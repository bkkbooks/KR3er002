body:
  text: 卷之四十七小兒雜病諸候三凡四十五論六十四注候注之言住也謂之風邪鬼氣留人身內也人無問大小若血氣虛衰則陰陽失守風邪鬼氣因而客之留在肌肉之間連滯腑臟之內或皮膚掣動遊易無常或心腹刺痛或體熱皮腫沉滯至死死又注易傍人故為注也小兒不能觸冒風邪多因乳母解脫之時不避溫涼暑濕或抱持出入早晚其神魂軟弱而為鬼氣所傷故病也六十五尸注候尸注者是五尸之中一尸注也人無問大小腹內皆有尸蟲尸蟲為性忌惡多接引外邪共為患害小兒血氣衰弱者精神亦羸故尸注因而為病其狀沉默不的知病處或寒熱淋瀝涉引歲月遂至於死死又注易傍人故名之為尸注也六十六蠱注候人聚蟲蛇雜類以器皿盛之令相啖食餘一存者即名為蠱能變化或隨飲食入腹食人五臟小兒有中者病狀與大人老子無異則心腹刺痛懊悶急者即死緩者涉歷歲月漸深羸困食心臟盡痢血心臟爛乃至死死又注易蠱人故為蠱注也六十七陰腫候足少陰為腎之經其氣下通於陰小兒有少陰之經虛而受風邪者邪氣衝於陰與血氣相搏結則陰腫也六十八腹脹候腹脹是冷氣客於臟故也小兒腑臟嫩弱有風冷邪氣客之搏於臟氣則令腹脹若脾虛冷移入於胃食則不消若腸虛冷氣乘之則變下痢六十九霍亂候霍亂者陰陽清濁二氣相干謂之氣亂氣亂於腸胃之間為霍亂也小兒腸胃嫩弱因解脫逢風冷乳哺不消而變吐痢也或乳母觸冒風冷食飲生冷物皆冷氣流入乳令乳變敗兒若飲之亦成霍亂吐痢皆是觸犯腑臟使清濁之氣相干故霍亂也挾風而絡實者則身發熱頭痛體疼而復吐痢凡小兒霍亂皆須暫斷乳亦以藥與乳母服令血氣調適乳汁溫和故也小兒吐痢不止血氣變亂即發驚癇也七十吐痢候吐痢者由腸虛而胃氣逆故也小兒有解脫而風冷入腸胃腸胃虛則泄痢胃氣逆則嘔吐此大體與霍亂相似而小輕不劇悶頓故直云吐痢亦不呼為霍亂也七十一服湯中毒毒氣吐下候春夏以湯下小兒其腸胃脆嫩不勝藥勢遂吐下不止藥氣熏臟腑乃煩懊頓乏者謂此為中毒毒氣吐下也七十二嘔吐逆候兒啼未定氣息未調乳母匆遽以乳飲之其氣尚逆乳不得下停滯胸膈則胸滿氣急令兒嘔逆變吐又乳母將息取冷冷氣入乳乳變壞不捻除之仍以飲兒冷乳入腹與胃氣相逆則腹脹痛氣息喘急亦令嘔吐又解脫換易衣裳及洗浴露兒身體不避風冷風冷因客膚腠搏血氣則熱入於胃則腹脹痛而嘔逆吐也凡如此風冷變壞之乳非直令嘔吐腸虛冷入於大腸則為痢也七十三噦候小兒噦由哺乳冷冷氣入胃與胃氣相逆冷折胃氣不通則令噦也七十四吐血候小兒吐血者是有熱氣盛而血虛熱乘於血血性得熱則流散妄行氣逆即血隨氣上故令吐血也七十五難乳候凡小兒初生看産人見兒出急以手料拭兒口無令惡血得入兒口則兒腹內調和無有疾病若料拭不及時則惡血穢露兒咽入腹令心腹痞滿短氣兒不能飲乳謂之難乳又云兒在胎之時母取冷過度冷氣入胞令兒著冷至兒生出則喜腹痛不肯飲乳此則胎寒亦名難乳也七十六吐哯候小兒吐哯者由乳哺冷熱不調故也兒乳哺不調則停積胸膈因更飲乳哺前後相觸氣不得宣流故吐哯出診其脈浮者無苦也七十七百病候小兒百病者由將養乖節或犯寒溫乳哺失時乍傷飢飽致令血氣不理腸胃不調或欲發驚癇或欲成伏熱小兒氣血脆弱病易動變證候百端故謂之百病也若見其微證即便治之使不成衆病治之若晚其病則成凡諸病至於困者汗出如珠著身不流者死也病如胸陷者其口唇乾目上反口中氣出冷足與頭相柱臥不舉手足四肢垂其臥正直如縛得其掌中冷至十日必死不可治也七十八頭身喜汗出候小兒有血氣未實者膚腠則疏若厚衣溫臥腑臟生熱蒸發腠理津液泄越故令頭身喜汗也七十九盜汗候盜汗者眠睡而汗自出也小兒陰陽之氣嫩弱腠理易開若將養過溫因睡臥陰陽氣交津液發泄而汗自出也八十痰候痰者水飲停積胸膈之間結聚痰也小兒飲乳因冷熱不調停積胸膈之間結聚成痰痰多則令兒飲乳不下吐涎沫變結而微壯熱也痰實壯熱不止則發驚癇八十一胸膈有寒候三焦不調則寒氣獨留膈上不通則令兒乳哺不得消下噫氣酸臭胸膈痞滿甚則氣息喘急八十二癥瘕癖結候五臟不和三焦不調有寒冷之氣客之則令乳哺不消化結聚成癥瘕癖結也其狀按之不動有形假者症也推之浮移者瘕也其弦急牢強或在左或在右癖也皆由冷氣痰水食飲結聚所成故云癥瘕癖結也八十三痞結候否者塞也小兒胸膈熱實腹內有留飲致令榮衛痞塞腑臟之氣不宣通其病腹納氣結脹滿或時壯熱是也八十四宿食不消候小兒宿食不消者脾胃冷故也小兒乳哺飲食取冷過度冷氣積於脾胃脾胃則冷胃為水穀之海脾氣磨而消之胃氣和調則乳哺消化若傷於冷則宿食不消診其三部脈沉者乳不消也八十五傷飽候小兒食不可過飽飽則傷脾脾傷不能磨消於食令小兒四肢沉重身體苦熱面黃腹大是也八十六食不知飽候小兒有嗜食食已仍不知飽足又不生肌肉其亦腹大其大便數而多泄亦呼為豁泄此腸胃不守故也八十七哺露候小兒乳哺不調傷於脾胃脾胃衰弱不能飲食血氣減損不榮肌肉而柴闢羸露其腑臟之不宣則吸吸苦熱謂之哺露也八十八大腹疔奚候小兒疔奚病者由哺食過度而脾胃尚弱不能磨消故也哺食不消則水穀之精減損無以榮其氣血致肌肉消瘠其病腹大頸小黃瘦是也若久不瘥則變成谷症傷飽一名哺露一名疔奚三種大體相似輕重立名也八十九洞泄下痢候春傷於風夏為洞泄小兒有春時解脫衣服為風冷所傷藏在肌肉至夏因飲食居處不調又被風冷入於腸胃先後重沓為風邪所乘則下痢也其冷氣盛痢甚為洞泄洞泄不止為注下也凡注下不止者多變驚癇所以然者本挾風邪因痢臟虛風邪乘之故也亦變眼痛生障下焦偏冷熱結上焦熏於肝故也九十痢後虛羸候腸胃虛弱受風冷則下痢利斷之後脾胃尚虛穀氣猶少不能榮血氣故虛羸也九十一赤白滯下候小兒體本挾熱忽為寒所折氣血不調大腸虛弱者則冷熱俱乘之熱搏血滲腸間其利則赤冷搏腸津液凝其痢則白冷熱相交血滯相雜腸虛者泄故為赤白滯下也九十二赤痢候小兒有挾客熱客熱入於經絡而血得熱則流散滲入大腸腸虛則泄故為赤痢也九十三熱痢候小兒本挾虛熱而為風所乘風熱俱入於大腸而痢為熱是水穀痢而色黃者為熱痢也九十四冷痢候小兒腸胃虛或解脫遇冷或飲食傷冷冷氣入於腸胃而痢其色白是為冷痢也冷甚則痢青也九十五冷熱痢候小兒先因飲食有冷氣在腸胃之間而復為熱氣所傷而腸胃宿虛故受於熱冷熱相交而變下痢乍黃乍白或水或谷是為冷熱痢也九十六卒痢候小兒卒痢者由腸胃虛暴為冷熱之氣所傷而為卒痢熱則色黃赤冷則色青白若冷熱相交則變為赤白滯痢也九十七久痢候春傷於風至夏為洞泄小兒春時解脫為風所傷藏在肌肉至夏因為水穀痢經久連滯不瘥也凡水穀痢久腸胃虛易為冷熱得冷則變白膿得熱則變赤血若冷熱相加則赤白相雜痢久則變腫滿亦變病𧈟亦令嘔噦皆由痢久脾胃虛所為也九十八重下痢候重下痢者此是赤白滯下利而挾熱多者熱結肛門痢不時下而久𠸯氣謂之重下痢也九十九痢如膏血候此是赤痢腸虛極腸間脂與血俱下故謂痢如膏血也一百蠱毒痢候歲時寒暑不調而有毒癘之氣小兒解脫為其所傷邪與血氣相搏入於腸胃毒氣蘊積值大腸虛者則變痢血其痢狀血色蘊瘀如雞鴨肝片隨痢下此是毒氣盛熱食於人臟狀如中蠱故謂之蠱毒痢也一百一痢兼渴候此是水穀痢津液枯竭腑臟虛燥則引飲若小便快者痢斷渴則止若小便澀水不行於小腸滲入腸胃渴亦不止痢亦不斷凡如此者皆身體浮腫脾氣弱不能剋水故也亦必眼痛生障小兒上焦本熱今又痢下焦虛上焦熱氣轉盛熱氣熏肝故也一百二被鬾候小兒所以有鬾病者婦人懷娠有惡神導其腹中胎妒嫉而制伏他小兒令病也妊娠婦人不必悉能制鬾人時有此耳鬾之為疾喜微微下寒熱有去來毫毛髮鬇鬡不悅是其證也一百三驚啼候小兒驚啼者是於眠睡里忽然而驚覺也由風熱邪氣乘於心則心臟生熱精神不定故臥不安則驚而啼也一百四夜啼候小兒夜啼者臟冷故也夜陰氣盛與冷相搏則冷動冷動與臟氣相併或煩或痛故令小兒夜啼也然亦有犯觸禁忌亦令兒夜啼則可法術斷之一百五躽啼候小兒在胎時其母將養傷於風冷邪氣入胞傷兒臟腑故兒生之後邪猶在兒腹內邪動與正氣相搏則腹痛故兒躽張蹙氣而啼一百六胎寒候小兒在胎時其母將養取冷過度冷氣入胞傷兒腸胃故兒生之後冷氣猶在腸胃之間其狀兒腸胃冷不能消乳哺或腹脹或時谷痢令兒顏色素皅時啼者是胎寒故也一百七腹痛候小兒腹痛多由冷熱不調冷熱之氣與臟腑相擊故痛也其熱而痛者則面赤或壯熱四肢煩手足心熱是也冷而痛者面色或青或白甚者乃至面黑唇口爪皆青是也一百八心腹痛候小兒心腹痛者腸胃宿挾冷又暴為寒氣所加前後冷氣重沓與臟氣相搏隨氣上下衝擊心腹之間故令心腹痛也
