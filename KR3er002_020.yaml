body:
  text: 卷之二十疝病諸候凡十一論一諸疝候諸疝者陰氣積於內復為寒氣所加使榮衛不調血氣虛弱故風冷入其腹內而成疝也疝者痛也或少腹痛不得大小便或手足厥冷繞臍痛白汗出或冷氣逆上搶心腹令心痛或裡急而腹痛此諸候非一故云諸疝也脈弦緊者疝也二寒疝候寒疝者陰氣積於內則衛氣不行衛氣不行則寒氣盛也故令惡寒不欲食手足厥冷繞臍痛白汗出遇寒即發故云寒疝也其脈弦緊者是也其湯熨針石別有正方補養宣導今附於後養生方導引法云蹲踞以兩手舉足蹲極橫治氣衝腫痛寒疝入上下致腎氣法蹲踞以兩手捉趾令離地低跟極橫挽自然一通愈榮沖中痛三寒疝心痛候夫寒疝心痛陰氣積結所生也陰氣不散則寒氣盛寒氣盛則痛上下無常言冷氣上衝於心故令心痛也四寒疝腹痛候此由陰氣積於內寒氣結搏而不散腑臟虛弱故風邪冷氣與正氣相擊則腹痛裡急故云寒疝腹痛也五寒疝心腹痛候此由腑臟虛弱風邪客於其間與真氣相擊故痛其痛隨氣上下或上衝於心或在於腹皆由寒氣所作所以謂之寒疝心腹痛也六寒疝積聚候積聚者由寒氣在內所生也血氣虛弱風邪搏於腑臟寒多則氣澀氣澀則生積聚也積者陰氣五臟所生始發不離其部故上下有所窮已聚者陽氣六腑所生也故無根本上下無所留止但諸臟腑受邪初未能為積聚邪氣留滯不去乃成積聚其為病也或左右脅下如覆杯或臍上下如臂或胃脘間覆大如盤羸瘦少氣或灑淅寒熱四肢不收飲食不為肌膚或累累如桃李或腹滿嘔泄寒即痛故云寒疝積聚也其脈快而緊積聚浮而牢積聚牢強急者生虛弱急者死七七疝候七疝者厥疝症疝寒疝氣疝盤疝胕疝狼疝此名七疝也厥逆心痛足寒諸飲食吐不下名曰厥疝也腹中氣乍滿心下盡痛氣積如臂名曰症疝也寒飲食即脅下腹中盡痛名曰寒疝也腹中乍滿乍減而痛名曰氣疝也腹中痛在臍旁名曰盤疝也腹中臍下有積聚名曰胕疝也小腹與陰相引而痛大行難名曰狼疝也凡七疝皆由血氣虛弱飲食寒溫不調之所生八五疝候一曰石疝二曰血疝三曰陰疝四曰妒疝五曰氣疝是為五疝也而範汪所錄華佗太一決疑雙丸方云治八痞五疝積聚伏熱留飲往來寒熱而不的顯五疝之狀尋此皆由腑臟虛弱飲食不節血氣不和寒溫不調之所生也九心疝候疝者痛也由陰氣積於內寒氣不散上衝於心故使心痛謂之心疝也其痛也或如錐刀所刺或陰陰而疼或四肢逆冷或唇口變青皆其候也十飢疝候陰氣在內寒氣客於足陽明手少陰之絡令食竟必飢心為之痛故謂之飢疝十一疝瘕候疝者痛也瘕者假也其病雖有結瘕而虛假可推移故謂之疝瘕也由寒邪與臟腑相搏所成其病腹內急痛腰背相引痛亦引小腹痛脈沉細而滑者曰疝瘕緊急而滑者曰疝瘕方云干脯曝之不燥者食之成疝瘕其湯熨針石別有正方補養宣導今附於後養生方導引法云挽兩足指五息止引腹中氣去疝瘕利孔竅又云坐舒兩腳以兩手捉大拇指使足上頭下極挽五息止引腹中氣遍行身體去疝瘕病利諸孔竅往來易行久行精爽聰明修長痰飲病諸候凡十六論一痰飲候痰飲者由氣脈閉塞津液不通水飲氣停在胸腑結而成痰又其人素盛今瘦水走腸間漉漉有聲謂之痰飲其為病也胸脅脹滿水穀不消結在腹內兩肋水入腸胃動作有聲體重多唾短氣好眠胸背痛甚則上氣咳逆倚息短氣不能臥其形如腫是也脈偏弦為痰浮而滑為飲其湯熨針石別有正方補養宣導今附於後養生方導引法云左右側臥不息十二通治痰飲不消右有飲病右側臥左有飲病左側臥又有不消以氣排之左右各十有二息治痰飲也二痰飲食不消候此由痰水結聚在胸腑膀胱之間久而不散流行於脾胃脾惡濕得水則脹脹則不能消食也或今腹裡虛滿或水穀不消化或時嘔逆皆其候也三熱痰候熱痰者謂飲水漿結積所生也言陰陽痞隔上焦生熱熱氣與痰水相搏聚而不散故令身體虛熱逆害飲食頭面吸吸而熱故云熱痰也四冷痰候冷痰者言胃氣虛弱不能宣行水穀故使痰水結聚停於胸膈之間時令人吞酸氣逆四肢變青不能食飲也五痰結實候此由痰水積聚在於胸腑遇冷熱之氣相搏結實不消故令人心腹痞滿氣息不安頭眩目暗常欲嘔逆故言痰結實六膈痰風厥頭痛候膈痰者謂痰水在於胸膈之上又犯大寒使陽氣不行令痰水結聚不散而陰氣逆上上與風痰相結上衝於頭即令頭痛或數歲不已久連腦痛故云膈痰風厥頭痛若手足寒冷至節即死七諸痰候諸痰者此由血脈壅塞飲水積聚而不消散故成痰也或冷或熱或結實或食不消或胸腹痞滿或短氣好眠諸候非一故云諸痰八流飲候流飲者由飲水多水流走於腸胃之間漉漉有聲謂之流飲遇血氣痞澀經絡不行水不宣通停聚溢於膀胱之間即令人短氣將息遇冷亦能虛脹久不瘥結聚而成癖也九流飲宿食候流飲宿食者由飲水過多水氣流行在脾胃之間脾得濕氣則不能消食令人噫則有宿食之氣腹脹滿亦壯熱或吞酸皆其候也十留飲候留飲者由飲酒後飲水多水氣停留於胸膈之間而不宣散乃令人脅下痛短氣而渴皆其候也十一留飲宿食候留飲宿食者由飲酒後飲水多水氣停留於脾胃之間脾得濕氣則不能消食令人噫氣酸臭腹脹滿吞酸所以謂之留飲宿食也十二癖飲候此由飲水多水氣停聚兩脅之間遇寒氣相搏則結聚而成塊謂之癖飲在脅下弦亙起按之則作水聲十三諸飲候諸飲者皆由榮衛氣痞澀三焦不調而因飲水多停積而成痰飲其為病也或兩脅脹滿或心胸煩悶或眼暗口乾或嘔逆短氣諸候非一故云諸飲其湯熨針石別有正方補養宣導今附於後養生方導引法云行左之右之側臥閉目氣不息十二通治諸飲不消右有飲病右不息排下消之又云鶩行氣低頭倚壁不息十二通以意排之痰飲宿食從下部出自愈鶩行氣者身直頸曲排氣下行而一通愈宿食久行自然能出不須孔塞也十四支飲候支飲謂飲水過多停積於胸膈之間支乘於心故云支飲其病令人咳逆喘息身體如腫之狀謂之支飲也十五溢飲候溢飲謂因大渴而暴飲水水氣溢於腸胃之外在於皮膚之間故言溢飲令人身體疼重而多汗是其候也十六懸飲候懸飲謂飲水過多留注脅下令脅間懸痛咳唾引脅痛故云懸飲癖病諸候凡十一論一癖候夫五臟調和則榮衛氣理榮衛氣理則津液通流雖復多飲水漿不能為病若攝養乖方則三焦痞隔三焦痞隔則腸胃不能宣行因飲水漿過多便令停滯不散更遇寒氣積聚而成癖癖者謂僻側在於兩脅之間有時而痛是也其湯熨針石別有正方補養宣導今附於後養生方云臥覺勿飲水更眠令人作水癖又云飲水勿急咽久成水癖養生方導引法云舉兩膝夾兩頰邊兩手據地蹲坐故久行之愈伏梁伏梁者宿食不消成癖腹中如杯如盤宿癰者宿水宿氣癖數生癰久行腸化為筋骨變為實二久癖候久癖謂因飲水過多水氣壅滯遇寒熱氣相搏便成癖在於兩肋下經久不瘥乃結聚成形弦亙而起按之乃水鳴積有歲年故云久癖三癖結候此由飲水聚停不散復因飲食相搏致使結積在於脅下時有弦亙起或脹痛或喘息短氣故云癖結脈緊實者癖結也四癖食不消候此由飲水結聚在於膀胱遇冷熱氣相搏因而作癖癖者冷氣也冷氣久乘於脾脾得濕冷則不能消穀故令食不消使人羸瘦不能食時泄利腹內痛氣力乏弱顏色黧黑是也關脈細微而絕者腹內有癖不能食也五寒癖候寒癖之為病是水飲停積肋下弦強是也因遇寒即痛所以謂之寒癖脈弦而大者寒癖也六飲癖候飲癖者由飲水過多在於脅下不散又遇冷氣相觸而痛即呼為飲癖也其狀脅下弦急時有水聲七痰癖候痰癖者由飲水未散在於胸腑之間因遇寒熱之氣相搏沉滯而成痰也痰又停聚流移於脅肋之間有時而痛即謂之痰癖八懸癖候懸癖者謂癖氣在脅肋之間弦亙而起咳唾則引脅下懸痛所以謂之懸癖九酒癖候夫酒癖者因大飲酒後渴而引飲無度酒與飲俱不散停滯在於脅肋下結聚成癖時時而痛因即呼為酒癖其狀脅下弦急而痛十酒癖宿食不消候此由飲酒多食魚膾之類腹內痞滿因而成渴渴又飲水水氣與食結聚兼遇寒氣相加所以成癖癖氣停聚乘於脾胃脾胃得癖氣不能消化故令宿食不消腹內脹滿噫氣酸臭吞酸氣急所以謂之酒癖宿食不消也十一飲酒人瘀癖菹痰候夫飲酒人大渴渴而飲水水與酒停聚胸膈之上蘊積不散而成癖也則令嘔吐宿水色如菹汁小豆汁之類酸苦者故謂之酒癖菹痰也痞噎病諸候凡八論一八痞候夫八痞者榮衛不和陰陽隔絕而風邪外入與衛氣相搏血氣壅塞不通而成痞也痞者塞也言腑臟痞塞不宣通也由憂恚氣積或墜墮內損所致其病腹納氣結脹滿時時壯熱是也其名有八故云八痞而方家不的顯其證狀範汪所錄華佗太一決疑雙丸方云治八痞五疝積聚伏熱留飲往來寒熱亦不說八痞之名也二諸痞候諸痞者榮衛不和陰陽隔絕腑臟痞塞而不宣通故謂之痞但方有八痞五痞或六痞以其名狀非一故云諸痞其病之候但腹納氣結脹滿閉塞不通有時壯熱與前八痞之勢不殊故云諸痞其湯熨針石別有正方補養宣導今附於後養生方導引法云正坐努腰胸仰舉頭將兩手指相對向前捺席使急身如共頭胸向下欲至席還起上下來去二七去胸肋痞臟冷臑疼悶腰脊悶也三噎候夫陰陽不和則三焦隔絕三焦隔絕則津液不利故令氣塞不調理也是以成噎此由憂恚所致憂恚則氣結氣結則不宣流使噎噎者噎塞不通也四五噎候夫五噎謂一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎雖有五名皆由陰陽不和三焦隔絕津液不行憂恚嗔怒所生謂之五噎噎者噎塞不通也五氣噎候此由陰陽不和臟氣不理寒氣填於胸膈故氣噎塞不通而謂之氣噎令人喘悸胸背痛也六食噎候此由臟氣冷而不理津液澀少而不能傳行飲食故飲食入則噎塞不通故謂之食噎胸內痛不得喘息食不下是故噎也七久寒積冷候此患由血氣衰少腑臟虛弱故令風冷之氣獨盛於內其冷氣久積不散所以謂之久寒積冷也其病令人羸瘦不能飲食久久不瘥更觸犯寒氣乃變成積聚吐利而嘔逆也八腹內結強候此由榮衛虛弱三焦不調則令虛冷在內蓄積而不散也又飲食氣與冷氣相搏結強而成塊有上有下或沉或浮亦有根亦無根或左或右也故謂之腹內結強久而不瘥積於年歲轉轉長大乃變成癥瘕病也
