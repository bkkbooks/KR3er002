body:
  text: 卷之二十一脾胃病諸候凡五論一脾胃氣虛弱不能飲食候脾者臟也胃者腑也脾胃二氣相為表裡胃為水穀之海主受盛飲食者也脾氣磨而消之則能食今脾胃二氣俱虛弱故不能飲食也尺脈浮滑不能飲食速疾者食不消脾不磨也二脾胃氣不和不能飲食候脾者臟也胃者腑也脾胃二氣相為表裡胃受谷而脾磨之二氣平調則谷化而能食若虛實不等水穀不消故令腹內虛脹或泄不能飲食所以謂之脾胃氣不和不能飲食也其湯尉針石別有正方補養宣導今附於後養生方導引法云欹身兩手一向偏側急努身舒頭共手競扒相牽漸漸一時盡勢氣共力皆和來去左右亦然各三七項前後兩角緩舒手如是似向外扒放縱身心搖三七遞互亦然去太倉不和臂腰虛悶也三胃反候榮衛俱虛其血氣不足停水積飲在胃脘則臟冷臟冷則脾不磨脾不磨則宿穀不化其氣逆而成胃反也則朝食暮吐暮食朝吐心下牢大如杯往往寒熱甚者食已即吐其脈緊而弦緊則為寒弦則為虛虛寒相搏故食已即吐名為胃反四五臟及身體熱候榮衛不調陰陽痞隔若陽氣虛陰氣盛則生寒冷之病今陰氣虛陽氣實故身體五臟皆生熱其狀吸吸而熱唇口乾小便赤也五肺萎候肺主氣為五臟上蓋氣主皮毛故易傷於風邪風邪傷於腑臟而血氣虛弱又因勞役大汗之後或經大下而亡津液津液竭絶肺氣壅塞不能宣通諸臟之氣因成肺萎也其病咳唾而嘔逆涎沫小便數是也咳唾咽燥欲飲者必愈欲咳而不能咳唾干沫而小便不利者難治診其寸口脈數肺萎也甚則脈浮弱嘔噦病諸候凡六論一乾嘔候乾嘔者胃氣逆故也但嘔而欲吐吐而無所出故謂之乾嘔二嘔噦候嘔噦之病者由脾胃有邪穀氣不治所為也胃受邪氣逆則嘔脾受邪氣脾脹氣逆遇冷折之氣逆不通則噦也三噦候脾胃俱虛受於風邪故令新谷入胃不能傳化故谷之氣與新谷相干胃氣則逆胃逆則脾脹氣逆因遇冷折之則噦也右手關上脈沉而虛者善噦也四嘔吐候嘔吐者皆由脾胃虛弱受於風邪所為也若風邪在胃則嘔膈間有停飲胃內有久寒則嘔而吐其狀長大息心裡淡淡然或煩滿而大便難或溏泄並其候也其湯尉針石別有正方補養宣導今附於後養生方云八月勿食姜一云被霜瓜向冬發寒熱及溫病食欲吐或心中停飲不消或為反胃養生方導引法云正坐兩手向後捉腕反向拓席盡勢使腹弦弦上下七左右換手亦然除腹肚冷風宿氣積胃口冷食飲進退吐逆不下又云偃臥展兩脛兩手左右蹺兩足踵以鼻納氣自極七息除腹中病食苦嘔又云坐直舒兩腳以兩手挽兩足自極十二通愈腸胃不能受食吐逆以兩手直叉兩腳底兩腳痛舒以頭抵膝上自極十二通愈腸胃不能受食吐逆五噫醋候噫醋者由上焦有停痰脾胃有宿冷故不能消穀谷不消則脹滿而氣逆所以好噫而吞酸氣息醋臭六噁心候噁心者由心下有停水積飲所為也心主火脾主土土性剋水今脾虛則土氣衰弱不能克消水飲水飲之氣不散上乘於心復遇冷氣所加之故令火氣不宣則心裡淡淡然欲吐名為噁心也宿食不消病諸候凡四論一宿食不消候宿食不消由臟氣虛弱寒氣在於脾胃之間故使穀不化也宿谷未消新谷又入脾氣既弱故不能磨之則經宿而不消也令人腹脹氣急噫氣醋臭時復憎寒壯熱是也或頭痛如瘧之狀寸口脈浮大按之反澀尺脈亦微而澀者則宿食不消也其湯尉針石別有正方補養宣導今附於後養生方導引法云凡食訖覺腹內過飽腸內先有宿氣常須食前後兩手撩膝左右欹身肚腹向前努腰就肚左三七右二七轉身按腰脊極勢去太倉腹內宿氣不化脾痹腸瘦臟腑不和得令腹脹滿日日消除又云閉口微息正坐向王氣張鼻取氣逼置齊下小口微出氣十二通以除結聚低頭不息十二通以消飲食令身輕強行之冬月不寒又云端坐伸腰舉左手仰掌以右手承右脅以鼻納氣自極七息除胃中寒食不消又云端坐伸腰舉右手仰掌以左手承左脅以鼻納氣自極七息所除胃寒食不變則愈又云鶩行氣低頭倚壁不息十二通以意排之痰飲宿食從下部出自愈鶩行氣者身直頸曲排氣下行十二通愈宿食又云雁行氣低臂推膝踞以繩自縛拘左低頭倚臂不息十二通消食輕身益精神惡氣不入去萬邪一本云正坐仰天呼吸天精解酒食飲飽出氣吐之數十須臾立飢且醒夏月行之令人清涼二食傷飽候夫食過於飽則脾不能磨消令氣急煩悶睡臥不安寸口脈盛而緊者傷於食脈緩大而實者傷於食也其湯尉針石別有正方補養宣導今附於後養生方導引法云若腹中滿食飲苦飽端坐伸腰以口納氣數十滿吐之以便為故不便復為之有寒氣腹中不安亦行之又云端坐伸腰口納氣數十除腹中滿食飲過飽寒熱腹中痛病三谷勞候脾胃虛弱不能傳消穀食使腑臟氣痞塞其狀令人食已則臥支體煩重而嗜眠是也四卒食病似傷寒候此由脾胃有伏熱因食不消所以發熱狀似傷寒但言身不疼痛為異也水腫病諸候凡二十二論一水腫候腎者主水脾胃俱主土土性剋水脾與胃合相為表裡胃為水穀之海今胃虛不能傳化水氣使水氣滲溢經絡浸漬腑臟脾得水濕之氣加之則病脾病則不能制水故水氣獨歸於腎三焦不瀉經脈閉塞故水氣溢於皮膚而令腫也其狀目里上微腫如新臥起之狀頸脈動時咳股間冷以手按腫處隨手而起如物里水之狀口苦舌乾不得正偃偃則咳清水不得臥臥則驚驚則咳甚小便黃澀是也水病有五不可治第一唇黑傷肝第二缺盆平傷心第三臍出傷脾第四足下平滿傷腎第五背平傷肺凡此五傷必不可治脈沉者水也脈洪大者可治微細者死其湯尉針石別有正方補養宣導今附於後養生方云十一月勿食經夏自死肉脯內動於腎喜成水病又云人臥勿以腳懸踏高處不久遂致成腎水也養生方導引法云蛤蟆行氣正坐動搖兩臂不息十二通以治五勞水腫之病二水通身腫候水病者由腎脾俱虛故也腎虛不能宣通水氣脾虛又不能制水故水氣盈溢滲液皮膚流遍四肢所以通身腫也令人上氣體重小便黃澀腫處按之隨手而起是也三風水候風水病者由脾腎氣虛弱所為也腎勞則虛虛則汗出汗出逢風風氣內入還客於腎脾虛又不能制於水故水散溢皮膚又與風濕相搏故云風水也令人身浮腫如里水之狀頸脈動時咳按腫上凹而不起也骨節疼痛而惡風是也脈浮大者名曰風水也四十水候十水者青水赤水黃水白水黑水懸水風水石水暴水氣水也青水者先從面目腫遍一身其根在肝赤水者先從心腫其根在心黃水者先從腹腫其根在脾白水者先從腳腫上氣而咳其根在肺黑水者先從腳趺腫其根在腎懸水者先從面腫至足其根在膽風水者先從四肢起腹滿大身盡腫其根在胃石水者先從四肢小腹腫獨大其根在膀胱暴水者先腹滿其根在小腸氣水者乍盛乍虛乍來乍去其根在大腸皆由榮衛痞澀三焦不調腑臟虛弱所生雖名證不同並令身體虛腫喘息上氣小便黃澀也五大腹水腫候夫水腫病者皆由榮衛痞澀腎脾虛弱所為而大腹水腫者或因大病之後或積虛勞損或新熱食竟入於水自漬及浴令水氣不散流溢腸外三焦閉塞小便不通水氣結聚於內乃腹大而腫故四肢小陰下濕手足逆冷腰痛上氣咳嗽煩疼故云大腹水腫六身面卒洪腫候身面卒洪腫者亦水病之候腎脾虛弱所為腎主水腎虛故水妄行脾主土脾虛不能剋制水故水流溢散於皮膚令身體卒然洪腫股間寒足䯒壅是也七石水候腎主水腎虛則水氣妄行不依經絡停聚結在臍間小腹腫大硬如石故云石水其候引脅下脹痛而不喘是也脈沉者名曰石水尺脈微大亦為石水腫起臍下至小腹垂垂然上至胃脘則死不治八皮水候肺主於皮毛腎主於水腎虛則水妄行流溢於皮膚故令身體面目悉腫按之沒指而無汗也腹如故而不滿亦不渴四肢重而不惡風是也脈浮者名曰皮水也九水腫咳逆上氣候腎主水肺主氣腎虛不能制水故水妄行浸溢皮膚而身體腫滿流散不已上乘於肺肺得水而浮浮則上氣而咳嗽也十水腫從腳起候腎者陰氣主於水而又主腰腳腎虛則腰腳血氣不足水之流溢先從虛而入故腰腳先腫也十一水分候水分者言腎氣虛弱不能制水令水氣分散流布四肢故云水分但四肢皮膚虛腫聶聶而動者名水分也十二毛水候夫水之病皆由腎虛所為腎虛則水流散經絡始溢皮毛今此毛水者乃肺家停積之水流溢於外肺主皮毛故余經未傷皮毛先腫因名毛水也十三疸水候水病無不由脾腎虛所為脾腎虛則水妄行盈溢皮膚而令身體腫滿此疸水者言脾胃有熱熱氣流於膀胱使小便澀而身面盡黃腹滿如水狀因名疸水也十四燥水候燥水謂水氣溢於皮膚因令腫滿以指畫肉上則隱隱成文字者名曰燥水也十五濕水候濕水者謂水氣溢於皮膚因令腫滿以指畫肉上隨畫隨散不成文字者名曰濕水故也十六犯土腫候犯土之病由居住之處穿鑿地土犯之土氣而致病也令人身之肌肉頭面遍體盡腫滿氣急故謂之犯土也十七不伏水土候不伏水土者言人越在他境乍離封邑氣候既殊水土亦別因而生病故云不伏水土病之狀身體虛腫或下痢而不能食煩滿氣上是也十八二十四水候夫水之病皆生於腑臟方家所出立名不同亦有二十四水或十八水或十二水或五水不的顯名證尋其病根皆由榮衛不調經脈痞澀脾胃虛弱使水氣流溢盈散皮膚故令遍體腫滿喘息上氣目果浮腫頸脈急動不得眠臥股間冷小便不通是其候也十九水症候水症者由經絡痞澀水氣停聚在於腹內大小腸不利所為也其病腹內有結塊堅強在兩脅間膨膨脹滿遍身腫所以謂之水症二十水瘕候水瘕者由經絡痞澀水氣停聚在於心下腎經又虛不能宣利溲便致令水氣結聚而成形假在於心腹之間抑按作水聲但欲飲而不用食遍身虛腫是也二十一水蠱候此由水毒氣結聚於內令腹漸大動搖有聲常欲飲水皮膚粗黑如似腫狀名水蠱也二十二水癖候水癖由飲水漿不消水氣結聚而成癖在於兩脅之側轉動便痛不耐風寒不欲食而短氣是也癖者謂僻側在於脅間故受名也
