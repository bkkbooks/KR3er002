body:
  text: 卷之十三氣病諸候凡二十五論一上氣候夫百病皆生於氣故怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收聚熱則腠理開而氣泄憂則氣亂勞則氣耗思則氣結九氣不同怒則氣逆甚則嘔血及食而氣逆上也喜則氣和榮衛行通利故氣緩焉悲則心系急肺布葉舉使上焦不通榮衛不散熱氣在內故氣消也恐則精卻精卻則上焦閉閉則氣還還則下焦脹故氣不行寒則經絡凝澀故氣收聚也熱則腠理開榮衛通故汗大泄也憂則心無所寄神無所歸慮無所定故氣亂矣勞則喘且汗外內皆越故氣耗矣思則身心有所止氣留不行故氣結矣診寸口脈伏胸中逆氣是諸氣上衝朐中故上氣面胕腫膊息其脈浮大不治上氣脈躁而喘者屬肺肺脹欲作風水發汗愈脈洪則為氣其脈虛寧伏匿者生牢強者死喘息低仰其脈滑手足溫者生也澀而四末寒者死也上氣脈數者死謂其形損故也其湯燙針石別有正方補養宣導今附於後養生方云飲水勿急咽久成氣病養生方導引法云兩手向後合手拓腰向上急勢振搖臂肘來去七始得手不移直向上向下盡勢來去二七去脊心肺氣壅悶消散又云凡學將息人先須正坐並膝頭足初坐先足指相對足跟外扒坐上少欲安穩須兩足跟向內相對坐上足指外扒覺悶痛漸漸舉身似款便坐上待共兩坐相似不痛始雙豎腳跟向上坐上足指並反向外每坐常學去膀胱內冷膝風冷足疼上氣腰痛儘自消適也又云兩足兩指相向五息止引心肺去咳逆上氣極用力令兩足相向意止引肺中氣出病人行肺內外展轉屈伸隨適無有違逆二卒上氣候肺主於氣若肺氣虛實不調或暴為風邪所乘則腑臟不利經絡痞澀氣不宣和則卒上氣也又因有所怒則氣卒逆上甚則變嘔血氣血俱傷其湯尉針石別有正方補養宣導今附於後養生方導引法云兩手交叉頤下自極致補氣治暴氣咳以兩手交頤下各把兩頤脈以頤句交中急牽來著喉骨自極三通致補氣充足治暴氣上氣寫喉等病令氣調長音聲弘亮三上氣鳴息候肺主於氣邪乘於肺則肺脹脹則肺管不利不利則氣道澀故氣上喘逆鳴息不通診其肺脈滑甚為息奔上氣脈出魚際者主喘息其脈滑者生快者死也四上氣喉中如水雞鳴候肺病令人上氣兼胸膈痰滿氣行壅滯喘息不調致咽喉有聲如水雞之鳴也五奔氣候夫氣血循行經絡周而復始皆有常度肺為五臟上蓋主通行於腑臟之氣若肺受邪則氣道不利氣道不利則諸臟氣壅則失度故氣奔急也六賁豚氣候夫賁豚氣者腎之積氣起於驚恐憂思所生若驚恐則傷神心藏神也憂思則傷志腎藏志也神志傷動氣積於腎而氣下上游走如豚之奔故曰賁豚其氣乘心若心中踴踴如事所驚如人所恐五臟不定食飲輒嘔氣滿胸中狂癡不定妄言妄見此驚恐賁豚之狀若氣滿支心心下悶亂不欲聞人聲休作有時乍瘥乍極吸吸短氣手足厥逆內煩結痛溫溫欲嘔此憂思賁豚之狀診其脈來觸祝觸祝者病賁豚也腎脈微急沉厥賁豚其足不收不得前後七上氣嘔吐候肺主於氣肺為邪所乘則上氣此為膈內有熱胃間有寒寒從胃上乘於肺與膈內熱相搏故乍寒乍熱而上氣上氣動於胃胃氣逆故嘔吐也八上氣腫候肺主於氣候身之皮毛而氣之行循環臟腑流通經絡若外為邪所乘則膚腠閉密使氣內壅與津液相併不得泄越故上氣而身腫也九結氣候結氣病者憂思所生也心有所存神有所止氣留而不行故結於內其湯尉針石別有正方補養宣導今附於後養生方云哭泣悲來新哭訖不用即食久成氣病養生方導引法云坐伸腰舉左手仰其掌卻右臂覆右手以鼻納氣自極七息息間稍頓右手除兩臂背痛結氣又云端坐伸腰舉左手仰掌以右手承右脅以鼻納氣自極七息除結氣又云兩手拓肘頭拄席努肚上極勢待大悶始下來去上下五七去脊背體內疼骨節急強肚腸宿氣行忌太飽不得用肚編也十冷氣候夫臟氣虛則內生寒也氣常行腑臟腑臟受寒冷即氣為寒冷所並故為冷氣其狀或腹脹或腹痛甚則氣逆上而面青手足冷十一七氣候七氣者寒氣熱氣怒氣恚氣憂氣喜氣愁氣凡七氣積聚牢大如杯若柈在心下腹中疾痛欲死飲食不能時來時去每發欲死如有禍狀此皆七氣所生寒氣則嘔吐噁心熱氣則說物不章言而遑怒氣則上氣不可忍熱痛上搶心短氣欲死不得氣息也恚氣則積聚在心下心滿不得飲食憂氣則不可極作暮臥不安席喜氣即不可疾行不能久立愁氣則喜忘不識人語置物四方還取不得去處若聞急即手足筋攣不舉十二九氣候九氣者謂怒喜悲恐寒熱憂勞思因此九事而傷動於氣一曰怒則氣逆甚則嘔血及食而氣逆也二曰喜則其氣緩榮衛通利故氣緩三曰悲則氣消悲則使心系急肺布葉舉使上焦不通熱氣在內故氣消也四曰恐則氣下恐則精卻精卻則上焦閉閉則氣還氣還則下焦脹故氣不行五曰寒則氣收聚寒使經絡凝澀使氣不宣散故也六曰熱則腠理開腠理開則榮衛通汗大泄七曰憂則氣亂氣亂則心無所寄神無所歸慮無所定故氣亂八曰勞則氣耗氣耗則喘且汗外內皆越故氣耗也九曰思則氣結氣結則心有所止故氣留而不行衆方說此九氣互有不同但氣上之由有九故名為九氣類也十三短氣候平人無寒熱短氣不足以息者體實實則氣盛盛則氣逆不通故短氣又肺虛則氣少不足亦令短氣則其人氣微常如少氣不足以呼吸診其脈尺寸俱微血氣不足其人短氣寸口脈沉胸中短氣脈前小後大則為胸滿短氣脈洪大者亦短氣也十四五膈氣候五膈氣者謂憂膈恚膈氣膈寒膈熱膈也憂膈之病胸中氣結煩悶津液不通飲食不下羸瘦不為氣力恚膈之為病心下苦實滿噫輒酢心食不消心下積結牢在胃中大小便不利氣膈之為病胸脅逆滿咽塞胸膈不通噫聞食臭寒膈之為病心腹脹滿咳逆腹上苦冷雷鳴繞臍痛食不消不能食肥熱膈之為病臟有熱氣五心中熱口中爛生瘡骨煩四肢重唇口乾燥身體頭面手足或熱腰背皆疼痛胸痹引背食不消不能多食羸瘦少氣及癖也此是方家所說五膈形證也經云陽脈結謂之膈言憂恚寒熱動氣傷神而氣之與神併為陽也傷動陽氣致陰陽不和而腑臟生病結於胸膈之間故稱為膈氣衆方說五膈互有不同但傷動之由有五故云五膈氣十五逆氣候夫逆氣者因怒則氣逆甚則嘔血及食而氣逆上人有逆氣不得臥而息有音者有起居如故而息有音者有得臥行而喘者有不能臥不能行而喘者有不能臥臥而喘者皆有所起其不得臥而息有音者是陽明之逆足三陽者下行今逆而上行故息有音陽明者為胃脈也胃者六腑之海其氣亦下行陽明逆氣不得從其道故不得臥夫胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆絡脈之氣不得隨經上下故留經而不行此絡脈之疾人故起居如故而息有音不得臥臥而喘者是水氣之客夫水者循津液而流也腎者水臟主津液津液主臥而喘診其脈趺陽脈太過則令人逆氣背痛溫溫然寸口脈伏胸中有逆氣關上脈細其人逆氣腹痛脹滿其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥以左足踵拘右足拇指鼻納氣自極七息除癖逆氣十六厥逆氣候厥者逆也謂陰氣乘於陽陰氣居於下陽氣處於上陽虛則陰實實則陰盛陰盛則上乘於陽衛氣為之厥逆失於常度故寒從背起手足冷逆陰盛故也十七少氣候此由臟氣不足故也肺主於氣而通呼吸臟氣不足則呼吸微弱而少氣胸痛少氣者水在臟腑水者陰氣陰氣在內故少氣診右手寸口脈陰實者肺實也苦少氣胸內滿彭彭與膊相引脈來濡者虛少氣也左手關上脈陰陽俱虛者足厥陰少陽俱虛也病苦少氣不能言右手關上脈陰陽俱虛者足太陰陽明俱虛也病苦胃中如空狀少氣不足以息四逆寒脈弱者少氣皮膚寒脈小者少氣也十八遊氣候夫五臟不調則三焦氣滿滿則氣遊於內不能宣散故其病但煩滿虛脹十九胸脅支滿候肺之積氣在於右脅肝之積氣在於左脅二臟虛實不和氣蓄於內故胸脅支滿春脈不及令人胸痛引背下則兩脅脹滿寸口脈滑為陽實胸中逆滿也二十上氣胸脅支滿候寒冷在內與臟腑相搏積於脅下冷乘於氣氣則逆上衝於胸脅故上氣而胸脅支滿二十一久寒胸脅支滿候陰氣積於內久而不已則生寒寒氣與臟氣相搏衝於胸脅故支滿二十二乏氣候夫虛極之人榮衛減耗腑臟虛弱氣行不足所以呼吸氣短也二十三走馬奔走及人走乏飲水得上氣候夫走馬及人走則大動於氣氣逆於胸內未得宣散而又飲水水搏於氣故有上氣二十四食熱餅觸熱飲水發氣候夫食熱皆觸動肺氣則熱聚肺間熱氣未歇而飲冷水水入於肺冷熱相搏氣聚不宣為冷所乘故令發氣二十五氣分候夫氣分者由水飲搏於氣結聚所成氣之流行常無壅滯若有停積水飲搏於氣則氣分結而住故云氣分腳氣病諸候凡八論一腳氣緩弱候凡腳氣病皆由感風毒所致得此病多不即覺或先無他疾而忽得之或因衆病後得之初甚微飲食嬉戲氣力如故當熟察之其狀自膝至腳有不仁或若痹或淫淫如蟲所緣或腳指及膝脛灑灑爾或腳屈弱不能行或微腫或酷冷或痛疼或緩從不隨或攣急或至困能飲食者或有不能者或見飲食而嘔吐惡聞食臭或有物如指發於腨腸徑上衝心氣上者或舉體轉筋或壯熱頭痛或胸頭沖悸寢處不欲見明或腹內苦痛而兼下者或言語錯亂有善忘誤者或眼濁精神昏憒者此皆病之證也若治之緩便上入腹入腹或腫或不腫胸脅滿氣上便殺人急者不全日緩者或一二三日初得此病便宜速治之不同常病病既入臟其脈有三品內外證候相似但脈異耳若病人脈得浮大而緩宜服續命湯兩劑若風盛宜作越婢湯加朮四兩若脈轉快而緊宜服竹瀝湯脈微而弱宜服風引湯二三劑此皆多是因虛而得若大虛乏氣短可以間作補湯隨病體之冷熱而用若未愈更作竹瀝湯若病人脈浮大而緊快此是三品之最惡脈脈或沉細而快者此脈正與浮大而緊者同是惡脈浮大者病在外沉細者病在內治亦不異當消息以意耳其形或尚可而手腳未及至弱數日之內上氣便死如此之脈急服竹瀝湯日一劑湯勢恆令相及勿令半日之內空無湯也若服竹瀝湯得下者必佳此湯竹汁多服之皆須熱服不熱輒停在胸膈更為人患若已服數劑病及脈勢未折而若脹滿者可以大鱉甲湯下之湯熱盡而不得下可以丸藥助令得下下後更服竹瀝湯趣令脈勢折氣息料理乃佳江東嶺南土地卑下風濕之氣易傷於人初得此病多從下上所以腳先屈弱然後毒氣循經絡漸入腑臟腑臟受邪氣便喘滿以其病從腳起故名腳氣其湯尉針石別有正方補養宣導今附於後養生方導引法云坐兩足長舒自縱身納氣向下使心內柔和適散然後屈一足安膝下長舒一足仰足指向上使急仰眠頭不至席兩手急努向前頭向上努挽一時各各取勢來去二七遞互亦然去腳疼腰膊冷血冷風痹日日漸損又云覆臥傍視立兩踵伸腰以鼻納氣自極七息除腳中弦痛轉筋腳痠疼腳痹弱又云舒兩足坐散氣向湧泉可三通氣徹到始收右足屈卷將兩手急捉腳湧泉挽足踏手挽一時取勢手足用力送氣向下三七不失氣數尋去腎內冷氣膝冷腳疼也又云一足屈之足指仰使急一足安膝頭散心兩足跟出氣向下一手拓膝頭向下急捺一手向後拓席一時極勢左右亦然二七去膝髀疼急又云一足踏地一足向後將足解溪安踹上急努兩手偏相向後側身如轉極勢二七左右亦然去足疼痛痹急腰痛也二腳氣上氣候此由風濕毒氣初從腳上後轉入腹而乘於氣故上氣也三腳氣痹弱候此由血氣虛弱若受風寒濕毒與血並行膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也四腳氣疼不仁候此由風濕毒氣與血氣相搏正氣與邪氣交擊而正氣不宣散故疼痛邪在膚腠血氣則澀澀則皮膚厚搔之如隔衣不覺知是名為痹不仁也五腳氣痹攣候腳氣之病有挾風毒風毒則搏於筋筋為攣風濕乘於血則痹故令痹攣也六腳氣心腹脹急候此由風濕毒氣從腳上入於內與臟氣相搏結聚不散故心腹脹急也七腳氣腫滿候此由風濕毒氣搏於腎經腎主於水今為邪所搏則腎氣不能宣通水液水液不傳於小腸致壅溢腑臟腑臟既浸漬溢於皮膚之間故腫滿也八腳氣風經五臟驚悸候夫溫濕成腳氣而挾風毒毒少風多則風證偏見風邪之來初客膚腠後經腑臟臟虛乘虛而入經遊五臟與神氣相搏神氣為邪所乘則心驚悸也
