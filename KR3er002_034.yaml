body:
  text: 卷之三十四瘻病諸候凡三十五論一諸瘻候諸瘻者謂瘻病初發之由不同至於瘻成形狀亦異有以一方而治之者故名諸瘻非是諸病共成一瘻也而方説九瘻者是狼瘻鼠瘻螻蛄瘻蜂瘻蚍蜉瘻蠐螬瘻浮疽瘻瘰癧瘻轉脈瘻此頸之九瘻也狼瘻者年少之時不自謹慎或大怒氣上不下之所生也始發之時在於頸項有根出缺盆上轉連耳本其根在肝鼠瘻者飲食之時有擇蟲蛆毒變化所生也使人寒熱其根在肺螻蛄瘻者食果蓏子不避有蟲即便啖之外絶於綱內絶於腸有毒不去變化所生也始發之時在於頸上狀如蝸形癮疹而出也其根在大腸蜂瘻者食飲勞倦渴乏多飲流水即得蜂毒不去變化所生也始發之時其根在頸歷歷三四處俱腫以潰生瘡狀如癰形瘥而復移其根在脾蚍蜉瘻者因寒腹中臚脹所得寒毒不去變化所生也始發之時在其頸項使人壯熱若傷寒有似疥癬婁婁孔出其根在肺蠐螬瘻者恐懼愁憂思慮哭泣不止餘毒變化所生也始發之時在其頸項無頭尾如棗核或移動皮中使人寒熱心滿其根在心浮疽瘻者因恚結馳思往反變化所生也始發之時在於頸亦在掖下如兩指無頭尾使人寒熱欲嘔吐其根在膽瘰癧瘻者因強力入水坐濕地或新沐浴汗入頭中流在頸上之所生也始發之時在其頸項恆有膿使人寒熱其根在腎轉脈瘻者因飲酒大醉夜臥不安驚欲嘔轉側失枕之所生也始發之時在其頸項濯濯脈轉身如振使人寒熱其根在小腸復有三十六種瘻方不可次第顯其名而有蜣螂蚯蚓等諸瘻非九瘻之名此即應是三十六種瘻之數也但瘻病之生或因寒暑不調故血氣壅結所作或由飲食乖節狼鼠之精入於腑臟毒流經脈變化而生皆有使血脈結聚寒熱相交久則成膿而潰漏也其生身體皮肉者亦有始結腫與石癰相似所可異者其腫之中按之纍纍有數脈喜發於頸邊或兩邊俱起便是瘻證也亦發兩掖下及兩顳顬間初作喜不痛不熱若失時治即生寒熱也所發之處而有輕重重者有兩種一則發口上寫有結核大小無定或如桃李大此蟲之窠窟止在其中二則發口之下無有結核而穿潰成瘡又蟲毒之居或腑臟無定故瘻發身體亦有數處其相應通者多死其瘻形狀起發之由今辨於後章養生方云六月勿食自落地五果經宿蚍蜉螻蛄蜣螂遊上喜為九瘻又云十二月勿食狗鼠殘肉生瘡及瘻出頸項及口裡或生咽內二鼠瘻候鼠瘻者由飲食不擇蟲蛆毒變化入腑臟出於脈稽留脈內而不去使人寒熱其根在肺出於頸掖之間其浮於脈中而未內著於肌肉而外為膿血者易去也決其生死者反其目視之其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死赤脈而不下貫瞳子可治也養生方云正月勿食鼠殘食作鼠瘻發於頸項或毒入腹下血不止或口生瘡如有蟲食三蜂瘻候蜂瘻者由飲食勞倦渴乏多飲流水即得蜂毒流入於臟其根在脾出發於頸項歷歷三四處或纍纍四五處蜂臺或發胸前俱腫以潰生瘡狀如癰形瘥而復移四蟻瘻候蟻瘻者由飲食有蟻精氣毒入於五臟流出經絡多著頸項戢戢然小腫核細乃遍身體五蚍蜉瘻候蚍蜉瘻者由飲食內有蚍蜉毒氣入於臟流於經脈使身寒似傷寒腹虛臚脹其根在肺發於頸項如疥癬婁婁孔出初生癢搔之生痕不治一百日生蚍蜉瘻六蠅瘻候此由飲食內有蠅窠子因誤食之入於腸胃流注入血脈變化生瘻發於頸下初生癢幣幣如蠅窠子狀使人寒熱久其中化生蠅也七螻蛄瘻候螻蛄瘻者由食果蓏子不避有蟲即便啖之有蟲氣入於腹內外發於頸其根在大腸初生之時其狀如風矢亦如蝸形癮疹而癢搔之則引大如四寸更其中生道乃有數十中生螻蛄亦有十數不治二年殺人八蠐螬瘻候此由恐懼愁憂思慮哭泣不止餘毒變化所生內動於臟外發頸項其根在心又方根在膀胱初生之時無頭尾腫如棗核或移動皮中使人寒熱心滿狀似蜂瘻而深坎蜂瘻則高而圓蠐螬瘻方五寸更疼痛日夜令人呻號三年生孔道乃有十數中生蠐螬乃有百數不治五年殺人九雕鳥鶴瘻候雕鳥鶴瘻者初腫如覆手疼痛一年生孔道數十處黃水出二年化生鶴水錢道而生口觜是也十尸瘻候人皆有五尸在人腹內發動令心腹脹氣息喘急衝擊心胸攻刺脅肋因而寒熱頸掖之下結瘰癧膿潰成瘻時還衝擊腹內則脹痛腰脊攣急是也十一風瘻候此由風邪經脈經脈結聚所成或諸瘡得風不即瘥變作其瘡得風者是由瘡遇冷膿汁不盡乃成也其風在經脈者初生之時其狀如腫有似覆手搔之則皮脫赤汁出乍腫乍減漸漸生根結實且附骨間不知首尾即潰成瘻若至五十日不消不潰變成石腫名為石癰久久不治令寒熱惡氣入腹絶悶刺心及咽項悉皆腫經一年不治者死十二鞠瘻候腫痛初生癰如大桃狀亦如瘤膿潰為瘡不治成石瘻化生鞠作竅傍行世呼為石鞠瘻十三蜣螂瘻候此由飲食居處有蜣螂毒氣入於臟腑流於經脈所生也初生之時其狀如鼠竅直下腫如覆手而癢搔痹疼痹至百日有十八竅深三寸中生蜣螂乃有一百數蜣螂成尾自覆刺人大如盂升至三年殺人十四骨疽瘻候骨疽瘻者或寒熱之氣搏經脈所成或蟲蛆之氣因飲食入人腑臟所生以其膿潰侵食於骨故名骨疽兼也初腫後乃破破而還合邊傍更生如是或六七度中有膿血至日西痛發如有針刺十五蚯蚓瘻候蚯蚓瘻者由居處飲食有蚯蚓之氣或飲食入腹內流於經脈所生其根在大腸其狀腫核潰漏十六花瘻候花瘻者風濕客於皮膚與血氣相搏因而成瘡風濕氣多其肉突出外如花開之狀世謂之反花瘡不瘥生蟲成瘻故謂之花瘻也十七蠍瘻候此由飲食居處有蠍蟲毒氣入於腑臟流於經脈所生也或生掖下或生頸邊腫起如蠍蟲之形寒熱而潰成瘻久則瘡里生細蠍蟲也十八蠔瘻候蠔瘻者由飲食居處有蠔蟲毒氣入腑臟流於經脈變化而生著面頰邊即脫肉結腫初如蠔蟲之窠後潰成瘻而蠔生是也十九腦瘻候腦瘻著頭頸逐氣上下疼痛而後腦瘻二十癰瘻候癰瘻者是癰潰瘡後其不瘥膿汁不盡因變生蟲成瘻故為癰瘻也二十一橛瘻候橛瘻者其瘡橫闊作頭狀如杏子形亦似瘰癧出血是也二十二蟲瘻候諸瘻皆有蟲而此獨以蟲為名者是諸瘡初本無蟲經久不瘥而變生蟲故以為名也二十三石瘻候石瘻之狀初起兩頭如梅李核堅實按之強如石而寒熱熱後潰成瘻是也二十四蛙瘻候此由飲食居處有蛙之毒氣入於腑臟流於經脈而成瘻因服藥隨小便出物狀似蛙形是也二十五蝦蟆瘻候此由飲食有蝦蟆之毒氣入於腑臟流於經脈結腫寒熱因潰成瘻服藥有物隨小便出如蝦蟆之狀故謂之蝦蟆瘻也二十六蛇瘻候蛇瘻者由居處飲食有蛇毒氣入於腑臟流於經脈寒熱結腫出處無定因潰成瘻服藥有物隨小便出如蛇形狀謂之蛇瘻二十七螲蟷瘻候螲蟷瘻者由居處飲食有螲蟷毒氣入於腑臟流於經脈所生初得之時如棗核許戾契或滿百日或滿周年走不定一處成竅而膿汁潰瘻也故謂之螲蟷瘻二十八赤白瘻候人有患瘡色赤白分明因而成瘻謂之赤白瘻二十九內瘻候人有發瘡色黑有結內有膿久乃積生侵食筋骨謂之內瘻三十雀瘻候此由居處飲食有雀毒氣入於臟流於脈發無定處腫因潰成瘻服藥有物隨小便出狀如雀㲉故謂之雀內瘻三十一膿瘻候諸瘻皆有膿汁此瘻獨以膿為名者是諸瘡久不瘥成瘻而重為熱毒氣停積生膿常不絶故謂之膿瘻也三十二冷瘻候冷瘻者亦是謂瘡得風冷久不瘥因成瘻膿汁不絶故為冷瘻也三十三久瘻候久瘻者是諸瘻連滯經久不瘥或暫瘥復發或移易三兩處更相應通故為久瘻也三十四瘰癧瘻候此由風邪毒氣客於肌肉隨虛處而停結為瘰癧或如梅李棗核等大小兩三相連在皮間而時發寒熱是也久則變膿潰成瘻也其湯尉針石別有正方補養宣導今附於後養生方導引法云踑踞以兩手從內曲腳中入據地曲腳加其上舉尻其可用行氣愈瘰癧乳痛三十五㿉瘻候㿉病之狀陰核腫大有時小歇歇時終大於常勞冷陰雨便發發則脹大使人腰背攣急身體惡寒骨節沉重此病由於損腎也足少陰之經腎之脈也其氣下通於陰陰宗脈之所聚積陰之氣也勞傷舉重傷於少陰之經其氣下衝於陰氣脹不通故成疾也其湯尉針石別有正方補養宣導今附於後養生方導引法云正偃臥直兩手兩足念胞所在令赤如油囊裹丹除陰下濕小便難㿉少腹重不便腹中熱但口納氣鼻出之數十不須小咽氣即腹中有熱者七息已溫熱咽之十數痔病諸候凡六論一諸痔候諸痔者謂牡痔牝痔脈痔腸痔血痔也其形證各條如後章又有酒痔肛邊生瘡亦有血出又有氣痔大便難而血出肛亦出外良久不肯入諸痔皆由傷風房室不慎醉飽合陰陽致勞擾血氣而經脈流溢滲漏腸間沖發下部有一方而治之者名為諸痔非為諸病共成一痔痔久不瘥變為瘻了其湯尉針石別有正方補養宣導今附於後養生方云忍大便不出久作氣痔養生方導引法云一足踏地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去痔五勞三里氣不下又云踞坐合兩膝張兩足不息兩通治五痔又云兩手抱足頭不動足向口面受氣衆節氣散來去三七欲得捉足左右側身各各急挽腰不動去四肢腰上下髓內冷血脈冷筋急悶痔又云兩足相踏向陰端急蹙將兩手捧膝頭兩向極勢捺之二七竟身側兩向取勢二七前後努腰七去心勞痔病二牡痔候肛邊生鼠乳出在外者時時出膿血者是也三牝痔候肛邊腫生瘡而出血者脈痔也四脈痔候肛邊生瘡癢而復痛出血者脈痔也五腸痔候肛邊腫核痛發寒熱而血出者腸痔也六血痔候因便而清血隨出者血痔也
