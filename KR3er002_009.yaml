body:
  text: 卷之九時氣病諸候凡四十三論一時氣候時行病者是春時應暖而反寒夏時應熱而反冷秋時應涼而反熱冬時應寒而反溫此非其時而有其氣是以一歲之中病無長少率相似者此則時行之氣也從立春節後其中無暴大寒不冰雪而人有壯熱為病者此則屬春時陽氣發於冬時伏寒變為溫病也從春分以後至秋分節前天有暴寒者皆為時行寒疫也一名時行傷寒此是節後有寒傷於人非觸冒之過也若三月四月有暴寒其時陽氣尚弱為寒所折病熱猶小輕也五月六月陽氣已盛為寒所折病熱則重也七月八月陽氣已衰為寒所折病熱亦小微也其病與溫及暑病相似但治有殊耳然得時病一日在皮毛當摩膏火炙愈不解者二日在膚法針服行解散汗出愈不解三日在肌復發汗若大汗即愈不解止勿復發汗也四日在胸服藜蘆丸微吐愈若病固藜蘆丸不吐者服赤豆瓜蒂散吐已解視病者尚未了了者復一法針之當解不愈者六日熱已入胃乃與雞子湯下之愈百無不如意但當諦視節度與病耳食不消病亦如時行病俱發熱頭痛食病當速下之時行病當待六七日下之時行病始得一日在皮二日在膚三日在肌四日在胸五日入胃入胃乃可下也熱在胃外而下之熱承虛便入胃然病要當復下之不得下胃中餘熱致此為病二死一生此輩不愈胃虛熱入胃爛微者赤斑出五死一生劇者黑斑出十死一生病人有強弱相倍也若得病無熱但狂言煩躁不安精神語言與人不相主當者勿以火迫但以豬苓散一方寸匕水和服之當以新汲井水強令飲一升若升半水可至二升益佳以指刺喉中吐之隨手愈不時吐者此病皆多不瘥勿以余藥治也不相主當必危若此病不時以豬苓散吐解之者其殆速死亦可先以法針之尤佳以病者過日不以時下之熱不得泄亦胃爛矣其湯尉針石別有正方補養宣導今附於後養生方導引法云清旦初起以左右手交互從頭上挽兩耳舉又引鬢髮即面氣流通令頭不白耳不聾又摩手掌令熱以摩面從上下二七止去皯氣令面有光又摩手令熱摩身體從上至下名曰干浴令人勝風寒時氣寒熱頭痛百病皆愈二時氣一日候時氣病一日太陽受病太陽為三陽之首主於頭項故得病一日頭項腰脊痛三時氣二日候時氣病二日陽明受病陽明主於肌肉其脈絡鼻入目故得病二日肉熱鼻乾不得眠夫諸陽在表始受病故可摩膏火炙發汗而愈四時氣三日候時氣病三日少陽受病少陽脈循於脅上於頸耳故得病三日胸脅熱而耳聾也三陽經絡始相傳病未入於臟故可汗而愈五時氣四日候時氣病四日太陰受病太陰為三陰之首三日以後諸陽受病訖即傳之於陰太陰之脈絡於脾主於喉嗌故得病四日腹滿而嗌乾其病在胸膈故可吐而愈也六時氣五日候時氣病五日少陰受病少陰脈貫腎絡肺繫於舌故得病五日口熱舌乾而引飲其病在腹故可下而愈七時氣六日候時氣病六日厥陰受病厥陰脈循陰器絡於肝故得病六日煩滿而陰縮此為三陰三陽俱受病毒氣入於腸胃故可下而愈八時氣七日候時氣病七日法當小愈所以然者陰陽諸經傳病竟故也今病不除者欲為再經病也再經病者謂經絡重受病也九時氣八九日以上候時氣病八九日以上不解者或是諸經絡重受於病或已發汗吐下之後毒氣未盡所以病不能除或一經受病未即相傳致使停滯纍日病證不改者故皆當察其證候而治之十時氣取吐候夫得病四日毒在胸膈故宜取吐有得病二三日便心胸煩滿此為毒氣已入或有五六日以上毒氣猶在上焦者其人有痰實故也所以復宜取吐也十一時氣煩候夫時氣病陰氣少陽氣多故身熱而煩其毒氣在於心而煩者則令人悶而欲嘔若其人胃內有燥糞而煩者則謬語時繞臍痛腹為之滿皆當察其證候也十二時氣狂言候夫病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上非其素時所能也病反能者皆陰陽爭而外並於陽四肢者諸陽之本也邪盛則四肢實實則能登高而歌熱盛於身故棄衣而走陽盛故妄言罵詈不避親戚大熱遍身狂言而妄見妄聞之十三時氣嘔候胃家有熱穀氣入胃與熱相併氣逆則嘔或吐下後飲水多胃虛冷亦為嘔也十四時氣乾嘔候熱氣在於脾胃或發汗解後或大下之後胃內不和尚有蓄熱熱氣上熏故心煩而嘔也十五時氣噦候伏熱在胃令人胸滿胸滿則氣逆氣逆則噦若大下後胃氣虛冷亦令致噦也十六時氣嗽候熱邪客於肺上焦有熱其人必飲水水停心下則上乘於肺故上氣而嗽也十七時氣渴候熱氣入於腎臟腎惡燥熱氣盛則腎燥腎燥故渴而引飲也十八時氣衄血候時氣衄血者五臟熱結所為心主於血邪熱中於手少陰之經客於足陽明之絡故衄血也衄者血從鼻出也十九時氣吐血候諸陽受病不發其汗熱毒入深結在五臟內有瘀血積故令吐血也二十時氣口瘡候發汗下後表裡俱虛而毒氣未盡熏於上焦故喉口生瘡也二十一時氣喉咽痛候陰陽隔絶邪客於足少陰之絡毒氣上熏攻於咽候故痛或生瘡也二十二時氣發斑候夫熱病在表已發汗未解或吐下後熱毒氣不散煩躁謬言語此為表虛里實熱氣躁於外故身體發斑如錦文凡發斑不可用發表藥令瘡開泄更增斑爛表虛故也二十三時氣毒攻眼候肝開竅於目肝氣虛熱毒乘虛上衝於目故赤痛或生翳赤白膜瘜肉及瘡也二十四時氣毒攻手足候熱毒氣從臟腑出攻於手足手足則焮熱赤腫疼痛也人五臟六腑井滎俞皆出於手足指故此毒從內而出也二十五時氣疱瘡候夫表虛里實熱毒內盛則多發疱瘡重者周匝遍身其狀如火瘡若根赤頭白者則毒輕若色紫黑則毒重其瘡形如登豆亦名登豆瘡二十六時氣瘙瘡候夫病新瘥血氣未復皮膚尚虛疏而觸冒風日則遍體起細瘡瘙癢如癬疥狀名為逸風二十七時氣䘌候毒氣結在腹內穀氣衰毒氣盛三蟲動作食人五臟多令泄利下部瘡癢若下唇內生瘡但欲寐者此蟲食下部也重者肛爛見五臟也二十八時氣熱利候此由熱氣在於腸胃挾毒則下黃赤汁也二十九時氣膿血利候此由熱毒傷於腸胃故下膿血如魚腦或如爛肉汁壯熱而腹㽲痛此濕毒氣所為也三十時氣䘌利候夫熱蓄在臟多令人下利若毒氣盛則變膿血因而成䘌䘌者蟲食人五臟及下部也若食下部則令穀道生瘡而下利名為䘌利若但生瘡而不利者為䘌也三十一時氣大便不通候此由脾胃有熱發汗太過則津液竭津液竭則胃干結熱在內大便不通也三十二時氣小便不通候此由汗後津液虛少其人小腸有伏熱故小便不通也三十三時氣陰陽毒候此謂陰陽二氣偏虛則受於毒若病身重腰脊痛煩悶面赤斑出咽喉痛或下利狂走此為陽毒若身重背強短氣嘔逆唇青面黑四肢逆冷為陰毒或得病數日變成毒者或初得病便有毒者皆宜依證急治失候則殺人三十四時氣變成黃候夫時氣病濕毒氣盛蓄於脾胃脾胃有熱則新谷鬱蒸不能消化大小便結澀故令身面變黃或如橘柚或如桃枝色三十五時氣變成瘧候病後邪氣未散陰陽尚虛因為勞事致二氣交爭陰勝則發寒陽勝則發熱故令寒熱往來有時休作而成瘧三十六時氣敗候此謂病後餘毒未盡形證變轉久而不瘥陰陽無復綱紀名為敗病三十七時氣勞復候夫病新瘥者血氣尚虛津液未復因即勞動更成病焉若言語思慮則勞於神梳頭澡洗則勞於力未堪勞而強勞之則生熱熱氣還經絡復為病者名曰勞復三十八時氣食復候夫病新瘥者脾胃尚虛穀氣未復若即食肥肉魚鱠餅餌棗栗之屬則未能消化停積在於腸胃使脹滿結實因更發熱復為病者名曰食復也三十九時氣病瘥後交接勞復候夫病新瘥者陰陽二氣未和早合房室則令人陰腫入腹腹內㽲痛名為交接勞復四十時氣病後陰陽易候陰陽易病者是男子婦人時氣病新瘥未平復而與之交接得病者名陰陽易也其男子病新瘥未平復而婦人與之交接得病者名曰陽易其婦人得病新瘥未平復而男子與之交接得病者名曰陰易若二男二女並不相易所以呼為易者陰陽相感動其毒度著於人如換易也其病之狀身體熱沖胸頭重不能舉眼中生眵四肢拘急小腹㽲痛手足拳皆即死其亦有不即死者病苦小腹裡急熱氣上衝胸頭重不欲舉百節解離經脈緩弱氣血虛骨髓竭便恍恍吸吸氣力轉少著床不能搖動起居仰人或引歲月方死四十一時氣病後虛羸候夫人榮衛先虛復為邪熱所中發汗吐下之後經絡損傷陰陽竭絶虛邪始散真氣尚少五臟猶虛穀神未復無津液以榮養故虛羸而生衆病焉四十二時氣陰莖腫候此由腎臟虛所致腎氣通於陰今腎為熱邪所傷毒氣下流故令陰腫四十三時氣令不相染易候夫時氣病者此皆因歲時不和溫涼失節人感乖戾之氣而生病者多相染易故預服藥及為方法以防之熱病諸候凡二十八論一熱病候熱病者傷寒之類也冬傷於寒至春變為溫病夏變為暑病暑病者熱重於溫也肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不安臥庚辛甚甲乙大汗氣逆則庚辛死心熱病者先不樂數日乃熱熱爭則卒心痛煩冤善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死脾熱病者先頭重頰痛煩心欲嘔身熱熱爭則腰痛腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死肺熱病者先淅然起毛惡風舌上黃身熱熱爭則喘咳痹走胸應背不得大息頭痛不甚汗出而寒丙丁甚庚辛大汗氣逆則丙丁死腎熱病者先腰痛脛酸苦渴數飲身熱熱爭則項痛而強脛寒且酸足下熱不欲言其項痛淖淡戊己甚壬癸大汗氣逆則戊己死肝熱病者左頰先赤心熱病者額先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤凡病雖未發見其赤色者刺之名曰治未病熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔血者死六曰舌本爛熱不已者死七曰咳血衄血汗不出出不至足者死八曰髓熱者死九曰熱而痙者死凡此九者不可刺也熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病脈尚盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病七八日脈微小病者溲血口中乾一日半死脈代一日死熱病已得汗脈尚數躁而喘且復熱勿庸刺喘甚者死熱病七八日脈不躁躁不數後三日中有汗三日不汗四日死未常汗者勿庸刺也診人熱病七八日其脈微小口乾脈代舌焦黑者死診人熱病七八日脈不數不喘者當喑之後三日溫汗不出者死熱病已得汗常大熱不去者亦死不治也熱病已得汗脈靜安者生脈躁者難治脈尚躁盛此陰氣之極亦死也腹滿常喘而熱不退者死多汗脈虛小者生堅實者死養生方云三月勿食陳齏必遭熱病二熱病一日候熱病一日病在太陽太陽主表表謂皮膚也病在皮膚之間故頭項腰脊疼痛三熱病二日候熱病二日陽明受病病在肌肉故肉熱鼻乾不得眠故可摩膏火炙發汗而愈四熱病三日候熱病三日少陽受病諸陽相傳病訖病猶在表未入於臟故胸脅熱而耳聾故可發汗而愈五熱病四日候熱病四日太陰受病太陰者三陰之首也三陽受病訖傳入於陰故毒氣已入胸膈其病喉干腹滿故可吐而愈六熱病五日候熱病五日少陰受病毒氣入腹內其病口舌乾而引飲故可下而愈七熱病六日候熱病六日厥陰受病毒氣入腸胃其人煩滿而陰縮故可下而愈八熱病七日候熱病七日三陰三陽傳病訖病法當愈今病不除者欲為再經病也再經者謂經絡重受病也九熱病八九日以上候熱病八九日以上不解者皆由毒氣未盡所以病證不除也十熱病解肌發汗候此謂得病三日已還病法在表故宜發汗或病已經五六日然其人喉口不焦乾心腹不滿又不引飲但頭痛身體壯熱脈洪大者此為病證在表未入於臟故雖五六日猶須解肌發汗不可苟依日數輒取吐下十一熱病煩候此由陽勝於陰熱氣獨盛痞結於臟則三焦隔絶故身熱而煩也十二熱病疱瘡候夫熱病疱瘡者此由表虛里實熱氣盛則發瘡重者周匝遍身若瘡色赤頭白則毒輕色紫黑則毒重其形如登豆故名登豆瘡十三熱病斑瘡候夫熱病在表或未發汗或已發汗吐下後表證未解毒氣不散煩熱而渴渴而不能飲表虛里實故身體發斑如錦文十四熱病熱瘡候人臟腑虛實不調則生於客熱表有風濕與熱氣相搏則身體生瘡癢痛而膿汁出甚者一瘥一劇此風熱所為也十五熱病口瘡候此由脾臟有熱衝於上焦故口生瘡也十六熱病咽喉瘡候上實下虛熱氣內盛熏於咽喉故生瘡也十七熱病大便不通候夫經發汗汗出多則津液少津液少則胃乾結熱在胃所以大便不通又有腑臟自生於熱者此由三焦痞隔脾胃不和蓄熱在內亦大便不通也十八熱病小便不通候熱在膀胱流於小腸熱盛則脾胃干津液少故小便不通也十九熱病下利候熱氣攻於腸胃胃虛則下赤黃汁挾毒則成膿血二十熱病䘌候熱氣攻於腸胃則穀氣衰所以三蟲動作食人五臟及下部重者肛爛見腑臟二十一熱病毒攻眼候肝臟開竅於目肝氣虛熱毒乘虛則上衝於目重者生瘡翳及赤白膜也二十二熱病毒攻手足候夫熱病毒攻手足及人五臟六腑井滎俞皆出於手足指今毒氣從腑臟而出循於經絡攻於手足故手足指皆腫赤焮痛也二十三熱病嘔候胃內有熱則穀氣不和新谷入胃與熱氣相搏胃氣不平故嘔或吐下以後臟虛亦令嘔也二十四熱病噦候伏熱在胃則令人胸滿胸滿則氣逆氣逆則噦若大下以後飲水多胃內虛冷亦令噦也二十五熱病口乾候此由五臟有虛熱脾胃不和津液竭少故口乾也二十六熱病衄候心臟傷熱所為也心主血肺主氣開竅於鼻邪熱與血氣並故衄也衄者血從鼻出也二十七熱病勞復候夫熱病新瘥津液未復血氣尚虛因勞動早勞則生熱熱氣乘虛還入經絡故復病也二十八熱病後沉滯候凡病新瘥後食豬肉及腸血肥魚脂膩必大下利醫所不能復治也必至於死若食餅餌粢飴哺炙膾棗栗諸果物脯及牢實難消之物胃氣尚虛弱不能消化必結熱復病還以藥下之
