body:
  text: 卷之三十二癰疽病諸候上凡一十六論一癰候癰者由六腑不和所生也六腑主表氣行經絡而浮若喜怒不測飲食不節陰陽不調則六腑不和榮衛虛者腠理則開寒客於經絡之間纍絡為寒所折則榮衛矧留於脈榮者血也衛者氣也榮血得寒則澀而不行衛氣從之與寒相搏亦壅遏不通氣者陽孔陽氣蘊積則生於熱寒熱不散故聚積成癰腑氣浮行主表故癰浮淺皮薄以澤久則熱勝於寒熱氣蘊積傷肉而敗肌故血肉腐壞化而為膿其患在表浮淺則骨髓不焦枯腑臟不傷敗故可治而愈也又少苦消渴年四十以外多發癰疽所以然者體虛熱而榮衛痞澀故也有膈痰而渴者年盛必作黃疸此由脾胃虛熱故也年衰亦發癰疽腑臟虛熱血氣痞澀故也又腫一寸至二寸癤也二寸至五寸癰也五寸至一尺癰疽也一尺至三尺者名曰竟體癰癰成九竅皆出諸氣憤郁不遂志欲者血氣蓄積多發此疾診其寸口脈外結者癰腫腎脈澀甚為大癰脈滑而數滑即為實數即為熱滑即為榮數即為衛榮衛相逢則結為癰熱之所過即為膿也脈弱而數者此為戰寒必發癰腫脈浮而數身體無熱其形默默胃中微躁不知痛所在此主當發癰腫脈來細而沉時直者身有癰腫若腹中有伏梁脈肺肝俱到即發癰疽四肢沉重肺脈多即死凡癰疽脈洪粗難治脈微澀者易愈諸浮數之脈應當發熱而反洗漸惡寒若有痛處當有癰也此或附骨有膿也脈弦洪相薄外急內熱故欲發癰癤凡發癰腫高者疹源淺腫下者疹源深大熱者易治小熱者難治初便大痛傷肌晚乃大痛傷骨諸癰發於節者不可治也發於陽者百日死發於陰者四十日死也尻太陽脈有腫癰在足心少陽脈八日死發膿血八十日死頭陽明脈有腫癰在尻六日死發膿血六十日死股太陽脈有腫癰在足太陽七十日死發膿血百日死膊太陽太陰脈有腫癰在脛八日死發膿血四百日死足少陽脈有腫癰在脅八日死發膿血六百日死手陽明脈有腫癰在淵掖一歲死發膿血二歲死發腫牢如石走皮中無根瘰癧也久久不消因得他熱乘之時有發者亦為癰也又手心主之脈氣發有腫癰在股脛六日死發膿血六十日死又有癰在腓腸中九日死也養生方云五月勿食不成核果及桃棗發癰癤不爾發寒熱變為黃疽又為泄利又云人汗入諸食中食之則作疔瘡癰癤等二癰有膿候此由寒氣搏於肌肉折於血氣結聚乃成癰凡癰經久不復可消者若按之都牢堅者未有膿也按之半堅半軟者有膿也又以手掩腫上不熱者為無膿若熱甚者為有膿凡覺有膿宜急破之不爾侵食筋骨也三癰潰後候此由寒氣客於肌肉折於血氣結聚乃成癰凡癰破潰之後有逆有順其眼白睛青黑而眼小者一逆也內藥而嘔者二逆也腹痛渴甚者三逆也膊項中不便者四逆也音嘶色脫者五逆也除此者併為順也此五種皆死候凡發癰疽則熱流入內五臟焦燥者渴而引飲兼多取冷則腸胃受冷而變下利利則腸胃俱虛而冷搏於胃氣逆則變嘔逆氣不通遇冷折之則變噦也四石癰候石癰者亦是寒氣客於肌肉折於血氣結聚所成其腫結確實至牢有根核皮相親不甚熱微痛熱時自歇此寒多熱少堅如石故謂之石癰也久久熱氣乘之乃有膿也五附骨癰腫候附骨癰亦由體癰熱而當風取涼風冷入於肌肉與熱氣相搏伏結近骨成癰其狀無頭但腫痛而闊其皮薄澤謂之附骨癰也六癰虛熱候此是寒客於經絡使血氣痞澀乃結腫成癰熱氣壅結則血化為膿膿潰癰瘥之後餘熱未盡而血氣已虛其人吸吸苦熱惙惙虛乏故謂之虛熱七癰煩渴候癰由寒搏於血血澀不通而熱歸之壅結所成熱氣不得宣泄內熏五臟故煩躁而渴凡癰腫熱渴引飲冷氣入腸胃即變下痢並變嘔噦所以然者本內虛熱氣逆故嘔嘔而氣逆外冷乘之氣不通故噦也八發癰咳嗽候夫肺主氣候於皮毛氣虛腠理受寒寒客經絡則血痞澀熱氣乘之則結成癰也肺氣虛寒寒復乘肺肺感於寒則成咳嗽故發癰而嗽也九癰下利候此由寒氣客於經絡折於氣血壅結不通結成癰腫發癰而利者由內熱而引飲取冷太過冷入腸胃故令下利也下利不止則變嘔噦所以然者脾與胃合俱象土脾候身之肌肉胃為水穀之海脾虛肌肉受邪胃虛則變下利下利不止則變嘔噦也十發癰大小便不通候此由寒客於經絡寒搏於血血澀不通壅結成癰臟熱不泄熱入大小腸故大小便不通十一發癰內虛心驚候此由體虛受寒寒客於經絡血脈痞澀熱氣蘊積結聚成癰結熱不散熱氣內迫於心故心虛熱則驚不定也十二癰腫久不愈汁不絶候此由寒客於經絡則血澀不通與寒相搏則結成癰腫熱氣乘之則血化為膿膿潰之後熱腫乃散余寒不盡肌肉未生故有惡液澳汁清而色黃不絶也十三癰瘥後重發候此由寒氣客於經絡血澀不通壅結成癰凡癰膿潰之後須著排膿藥令熱毒膿血俱散盡若有惡肉亦敷藥食之則好肉得生真氣得復若膿血未盡猶挾餘毒瘡口便合當時雖瘥而後終更發十四久癰候此由寒氣客於經絡血澀不通壅結成癰發癰之後熱毒未盡重有風冷乘之冷搏於腫蘊結不消故經久一瘥一發久則變成瘻也十五疽候疽者五臟不調所生也五臟主裡氣行經絡而沉若喜怒不測飲食不節陰陽不和則五臟不調榮衛虛者腠理則開寒客經絡之間經絡為寒所折則榮衛稽留於脈榮者血也衛者氣也榮血得寒則澀而不行衛氣從之與寒相搏亦壅遏不通氣者陽也陽氣蘊積則生於熱寒熱不散故積聚成疽臟氣沉行主裡故疽腫深厚其上皮強如牛領之皮久則熱勝於寒熱氣淳盛蘊結傷肉也血肉腐壞化而為膿乃至傷骨爛筋不可治而死也又少苦消渴年至四十以上多發癰疽所以然者體虛熱而榮際痞澀故也又有膈痰而渴者年盛必作黃疸此由脾胃虛熱故也年衰亦發癰疽腑臟虛熱血氣痞澀故也又腫一寸至二寸癤也二寸至五寸癰也五寸至一尺癰疽也一尺至三尺者名曰競體癰癰成九竅皆出諸氣憤郁不遂志欲者血氣蓄積多發此疾診其脈弦洪相薄外急內熱欲發癰疽脈來細而沉時直者身有癰腫若腹中有伏梁脈肺肝俱到即發癰疽四肢沉重肺脈多即死凡癰疽脈洪粗難治脈微澀者易愈諸浮數之脈應當發熱而反洗淅惡寒若有痛處當有癰也此或附骨有膿也身有五部伏菟一腓二背三五臟之俞四項五五部有疽者死又疽發於嗌中名曰猛疽猛疽不治化為膿膿不瀉寒咽半日死其化作膿瀉之則已發於頸名曰夭疽其腫大以赤黑不急治則熱氣下入淵掖前傷任脈內熏肝肺熏肝肺十餘日而死矣陽氣大發消腦留項名曰腦鑠其色不樂項痛而刺以針煩心者死不可治發於膊及臑名曰疵疽其狀赤黑急治之此令人汗出至足不害五臟癰發四五日燉𤋲之也發於掖下赤堅者名曰米疽也堅而不潰者為馬刀也發於胸名曰井疽也其狀如大豆三四日起不早治下入腹中不治十日死發於膺名曰甘疽其狀如谷實瓠瓜常苦寒熱急治之去其寒熱不治十歲死死後出膿發於股陽名曰兌疽其狀不甚變而膿附骨不急治四十日死發於脅名曰改訾改訾者女子之病也又云癰發女子陰旁名曰改訾疽久不治其中生瘜肉如赤小豆麻黍也發於尻名曰兌疽其狀赤堅大急治之不治四十日死若發尻尾名曰兌疽若不急治便通洞一身十日死發於股陰名曰赤弛不急治之六日死在兩股內者不治六十日當死發於膝名曰疵疽其狀大癰色不變寒熱而堅勿石石之則死須其色黑柔乃石之生也發於脛名曰兔齧疽其狀赤至骨急治之不治害人也發於踝名曰走緩色不變數灸而止其寒熱不死發於足上下名曰四淫不急治之百日死發於足傍名曰癘疽其狀不大初從小指發急治之其狀黑者不可消百日死也發於足趾名曰脫疽其狀赤黑死不赤黑不死治之不衰急斬去之活也不斬者死矣赤疽發額不瀉十餘日死其五日可刺也其膿赤多血死未有膿可治人年二十五三十一六十九十五百神皆在額不可見血見血者死赤疽發身腫牢核而身熱不可以坐不可以行不可以屈伸成膿刺之即已赤疽發胸可治赤疽發髀樞六月內可治不治出歲死赤疽發陰股牢者死濡者可治赤疽發掌中可治赤疽發脛死不可治白疽發膊若肘後癢目痛傷精及身熱多汗五六處死黑疽發腫居背大骨上八日可刺也過時不刺為骨疽骨疽膿出不可止者出碎骨六十日死黑疽發淵掖死黑疽發耳中如米此名文疽死黑疽發膊死黑疽發缺盆中名曰伏癰死黑疽發肘上下不死可治黑疽發腓腸死黑疽發膝臏牢者死濡者可治黑疽發趺上牢者死倉疽發身先癢後痛此故傷寒寒氣入臟篤發為倉疽九日可治九十日死釘疽發兩膊此起有所逐惡血結留內外榮衛不通發為釘疽三日身腫痛甚口噤如痙狀十一日可刺不治二十日死疽起於肉上如丁蓋下有腳至骨名釘疽也鋒疽發背起心俞若膊髃二十日不瀉死其八日可刺也其色赤黑膿見青者死不治人年六歲十八二十四四十五十六六十七七十二九十八神皆在膊不可見血見血必死陰疽發髀若陰股始發腰強內不能自止數飲不能多五日牢痛如此不治三歲死刺疽發起肺俞若肝俞不瀉一十日死其八日可刺也發而赤其上肉如椒子者死不可治人年十九二十五三十三四十九五十七六十七十三八十一九十七神皆在背不可見血見血者死脈疽發環項始病身隨而熱不欲動悁悁或不能食此有所大畏恐怖而不精上氣嗽其發引耳不可以動二十日可刺如不刺八十日死龍疽發背起胃俞若腎俞二十日不瀉死九日可刺其上赤下黑若青黑者死發血膿者不死首疽發背發熱八十二日大熱汗頭引身盡如嗽身熱同同如沸者皮澤頗腫處淺刺之不刺入腹中二十日死俠榮疽發脅若起兩肘頭二十五日不瀉死其九日可刺發赤白間其膿多白而無赤可治也人年一十六二十六三十二四十八五十八六十四八十九十六神皆在脅不可見血見血者死勇疽發股起太陰若伏兔二十五日不瀉死其十日可刺勇疽發清膿赤黑死白者尚可治人年十一十五二十三十一三十二四十六五十九六十三七十五九十一神皆在尻尾不可見血見血者死標叔疽發背熱同同耳聾後六十腫如裹水狀如此可刺之但出水後乃有血血出即除也人年五十七六十五七十三八十一九十七神皆在背不可見血見血者死癆疽發足趺若足下三十日不瀉死其十二日可刺癆疽發赤白膿而不大多其上癢赤黑死不可治人年十三二十九三十五六十一七十三九十三神皆在足不可見血見血者死沖疽發在小腹痛而戰寒熱冒五日悁悁六日而變可刺之不刺之五十日死敦疽發兩手五指頭若足五指頭十八日不瀉死其四日可刺其發而黑癰不甚未過節可治也疥疽發掖下若兩臂兩掌中振寒熱而嗌乾者飲多即嘔煩心悁悁或卒疹者如此可汗不汗者死筋疽發背俠脊兩邊大筋其色蒼八日可刺也陳干疽發臂三四日痛不可動五十日身熱而赤六十日可刺之如刺之無血三四日病已蚤疽發手足五指頭起節色不變十日之內可刺也過時不刺後為食癰在掖三歲死其湯尉針石別有正方補養宣導今附於後養生方云銅器蓋食汗入食食之令人發惡瘡內疽又云鯽魚膾合豬肝肺食之發疽又云烏雞肉合鯉魚肉食發疽又云魚腹內有白如膏合烏雞肉食之亦發疽也又云魚金鰓食發疽也又云已醉強飽食不幸發疽養生方導引法云正倚壁不息行氣從頭至足止愈疽行氣者鼻內息五入方一吐為一通滿十二通愈又云正坐倚壁不息行氣從口趣令氣至頭而止治疽痹氣不足十六疽潰後候此由寒氣客於經絡折於氣血血澀不通乃成疽發疽潰之後有逆有順其眼白睛青黑而眼小者一逆也內藥而嘔者二逆也腹痛渴甚者三逆也膊項中不便者四逆也音嘶色脫者五逆也除此者併為順矣此五種皆死候凡發癰疽則熱流入內五臟焦燥渴而引飲兼多取冷則腸胃受冷而變下利利則腸胃俱虛而冷搏胃氣氣逆則變嘔逆氣不通遇冷折之則噦也
