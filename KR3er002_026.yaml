body:
  text: 卷之二十六蠱毒病諸候下凡二十七論十解諸毒候凡藥有大毒不可入口鼻耳目即殺人者一曰鉤吻生朱崖二曰鰿又名䲰日狀如黑雄雞生山中三曰陰命赤色著木懸其子生山海四曰海薑狀如龍芮赤色生海中五曰鴆羽狀如雀黑項赤喙食蝮蛇生海內但被此諸毒藥發動之狀皆似勞黃頭項強直背痛而欲寒四肢酸灑毛悴色枯肌肉纏急神情不樂又欲似瘴病或振寒如瘧或壯熱似時行或吐或利多苦頭痛又言人齒色黑舌色赤多黑少並著藥之候也嶺南俚人別有不強藥有藍藥有焦銅藥金藥菌藥此五種藥中人者亦能殺人但此毒初著人不能知欲知是毒非毒者初得便以灰磨洗好熟銀令淨復以水楊枝洗口齒含此銀一宿臥明旦吐出看之銀黑者是不強藥銀青黑者是藍藥銀紫斑者是焦銅藥此三種但以不強藥最急毒若熱酒食里著者六七日便覺異若冷酒食里著經半月始可知耳若含銀銀色不異而病候與著藥之狀不殊心疑是毒欲得即知者可食鯉魚鱠食竟此毒即發亦空腹取銀口含之可兩食頃出著露下明旦看銀色若變黑即是藥毒又言取雞子煮去殼令病人齒齧雞子白處亦著露下若齒齧痕處黑即是也又言覺四大不調即須空腹食炙雞炙羸鴨等肉觸犯令藥發即治之便瘥若久不治毒侵腸胃難復攻治若定知著藥而四大未羸者取大戟長三寸許食之必大吐利若色青者是焦銅藥色赤者是金藥吐菌子者是菌藥此外雜藥利亦無定色但小異常利耳又有兩種毒藥併名當孤草其一種著人時脈浮大而洪病發時嗇嗇惡寒頭微痛乾嘔背迫急口噤不覺嚼舌大小便祕澀眼匡唇口指甲顏色皆青是也又一種當孤草毒者其病發時口噤而干舌不得言咽喉如錐刀刺胸中甚熱膊胛滿不至百日身體唇口手腳指甲青而死又著烏頭毒者其病發時咽喉強而眼睛疼鼻中艾臭手腳沉重常嘔吐腹中熱悶唇口習習顏色乍青乍赤經百日死凡人若色黑大骨及肥者皆胃厚則勝毒若瘦者則胃薄不勝毒也十一解諸藥毒候凡藥物云有毒及有大毒者皆能變亂於人為害亦能殺人但毒有大小自可隨所犯而救解之但著毒重者亦令人發病時咽喉強直而兩眼睛疼鼻乾手腳沉重常嘔吐腹裡熱悶唇口習習顏色乍青乍赤經百日便死其輕者乃身體習習而痹心胸湧湧然而吐或利無度是也但從酒得者難治言酒性行諸血脈流遍周體故難治因食得者易愈言食與藥俱入胃胃能容雜毒又逐大便泄毒氣毒氣未流入血脈故易治若但覺有前諸候便以解毒藥法救之十二服藥失度候凡合和湯藥自有限劑至於圭銖分兩不可乘違若增加失宜便生他疾其為病也令人吐下不已嘔逆而悶亂手足厥冷腹痛轉筋久不以藥解之亦能致死速治即無害十三諸飲食中毒候凡人往往因飲食忽然困悶少時致甚乃至死者名為飲食中毒言人假以毒物投食里而殺人但其病頰內或懸癰內初如酸棗大漸漸長大是中毒也急治則瘥久不治毒入腹則死但診其脈浮之無陽微細而不可知者中毒也十四食諸肉中毒候凡可食之肉無甚有毒自死者多因疫氣所斃其肉則有毒若食此毒肉便令人困悶吐利無度是中毒十五食牛肉中毒候凡食牛肉有毒者由毒蛇在草牛食因誤啖蛇則死亦有蛇吐毒著草牛食其草亦死此牛肉則有大毒又因疫病而死者亦有毒食此牛肉則令人心悶身體痹甚者乃吐逆下利腹痛不可堪因而致死者非一也十六食馬肉中毒候凡駿馬及馬鞍下肉皆有毒不可食之食之則死其有凡馬肉則無毒因疫病死者肉亦有毒此毒中人多洞下而煩亂十七食六畜肉中毒候六畜者謂牛馬豬羊雞狗也凡此等肉本無毒不害人其自死及著疫死者皆有毒中此毒者亦令人心煩悶而吐利無度十八食六畜百獸肝中毒候凡禽獸六畜自死者肝皆有毒不可食往往傷人其疫死者彌甚被其毒者多洞利嘔吐而煩悶不安十九食鬱肉中毒候郁肉毒者謂諸生肉及熟肉內器中密閉頭其氣壅積不泄則為郁肉有毒不幸而食之乃殺人其輕者亦吐利煩亂不安二十食狗肉中毒候凡狗肉性甚躁熱其疫死及狂死者皆有毒食之難消故令人煩毒悶亂二十一食豬肉中毒候凡豬肉本無毒其野田間放或食雜毒物而遇死者此肉則有毒人食之則毒氣攻臟故令人吐利困悶不安二十二食射菵肉中毒候射獵人多用射菵藥塗箭頭以射蟲鹿傷皮則死以其有毒故也人獲此肉除箭處毒肉不盡食之則被毒致死其不死者所誤食肉處去毒箭遠毒氣不深其毒則輕雖不死猶能令人困悶吐利身體痹不安菵藥者以生烏頭搗汁日作之是也二十三食鴨肉成病候鴨肉本無毒不能損人偶食觸冷不消因結聚成腹內之病二十四食漏脯中毒候凡諸肉脯若為久故茅草屋漏所濕則有大毒食之三日乃成暴症不可治亦有即殺人者幾脯炙之不動得水則動亦殺人二十五食魚鱠中毒候凡人食魚鱠者皆是使生冷之物食之甚利口人多嗜之食傷多則難消化令人心腹痞滿煩亂不安二十六食諸魚中毒候凡食諸魚有中毒者皆由魚在水中食毒蟲惡草則有毒人食之不能消化即令悶亂不安也二十七食鱸魚肝中毒候此魚肝有毒人食之中其毒者即麵皮剝落雖爾不至於死二十八食鯸鮐魚中毒候此魚肝及腹內子有大毒不可食食之往往致死二十九食蟹中毒候此蟹食水茛水茛有大毒故蟹亦有毒中其毒則悶亂欲死若經霜以後遇毒即不能害人未被霜蟹煮食之則多有中毒令人悶亂精神不安三十食諸菜菌菌中毒候凡園圃所種之菜本無毒但菌菌等物皆是草木變化所生出於樹者為菌生於地者為菌並是鬱蒸濕氣變化所生故或有毒者人食遇此毒多致死甚疾速其不死者猶能令煩悶吐利良久始醒三十一食諸蟲中毒候野菜芹荇之類多有毒蟲水蛭附之人誤食之使中其毒亦能悶亂煩躁不安三十二飲酒大醉連日不解候飲酒過多酒毒漬於腸胃流溢經絡使血脈充滿令人煩毒惛亂嘔吐無度乃至纍日不醒往往有腹背穿穴者是酒熱毒氣所為故須搖動其身以消散也三十三飲酒中毒候凡酒性有毒人若飲之有不能消便令人煩毒悶亂其湯尉針石別有正方補養宣導今附於後養生方云正坐仰天呼出酒食醉飽之氣出氣之後立飢且醒三十四飲酒腹滿不消候夫酒性宣通而不停聚故醉而復醒隨血脈流散故也今人有榮衛痞澀痰水停積者因復飲酒不至大醉大吐故酒與痰相搏不能消散故令腹滿不消三十五惡酒候酒者水穀之精也其氣慓悍而有大毒入於胃則胃脹氣逆上逆於胸內蘸於肝膽故令肝浮膽橫而狂悖變怒失於常性故云惡酒也三十六飲酒後諸病候酒性有毒而復大熱飲之過多故毒熱氣滲溢經絡浸溢腑臟而生諸病也或煩毒壯熱而似傷寒或灑淅惡寒有同溫瘧或吐利不安或嘔逆煩悶隨臟氣虛實而生病焉病候非一故云諸病
