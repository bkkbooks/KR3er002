body:
  text: 卷之四十九小兒雜病諸候五凡五十論一百五十五丹候風熱毒氣客於腠理熱毒搏於血氣蒸發於外其皮上熱而赤如丹之塗故謂之丹也若久不瘥即肌肉爛傷一百五十六五色丹候五色丹發而變改無常或青黃白黑赤此由風毒之熱有盛有衰或冷或熱故發為五色丹也一百五十七赤黑丹候丹病本是毒熱折於血氣蘊蒸色赤而復有冷氣乘之冷熱互交更相積瘀令色赤黑一百五十八白丹候丹初是熱毒挾風熱搏於血積蒸發赤也熱輕而挾風多者則其色微白也一百五十九丹火候丹火之狀發赤如火之燒須臾熛漿起是也一百六十天火丹候丹發竟身體斑赤如火之燒故謂之天火丹也一百六十一伊火丹候丹發於膀骨青黑色謂之伊火丹也一百六十二熛火丹候丹發於臂背穀道者謂之熛火丹也一百六十三骨火丹候丹發初在臂起正赤若黑謂之骨火丹也一百六十四厲火丹候丹發初從髂下起皆赤能移走謂之厲火丹也一百六十五火丹候火丹之狀往往如傷赤著身而日漸大者謂之火丹也一百六十六飛火丹候丹著兩臂及背膝謂之飛火丹也一百六十七遊火丹候丹發兩臂及背如火灸者謂之遊火丹也一百六十八殃火丹候丹發兩脅及腋下膀上謂之殃火丹也一百六十九尿灶火丹候丹發膝上從兩股起及臍間走入陰頭謂之尿灶火丹也一百七十風火丹候丹初發肉黑忽腫起謂之風火丹也一百七十一暴火丹候暴火丹之狀帶黑皅色謂之暴火丹也一百七十二留火丹候留火丹之狀發一日一夜便成瘡如棗大正赤色謂之留火丹也一百七十三朱田火丹候丹先發背起遍身一日一夜而成瘡謂之朱田火丹也一百七十四鬱火丹候丹發從背起謂之鬱火丹也一百七十五神火丹候丹發兩膀不過一日便赤黑謂之神火丹也一百七十六天灶火丹候丹發兩膀里尻間正赤流陰頭赤腫血出謂之天灶火丹也一百七十七鬼火丹候丹發兩臂赤起如李子謂之鬼火丹也一百七十八石火丹候丹發通身似纈目突起如細粟大色青黑謂之石火丹也一百七十九野火丹候丹發赤斑斑如梅子竟背腹謂之野火丹也一百八十茱萸火丹候丹發初從背起遍身如細纈謂之茱萸火丹也一百八十一家火丹候丹初發著兩腋下兩膀上名之曰家火丹也一百八十二廢灶火丹候丹發從足趺起正赤者謂之廢灶火丹也一百八十三螢火丹候丹發如灼在脅下正赤初從髂起而長上痛是螢火丹也一百八十四赤丹候此謂丹之純赤色者則是熱毒搏血氣所為也一百八十五風瘙隱疹候小兒因汗解脫衣裳風入腠理與血氣相搏結聚起相連成隱疹風氣止在腠理浮淺其勢微故不腫不痛但成隱疹瘙癢耳一百八十六卒腹皮青黑候小兒因汗腠理則開而為風冷所乘冷搏於血隨肌肉虛處停之則血氣沉澀不能榮其皮膚而風冷客於腹皮故青黑一百八十七藍注候小兒為風冷乘其血脈血得冷則結聚成核其皮肉色如藍乃經久不歇世謂之藍注一百八十八身有赤處候小兒因汗為風邪毒氣所傷與血氣相搏熱氣蒸發於外其肉色赤而壯熱是也一百八十九赤遊腫候小兒有肌肉虛者為風毒熱氣所乘熱毒搏於血氣則皮膚赤而腫起其風隨氣行遊不定故名赤遊腫也一百九十大便不通候小兒大便不通者腑臟有熱乘於大腸故也脾胃為水穀之海水穀之精華化為血氣其糟粕行於大腸若三焦五臟不調和熱氣歸於大腸熱實故大便燥澀不通也一百九十一大小便不利候小兒大小便不利者腑臟冷熱不調大小腸有遊氣氣壅在大小腸不得宣散故大小便澀不流利也一百九十二大小便血候心主血脈心臟有熱熱乘於血血性得熱流散妄行不依常度其流滲於大小腸者故大小便血也一百九十三尿血候血性得寒則凝澀得熱則流散而心主於血小兒心臟有熱乘於血血滲於小腸故尿血也一百九十四痔候痔有牡痔牝痔脈痔腸痔血痔酒痔皆因勞傷過度損動血氣所生小兒未有虛損而患痔止是大便有血出腸內有結熱故也一百九十五小便不通利候小便不通利者腎與膀胱熱故也此二經為表裡俱主水水行於小腸入胞為小便熱氣在其臟腑水氣則澀故小便不通利也一百九十六大小便數候脾與胃合胃為水穀之海水穀之精化為血氣以行經脈其糟粕水液行之於大小腸若三焦平和則五臟調適虛實冷熱不偏其脾胃氣弱大小腸偏虛下焦偏冷不能制於水穀者故令大小便數也一百九十七諸淋候小兒諸淋者腎與膀胱熱也膀胱與腎為表裡俱主水水入小腸下於胞行於陰為小便也腎氣下通於陰陰水液之道路膀胱津液之府膀胱熱津液內溢而流於澤水道不通水不上不下停積於胞腎氣不通於陰腎熱其氣則澀故令水道不利小便淋瀝故謂為淋其狀小便出少起數小腹弦急痛引臍是也又有石淋氣淋熱淋血淋寒淋諸淋形證隨名具說於後章而以一方治之者故謂諸淋也一百九十八石淋候石淋者淋而出石也腎主水水結則化為石故腎客砂石腎為熱所乘熱則成淋其狀小便莖中痛尿不能卒出時自痛引小腹膀胱裡急砂石從小便道出甚者水道塞痛令悶絶一百九十九氣淋候氣淋者腎虛膀胱受肺之熱氣氣在膀胱膀胱則脹肺主氣氣為熱所乘故流入膀胱膀胱與腎為表裡膀胱熱則氣壅不散小腹氣滿水不宣利故小便澀成淋也其狀膀胱小腹滿尿澀常有餘瀝是也亦曰氣癃診其少陰脈數者男子則氣淋也二百熱淋候熱淋者三焦有熱氣傳於腎與膀胱而熱氣流入於胞而成淋也二百一血淋候血淋者是熱之甚盛者則尿血謂之血淋心主血血之行身通遍經絡循環腑臟其熱甚者血即散失其常經溢滲入胞而成血淋矣二百二寒淋候寒淋者其病狀先寒戰然後尿是也小兒取冷過度下焦受之冷氣入胞與正氣交爭寒氣勝則戰寒而成淋正氣勝則戰寒解故得小便也二百三小便數候小便數者膀胱與腎俱有客熱乘之故也腎與膀胱為表裡俱主水腎氣下通於陰此二經既受客熱則水行澀故小便不快而起數也二百四遺尿候遺尿者此由膀胱有冷不能約於水故也足太陽為膀胱之經足少陰為腎之經此二經為表裡腎主水腎氣下通於陰小便者水液之餘也膀胱為津液之腑既冷氣衰弱不能約水故遺尿也
