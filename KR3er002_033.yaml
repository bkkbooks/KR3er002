body:
  text: 卷之三十三癰疽病諸候下凡二十九論十七緩疽候緩疽者由寒氣客於經絡致榮衛凝澀氣血壅結所成其寒盛者則腫結痛深而回回無頭尾大者如拳小者如桃李冰冰與皮肉相親著熱氣少其腫與肉相似不甚赤積日不潰久乃變紫黯色皮肉俱爛如牛領瘡漸至通體青黯不作頭而穿潰膿出是也以其結腫積久而肉腐壞遲故名緩疽亦名肉色疽也緩疽急者一年殺人緩者數年乃死十八熛疽候熛疽之狀肉生小黯點小者如粟豆大者如梅李或赤或黑乍青乍白有實核燥痛應心或著身體其著手指者似代指人不別者呼為代指不急治毒逐脈上入臟則殺人南方人得此疾皆截去指恐其毒上攻臟故也又云十指端忽策策痛入心不可忍嚮明望之晃晃黃赤或黯黯青黑是熛疽直截後節十有一冀又云風疹痛不可忍者熛疽發五臟俞節解相應通洞熛疽也諸是熛疽皆死又齒間臭熱血出不止熛疽也七日死治所不瘥以灰掩覆其血不爾著人又云諸是熛疽皆死唯痛取利十有一活耳此皆毒氣客於經絡氣血痞澀毒變所生也十九疽發口齒候寒氣客於經絡血澀不通結而成疽五臟之氣皆出於口十二經脈有入齒者有連舌本者榮衛之氣無處不行虛則受邪挾毒乘虛而入脈故也其發口齒者多血出不可禁皆死二十行疽候行疽候者發瘡小者如豆大者如錢往來匝身及生面上謂之行疽此亦寒熱客於腠理與血氣相搏所生也二十一風疽候腫起流之血脈而攣曲疾痛所以發瘡歷年謂之風疽此由風濕之氣客於經絡與氣相搏所成也養生方云大解汗當以粉粉身若令自乾者成風疽也二十二石疽候此由寒氣客於經絡與血氣相搏血澀結而成疽也其寒毒偏多則氣結聚而皮厚狀如痤癤堅如石故謂之石疽也二十三禽疽候禽疽發如疹者數十處其得四日腫合牢核痛其狀若變十日可刺其初發身戰寒齒如噤欲痙如是者十五日死也此是寒濕之氣客於肌肉所生也二十四杼疽候杼疽者發項及兩耳下不瀉十六日死其六日可刺其色黑見膿如癰者死不可治人年三十十九二十三三十五三十九五十一五十五六十一八十七九十九神皆在兩耳下不可見血見血者死此是寒濕之氣客於肌肉折於血氣之所生也二十五水疽候此由寒濕之氣客於皮膚搏於津液使血氣痞澀濕氣偏多則發水疽其腫狀如物裹水多發於手足此是隨肌膚虛處而發也亦有發身體數處而壯熱遂至死二十六肘疽候肘疽是疽發於肘謂之肘疽凡諸疽發節解並皆斷筋節而發肘者尤為重也此亦是寒濕之氣客於肌肉折於血氣所生也二十七附骨疽候附骨疽者由當風入骨解風與熱相搏復遇冷濕或秋夏露臥為冷所折風熱伏結壅遏附骨成疽喜著大節解間丈夫及産婦女人喜著鼠䖱髂頭䏶膝間嬰孩嫩兒亦著膊肘背脊也其大人老人著急者則先覺痛不得轉動挪之應骨痛經日便覺皮肉生急洪洪如肥狀則是也其小兒不知字名抱之才近其便啼喚則是支節有痛處便是其候也大人老人著緩者則先覺如肥洪洪耳經日便覺痹痛不隨也其小兒則覺四肢偏有不動搖者如不隨狀看支節解中則有肥洪洪處其名不知是附骨疽乃至合身成膿不潰至死皆覺身體變青黯也其大人老人皆不悟是疽乃至於死也亦有不別是附骨疽呼急者為賊風其緩者謂風腫而已二十八久疽候此由寒氣客於經絡折於氣血血澀不通乃結成疽凡疽發諸節及腑臟之俞則卒急也其久疽者發於身體閒處故經久積年致膿汁不盡則瘡內生蟲而變成瘻也二十九疽虛熱候此由寒搏於熱結壅血澀乃成疽疽膿雖潰瘥之後餘熱未盡而血已虛其人吸吸苦熱惙惙虛乏故謂虛熱也三十疽大小便不通候此由寒氣客於經絡寒搏於血血澀不通壅結成疽腑臟熱不泄熱入大小腸故大小便不通也三十一癰發背候夫癰發於背者多發於諸腑俞也六腑不和則生癰諸腑俞皆在背其血氣經絡周於身腑氣不和腠理虛者經絡為寒所客寒折於血則壅不通故結成癰發其俞也熱氣加於血則肉血敗化故為膿癰初結之狀腫而皮薄以澤又云背上忽有赤腫而頭白搖之連根入應胸裡動是癰也又發背若熱手不可得近者內先服王不留行散外摩發背膏大黃貼若在背生破無苦良久不得膿以食肉膏散著甕頭內癰口中人體熱氣歇服術散五日後癰欲瘥者服排膿內塞散三十二癰發背潰後候此由寒氣客於經絡折於血氣血澀不通乃結成癰發背癰膿出之後眼白睛青黑而眼小一逆也內藥而嘔二逆也腹痛渴甚三逆也膊項中不便四逆也音嘶色脫五逆也此等五逆者皆不可治也或熱或渴非倉卒而急可得漸治之也凡發背則熱氣流入腑臟膿潰之後血氣則虛腑臟燥熱渴而引飲飲冷入腸胃則變下利胃虛氣逆則變嘔也嘔逆若遇冷折之氣不通則噦也其瘡若膿汁不盡而瘡口早合雖瘥更發惡汁連滯則變成瘻也三十三癰發背後下利候此是寒氣客於經絡折於氣血血澀不通乃結成癰癰發背後利者由內熱而引飲取冷太過冷入腸胃故令下利不止胃虛氣逆則變嘔所以然者脾與胃合俱象土脾候身之肌肉胃為水穀之海脾虛則肌肉受邪胃虛則變下痢下利不止氣逆故變嘔嘔而遇冷析氣逆不通則噦也三十四癰發背渴候此由寒氣客於經絡折於氣血血澀不通乃結成癰也癰發背五臟熱盛虛燥故渴而冷飲入腸胃則變利也三十五癰發背兼嗽候肺主氣候於皮毛氣虛腠理受寒客於經絡則血痞澀熱氣乘之則結成癰也肺氣虛其寒復乘肺肺感於寒則成咳嗽故發癰而兼嗽也三十六癰發背大便不通候此由寒客於經絡血氣痞澀則生熱蘊結成癰氣壅在臟腑熱入腸胃故令大便不通也三十七癰發背惡肉不盡候此由寒氣客於經絡折於氣血血澀不通乃結成癰發背膿潰之後外有風氣搏之變而生惡肉壅塞於瘡者則毒氣內侵須敷藥以食之三十八疽發背候疽發背者多發於諸臟俞也五臟不調則發疽五臟俞皆在背其血氣經絡周於身腑臟不調腠理虛者經脈為寒所客寒折於血血壅不通故用結成疽其發臟俞也熱氣施於血則肉血敗腐為膿也疽初結之狀皮強如牛領之皮是也疽重於癰發者多死刺疽發起肺俞若肝俞不瀉二十日死其八日可刺也發而赤其上肉如椒子者死不可理人年十九二十五三十三四十九五十七六十七十三八十一九十七神皆在背不可見血見血者死蜂疽發背起心俞若膊髃二十日不瀉即死其八日可刺也其色赤黑膿見青者死不治人年六歲十八二十四四十五十六六十七七十二九十八神皆在膊不可見血見血者死三十九疽發背潰後候此由寒氣客於經絡折於氣血血澀不通乃結成疽發背疽膿出之後眼白睛青黑而眼小一逆也內藥而嘔二逆也腹痛渴甚三逆也膊項中不便四逆也音嘶色脫五逆也皆不可治自余或熱渴或利嘔非倉卒之急也可得漸治凡發背則熱氣流入腑臟膿潰之後血氣則虛腑臟積熱渴而引飲飲冷入於腸胃則變下痢胃虛氣逆則變嘔也嘔逆若遇冷折之氣不通即噦也其瘡若膿汁不盡而瘡口早合雖瘥更發惡汁連滯則變成瘻也四十疽發背熱渴候此由寒氣客於經絡折於氣血血澀不通乃結成疽疽發背則腑臟皆熱熱則臟燥故渴也而冷飲入腸胃則變痢也四十一腸癰候腸癰者由寒濕不適喜怒無度使邪氣與榮衛相干在於腸內遇熱加之血氣蘊積結聚成癰熱積不散血肉腐壞化而為膿其病之狀小腹重而微強抑之即痛小便數似淋時時汗出復惡寒其身皮皆甲錯腹皮急如腫狀診其脈洪數者已有膿也其脈遲緊者未有膿也甚者腹脹大轉側聞水聲或繞臍生瘡穿而膿出或膿自臍中出或大便去膿血惟宜急治之又云大便膿血似赤白下而寮非者是腸癰也卒得腸癰而不曉治之錯者殺人寸脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗小腹痞堅小便或難汗出或復惡寒膿為已成設脈遲緊聚為瘀血血下則愈家成引日又諸浮數脈當發熱而反洗淅惡寒若有痛處者當積有膿脈滑澀相搏腸癰出血者也養生方云六畜卒疫死及夏病者腦不中食喜生腸癰也四十二內癰候內癰者由飲食不節冷熱不調寒氣客於內或在胸膈或在腸胃寒折於血血氣留止與寒相搏壅結不散熱氣乘之則化為膿故曰內癰也胸內痛少氣而發熱當入暗室中以手按左腿而其右眼見光者胸內結癰也若不見光熛疽內發若吐膿血者不可治也急以灰掩其膿血不爾才著人腸內有結痛或在脅下或在臍左近結成塊而壯熱必作癰膿診其脈數而身無熱者內有癰養生方云四月勿食暴雞肉作內癰在胸掖下出瘻也四十三肺癰候肺癰者由風寒傷於肺其氣結聚所成也肺主氣候皮毛勞傷血氣腠理則開而受風寒其氣虛者寒乘虛傷肺塞搏於血蘊結成癰熱又加之積熱不散血敗為膿肺處胸間初肺傷於寒則微嗽肺癰之狀其人咳胸內滿隱隱痛而戰寒診其肺部脈緊為肺癰又寸口脈數而實咽乾口內辟辟燥不渴時時出濁唾腥臭久久吐膿如粳米粥者難治也又肺癰喘而胸滿又肺癰有膿而嘔者不須治其嘔膿止自愈又寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴唾而濁沫時時戰寒熱之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿成則死又欲知有膿者其脈緊數膿為未成其脈緊去但數膿為已成又肺病身當有熱咳嗽短氣唾出膿血其脈當短澀而反浮大其色當白而反赤者此是火之剋金大逆不治也四十四䐔病候䐔病者由勞役肢體熱盛自取風冷而為涼濕所折入於肌肉筋脈結聚所成也其狀赤脈起如編繩急痛壯熱其發於腳者患從鼠䖱起至踝赤如編繩故謂䐔病也發於臂者喜掖下起至手也若不即治其久潰膿亦令人筋攣縮也其著腳若置不治不消復不潰其熱歇氣不散變作腫脈緩澀相搏腫䐔已成膿也四十五痤癤候痤癤者由風濕冷氣搏於血結聚所生也人運役勞動則陽氣發泄因而汗出遇風冷濕氣搏於經絡經絡之血得冷所折則結澀不通而生痤癤腫結如梅李也又云腫一寸二寸癤也其不消而潰者即宜熟捻去膿至清血出若膿汁未盡其瘡合者則更發其著耳下頷頸掖下若膿汁不盡多變成瘻也養生方云人汗諸食中食之作癰癤又云五月勿食不成核果及桃棗發癰癤也
