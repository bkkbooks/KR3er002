body:
  text: 卷之四十五小兒雜病諸候一凡二十九論一養小兒候經說年六歲以上為小兒十八以上為少年二十以上為壯年五十以上為老年也其六歲已還者經所不載是以乳下嬰兒病難治者皆無所承按故也中古有巫方立小兒顱囟經以占夭壽判疾病死生世所相傳始有小兒方焉逮乎晉宋推諸蘇家傳襲有驗流於人間小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風日則令肌膚脆軟便易傷損皆當以故絮著衣莫用新綿也天和暖無風之時令母將抱日中嬉戲數見風日則血凝氣剛肌肉硬密堪耐風寒不致疾病若常藏在幃帳之內重衣溫暖譬如陰地之草木不見風日軟脆不任風寒又當薄衣薄衣之法當從秋習之不可以春夏卒減其衣則令中風寒從秋習之以漸稍寒如此則必耐寒冬月但當著兩薄襦一復裳耳非不忍見其寒適當佳耳愛而暖之適所以害之也又當消息無令汗出汗出則致虛損便受風寒晝夜寤寐皆當慎之其飲乳食哺不能無痰癖常當節適乳哺若微不進乳仍當將護之凡不能進乳哺則宜下之如此則終不致寒熱也又小兒始生生氣尚盛無有虛勞微惡則須下之所損不足言及其愈病則致深益若不時下則成大疾疾成則難治矣其冬月下之難將護然有疾者不可不下夏月下之後腹中常當小脹滿故當節哺乳將護之數日間又節哺之當令多少有常劑兒稍大食哺亦當稍增若減少者此是腹中已有小不調也便當微將藥勿復哺之但當乳之甚者十許日輕者五六日自當如常若都不肯食哺而但飲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癇或致下利此皆病重不早下之所為也則難治先治其輕時兒不耗損百病速除矣小兒所以少病癇者其母懷娠時時勞役運動骨血則氣強胎養盛故也若待御多血氣微胎養弱則兒軟脆易傷故多病癇兒皆須著帽項衣取燥菊花為枕枕之兒母乳兒三時摸兒項風池若壯熱者即須熨使微汗微汗不瘥便灸兩風池及背第三椎第五椎第七椎第九椎兩邊各二壯與風池凡為十壯一歲兒七壯兒大者以意節度增壯數可至三十壯唯風池特令多七歲以上可百壯小兒常須慎護風池諺云戒養小兒慎護風池風池在頸項筋兩轅之邊有病乃治之疾微慎不欲妄針灸亦不用輒吐下所以然者針灸傷經絡吐下動腑臟故也但當以除熱湯浴之除熱散粉之除熱赤膏摩之又以臍中膏塗之令兒在涼處勿禁水洗常以新水洗新生無疾慎不可逆針灸逆針灸則忍痛動其五脈因喜成癇河洛間土地多寒兒喜病痙其俗生兒三日喜逆灸以防之又灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆決舌下去血灸頰以防噤江東地溫無此疾古方既傳有逆針灸之法今人不詳南北之殊便按方用之多害於小兒是以田舍小兒任自然皆得無橫夭又云春夏決定不得下小兒所以爾者小兒腑臟之氣軟弱易虛易實下則下焦必益虛上焦生熱熱則增痰痰則成病自非當病不可下也二變蒸候小兒變蒸者以長血氣也變者上氣蒸者體熱變蒸有輕重其輕者體熱而微驚耳冷髖亦冷上唇頭白泡起如死魚目珠子微汗出而近者五日而歇遠者八九日乃歇其重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯無所苦也變蒸之時目白睛微赤黑睛微白亦無所苦蒸畢自明瞭矣先變五日後蒸五日為十日之中熱乃除變蒸之時不欲驚動勿令旁邊多人變蒸或早或晚依時如法者少也初變之時或熱甚者違日數不歇審計日數必是為蒸服黑散發汗熱不止者服紫雙丸小瘥便止勿復服之其變蒸之時遇寒加之則寒熱交爭腹痛夭矯啼不止者熨之則愈變蒸與溫壯傷寒相似若非變蒸身熱耳熱髖亦熱此乃為他病可為余治審是變蒸不得為余治其變日數從初生至三十二日一變六十四日再變變且蒸九十六日三變一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小變蒸畢後六十四日大蒸後六十四日復大蒸後百二十八日復大蒸積五百七十六日大小蒸畢也三溫壯候小兒溫壯者由腑臟不調內有伏熱或挾宿寒皆搏於胃氣足陽明為胃之經主身之肌肉其胃不和調則氣行壅澀故蘊積體熱名為溫壯候小兒大便其糞黃而臭此腹內有伏熱宜將服龍膽湯若糞白而酢臭則挾宿寒不消當服紫雙丸輕者少服藥令默除之甚者小增藥令微利皆當節乳哺數日令胃氣和調若不節乳哺則病易復復則傷其胃氣令腹滿再三利尚可過此則傷小兒矣四壯熱候小兒壯熱者是小兒血氣盛五臟生熱熏發於外故令身體壯熱大體與溫壯相似而有小異或挾伏熱或挾宿寒其挾伏熱者大便黃而臭挾宿寒者糞白而有酸氣此二者腑臟不調冷熱之氣俱乘腸胃蘊積染漸而發溫溫然熱不甚盛是溫壯也其壯熱者是血氣盛熏發於外其發無漸壯熱甚以此為異若壯熱不歇則變為驚極重者亦變癇也五驚候小兒驚者由血氣不和熱實在內心神不定所以發驚甚者掣縮變成癇又小兒變蒸亦微驚所以然者亦由熱氣所為但須微發驚以長血脈不欲大驚大驚乃灸驚脈若五六十日灸者驚復更甚生百日後灸驚脈乃善耳六欲發癇候夫小兒未發癇欲發之候或溫壯連滯或搖頭弄舌或睡里驚掣數齧齒如此是欲發癇之症也七癇候癇者小兒病也十歲以上為癲十歲以下為癇其發之狀或口眼相引而目睛上搖或手足掣縱或背脊強直或頸項反折諸方說癇名證不同大體其發之源皆因三種三種者風癇驚癇食癇是也風癇者因衣厚汗出而風入為之驚癇者因驚怖大啼乃發食癇者因乳哺不節所成然小兒氣血微弱易為傷動因此三種變作諸癇凡諸癇正發手足掣縮慎勿捉持之捉則令曲突不隨也八發癇瘥後身體頭面悉腫滿候凡癇發之狀或口眼相引或目睛上搖或手足掣縱或背脊強直或頭項反折或屈指如數皆由以兒當風取涼乳哺失節之所為也其癇瘥後而腫滿者是風癇風癇因小兒厚衣汗出因風取涼而得之初發之狀屈指如數然後掣縮是也其癇雖瘥氣血尚虛而熱未盡在皮膚與氣相搏致令氣不宣泄故停併成腫也九發癇瘥後六七歲不能語候凡癇發之狀口眼相引或目睛上搖或手足瘛瘲或脊背強直或頭項反折皆由以兒當風取涼乳哺失節之所為也而癇發瘥後不能語者是風癇風癇因兒衣厚汗出以兒乘風取涼太過為風所傷得之其初發之狀屈指如數然後發瘛瘲是也心之聲為言開竅於口其癇發雖止風冷之氣猶滯心之絡脈使心氣不和其聲不發故不能言也十驚癇候驚癇者起於驚怖大啼精神傷動氣脈不定因驚而發作成癇也初覺兒欲驚急持抱之驚自止故養小兒常慎驚勿聞大聲每持抱之間常當安徐勿令怖又雷鳴時常塞兒耳並作余細聲以亂之驚癇當按圖灸之摩膏不可大下何者驚癇心氣不定下之內虛則甚難治凡諸癇正發手足掣縮慎不可捉持之捉之則令曲突不隨也十一風癇候風癇者由乳養失理血氣不和風邪所中或衣厚汗出腠理開風因而入初得之時先屈指如數乃發掣縮是也當與㹠心湯又病先身熱瘛瘲驚啼叫喚而後發癇脈浮者為陽癇內在六腑外在肌膚猶易治病先身冷不驚瘈不啼喚乃成病發時脈沉者為陰癇內在五臟外在骨髓極者難治病發時身軟時醒者謂之癇身強直反張如弓不時醒者謂之痙診其心脈滿大癇瘈筋攣肝脈小急亦癇瘈筋攣尺寸脈俱浮直上直下此為督脈腰背強直不得俯仰小兒風癇三部脈緊急其癇可治小兒脈多似雀鬥要以三部脈為主若緊者必風癇凡諸癇發手足掣縮慎勿捉持之捉則令曲突不隨也十二發癇瘥後更發候癇發之狀或口眼相引或目睛上搖或手足瘛瘲或背脊強直或頭項反折或屈指如數皆由當風取涼乳哺失節之所為其瘥之後而更發者是余勢未盡小兒血氣軟弱或因乳食不節或風冷不調或更驚動因而重發如此者多成常疹凡諸癇正發手足掣縮慎勿捉持之捉則令曲突不隨也十三傷寒候傷寒者冬時嚴寒而人觸冒之寒氣入腠理搏於血氣則發寒熱頭痛體疼謂之傷寒又春時應暖而反寒此非其時有其氣傷人即發病謂之時行傷寒者小兒不能觸冒寒氣而病傷寒者多由大人解脫之時久故令寒氣傷之是以小兒亦病之診其脈來一投而止者便是得病一日假令六投而止者便是得病六日其脈來洪者易治細微者難治也十四傷寒解肌發汗候傷寒是寒氣客於皮膚寒從外搏於血氣腠理閉密冷氣在內不得外泄蘊積生熱故頭痛壯熱體疼所以須解其肌膚令腠理開津液為汗發泄其氣則熱歇凡傷寒無問長幼男女於春夏宜發汗又脈浮大宜發汗所以然者病在表故也十五傷寒挾實壯熱候傷寒是寒氣客於皮膚搏於血氣腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其人本臟氣實者則寒氣與實氣相搏而壯熱者謂之挾實實者有二種有冷有熱其熱實糞黃而臭其冷實食不消糞白而酸氣比候知之其內雖有冷熱之殊外皮膚皆壯熱也十六傷寒兼驚候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱也其兼驚者是熱乘心心主血脈小兒血氣軟弱心神易動為熱所乘故發驚驚不止則變驚癇也十七傷寒大小便不通候傷寒是寒氣客於皮膚搏於血氣使腠理閉密不宣泄蘊積生熱故頭痛體疼而壯熱其大小便不通是寒搏於氣而生熱熱流入大小腸故澀結不通凡大小便不通則內熱不歇或乾嘔或言語而氣還逆上則心腹脹滿也十八傷寒腹滿候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其腹滿者是熱入腹傳於臟臟氣結聚故令腹滿若挾毒者則腹滿心煩懊悶多死十九傷寒咽喉痛候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼壯熱其咽喉痛者是心胸熱盛氣上衝於咽喉故令痛若挾毒則喉痛結腫水漿不入毒還入心煩悶者死二十傷寒嗽候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其嗽者邪在肺肺候身之皮毛而主氣傷寒邪氣先客皮膚隨氣入肺故令嗽重者有膿血也二十一傷寒後嗽候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛壯熱體疼也瘥後而猶嗽者是邪氣猶停在肺未盡也寒之傷人先客皮毛皮毛肺之候肺主氣寒搏肺氣入五臟六腑故表裡俱熱熱退之後肺尚未和邪猶未盡邪隨氣入肺與肺氣相搏故傷寒後猶病嗽也二十二傷寒汗出候傷寒者是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼壯熱也而汗出者陽虛受邪邪搏於氣故發熱陰氣又虛邪又乘於陰陰陽俱虛不能制其津液所以傷寒而汗出也二十三傷寒餘熱往來候傷寒是寒氣客於皮膚搏於血氣腠理閉密氣不宣泄蘊積生熱使頭痛體疼而壯熱也其餘熱往來者是邪氣與正氣交爭正氣勝則邪氣卻散故寒熱俱歇若邪氣未盡者時干於正氣正氣為邪氣所幹則壅痞還熱故餘熱往來不已也二十四傷寒已得下後熱不除候傷寒是寒氣客於皮膚搏於血氣使腠理閉密不得宣泄蘊積生熱故頭痛體疼而壯熱也若四五日後熱歸入里則宜下之得利後熱猶不除者餘熱未盡故其狀肉常溫溫而熱也二十五傷寒嘔候傷寒是寒氣客於皮膚搏於血氣腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其嘔者是胃氣虛熱乘虛入胃胃得熱則氣逆故嘔也二十六傷寒熱渴候傷寒是寒氣客於皮膚搏於血氣腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其渴者是熱入臟髒得熱則津液竭燥故令渴也二十七傷寒口內生瘡候傷寒是寒氣客於皮膚搏於血氣腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其口生瘡熱毒氣在臟上衝胸膈氣發於口故生瘡也二十八傷寒鼻衄候傷寒是寒氣客於皮膚搏於血氣腠理閉密氣不得宣泄蘊積毒氣故頭痛體疼而壯熱其鼻衄是熱搏於氣而乘於血也肺候身之皮毛其氣開竅於鼻蘊寒先客皮膚搏於氣而成熱熱乘於血血得熱而妄行發從鼻出者名鼻衄也凡候熱病而應衄者其人壯熱頻發汗汗不出或未及發汗而鼻燥喘息鼻氣鳴即衄凡衄小兒止一升數合則熱因之得歇若一升二升者死二十九傷寒後下利候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積毒氣頭痛體疼而壯熱也其熱歇後而利者是熱從表入里故也表熱雖得解而裡熱猶停腸胃與水穀相併腸胃虛則泄利其狀利色黃若壯熱不止則變為血利若重遇冷則冷熱相加則變赤白瀉利也
