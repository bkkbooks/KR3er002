body:
  text: 序臣聞人之生也陶六氣之和而過則為診醫之作也求百病之本而善則能全若乃分三部九候之殊別五聲五色之變揆盈虛於表裡審躁靜於性韻達其消息謹其攻療茲所以輔含靈之命裨有邦之治也國家丕冒萬宇交修庶職執技服於官守寬疾存乎政典皇上秉靈圖而迪成憲奉母儀而隆至化明燭幽隱惠綏動植憫斯民之疢苦佇嘉醫之拯濟且念幅員之遼邈閭巷之窮厄肄業之士罕盡精良傳方之家頗承疑舛四種之書或闕七年之習未周以彼粗工肆其億度夭害生理可不哀哉是形𦞙怛或懷重慎以為昔之上手效應參神前五日而逆知經三折而取信得非究源之微妙用意之詳密乎蓋診候之教肇自軒祖中古以降論著彌繁思索其精博利族眾乃下明詔疇咨舊聞上稽聖經旁摭奇道發延閣之秘蘊敕中尚而讎對諸病源候論者隋大業中太醫巢元方等奉詔所作也會粹群說沈研精理形脈之證罔不該集明居處愛欲風濕之所感示針鑱撟引湯熨之所宜誠術藝之楷模而診察之津涉監署課試固常用此乃命與難經素問圖鏤方版傳布海內洪惟祖宗之訓務惟存育之惠補農經之闕漏班禁方於遐邇逮今搜採益窮元本方論之要殫矣師藥之功備矣將使後學優而柔之視色毫而靡愆應心手而胥驗大哉昧百草而救枉者古皇之盛德憂一夫之失所者二帝之用心弭茲札瘥躋之仁壽上聖愛人之旨不其篤歟翰林醫官副使趙拱等參校既終繕錄以獻爰俾近著為之題辭顧惟空疏莫探秘賾徒以述善誘之深意用勸方來楊勤恤之至仁式昭大庇云爾謹序翰林學士兼侍讀學士玉清昭應宮判官中散大夫尚書左司郎中知制誥史館修撰判館事上護軍常山郡開國侯食邑一千二百戶賜紫金魚袋臣宋綬奉敕撰
