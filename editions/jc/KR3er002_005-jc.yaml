body:
  text: 卷之五腰背病諸候凡十論一腰痛候腎主腰腳腎經虛損風冷乘之故腰痛也又邪客於足太陰之絡令人腰痛引少腹不可以仰息診其尺脈沉主腰背痛寸口脈弱腰背痛尺寸俱浮直上直下此為督脈腰強痛凡腰痛有五一曰少陰少陰申也七月萬物陽氣傷是以腰痛二曰風痹風寒著腰是以痛三曰腎虛役用傷腎是以痛四曰䐴腰墜墮傷腰是以痛五曰寢臥濕地是以痛其湯熨針石別有正方補養宣導今附於後養生方云飯了勿即臥久成氣病令腰疼痛又曰大便勿強努令人腰疼目澀又云笑多即腎轉腰痛又云人汗次勿企床懸腳久成血痹兩足重及腰痛養生方導引法云一手向上極勢手掌四方轉回一手向下努之合手掌努指側身欹形轉身向似看手掌向上心氣向下散適知氣下緣上始極勢左右上下四七亦然去膊井肋腰脊痛悶又云互跪長伸兩手拓席向前待腰脊須轉遍身骨解氣散長引腰極勢然始卻跪使急如似脊內冷氣出許令臂膊痛痛欲似悶痛還坐來去二七去五臟不和背痛悶又云凡人常覺脊強不問時節縮咽膊內仰面努搏井向上也頭左右兩向挪之左右三七一住待血行氣動定然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰如用辰別三七除寒熱脊腰頸痛又云長舒兩足足指努向上兩手長舒手掌相向手指直舒仰頭努脊一時極勢滿三通動足相去一尺手不移處手掌向外七通更動足二尺手向下拓席極勢三通去遍身內筋脈虛勞骨髓痛悶長舒兩足向身角上兩手捉兩足指急搦心不用力心氣並在足下手足一時努縱極勢三七去踹臂腰疼解谿蹙氣日日漸損又云凡學將息人先須正坐並膝頭足初坐先足指指向對足跟外扒坐上少欲安穩須兩足跟向內相對坐上足指外扒覺悶痛漸漸舉身似款便坐坐上待共兩坐相似不痛始雙豎足跟向上坐上足指並反而向外每坐常學去膀胱內冷面冷風膝冷足疼上氣腰痛儘自消適也二腰痛不得俯仰候腎主腰腳而三陰三陽十二經八脈有貫腎絡於腰脊者勞損於腎動傷經絡又為風冷所侵血氣擊搏故腰痛也陽病者不能俯陰病者不能仰陰陽俱受邪氣者故令腰痛而不能俯仰養生方導引法云伸兩腳兩手指著足五指上愈腰折不能低著唾血久疼愈又云長伸兩腳以兩手捉足五指七通愈折腰不能低仰也三風濕腰痛候勞傷腎氣經絡既虛或因臥濕當風而風濕乘虛搏於腎經與血氣相擊而腰痛故云風濕腰痛四卒腰痛候夫勞傷之人腎氣虛損而腎主腰腳其經貫腎絡脊風邪乘虛卒入腎經故卒然而患腰痛五久腰痛候夫腰痛皆由傷腎氣所為腎虛受於風邪風邪停積於腎經與血氣相擊久而不散故久腰痛六腎著腰痛候腎主腰腳腎經虛則受風冷內有積水風水相搏浸積於腎腎氣內著不能宣通故令腰痛其病狀身重腰冷腹重如帶五千錢如坐於水形狀如水不渴小便自利飲食如故久久變為水病腎濕故也七䐴腰候䐴腰者謂卒然傷損於腰而致痛也此由損血搏於背脊所為久不已令人氣息乏少面無顏色損腎故也八腰腳疼痛候腎氣不足受風邪之所為也勞傷則腎虛虛則受於風冷風冷與真氣交爭故腰腳疼痛九背僂候肝主筋而藏血血為陰氣為陽陽氣精則養神柔則養筋陰陽和同則氣血調適共相榮養也邪不能傷若虛則受風風寒搏於脊膂之筋冷則攣急故令背僂十脅痛候邪客於足少陽之絡令人脅痛咳汗出陰氣擊於肝寒氣客於脈中則血泣脈急引脅與小腹診其脈弦而急脅下如刀剌狀如飛屍至困不死左手脈大右手脈小病右脅下痛寸口脈雙弦則脅下拘急其人澀澀而寒其湯熨針石別有正方補養宣導今附於後養生方導引法云卒左脅痛念肝為青龍左目中魂神將五營兵千乘萬騎從甲寅直符吏入右脅下取病去又云右脅痛念肺為白虎右目中魄神將五營兵千乘萬騎從甲申直符吏入右脅下取病去脅側臥伸臂直腳以鼻納氣以口出之除脅皮膚痛七息止又云端坐伸腰右顧視目口納氣咽之三十除左脅痛開目又云舉手交項上相握自極治脅下痛坐地交兩手著不周遍握當挽久行實身如金剛令息調長如風雲如雷消渴病諸候凡八論一消渴候夫消渴者渴不止小便多是也由少服五石諸丸散積經年歲石勢結於腎中使人下焦虛熱及至年衰血氣減少不復能制於石石勢獨盛則腎為之燥故引水而不小便也其病變多發癰疽此坐熱氣留於經絡不引血氣壅澀故成癰膿診其脈數大者生細小浮者死又沉小者生實牢大者死有病口甘者名為何何以得之此五氣之溢也名曰脾癉夫五味入於口藏於胃脾為之行其精氣溢在脾令人口甘此肥美之所發此人必數食甘美而多肥肥者令人內熱甘者令人中滿故其氣上溢轉為消渴厥陰之病消渴重心中疼飢而不欲食甚則欲吐蛔其湯熨針石別有正方補養宣導今附於後養生法云人睡臥勿張口久成消渴及失血色養生方導引法赤松子云臥閉目不息十二通治飲食不消法云解衣惔臥伸腰䐜少腹五息止引腎氣去消渴利陰陽解衣者無使掛礙惔臥者無外想使氣易行伸腰者使腎無逼蹙䐜者大努使氣滿小腹者即攝腹牽氣使上息即為之引腎者引水來咽喉潤上部去消渴枯槁病利陰陽者饒氣力也此中數虛要與時節而為避初食後大飢時此二時不得導引傷人亦避惡日時節不和時亦避導已先行一百二十步多者千步然後食之法不使大冷大熱五味調和陳穢宿食蟲蠍余殘不得食少眇著口中數嚼少湍咽食已亦勿眠此名谷藥並與氣和即真良藥二渴病候五臟六腑皆有津液若臟腑因虛實而生熱者熱氣在內則津液竭少故渴也夫渴數飲其人必眩背寒而嘔者因利虛故也診其脈心脈滑甚為善渴其久病變或發癰疽或成水疾三大渴後虛乏候夫人渴病者皆由臟腑不和經絡虛竭所為故病雖瘥血氣未復仍虛乏也四渴利候渴利者隨飲小便故也由少時服乳石石熱盛時房室過度致令腎氣虛耗下焦生熱熱則腎燥燥則渴然腎虛又不得傳制水液故隨飲小便以其病變多發癰疽以其內熱小便利故也小便利則津液竭津液竭則經絡澀經絡澀則榮衛不行榮衛不行則熱氣留滯故成癰疽膿五渴利後損候夫渴利病後榮衛虛損臟腑之氣未和故須各宣暢也六渴利後發瘡候渴利之病隨飲小便也此謂服石藥之人房室過度腎氣虛耗故也下焦生熱熱則腎燥腎燥則渴然腎虛又不能制水故小便利其渴利雖瘥熱猶未盡發於皮膚皮膚先有風濕濕熱相搏所以生瘡七渴利候內消病者不渴而小便多是也由少服五石石熱結於腎內熱之所作也所以服石之人小便利者石性歸腎腎得石則實實則消水漿故利利多不得潤養五臟臟衰則生諸病由腎盛之時不惜其氣恣意快情致使虛耗石熱孤盛則作消利故不渴而小便多也八強中候強中病者莖長興盛不痿精液自出是也由少服五石五石熱住於腎中下焦虛熱少壯之時血氣尚豐能制於五石及至年衰血氣減少腎虛不復能制精液若精液竭則諸病生矣
