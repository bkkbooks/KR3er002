body:
  text: 卷之四十二婦人妊娠諸候下凡四十一論二十一妊娠傷寒候冬時嚴寒人體虛而為寒所傷即成病為傷寒也輕者嗇嗇惡寒吸吸發熱微咳鼻塞數日乃止重者頭痛體疼憎寒壯熱久不歇亦傷胎也二十二妊娠傷寒後復候冬時嚴寒人體虛觸冒之得病名傷寒其狀頭痛體疼壯熱瘥後體虛尚未平復或起早或飲冷過度病更如初故謂之復也三十三妊娠時氣候四時之間忽有非切之氣如春時應暖而反寒夏時應熱而反冷秋時應涼而反熱冬時應寒而反溫非其節而有其氣一氣之至無人不傷長少雖殊病皆相似者多挾於毒言此時普行此氣故云時氣也妊娠遇之重者傷胎也二十四妊娠溫病候冬時嚴寒人有觸冒之寒氣伏藏肌骨未即病至春而發謂之溫也亦壯熱大體與傷寒相似又冬時應寒而反溫溫氣傷人即病亦令壯熱謂之溫病妊娠遇此病熱搏於胎皆損胎也二十五妊娠熱病候冬時嚴寒觸冒傷之藏於肌骨夏至乃發壯熱又為暑病暑病即熱病也此寒氣蘊積發即有毒妊娠遇之多致墮胎也二十六妊娠寒熱候妊娠寒熱病者猶是時氣之病也此病起於血氣虛損風邪乘之致陰陽並隔陽勝則熱陰勝則寒陰陽相乘二氣交爭故寒熱其妊娠而感此病者熱甚則傷胎也二十七妊娠瘧候夫瘧者由夏傷於暑客於皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱正邪相擊陰陽交爭陽盛則熱陰盛則寒陰陽更虛更盛故發寒熱陰陽相離寒熱俱歇若邪動氣至交爭則復發故瘧休作有時其發時節漸晏者此由邪客於風府循膂而下衛氣一日一夜常大會於風府其明日日下一節故其作發日晏其發日早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏沖之脈其氣上行九日出於缺盆之內其氣既上故其病發更早其間日發者由邪氣風薄五臟橫連募原其道遠其氣深其行遲不能日作故間日蓄積乃發妊娠而發者寒熱之氣迫傷於胎多致損動也二十八妊娠下痢候春傷於風邪氣留連遇腸胃虛弱風邪因而傷之腸虛則泄故為下痢然此水穀利痢也二十九妊娠滯痢候冷熱不調腸虛者冷熱之氣客於其間熱氣乘之則赤冷氣乘之則白冷熱相交連滯故赤白如魚腦鼻涕相雜為滯利也三十妊娠胸脅支滿候妊娠經血不通上為乳法兼以養胎若宿有停飲者則血飲相搏又因冷熱不調動於血飲血飲乘氣逆上搶於胸脅胸脅脹滿而氣小喘謂之支滿三十一妊娠痰候水飲停積結聚為痰人皆有之少者不能為害若多則成病妨害飲食乃至嘔吐妊娠病之若嘔吐甚者傷胎也三十二妊娠子煩候臟虛而熱氣乘於心則令心煩停痰積飲在於心胸其衝於心者亦令煩也若虛熱而煩者但煩熱而已若有痰飲而煩者則嘔吐涎沫妊娠之人既血飲停積或虛熱相搏故亦煩以其妊娠而煩故謂之子煩也三十三妊娠霍亂候陰陽清濁相干謂之氣亂氣亂於腸胃之間為霍亂也但飲食過度冒觸風冷使陰陽不和致清濁相干腸胃虛者受之故霍亂也先心痛則先吐先腹痛則先利心腹俱痛吐利併發有頭痛體疼發熱而吐痢者亦為霍亂所以然者挾風而有實故也風折血氣皮膚閉密血氣不得宣故令壯熱風邪乘其經脈氣上衝於頭則頭痛風氣入於腸胃腸虛則泄痢胃逆則嘔吐故吐痢也吐痢甚則煩腑臟虛故也又手足逆冷陽氣暴竭謂之四逆也妊娠而病之吐痢甚者則傷損胎也三十四妊娠中惡候人有忽然心腹刺痛悶亂欲死謂之中惡言惡邪之氣中傷於人也所以然者人之血氣自養而精神為主若血氣不和則精神衰弱故厲毒鬼氣得中之妊娠病之亦致損胎也三十五妊娠腹滿候妊娠腹滿者由腹內宿有寒冷停飲挾以妊娠重因觸冷則冷飲發動燠氣相干故令腹滿也三十六妊娠咳嗽候肺感於微寒寒傷於肺則成咳嗽所以然者肺主氣候皮毛寒之傷人先客皮毛故肺受之又五臟六腑俱受氣於肺以四時更王五臟六腑亦皆有咳嗽各以其時感於寒而為咳嗽也秋則肺受之冬則腎受之春則肝受之夏則心受之其諸臟咳嗽不已各傳於腑妊娠而病之者久不已傷於胎也三十七妊娠胸痹候胸痹者由寒氣客於臟腑上衝胸心愊愊如滿噎塞不利習習如癢而痹痛胸中慄慄然飲食不下謂之胸痹出而脾胃漸弱乃至斃人妊娠而病之非直妊婦為患亦傷損於胎也三十八妊娠咽喉身體著毒腫候毒腫者是風邪厲毒之氣客人肌肉搏於血氣積聚所成然邪毒傷人無有定處隨經絡虛處而留止之故或著身體或著咽喉但毒之所停血則痞澀血氣與邪相搏故成腫也其毒發於身體猶為小緩若著咽喉最急便腫塞痹痛乃至水漿不通毒入攻心心煩悶妊娠者尤宜急救不爾子母俱傷也三十九妊娠中蠱毒候蠱毒者人有以蛇蝘蜣斿諸蟲合著一處令其自相殘食餘一個在者名之為蠱諸山縣人多作而敬事之因飲食里以毒斃人又或吐血利血是食人腑臟則死又云有緩急緩急延引日月急者止在旦夕以法術知其主呼之蠱去乃瘥平人遇之尚死況妊娠者故子母俱傷也四十妊娠飛屍入腹候飛屍者是五屍中一屍也其遊走皮膚貫穿臟腑每發刺痛變作無常為飛屍也妊娠病之者亦損胎也四十一妊娠患子淋候淋者腎虛膀胱熱也腎虛不能制水則小便數也膀胱熱則水行澀澀而且數淋瀝不宣妊娠之人胞系於腎腎患虛熱成淋故謂子淋也四十二妊娠大小便不通候人有腑臟氣實而生於熱者隨停積之處成病若熱結大腸大便不通熱結小腸小便不通若大小腸俱為熱所結故煩滿大小便不通也凡大小便不通則內熱腸胃氣逆令變乾嘔也四十三妊娠大便不通候三焦五臟不調和冷熱痞結津液竭燥腸胃痞澀蘊積結於腸間則大便不通令腹痞滿煩熱甚者變乾嘔所以然者胃內熱氣逆也四十四妊娠大小便不利候冷熱之氣不調乘於大小腸則謂之為遊氣壅痞而生熱或熱病熱入大小腸並令大小便不利也凡大小便不利則心脅滿食不下而煩躁不安也四十五妊娠小便利候小便利者腎虛胞冷不能溫制於小便故小便利也四十六妊娠小便數候腎與膀胱合俱主水腎氣通於陰腎虛而生熱熱則小便澀虛則小便數虛熱相搏雖數起而不宣快也四十七妊娠小便不利候腎與膀胱合俱主水水行入胞為小便臟腑有熱熱入於胞故令小便不利也四十八妊娠小便不通候小腸有熱熱入於胞內熱結甚者故小便不通則心脅小腸俱滿氣喘急也四十九妊娠驚胎候驚胎者見懷妊月將滿或將產其胎神識已具外有勞傷損動而胎在內驚動也五十妊娠中風候四時八方之氣為風常以冬至之日候之風從其鄉來者長養萬物若不從鄉來者為虛風賊於人人體虛者則中之五臟六腑俞皆在背臟腑虛風邪皆從其俞入人中之隨腑臟所感而發也心中風但偃臥不得傾側汗出若唇赤汗流者可治急灸心俞百壯若唇或青或白或黃或黑此是心壞為水面目亭亭時悚動者皆不可治五六日而死若肝中風但踞坐不得低頭若繞兩目連額上色微有青唇青面黃可治急灸肝俞百壯若大青黑面一黃一白者是肝已傷不可治數日而死若脾中風踞而腹滿身通黃吐咸汁出可治急灸脾俞百壯若手足青者不可治若腎中風踞而腰痛視脅左右未有黃色如餅𧶺大者可治急灸腎俞百壯若齒黃赤鬢髮直面土色者不可治也若肺中風偃臥而胸滿短氣冒悶汗出者視目下鼻上下兩邊下行至口色白者可治急灸肺俞百壯若色黃者為肺已傷化為血不可治其人當妄掇空或自拈衣如此數日而死妊娠而中風非止妊娠為病甚者損胎也五十一妊娠痙候體虛受風而傷太陽之經停滯經絡後復遇寒濕相搏發則口噤背強名之為痙妊娠而發者悶冒不識人須臾醒醒復發亦是風傷太陽之經作痙也亦名子癇亦名子冒也五十二妊娠鬼胎候夫人腑臟調和則血氣充實風邪鬼魅不能幹之若榮衛虛損則精神衰弱妖魅鬼精得入於臟狀如懷娠故曰鬼胎也五十三妊娠兩胎一生一死候陽施陰化精盛有餘者則成兩胎胎之在胞以血氣資養若寒溫節適虛實調和氣血強盛則胎無傷夭若冷熱失宜氣血損弱則胎翳燥不育其兩胎而一死者是血遇於寒挾經養不調故偏夭死也候其胎上冷是胎已死也五十四妊娠胎痿燥候胎之在胞血氣資養若血氣虛損胞臟冷者胎則翳燥委伏不長其狀兒在胎都不轉動日月雖滿亦不能生是其候也而胎在內痿燥其胎多死五十五妊娠過年久不產候過年不產由挾寒冷宿血在胞而有胎則冷血相搏令胎不長產不以時若其胎在胞日月雖多其胎翳小轉動勞羸是挾於病必過時乃產五十六妊娠墮胎後血出不止候墮胎損經脈損經脈故血不止也瀉血多者便致煩悶乃至死也五十七妊娠墮胎後血不出候此由宿有風冷因墮胎血冷相搏氣虛逆上者則血結不出也其血逆上搶心則亦煩悶甚者致死五十八妊娠墮胎衣不出候此由墮胎初下婦人力羸不能更用氣產胞便遇冷冷則血澀故胞衣不出也若胞上掩心煩悶乃至於死也五十九妊娠墮胎後腹痛虛乏候此由墮胎之時血下過少後余血不盡將攝未復而勞傷氣力觸冒風冷風冷搏於血氣故令腹痛勞損血氣不復則虛乏而余血不盡結搏於內多變成血瘕亦令月水不通也六十妊娠墮胎後著風候墮胎後榮衛損傷腠理虛疏未得平復若起早當風取涼即著於風初止羸弱或飲食減少氣力不即平復若風挾冷入腹內搏於血結成刺痛若入腸胃亦下痢入經絡或痹或疼痛若入太陽之經則腰背強直成痙或角弓反張或口喎僻或緩弱不隨或一邊攣急各隨所傷處而成病也六十一妊娠欲去胎候此謂妊娠之人羸瘦或挾疾病既不能養胎兼害妊婦故去之
