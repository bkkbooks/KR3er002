body:
  text: 卷之二十八目病諸候凡三十八論一目赤痛候凡人肝氣通於目言肝氣有熱熱衝於目故令赤痛二目胎赤候胎赤者是人初生洗目不淨令穢汁浸漬於眥使瞼赤爛至大不瘥故云胎赤三目風赤候目者肝之竅風熱在內乘肝其氣外衝於目故見風淚出目瞼眥赤四目赤爛眥候此由冒觸風日風熱之氣傷於目而眥瞼皆赤爛見風彌甚世亦云風眼五目數十年赤候風熱傷於目眥則眥赤爛其風熱不去故眥常赤爛積年不瘥六目風腫候目為肝之外候肝虛不足為冷熱之氣所幹故氣上衝於目外復遇風所擊冷熱相搏而令瞼內結腫或如杏核大或如酸棗之狀腫而因風所發故謂之風腫七目風淚出候目為肝之外候若被風邪傷肝肝氣不足故令目淚出其湯熨針石別有正方補養宣導今附於後養生方導引法云踞坐伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息展右足著外除難屈伸拜起去脛中痛痹風目耳聾又云踞伸左腳兩手抱右膝頭伸腰以鼻納氣自極七息展左足著外除難屈伸拜起去脛中疼一本云除風目暗耳聾又云以鼻納氣左手持鼻除目暗泣出鼻納氣口閉自極七息除兩脅下積血氣又云端坐伸腰徐徐以鼻納氣以右手持鼻徐徐閉目吐氣除目暗淚苦出鼻中瘜肉耳聾亦能除傷寒頭痛洗洗皆當以汗出為度八目淚出不止候夫五臟六腑皆有津液通於目者為淚若臟氣不足則不能收制其液故目自然淚出亦不因風而出不止本無赤痛九目膚翳候陰陽之氣皆上注於目若風邪痰氣乘於腑臟腑臟之氣虛實不調故氣衝於目久不散變生膚翳膚翳者明眼睛上有物如蠅翅者即是十目膚翳覆瞳子候此言肝臟不足為風熱之氣所幹故於目睛上生翳翳久不散漸漸長侵覆瞳子十一目瘜肉淫膚候瘜肉淫膚者此由邪熱在臟氣衝於目熱氣切於血脈蘊積不散結而生瘜肉在於白晴膚瞼之間即謂之瘜肉淫膚也十二目暗不明候失目者五臟六腑陰陽精氣皆上注於目若為血氣充實則視瞻分明血氣虛竭則風邪所侵令目暗不明其湯熨針石別有正方補養宣導今附於後養生方云恣樂傷魂魂通於目損於肝則目暗養生方導引法云蹲踞以兩手舉足五趾低頭自極則五臟氣遍至治耳不聞人語聲目不明久為之則令發白復黑又云仰兩足指五息止引腰背痹偏枯令人耳聞聲久行眼耳諸根無有掛礙又云伸左脛屈右膝內壓之五息止引肺氣去風虛令人目明依經為之引肺中氣去風虛病令人目明夜中見色與晝無異又云雞鳴以兩手相摩令熱以熨目三行以指抑目左右有神光令目明不病痛又云東向坐不息再通以兩手中指口唾之二七相摩拭目令人目明以甘泉漱之洗目去其翳垢令目清明上以納氣洗身中令內睛潔此以外洗去其塵障又云臥引為三以手爪項邊脈五通令人目明臥正偃頭下卻亢引三通以兩手指爪項邊大脈為五通除目暗患久行令人眼夜能見色為久不已通見十方無有劑限十三目青盲候青盲者謂眼本無異瞳子黑白分明直不見物耳但五臟六腑之精氣皆上注於目若臟虛有風邪痰飲乘之有熱則赤痛無熱但內生鄣是腑臟血氣不榮於睛故外狀不異只不見物而已是之謂青盲養生方云勿塞故井及水瀆令人耳聾目盲又云正月八日沐浴除目盲十四目青盲有翳候白黑二晴無有損傷瞳子分明但不見物名為青盲更加以風熱乘之氣不外泄蘊積於睛間而生翳似蠅翅者覆瞳子上故為清盲翳也十五目茫茫候夫目是五臟六腑之精華宗脈之所聚肝之外候也腑臟虛損為風邪痰熱所乘氣傳於肝上衝於目故令視瞻不分明謂之茫茫也凡目病若肝氣不足兼胸膈風痰勞熱則目不能遠視視物則茫茫漠漠也若心氣虛亦令目茫茫或惡見火光視見蜚蠅黃黑也診其左手尺中脈沉為陰陰實者目視茫茫其脈浮大而緩者此為逆必死其湯熨針石別有正方補養宣導今附於後養生方導引法云雞鳴欲起先屈左手啖鹽指以指相摩咒曰西王母女名曰益愈賜我目受之於口即精摩形常雞鳴二七著唾除目茫茫致其精光徹視萬里遍見四方咽二七唾之以熱指摩目二七令人目不瞑十六雀目候人有晝而睛明至瞑則不見物世謂之雀目言其如鳥雀瞑便無所見也十七目珠管候目是五臟六腑之精華宗脈之所聚肝之外候也肝藏血若腑臟氣血調和則目精彩明淨若風熱痰飲漬於臟腑使肝臟血氣蘊積沖發於眼津液變生結聚狀如珠管十八目珠子脫出候目是臟腑陰陽之精華宗脈之所聚上液之道肝之外候凡人風熱痰飲漬於臟腑陰陽不和肝氣蘊積生熱熱衝於目使目睛疼痛熱氣衝擊其珠子故令脫出十九目不能遠視候夫目不能遠視者由目為肝之外候腑臟之精華若勞傷腑臟肝氣不足兼受風邪使精華之氣衰弱故不能遠視二十目澀候目肝之外候也腑臟之精華宗脈之所聚上液之道若悲哀內動腑臟則液道開而泣下其液竭者則目澀又風邪內乘其腑臟外傳於液道亦令泣下而數欠泣竭則目澀若腑臟勞熱熱氣乘於肝而沖發於目則目熱而澀也甚則赤痛二十一目眩候目者五臟六腑之精華宗脈之所聚也筋骨血氣之精與脈併為目系繫上屬於腦若腑臟虛風邪乘虛隨目系入於腦則令腦轉而目系急則目眴而眩也二十二目視一物為兩候目是五臟六腑之精華凡人腑臟不足精虛而邪氣乘之則精散故視一物為兩也二十三目偏視候目是五臟六腑之精華人腑臟虛而風邪入於目而瞳子被風所射睛不正則偏視此患亦有從小而得之者亦有長大方病之者皆由目之精氣虛而受風邪所射故也二十四目飛血候目肝之外候也肝藏血足厥陰也其脈起足大趾之聚毛入連於目系其經脈之血氣虛而為風熱所乘故血脈生於白睛之上謂之飛血二十五目黑候目黑者肝虛故也目是臟腑之精華肝之外候而肝藏血腑臟虛損血氣不足故肝虛不能榮於目致精彩不分明故目黑二十六目暈候五臟六腑之精華皆上注於目目為肝之外候肝藏血血氣不足則肝虛致受風邪風邪搏於精氣故精氣聚生於白睛之上繞於黑睛之際精彩昏濁黑白不明審謂之止暈二十七癥目候睊目者是風氣客於瞼眥之間與血氣津液相搏使目眥癢而淚出目眥恆濕故謂之睊目二十八目眵䁾候目是腑臟之精華肝之外候夫目上液之道腑臟有熱氣熏於肝沖發於目眥瞼使液道熱澀滯結成眵䁾也二十九睢目候目是腑臟血氣之精華肝之外候然則五臟六腑之血氣皆上榮於目也若血氣虛則膚腠開而受風風客於瞼膚之間所以其皮緩縱垂覆於目則不能開世呼為睢目亦名侵風三十目眇候目者腑臟之精華宗脈之所聚肝之外候也風邪停飲在於臟腑侵於肝氣上衝於眼則生翳鄣管珠瘜肉其經絡有偏虛者翳鄣則偏覆一瞳子故偏不見物謂之眇目三十一目蠟候蠟目者是蠅蛆目眥成瘡故謂之蠟目三十二目肥候肥目者白睛上生點注或如浮萍或如榆莢有如胡粉色者有作青黑色者似羹上脂致令目暗世呼為肥目五臟六腑之精華皆上注於目為肝之外候宗脈所聚上液之道此由腑臟氣虛精液為邪所搏變化而生也三十三目疱瘡候目肝之候也五臟六腑之精華上榮於目腑臟有熱氣乘於肝沖發於目熱氣結聚故睛上生疱瘡也三十四目膿漏候目是肝之外候上液之道風熱客於瞼眥之間熱搏於血液令眥內結聚津液乘之不止故成膿汁不盡謂之膿漏三十五目封塞候目肝之外候也肝氣通於目風邪毒氣客於瞼膚之間結聚成腫腫而瞼合不開故謂之封塞然外為風毒結腫內則蘊積生熱若腫不即消熱勢留滯則變生膚翳瘜肉白鄣也三十六目內有疔候目肝之外候也臟腑熱盛熱乘於肝氣衝於目熱氣結聚而目內變生狀如疔也三十七針眼候人有眼內眥頭忽結成疱三五日間便生膿汁世呼為偷針此由熱氣客在眥間熱搏於津液所成但其熱勢輕者故止小小結聚汁潰熱歇乃瘥三十八割目後除痛止血候夫目生淫膚瘜肉其根皆從目眥染漸而起五臟六腑之精華上注於目目宗脈之所聚肝之外候也肝藏血十二經脈有起內眥兌眥者風熱氣乘其臟腑臟腑生熱熱氣熏肝沖發於目熱搏血結故生淫膚瘜肉割之而傷經脈者則令痛不止血出不住即須方藥除療之
