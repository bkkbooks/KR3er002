body:
  text: 卷之二十五蠱毒病諸候上凡九論一蠱毒候凡蠱毒有數種皆是變惑之氣人有故造作之多取蟲蛇之類以器皿盛貯任其自相啖食唯有一物獨在者即謂之為蠱便能變惑隨逐酒食為人患禍患禍於佗則蠱主吉利所以不羈之徒而蓄事之又有飛蠱去來無由漸狀如鬼氣者得之卒重凡中蠱病多趨於死以其毒害勢甚故云蠱毒著蠱毒面色青黃者是蛇蠱其脈洪壯病發之時腹內熱悶胃脅支滿舌本脹強不喜言語身體恆痛又心腹似如蟲行顏色赤唇口乾燥經年不治肝鬲爛而死其面色赤黃者是蜥蜴蠱其脈浮滑而短病發之時腰背微滿手腳唇口悉皆習習而喉脈急舌上生瘡二百日不治啖人心肝盡爛下膿血羸瘦顏色枯黑而死其面色青白又云其脈沉濡病發時咽喉塞不欲聞人語腹內鳴喚或下或上天陰雨轉劇皮內如蟲行手腳煩熱嗜醋食咳唾膿血顏色乍白乍青腹內脹滿狀如蝦蟆若成蟲吐出如科斗形是蝦蟆蠱經年不治啖人脾胃盡唇口裂而死其脈緩而散者病發之時身體乍冷乍熱手腳煩疼無時節吐逆小便赤黃腹內悶胸痛顏色多青毒或吐出似蜣螂有足翅是蜣螂蠱經年不治啖人血脈枯盡而死欲知是蠱與非當令病人唾水內沉者是蠱浮者非蠱又云旦起取井花水未食前當令病人唾水內唾如柱腳直下沉者是蠱毒沉散不至下者草毒又云含大豆若是蠱豆脹皮脫若非蠱豆不爛脫又云以鵠皮置病人臥下勿令病人知若病劇者是蠱也又云取新生雞子煮熟去皮留黃白令完全日晚口含以齒微微微螘之勿令破作兩炊時夜吐二瓦上著霜露內旦看大青是蠱毒也昔有人食新變鯉魚中毒病心腹痛心下硬發熱煩冤欲得水洗沃身體搖動如魚得水狀有人診云是蠱其家云野間相承無此毒不作蠱治遂死其湯熨針石別有正方補養宣導今附於後養生方導引法云兩手著頭相叉長引氣即吐之坐地緩舒兩腳以兩手從外抱膝中疾低頭入兩膝間兩手交叉頭上十二通愈蠱毒及三尸毒腰中大氣又云行大道常度日月星辰清淨以雞鳴安身臥嗽口三咽之調五臟殺蠱蟲治心腹痛令人長生又云無生經曰治百病邪蠱當正偃臥閉目閉氣內視丹田以鼻徐徐納氣令腹極滿徐徐以口吐之勿令有聲令入多出少以微為之故存視五臟各如其形色又存胃中令鮮明潔白如素為之倦極汗出乃止以粉粉身摩捋形體汗不出而倦者亦可止明日復為之又當存作大雷電隆晃走入腹中為之不止病自除二蠱吐血候蠱是合聚蟲蛇之類以器皿盛之任其相啖食餘一存者名為蠱能害人食人腑臟其狀心切痛如被物齧或硬面目青黃病變無常是先傷於膈上則吐血也不即治之食臟腑盡則死三蠱下血候蠱是合聚蟲蛇之類以器皿盛之任其自相食啖餘留一存者為蠱能變化為毒害人有事之以毒害多因飲食內行之人中之者心腹懊痛煩毒不可忍食人五臟下血瘀黑如爛雞肝四氐羌毒候氐羌毒者猶是蠱毒之類於氐羌界域得之故名焉然其發病之狀猶如中蠱毒心腹刺痛食人五臟吐血利血故是蠱之類也五貓鬼候貓鬼者云是老貍野物之精變為鬼蜮而依附於人人畜事之猶如事蠱以毒害人其病狀心腹刺痛食人腑臟吐血利血而死六野道候野道者是無主之蠱也人有畜事蠱以毒害人為惡既積乃至死滅絕其蠱則無所依止浮游由野道路之間有犯害人者其病發猶是蠱之狀但以其于田野道路得之故以謂之野道七射工候江南有射工毒蟲一名短狐一名蜮常在山澗水內此蟲口內有橫骨狀如角弓其蟲形正黑狀如大蜚生齒髮而有雌雄雄者口邊兩角角端有椏能屈伸冬月並在土內蟄其上氣蒸休休冬月有雪落其上不凝夏月在水內人行水上及以水洗浴或因大雨潦時仍逐水便流入人家或遇道上牛馬等跡內即停住其含沙射人影便病初得時或如傷寒或似中惡或口不能語或身體苦強或惡寒壯熱四肢拘急頭痛骨悁屈伸張口欠㰦或清朝小蘇晡夕則劇劇者不過三日則齒間有血出不即治殺人又云初始證候先寒熱惡冷欠㰦筋急頭痛目疼狀如傷寒亦如中屍便不能語朝旦小蘇晡夕軋劇寒熱悶亂是也始得三四日可治急者七日皆死緩者二七日遠不過三七日皆死其毒中人初未有瘡但惡風瘮癝寒熱或如針刺及其成瘡初如豆粒黑子或如火燒或如蠼螋尿瘡皆肉內有穿空如大針孔也其射中人頭面尤急腰以上去人心近者多死中人腰以下者小寬不治亦死雖不死皆百日內不可保瘥又云瘡有數種其一種中人瘡正黑如黶子狀或周遍悉赤衣被犯之如有芒刺痛其一種作瘡久即穿陷或晡間寒熱其一種如火炙人肉熛起作瘡此最急數日殺人其一種突起如石癤狀俱能殺人自有遲速耳大都此病多令人寒熱欠伸張口閉眼此蟲冬月蟄在土內人有識之者取帶之溪邊行亦佳若得此病毒仍以為屑漸服之夏月在水中者則不可用八沙蝨候山內水間有沙蝨其蠱甚細不可見人入水浴及汲水澡浴此蟲著身及陰雨日行草間亦著人便鑽入皮里其診法初得時皮上正赤如小豆黍粟以手摩赤上痛如刺過三日之後令百節強疼痛寒熱赤上發瘡此蟲漸入至骨則殺人人在山澗洗浴竟巾拭𤐰𤐰如芒毛針刺熟看見處以竹簪挑拂去之已深者用針挑取蟲子正如疥蟲著爪上映光方見行動也挑不得灸上三七壯則蟲死病除若止兩三處不能為害多處不可盡挑灸挑灸其上而猶覺昏昏是其已大深便應須依土俗作方術拂出之並作諸藥湯浴皆得一二升出都盡乃止此七日內宜瘥不爾則續有飛蠱來人攻啖心臟便死飛蠱白色如韭葉大長四五寸初著腹脅腫痛如刺即破雞㩉之盡出食雞或得三四數過與取盡乃止兼取麝香犀角護其內作此治可瘥勿謂小小不速治則殺人彼土呼此病為呼淉吳音沙作淉讀如鳥長尾淉淉音也言此蟲能招呼沙蝨入人體內人行有得沙蝨還至即以火自灸燎令遍則此蟲自墮地也九水毒候自三吳已東及南諸山郡山縣有山谷溪源處有水毒病春秋輒得一名中水一名中溪一名中灑蘇駭反一名水中病亦名溪溫今人中溪以其病與射工診候相似通呼溪病其實有異有瘡是射工無瘡是溪病初得惡寒頭微痛目匡疼心內煩懊四肢振焮腰背骨節皆強兩膝疼或吸吸熱但欲睡旦醒暮劇手足指逆冷至肘膝二三日則復生蟲食下部肛內有瘡不癢不痛令人不覺視之乃知不即治六七日下部便膿潰蟲上食五臟熱盛煩毒注下不禁八九日死一云十餘日死水毒有陰陽覺之急視下部若有瘡正赤如截肉者為陽毒最急若瘡如鱧魚齒者為陰毒猶小緩皆殺人不過二十日又云水毒有雌雄脈洪大而數者為陽是雄溪易治宜先發汗及浴脈沉細遲者為陰是雌溪難治欲知審是中水者手足指冷即是若不冷非也其冷或一寸或至腕或至肘膝冷至二寸為微至肘膝為劇又云作數斗湯以蒜四五升搗碎投湯內消息視之莫令大熱絞去滓適寒溫以自浴若身體發赤斑文者是也又云若有發瘡處但如黑點繞邊赤狀似雞眼在高處難治下處易治余診同無復異但覺寒熱頭痛腰背急強手腳冷欠㰦欲眠朝瘥暮劇便判是溪病不假蒜湯及視下部瘡也此證者至困時亦不皆洞利及齒間血出惟熱勢猛者則心腹煩亂不食而狂語或有下血物如爛肝十餘日至二十日則死不測蟲食五臟肛傷以不治又云溪病不歇仍飛蠱來人或皮膚腹脅間突起如燒痛如刺登破生雞㩉上輒得白蟲狀似蛆長四五六七寸或三四六八枚無定此即應是所云蟲啖食五臟及下部之事又云中溪及射工法急救令七日內瘥不爾則有飛蠱來入人身內攻啖五臟便死彼土闢卻之法略與射工相似
