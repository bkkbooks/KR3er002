body:
  text: 卷之二十三中惡病諸候凡十四論一中惡候中惡者是人精神衰弱為鬼神之氣卒中之也夫人陰陽順理榮衛調平神守則強邪不干正若將攝失宜精神衰弱便中鬼毒之氣其狀卒然心腹刺痛悶亂欲死凡卒中惡腹大而滿者診其脈緊大而浮者死緊細而微者生又中惡吐血數升脈沉數細者死浮焱如疾者生中惡者瘥後余勢停滯發作則變成注二中惡死候中鬼邪之氣卒然心腹絞痛悶絕此是客邪暴盛陰陽為之難絕上下不通故氣暴厥絕如死良久其真氣復生也而有乘年之衰逢月之空失時之和謂之三虛三虛而腑臟衰弱精神微羸中之則真氣竭絕則死其得瘥者若余勢停滯發作則變成注三屍厥候屍厥者陰氣逆也此由陽脈卒下墜陰脈卒上升陰陽離居榮衛不通真氣厥亂客邪乘之其狀如死猶微有息而不恆脈尚動而形無知也聽其耳內循循有如嘯之聲而股間暖是也耳內雖無嘯聲而脈動者故當以屍厥治之診其寸口脈沉大而滑沉即為實滑即為氣實氣相搏身溫而汗此為入腑雖卒厥不知人氣復則自愈也若唇正青身冷此為入臟亦卒厥不知人即死候其左手關上脈陰陽俱虛者足厥陰足少陽俱虛也病苦恍惚屍厥不知人妄有所見四卒死候卒死者由三虛而遇賊風所為也三虛謂乘年之衰一也逢月之空二也失時之和三也人有此三虛而為賊風所傷使陰氣偏竭於內陽氣阻隔於外二氣壅閉故暴絕如死若腑臟氣未竭者良久乃蘇然亦有挾鬼神之氣而卒死者皆有頃邪退乃活也凡中惡及卒忤卒然氣絕其後得蘇若其邪氣不盡者停滯心腹或心腹痛或身體沉重不能飲食而成宿疹皆變成注五卒忤候卒忤者亦名客忤謂邪客之氣卒犯忤人精神也此是鬼厲之毒氣中惡之類人有魂魄衰弱者則為鬼氣所犯忤喜於道間門外得之其狀心腹絞痛脹滿氣衝心胸或即悶絕不復識人肉色變異腑臟虛竭者不即治乃至於死然其毒氣有輕重輕者微治而瘥重者侵克腑臟雖當時救療餘氣停滯久後猶發乃變成注六卒忤死候犯卒忤客邪鬼氣卒急傷人入於腑臟使陰陽離絕氣血暴不通流奄然厥絕如死狀也良久陰陽之氣和乃蘇若腑臟虛弱者即死亦有雖瘥而毒氣不盡時發則心腹刺痛連滯變成注七鬼擊候鬼擊者謂鬼厲之氣擊著於人也得之無漸卒著如人以刀矛刺狀胸脅腹內絞急切痛不可抑按或吐血或鼻中出血或下血一名為鬼排言鬼排觸於人也人有氣血虛弱精魂衰微忽與鬼神遇相觸突致為其所排擊輕者困而獲免重者多死八卒魘候卒魘者屈也謂夢裡為鬼邪之所魘屈人臥不悟皆是魂魄外遊為他邪所執錄欲還未得致成魘也忌火照火照則神魂遂不復入乃至於死而人有於燈光前魘者是本由明出是以不忌火也又云人魘忽然明喚之魘死不疑暗喚之好唯得遠喚亦不得近而急喚亦喜失魂魄也其湯熨針石別有正方補養宣導今附於後養生方導引法云拘魂門制魄戶名曰握固法屈大母指著四小指內抱之積習不止眠時亦不復開令人不魘魅九魘不寤候人眠睡則魂魄外遊為鬼邪所魘屈其精神弱者魘則久不得寤乃至氣暴絕所以須傍人助喚並以方術治之乃蘇十自縊死候人有不得意志者多生忿恨往往自縊以繩物繫頸自懸掛致死呼為自縊若覺早雖已死徐徐捧下其陰陽經絡雖暴壅閉而臟腑真氣故有未盡所以猶可救療故有得活者若見其懸掛便忽遽截斷其繩舊云則不可救此言氣已壅閉繩忽暴斷其氣雖通而奔迸運悶故則氣不能還即不得復生又云自縊死旦至暮雖已冷必可治暮至旦則難治此謂其晝則陽盛其氣易通夜則陰盛其氣難通又云夏則夜短又熱則易活又云氣雖已斷而心微溫者一日以上猶可活也十一溺死候人為水所沒溺水從孔竅入灌注腑臟其氣壅閉故死若早拯救得出即泄瀝其水令氣血得通便得活又云經半日及一日猶可活氣若已絕心上暖亦可活十二中熱暍候夏月炎熱人冒涉途路熱毒入內與五臟相併客邪熾盛或郁瘀不宣致陰氣卒絕陽氣暴壅經絡不通故奄然悶絕謂之暍然此乃外邪所擊真臟未壞若便遇治救氣宣則蘇夫熱暍不可得冷得冷便死此謂外卒以冷觸其熱蘊積於內不得宣發故也十三冒熱困乏候人盛暑之時觸冒大熱熱毒氣入臟腑則令人煩悶鬱冒至於困乏也十四凍死候人有在於途路逢悽風苦雨繁霜大雪衣服沾濡冷氣入臟致令陰氣閉於內陽氣絕於外榮衛結澀不復流通故致噤絕而死若早得救療血溫氣通則生又云凍死一日猶可治過此則不可治也屍病諸候凡十二論一諸屍候人身內自有三尸諸蟲與人俱生而此蟲忌惡能與鬼靈相通常接引外邪為人患害其發作之狀或沉沉默默不的知所苦而無處不惡或腹痛脹急或石磥塊踴起或攣引腰脊或精神雜錯變狀多端其病大體略同而有小異但以一方治之者故名諸屍也二飛屍候飛屍者發無由漸忽然而至若飛走之急疾故謂之飛屍其狀心腹刺痛氣息喘急脹滿上衝心胸者是也三遁屍候遁屍者言其停遁在人肌肉血脈之間若卒有犯觸即發動亦令人心腹脹滿刺痛氣息喘急傍攻兩脅上衝心胸瘥後復發停遁不消故謂之遁屍也四沉屍候沉屍者發時亦心腹絞痛脹滿喘急衝刺心胸攻擊脅肋雖歇之後猶沉痼在人腑臟令人四體無處不惡故謂之沉屍五風屍候風屍者在人四肢循環經絡其狀淫躍去來沉沉默默不知痛處若衝風則發是也六屍注候屍注病者則是五屍內之屍注而挾外鬼邪之氣流注身體令人寒熱淋瀝沉沉默默不的知所苦而無處不惡或腹痛脹滿喘急不得氣息上衝心胸傍攻兩脅或磥塊踴起或攣引腰脊或舉身沉重精神雜錯惛覺昏謬每節氣改變輒致大惡積月累年漸就頓滯以至於死死後復易傍人乃至滅門以其屍病注易傍人故為屍注七伏屍候伏屍者謂其病隱伏在人五臟內積年不除未發之時身體平調都如無患若發動則心腹刺痛脹滿喘急其湯熨針石別有正方補養宣導今附於後養生方導引法云叩齒二七過輒嚥氣二七過如此三百通乃止為之二十日邪氣悉去六十日小病愈百日大病除伏屍皆去面體光澤八陰屍候陰屍者由體虛受於外邪搏於陰氣陽氣壅積初著之狀起於皮膚內卒有物狀似蝦蟆經宿與身內屍蟲相搏如杯大動搖掣痛不可堪忍此多因天雨得之過數日不治即死九冷屍候冷屍者由是身內屍蟲與外邪相接引為病發動亦心腹脹滿刺痛氣急但因觸冷即發故謂之冷屍十寒屍候寒屍者由身內屍蟲與外邪相引接所成發動亦令人心腹脹滿刺痛但以其至冬月感於寒氣則發故謂之寒屍十一喪屍候人有年命衰弱至於喪死之處而心意忽有所畏惡其身內屍蟲性既忌惡便更接引外邪共為疹病其發亦心腹刺痛脹滿氣急但逢喪處其病則發故謂之喪屍十二屍氣候人有觸值死屍或臨屍其屍氣入腹內與屍蟲相接成病其發亦心腹刺痛脹滿氣急但聞屍氣則發故謂之屍氣
