body:
  text: 卷之四十八小兒雜病諸候四凡四十六論一百九解顱候解顱者其狀小兒年大囟應合而不合頭縫開解是也由腎氣不成故也腎主骨髓而腦為髓海腎氣不成則髓腦不足不能結成故頭顱開解也一百十囟填候小兒囟填由乳哺不時飢飽不節或熱或寒乘於脾胃致腑臟不調其氣上衝所為也其狀囟張如物填其上汗出毛髮黃而短者是也若寒氣上衝即牢硬熱氣上衝即柔軟又小兒脅下有積又氣滿而體熱熱氣乘於臟臟氣上衝於腦囟亦致囟填又咳且啼而氣乘臟上衝亦病之啼甚久其氣未定因而乳之亦令囟填所以然者方啼之時陰陽氣逆上衝故也一百十一囟陷候此謂囟陷下不平也由腸內有熱熱氣熏臟臟熱即渴引飲而小便泄痢者即腑臟血氣虛弱不能上充髓腦故囟陷也一百十二重舌候小兒重舌者心脾熱故也心候於舌而主於血脾之絡脈又出舌下心火脾土二臟母子也有熱即血氣俱盛其狀附舌下近舌根生形如舌而短故謂之重舌一百十三滯頤候滯頤之病是小兒多涎唾流出漬於頤下此由脾冷液多故也脾之液為涎脾氣冷不能收制其津液故令涎流出滯漬於頤也一百十四中風候小兒血氣未定肌膚脆弱若將養乖宜寒溫失度腠理虛開即為風所中也凡中風皆從背諸臟俞入若心中風但得偃臥不得傾側汗出若唇赤汗流者可治急灸心俞若唇或青或白或黃或黑此是心壞為水面目亭亭時悚動者皆不復可治五六日而死若肝中風踞坐不得低頭若繞兩目連額上色微有青唇色青而面黃可治急灸肝俞若大青黑面一黃一白者是肝已傷不可復治數日而死若脾中風踞而腹滿身通黃吐咸汁出者可治急灸脾俞若手足青者不可復治也若腎中風踞而腰痛視脅左右未有黃色如餅𦻎大者可治急灸腎俞若齒黃赤鬢髮直面土色不可治也肺中風偃臥而胸滿短氣冒悶汗出視目下鼻上下兩邊下行至口色白者可治急灸肺俞若色黃者為肺已傷化為血不可復治也其人當妄掇空或自拈衣如此數日而死如此五臟之中風也其年長成童者灸皆百壯若五六歲以下至於嬰兒灸者以意消息之凡嬰兒若中於風則的成癲癇也一百十五中風四肢拘攣候小兒肌肉脆弱易傷於風風冷中於膚腠入於經絡風冷搏於筋脈筋脈得冷即急故使四肢拘攣也一百十六中風不隨候夫風邪中於肢節經於筋脈若風挾寒氣者即拘急攣痛若挾於熱即緩縱不隨一百十七白虎候按堪輿歷遊年圖有白虎神云太歲在卯即白虎在寅准此推之知其神所在小兒有居處觸犯此神者便能為病其狀身微熱有時啼喚有時身小冷屈指如數似風癇但手足不瘛瘲耳一百十八卒失音不能語候喉嚨者氣之道路喉厭者音聲之門戶有暴寒氣客於喉厭喉厭得寒即不能發聲故卒然失音也不能語者語聲不出非牙關噤也一百十九中風口噤候小兒中風口噤者是風入頷頰之筋故也手三陽之筋入結頷頰足陽明之筋上夾於口膚腠虛受風冷客於諸陽之筋筋得寒冷則攣急故機關不利而口噤也一百二十中風口喎邪僻候小兒中風口喎邪僻是風入於頷頰之筋故也足陽明之筋上夾於口手三陽之脈偏急而口喎邪僻也一百二十一中風痙候小兒風痙之病狀如癇而背脊項頸強直是風傷太陽之經小兒解脫之臍瘡未合為風所傷皆令發痙一百二十二羸瘦候夫羸瘦不生肌膚皆為脾胃不和不能飲食故血氣衰弱不能榮於肌膚凡小兒在胎而遇寒冷或生而挾伏熱皆令兒不能飲食故羸瘦也挾熱者即溫壯身熱肌肉微黃其挾冷者即時時下痢唇口青皅一百二十三虛羸候此謂小兒經諸大病或驚癇或傷寒或溫壯而服藥或吐痢發汗病瘥之後血氣尚虛脾胃猶弱不能傳化穀氣以榮身體故氣力虛而羸也一百二十四嗽候嗽者由風寒傷於肺也肺主氣候皮毛而俞在於背小兒解脫風寒傷皮毛故因從肺俞入傷肺肺感微寒即嗽也故小兒生須常暖背夏月亦須用單背襠若背冷得嗽月內不可治百日內嗽者十中一兩瘥耳一百二十五咳逆候咳逆由乳哺無度因挾風冷傷於肺故也肺主氣為五臟上蓋在胸間小兒啼氣未定因而飲乳乳與氣相逆氣則引乳射於肺故咳而氣逆謂之咳逆也冷乳冷哺傷於肺搏於肺氣亦令咳逆也一百二十六病氣候肺主氣肺氣有餘即喘咳上氣若又為風冷所加即氣聚於肺令肺脹即胸滿氣急也一百二十七腫滿候小兒腫滿由將養不調腎脾二臟俱虛也腎主水其氣下通於陰脾主土候肌肉而剋水腎虛不能傳其水液脾虛不能剋制於水故水氣流溢於皮膚故令腫滿其挾水腫者即皮薄如熟李之狀也若皮膚受風風搏於氣致腫者但虛腫如吹此風氣腫也一百二十八毒腫候毒腫是風熱濕氣搏於皮膚使血氣澀不行蘊積成毒其腫赤而熱是也一百二十九耳聾候小兒患耳聾是風入頭腦所為也手太陽之經入於耳內頭腦有風風邪隨氣入乘其脈與氣相搏風邪停積即令耳聾一百三十耳鳴候手太陽之經脈入於耳內小兒頭腦有風者風入乘其脈與氣相擊故令耳鳴則邪氣與正氣相擊久即邪氣停滯皆成聾也一百三十一耳中風掣痛候小兒耳鳴及風掣痛其風染而皆起於頭腦有風其風入經脈與氣相動而作故令掣痛其風染而漸至與正氣相擊輕者動作幾微故但鳴也其風暴至正氣又盛相擊則其動作疾急故掣痛也若不止則風不散津液壅聚熱氣加之則生黃汁甚者亦有薄膿也一百三十二聤耳候耳宗脈之所聚腎氣之所通小兒腎臟盛而有熱者熱氣上衝於耳津液壅結即生膿汁亦有因沐浴水入耳內而不傾瀝令盡水濕停積搏於血氣蘊結成熱亦令膿汁出皆為之聤耳久不瘥即變成聾也一百三十三目赤痛候肝氣通於目臟內客熱與胸膈痰飲相搏熏漬於肝肝熱氣衝發於目故令目赤痛也甚則生翳一百三十四眼障翳候眼是腑臟之精華肝之外候而肝氣通於眼也小兒腑臟痰熱熏漬於肝沖發於眼初只熱痛熱氣蘊積變生障翳熱氣輕者止生白翳結聚小者如黍粟大者如麻豆隨其輕重輕者止生一翳重者乃至兩三翳也若不生翳而生白障者是疾重極遍覆黑睛滿眼悉白則失明也其障亦有輕重輕者黑睛邊微有白膜來侵黑睛漸染散漫若不急治熱勢即重滿目並生白障也一百三十五目青盲候眼無障翳而不見物謂之青盲此由小兒臟內有停飲而無熱但有飲水積漬於肝也目是五臟之精華肝之外候也肝氣通於目為停飲所漬臟氣不宣和精華不明審故不赤痛亦無障翳而不見物故名青盲也一百三十六雀目候人有晝而睛明至暝便不見物謂之雀目言其如鳥雀瞑便無所見也一百三十七緣目生瘡候風邪客於瞼眥之間與血氣相搏挾熱即生瘡浸漬緣目赤而有汁時瘥時發世云小兒初生之時洗浴兒不淨使穢露浸漬眼瞼睫眥後遇風邪發即目赤爛生瘡喜難瘥瘥後還發成疹世人謂之胎赤一百三十八鼻衄候小兒經脈血氣有熱喜令鼻衄夫血之隨氣循行經脈通遊腑臟若冷熱調和行依其常度無有壅滯亦不流溢也血性得寒即凝澀結聚得熱即流散妄行小兒熱盛者熱乘於血血隨氣發溢於鼻者謂之鼻衄凡人血虛受熱即血失其常度發溢漫行乃至發於七竅謂之大衄也一百三十九䘌鼻候䘌鼻之狀鼻下兩邊赤發時微有瘡而癢是也亦名赤鼻亦名疳鼻然鼻是肺氣所通肺候皮毛其氣不和風邪客於皮毛次於血氣夫邪在血氣隨虛處而入停之其停於鼻兩邊與血氣相搏成瘡者謂之䘌鼻也一百四十齆鼻候肺主氣而通於鼻而氣為陽諸陽之氣上榮頭面若氣虛受風冷風冷客於頭腦即其氣不和冷氣停滯搏於津液膿涕結聚即鼻不聞香臭謂之齆鼻一百四十一鼻塞候肺氣通於鼻而氣為陽諸陽之氣上榮頭面其氣不和受風冷風冷邪氣入於腦停滯鼻間即氣不宣和結聚不通故鼻塞也一百四十二喉痹候喉痹是風毒之氣客於咽喉之間與血氣相搏而結腫塞飲粥不下乃成膿血若毒入心心即煩悶懊憹不可堪忍如此者死一百四十三馬痹候馬痹與喉痹相似亦是風熱毒氣客於咽喉頷頰之間與血氣相搏結聚腫痛其狀從頷下腫連頰下應喉內痛腫塞水漿不下甚者膿潰毒若攻心則心煩懊悶至死一百四十四齒不生候齒是骨之所終而為髓之所養也小兒有稟氣不足者髓即不能充於齒骨故齒久不生一百四十五齒痛風齲候手陽明足陽明之脈併入於齒風氣入其經脈與血氣相搏齒即腫痛膿汁出謂之風齲一百四十六齒根血出候手陽明足陽明之脈併入於齒小兒風氣入其經脈與血相搏血氣虛熱即齒根血出也一百四十七數歲不能行候小兒生自變蒸至於能語隨日數血脈骨節備成其臏骨成即能行骨是髓之所養若稟生血氣不足者即髓不充強故其骨不即成而數歲不能行也一百四十八鶴節候小兒稟生血氣不足即肌肉不充肢體柴瘦骨節皆露如鶴之腳節也一百四十九頭髮黃候足少陰為腎之經其血氣華於發若血氣不足則不能潤悅於發故發黃也一百五十頭髮不生候足少陰為腎之經其華在發小兒有稟性少陰之血氣不足即發疏薄不生亦有因頭瘡而禿落不生者皆由傷損其氣血血氣損少不能榮於發也一百五十一惛塞候人有稟性陰陽不和而心神惛塞者亦有因病而精采暗鈍皆由陰陽之氣不足致神識不分明一百五十二落床損瘀候血之在身隨氣而行常無停積若因墮落損傷即血行失度隨傷損之處即停積若流入腹內亦積聚不散皆成瘀血凡瘀血在內顏色萎黃氣息微喘澀澀小寒吸吸微熱或時損痛也一百五十三唇青候小兒臟氣不和血虛為冷所乘即口唇青皅亦有臟氣熱唇生瘡而風冷之氣入瘡雖瘥之後血色不復故令唇青一百五十四無辜病候小兒面黃髮直時壯熱飲食不生肌膚積經日月遂致死者謂之無辜言天上有鳥名無辜晝伏夜游洗浣小兒衣席露之經宿此鳥即飛從上過而取此衣與小兒著並席與小兒臥便令兒著此病
