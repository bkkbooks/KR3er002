body:
  text: 卷之三十五瘡病諸候凡六十五論一頭面身體諸瘡候夫內熱外虛為風濕所乘則生瘡所以然者肺主氣候於皮毛脾主肌肉氣虛則膚腠開為風濕所乘內熱則脾氣溫脾氣溫則肌肉生熱也濕熱相搏故頭面身體皆生瘡其瘡初如疱須臾生汁熱盛者則變為膿隨瘥隨發二頭面身體諸久瘡候諸久瘡者內熱外虛為風濕所乘則頭面身體生瘡其臟內熱實氣盛熱結肌肉其熱留滯不歇故瘡經久不瘥三諸惡瘡候諸瘡生身體皆是體虛受風熱風熱與血氣相搏故發瘡若熱風熱挾濕毒之氣者則瘡癢痛焮腫而瘡多汁身體壯熱謂之惡瘡也其湯熨針石別有正方補養宣導今附於後養生方云銅器蓋食汗入食發惡瘡內疽也又云醉而交接或致惡瘡又云飲酒熱未解以冷水洗面令人面發惡瘡輕者齇疱又云五月五日取棗葉三升井華水搗取汁浴永不生惡瘡又云井華水和粉洗足不病惡瘡又云五月一日八月二日九月九日十月七日十一月四日十二月十三日沐浴除惡瘡養生方導引法云龍行氣低頭下視不息十二通愈風疥惡瘡熱不能入咽四久惡瘡候夫體虛受風熱濕毒之氣則生瘡癢痛焮腫多汁壯熱謂之惡瘡而濕毒氣盛體外虛內熱其瘡漸增經久不瘥為久惡瘡五瘑瘡候瘑瘡者由膚腠虛風濕之氣折於血氣結聚所生多著手足間遞相對如新生茱萸子痛癢抓搔成瘡黃汁出浸淫生長拆裂時瘥時劇變化生蟲故名瘑瘡六燥瘑瘡候膚腠虛風濕搏於血氣則生瘑瘡若濕氣少風氣多者其瘑則乾燥但癢搔之白屑出乾枯拆痛此蟲毒氣淺在皮膚故名燥瘑瘡也七濕瘑瘡候膚腠虛風濕搏於血氣生瘑瘡若風氣少濕氣多其瘡痛癢搔之汁出常濡濕者此蟲毒氣深在於肌肉內故也八久瘑瘡候瘑瘡積久不瘥者由膚腠虛則風濕之氣停滯蟲在肌肉之間則生長常癢痛故經久不瘥九癬候癬病之狀皮肉隱胗如錢文漸漸增長或圓或斜癢痛有匡郭里生蟲搔之有汁此由風濕邪氣客於腠理復值寒濕與血氣相搏則血氣痞澀發此疾按九蟲論云蟯蟲在人腸內變化多端發動亦能為癬而癬內實有蟲也養生方云夏勿露面臥露下墮面上令面皮厚及喜成癬十乾癬候乾癬但有匡郭皮枯索癢搔之白屑出是也皆是風濕邪氣客於腠理復值寒濕與血氣相搏所生若其風毒氣多濕氣少故風沉入深故無汁為乾癬也其中亦生蟲十一濕癬候濕癬者亦有匡郭如蟲行浸淫赤濕癢搔之多汁成瘡是其風毒氣淺濕多風少故為濕癬也其里亦有蟲十二風癬候風癬是惡風冷氣客於皮折於血氣所生亦作圓文匡郭但抓搔頑痹不知痛癢其里亦有蟲十三白癬候白癬之狀白色硿硿然而癢此亦是腠理虛受風風與氣並血澀而不能榮肌肉故也十四牛癬候俗云以盆器盛水飲牛用其餘水洗手面即生癬名牛癬其狀皮厚抓之硬強而癢是也其里亦生蟲十五圓癬候圓癬之狀作圓文隱起四畔赤亦癢痛是也其里亦生蟲十六狗癬候俗云狗舐之水用洗手面即生癬其狀微白點綴相連亦微癢是也其里亦生蟲十七雀眼癬候雀眼癬亦是風濕所生其文細似雀眼故謂之雀眼癬搔之亦癢中亦生蟲十八刀癬候俗云以磨刀水用洗手面而生癬名為刀癬其形無匡郭縱斜無定是也中亦生蟲十九久癬候久癬是諸癬有蟲而經久不瘥者也癬病之狀皮肉隱胗如錢文漸漸增長或圓或斜癢痛有匡郭搔之有汁又有乾癬皮枯索癢搔之白屑出又有濕癬如蟲行浸淫赤濕癢搔之多汁又有風癬搔抓頑痹不知痛癢又有牛癬因飲牛余水洗手面得之其狀皮厚抓之硬強又有圓癬作圓文隱起四面赤又有狗癬因以狗舐余水洗手面得之其狀微白點綴相連亦微癢又有雀眼癬作細文似雀眼搔之亦癢痛又有刀癬因以磨刀水洗手面得之其狀無匡郭縱邪無定如此之癬初得或因風濕客於肌膚折於血氣所生或因用牛狗所飲余水洗手面得之至其病成皆有蟲侵食轉深連滯不瘥故成久癬二十疥候疥者有數種有大疥有馬疥有水疥有乾疥有濕疥多生手足乃至遍體大疥者作瘡有膿汁焮赤癢痛是也馬疥者皮肉隱嶙起作根墌搔之不知痛此二者則重水疥者㾦瘰如小瘭漿摘破有水出此一種小輕乾疥者但癢搔之皮起作干痂濕疥者小瘡皮薄常有汁出並皆有蟲人往往以針頭挑得狀如水內瘑蟲此悉由皮膚受風邪熱氣所致也按九蟲論云蟯蟲多所變化多端或作瘑疥痔瘻無所不為其湯熨針石別有正方補養宣導今附於後養生方導引法云龍行氣低頭下視不息十二通愈風疥惡瘡熱不能入咽二十一乾疥候乾疥但癢搔之皮起作干痂此風熱氣深在肌肉間故也二十二濕疥候濕疥起小瘡皮薄常有水汁出此風熱氣淺在皮膚間故也二十三熱瘡候諸陽氣在表陽氣盛則表熱因運動勞役腠理則虛而開為風邪所客風熱相搏留於皮膚則生瘡初作瘭漿黃汁出風多則癢熱多則痛血氣乘之則多膿血故名熱瘡也二十四冷瘡候凡身體發瘡皆是風熱所為然血虛者亦傷於邪若重觸風寒則冷氣入於瘡令血澀不行其瘡則頑令不知痛癢亦經久難瘥名為冷瘡二十五疽瘡候此疽瘡是瘑之類也非癰疽之疽世云瘑疽即是此也多發於指節腳脛間相對生幣幣作細孔如針頭其里有蟲癢痛搔之黃汁出隨瘥隨發皆是風邪客於皮膚血氣之所變生亦有因諸淺瘡經久不瘥癢痛抓搔之或衣揩拂之其瘡則經久不瘥而變作疽瘡者里皆有細蟲二十六甲疽候甲疽之狀瘡皮厚甲錯剝起是也其瘡亦癢痛常欲抓搔之汁出其初皆是風邪折於血氣所生而瘡里亦有蟲二十七查疽候查疽之狀隱胗赤起如今查樹子形是也亦是風邪客於皮膚血氣之所變生也其瘡內有蟲亦癢痛時焮腫汁出二十八頑疽候此由風濕客於皮膚血氣所變隱胗生瘡癢而不痛故名頑疽二十九棖疽候棖疽是諸雜瘡帶風濕苦癢數以手抓搔棖觸便侵食闊久不瘥乃變生蟲故名棖疽三十月食瘡候月食瘡生於兩耳及鼻面間並下部諸孔竅側侵食乃至筋骨月初則瘡盛月末則瘡衰以其隨月生死因名之為月食瘡也又小兒耳下生瘡亦名月食世云小兒見月以手指指之則令病此瘡也其生諸孔竅有蟲久不瘥則變成瘻也三十一天上病候天上病者人神采昏塞身體沉重下部生瘡上食五臟甚者至死世人隱避其名故云天上病也此是腑臟虛腸胃之間蟲動侵食人五臟故也三十二甜瘡候甜瘡生面上不癢不痛常有肥汁出汁所溜處隨即成瘡亦生身上小兒多患之亦是風濕搏於血氣所生以其不癢不痛故名甜瘡三十三浸淫瘡候浸淫瘡是心家有風熱發於肌膚初生甚小先癢後痛而成瘡汁出侵潰肌肉浸淫漸闊乃遍體其瘡若從口出流散四肢者則輕若從四肢生然後入口者則重以其漸漸增長因名浸淫也三十四反花瘡候反花瘡者由風毒相搏所為初生如飯粒其頭破則血出便生惡肉漸大有根膿汁出肉反散如花狀因名反花瘡凡諸惡瘡久不瘥者亦惡肉反出如反花形三十五瘡建候人身上患諸瘡熱氣盛者腫焮痛附畔別結聚狀如瘰癧者名為瘡建亦名瘡根也三十六王爛瘡候王爛瘡者由腑臟實熱皮膚虛而受風濕與熱相搏故初起作瘭漿漸漸王爛汁流浸潰爛故名王爛瘡也亦名王灼瘡其初作熛漿如湯火所灼也又名洪燭瘡初生如沸湯灑作瘭漿赤爛如火燭故名洪燭也三十七白頭瘡候白頭瘡者由體虛帶風熱遍身生瘡瘡似大疥癢漸白頭而有膿四邊赤疼痛是也三十八無名瘡候此瘡非癰非疽非癬非疥狀如惡瘡或瘥或劇人不能名故名無名瘡也此亦是風熱搏於血氣所生也三十九豬灰瘡候豬灰瘡者坐處生瘡赤黑有竅深如大豆許四邊青中央坼作臼陷而不甚痛狀如豬灰因以為名此亦是風熱搏於血氣所生也四十不痛瘡候諸瘡久不瘥觸風冷有惡肉則搔針灸不覺痛因以不痛為名四十一雁瘡候雁瘡者其狀生於體上如濕癬癧瘍多著四肢乃遍身其瘡大而熱疼痛得此瘡者常在春秋二月八月雁來時則發雁去時便瘥故以為名亦云雁過荊漢之域多有此病四十二蜂窠瘡候其瘡如疽瘻之類有小孔象於蜂窠因以為名此亦風濕搏於血氣之所生也四十三斷咽瘡候此瘡繞頸而生皮傷赤若匝頸則害人此亦是風濕搏於血氣之所生也四十四毒瘡候此由風氣相搏變成熱毒而生瘡於指節或指頭初似疥甚癢經宿乃紫黑也四十五瓠毒瘡候俗云人有用瓠花上露水以洗水遇毒即作瘡因以名之四十六晦瘡候其瘡生皆兩兩相對頭戴白膿俗云人有誤小便故灶處即生此瘡小兒多患也四十七集瘡候此瘡十數個集生一處因以為名亦是皮膚偏有虛處風濕搏於血氣變生四十八屋食瘡候方云犯屋示所為未詳其形狀四十九烏啄瘡候烏啄瘡四畔起中央空是也此亦是風濕搏於血氣之所變生以其如烏鳥所啄因以名之也五十攝領瘡候攝領瘡如癬之類生於頸上癢痛衣領拂著即劇云是衣領揩所作故名攝領瘡也五十一雞督瘡候雞督瘡生脅旁此瘡亦是風濕搏於血氣之所變生以其形似雞屎因以為名也五十二斷耳瘡候斷耳瘡生於耳邊久不瘥耳乃取斷此亦月食之類但不隨月生長為異此瘡亦是風濕搏血氣所生以其斷耳因以為名也五十三新婦瘡候此瘡狀繞腰生如蠼螋尿但不痛為異耳此瘡亦是風濕搏血氣所生而世人呼之為新婦瘡也五十四土風瘡候土風瘡狀如風胗而頭破乍發乍瘥此由肌腠虛疏風塵入於皮膚故也俗呼之為土風瘡五十五逸風瘡候逸風瘡生則遍體狀如癬疥而癢此由風氣散逸於皮膚因名逸風瘡也五十六甑帶瘡候甑帶瘡者繞腰生此亦風濕搏血氣所生狀如甑帶因以為名又云此瘡繞腰匝則殺人五十七兔齧瘡候凡疽發於脛名曰兔齧瘡一名血實瘡又隨月生死蓋月食之類非脛瘡也尋此瘡亦風濕搏於血氣血氣實熱所生故一名血實又名兔齧者亦當以其形狀似於兔齧因以為名五十八血瘡候血瘡者云諸患風濕搏血氣而生瘡其熱氣發逸瘡但出血者名為血瘡也五十九瘡中風寒水候凡諸瘡生之初因風濕搏血氣發於皮膚故生也若久不瘥多中風冷水氣若中風則噤痙中冷則難瘥中水則腫也六十露敗瘡候凡患諸瘡及惡瘡初雖因風濕搏血氣蘊結生熱蒸發皮肉成瘡若觸水露氣動經十數年不瘥其瘡瘀黑作痂如被霜瓠皮瘡內肉似斷故名露敗瘡也六十一瘡惡肉候諸瘡及癰疽皆是風濕搏血氣血氣蘊結生熱而發肌肉成瘡久不瘥者多生惡肉四邊突起而好肉不生此由毒熱未盡經絡尚壅血氣不到故也六十二瘡瘥復發候諸惡瘡皆因風濕毒所生也當時雖瘥其風毒氣猶在經絡者後小勞熱或食毒物則復更發也六十三漆瘡候漆有毒人有稟性畏漆但見漆便中其毒喜面癢然後胸臂䏶腨皆悉瘙癢面為起腫繞眼微赤諸所癢處以手搔之隨手輦展起赤㾦瘰㾦瘰消已生細粟瘡甚微有中毒輕者證候如此其有重者遍身作瘡小者如麻豆大者如棗杏膿焮疼痛摘破小定有小瘥隨次更生若火燒漆其毒氣則厲著人急重亦有性自耐者終日燒煮竟不為害也六十四凍爛腫瘡候嚴冬之夜觸冒風雪寒毒之氣傷於肌膚血氣壅澀因即瘃凍焮赤疼腫便成凍瘡乃至皮肉爛潰重者支節墮落六十五夏日沸爛瘡候盛夏之月人膚腠開易傷風熱風熱毒氣搏於皮膚則生沸瘡其狀如湯之沸輕者幣幣如粟粒重者熱汗浸漬成瘡因以為名世呼為沸子也傷瘡病諸候凡四論一湯火瘡候凡被湯火燒者初慎勿以冷物及井下泥尿泥及蜜淋拓之其熱氣得冷即卻深搏至骨爛人筋也所以人中湯火後喜攣縮者良由此也二灸瘡急腫痛候夫灸瘡膿潰以後更焮腫急痛者此中風冷故也三灸瘡久不瘥候夫灸之法中病則止病已則瘡瘥若病熱未除或中風冷故久不瘥也四針灸瘡發洪候夫針灸皆是節穴俞募之處若病甚則風氣衝擊於瘡凡血與氣相隨而行故風乘於氣而動於血血從灸瘡處出氣盛則血不止名為發洪
