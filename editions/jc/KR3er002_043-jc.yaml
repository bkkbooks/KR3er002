body:
  text: 卷之四十三婦人將產病諸候凡三論一產法人處三才之間稟五行之氣陽施陰化故令有子然五行雖復相生而則柔刑殺互相害克至於將產則有日遊反支禁忌若犯觸之或橫致諸病故產時坐臥產處須順四時五行之氣故謂之產法也二產防運法防運者諸臨產若觸犯日遊反支諸所禁忌則令血氣不調理而致運也其運之狀心煩悶氣欲絕是也故須預以法術防之三胞衣不出候有產兒下苦胞衣不落者世謂之息胞由產婦初時用力比產兒出而體已疲頓不能更用氣產胸經停之間外冷乘之則血道痞澀故胞久不出彌須急以方藥救治不爾害於兒所以爾者胞系連兒臍胞不出則不得以時斷臍浴洗冷氣傷兒則成病也舊方胞衣久不出恐損兒者依法截臍而以物系其帶一頭亦有產而看產人不用意慎護而挽牽甚胞系斷者其胞上掩心則斃人也縱令不死久則成病也婦人難產病諸候凡七論一產難候產難者或先因漏胎去血臟燥或子臟宿挾疹病或觸禁忌或始覺腹痛產時未到便即驚動穢露早下致子道乾澀產發力疲皆令難也候其產婦舌青者兒死母活唇青口青口兩邊沫出者子母俱死面青舌赤沫出者母死子活故將產坐臥產處須順四時方面並避五行禁忌若有犯觸多令產難產婦腹痛而腰不痛者未產也若腹痛連腰甚者即產所以然者腎候於腰胞系於腎故也診其尺脈轉急如切繩轉珠者即產也二橫產候橫產由初覺腹痛產時未至驚動傷早兒轉未竟便用力產之故令橫也或觸犯禁忌所為將產坐臥產處須順四時方面並避五行禁忌若觸犯多致災禍也三逆產候逆產者初覺腹痛產時未至驚動傷早兒轉未竟便用力產之則令逆逆也或觸犯禁忌所為故產處及坐臥須順四時方面並避五行禁忌若觸犯多致災禍養生方云妊娠大小便勿至非常之去處必逆產殺人也四產子上逼心候妊娠將養得所則氣血調和故兒在胎則安當產亦易若節適失宜則血氣乖理兒在胎則亟動至產育亦難產而子上迫於心者由產難用力胎動氣逆胎上衝迫於心也凡胎上迫心則暴悶絕胎下乃蘇甚者至死凡產處及坐臥須順四時方面並避五行禁忌若有觸犯多致災禍也五產子但趍後孔候產子但暗後孔者由坐臥未安匆遽強𠸯氣暴衝擊故兒失其道婦人產有坐有臥若坐產者須正坐旁人扶抱肋腰持捉之勿使傾斜故兒得順其理臥產者亦待臥定背平著度體不傴曲則兒不失其道若坐臥未安身體斜曲兒正轉動匆遽強𧵅氣暴衝擊則令兒趨後孔或橫或逆皆由產時匆遽或觸犯禁忌坐臥不安審所為故產坐臥須平正順四時方面避五行禁忌若有觸犯多致災禍也六產已死而子不出候產婦已死而子不出或觸犯禁忌或產時未到驚動傷早或傍看產人抱腰持捉失理皆令產難而致胎上掩心悶絕故死也候其婦將困乏際面青舌赤口渤海出者則母死兒活也故產處坐臥須順四時方面避五行禁忌若有觸犯多招災禍也七產難子死腹中候產難子死腹中者多因驚動過早或觸犯禁忌致令產難產難則穢沃下產時未到穢露已盡而胎枯燥故子死腹中候其產婦舌青黑及胎上冷者子已死也故產處坐臥須順四時方面避五行禁忌若有觸犯多招災禍也婦人產後病諸候上凡三十論一產後血運悶候運悶之狀心煩氣欲絕是也亦去血過多亦有下血極少皆令運若產去血過多血虛氣極如此而運悶者但煩悶而已若下血過少而氣逆者則因隨氣上掩於心亦令運悶則煩悶而心滿急二者為異亦當候其產婦血下多少則知其產後應運與不運也然煩悶不止則斃人凡產時當向坐臥若觸犯禁忌多令運悶故血下或多或少是以產處及坐臥須順四時方面避五行禁忌若有觸犯多招災禍也二產後血露不盡候凡妊娠當風取涼則胞絡有冷至於產時其血下必少或新產而取風涼皆令風冷搏於血致使血不宣消蓄積在內則有時血露淋瀝下不盡三產後惡露不盡腹痛候妊娠取風冷過度胞絡有冷比產血下則少或新產血露未盡而取風涼皆令風冷搏於血血則壅滯不宣消蓄積在內內有冷氣共相搏擊故令痛也甚者則變成血瘕亦令月水不通也四產後血上搶心痛候產後氣虛挾宿寒寒搏於血血則凝結不消氣逆上者則血隨上搶衝擊而心痛也凡產余血不盡得冷則結與氣相搏相痛因重遇於寒血結彌甚變成血瘕亦令月水痞澀不通五半產候半產謂妊娠兒骨節腑臟漸具而日月未足便產也多因勞役驚動所致或觸犯禁忌亦然也六產後血瘕痛候新產後有血氣相擊而痛者謂之瘕痛瘕之言假也謂其痛浮假無定處也此由宿有風冷血氣不治至產血下少故致此病也不急治多成積結妨害月水輕則痞澀重則不通七產後風虛腫候夫產傷血勞氣腠理則虛為風邪所乘邪搏於氣不得宣泄故令虛腫輕浮如吹者是邪搏於氣氣腫也若皮薄如熟李狀則變為水腫也氣腫發汗即愈水腫利小便即瘥八產後腹中痛候產後臟虛或宿挾風寒或新觸冷與氣相擊搏故腹痛若氣逆上者亦令心痛胸脅痛也久則變成疝瘕九產後心腹痛候產後氣血俱虛遇風寒乘之與血氣相擊隨氣而上衝於心或下攻於腹故令心腹痛若久痛不止則變成疝瘕十產後心痛候產後臟虛遇風冷客之與血氣相搏而氣逆者上攻於心之絡則心痛凡心痛乍間乍甚心之支別絡為邪所傷也若邪傷心之正經為真心痛朝發夕死夕發朝死所以然者心為諸臟之主不受邪邪傷即死也十一產後小腹痛候上由產時惡露下少胞絡之間有餘血者與氣相擊搏令小腹前也因重遇冷則血結變成血瘕亦月水不利也十二產後腰痛候腎主腰腳而婦人以腎系胞產則勞傷腎氣損動胞絡虛未平復面風冷客之冷氣乘腰者則令腰痛也若寒冷邪氣連滯腰脊則痛久不已後有娠喜墮胎所以然者胞系腎腎主腰脊也十三產後兩脅腹滿痛候膀胱宿有停水因產惡露下少血不宣消水血壅痞與氣相搏積在膀胱故令脅腹俱滿而氣動與水血相擊則痛也故令兩脅腹滿痛亦令月水不利亦令成血瘕也十四產後虛煩短氣候此由產時勞傷重者血氣虛極則其後不得平和而氣逆乘心故心煩也氣虛不足故短氣也十五產後上氣候肺主氣五臟六腑俱稟氣於肺產則氣血俱傷臟腑皆損其後肺氣未復虛竭逆上故上氣也十六產後心虛候肺主氣心主血脈而血氣通榮腑臟遍循經絡產則血氣傷損臟腑不足而心統領諸臟其勞傷不足則令驚悸恍惚是心氣虛也十七產後虛煩候產血氣俱傷臟腑虛竭氣在內不宣故令煩也十八產後虛熱候產後腑臟勞傷血虛不復而風邪乘之搏於血氣使氣不宣泄而痞澀生熱或肢節煩憒或唇乾燥但因虛生熱故謂之虛熱也十九產後虛羸候夫產損動腑臟勞傷氣血輕者節養將攝滿月便得平復重者其日月雖滿氣血猶未調和故虛羸也然產後虛羸將養失所多沉滯勞瘠乍起乍臥風冷多則闢瘦顏色枯黑食飲不消風熱多則腲退虛乏顏色無異於常食亦無味甚傷損者皆著床此勞瘠也二十產後風冷虛勞候產則血氣勞傷腑臟虛弱而風冷客之風冷搏血氣血氣則不能自溫於肌膚使人虛乏疲頓致羸損不平復謂之風冷虛勞若久不瘥風冷乘虛而入腹搏於血則痞澀入腸則下痢不能養或食不消入子臟並胞臟冷亦使無子也二十一產後汗出不止候夫汗由陰氣虛而陽氣加之裡虛表實陽氣獨發於外故汗出也血為陰產則傷血是為陰氣虛也氣為陽其氣實者陽加於陰故令汗汗出而陰氣虛弱不復者則汗出不止凡產後皆血虛故多汗因之遇風則變為痙縱不成痙則虛乏短氣身體柴瘦唇口乾燥久普通經水斷絕津液竭故也二十二產後汗血候肝藏血心主血脈產則營損肝心傷動血氣血為陰陰虛面陽氣乘之即令汗血此為陰氣大虛血氣傷動故因汗血出乃至斃人二十三產後虛渴候夫產血水俱下腑臟血燥津液不足宿挾虛熱者燥竭則甚故令渴二十四產後余疾候產後余疾由產勞傷腑臟血氣不足日月未滿而起早勞段虛損不復為風邪所乘令氣力疲乏股肉柴瘦若風冷入於腸胃腸胃虛冷時變下痢若入搏於血則經水痞澀冷搏氣血亦令腹痛隨腑腹虛處乘虛傷之變成諸疾以其因產傷損余勢不復致羸瘠疲頓乍瘥乍甚故謂產後余疾也二十五產後中風候產則傷動血氣勞損腑臟其後未平復起早勞動氣虛而風邪乘虛傷之致發病者故曰中風若風邪冷氣初客皮膚經絡疼痹不仁若乏少氣其人筋脈挾寒則攣急𧶺僻挾濕則強脈緩弱若入傷諸臟腑恍惚驚悸隨其所傷腑臟經絡而為諸疾凡中風風先客皮膚後因虛入傷五臟多從諸臟俞入若心中風鋰得偃臥不得傾側汗出若唇赤汁流者可治急灸心俞百壯若唇或青或白或黃或黑此是心壞為水面目亭亭時悚動者皆不可復治五六日而死若肝中風踞坐不得低頭若繞兩目連額上色微有青唇青面黃可治急灸肝俞百壯若大青黑面一黃一白者是肝已傷不可復治數日而死若脾中風踞而腹滿體通黃吐鹹水出可治急灸脾俞百壯若手足青者不可復治也腎中風踞而腰痛視脅左右未有黃色如餅𧶺大者可治急灸腎俞百壯若齒黃赤鬢髮直面土色不可復治也肺中風偃臥而胸滿短氣冒悶汗出視目下鼻上下兩邊下行至口色白者可治急灸肺俞百壯若色黃者為肺已傷化為血而不可復治其人當妄掇空或自拈衣如此數日二十六產後中風口噤候產後中風噤者是血氣虛而風入於領頰夾口之筋也手三陽之筋結入於頷頰產則勞損腑臟傷動筋脈風乘之者其三陽之筋偏虛則風偏搏之筋得風冷則急故令口噤也二十七產後中風痙候產後中風痙者因產傷動血脈臟腑虛竭飲食未復未滿日月榮衛虛傷風氣得入五臟傷太陽之經復感寒濕寒搏於筋則發痙其狀口急噤背強直搖頭馬鳴腰為反折須臾十發氣急如絕汗出如雨手拭不及者皆死二十八產後中柔風候柔風者四肢不收或緩或急不得俯仰也由陰陽俱虛風邪乘之風入於陽則表緩四肢不收也入於陰則裡急不得俯仰也產則血氣皆損故陰陽俱虛未得平復而風邪乘之故也二十九產後中風不隨候產後腑臟傷動經絡虛損日月未滿未得平復而起早勞動風邪乘虛入邪搏於陽經者氣行則遲機關緩縱故令不隨也三十產後風虛癲狂候產後血氣俱虛受風邪入並於陰則癲忽發臥地吐涎口喎目急手足繚左又無所覺知良久乃蘇是也邪入並於陽則狂發則言語倒錯或自高賢或罵詈不避尊卑是也產則傷損血氣陰陽俱虛未平復者為風邪所乘邪乘血氣乍並於陽乍並於陰故癲狂也
