body:
  text: 卷之三十七婦人雜病諸候一凡三十二論一風虛勞冷候風虛勞冷者是人體虛勞而受於冷也夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣便致虛損則風冷乘虛而干之或客於經絡或入於腹內其經絡得風冷則氣血冷澀不能自溫於肌膚也腹內得風冷則脾胃弱不消飲食也隨其所傷而變成病若大腸虛者則變下利若風冷入於子臟則令臟冷致使無兒若搏於血則血澀壅亦令經水不利斷絶不通二風邪驚悸候風邪驚悸者是風乘於心故也心藏神為諸臟之主若血氣調和則心神安定若虛損則心神虛弱致風邪乘虛干之故驚而悸動不定也其驚悸不止則變恍惚而憂懼三虛汗候人以水穀之精化為血氣津液津液行於腠理若勞傷損動陽氣外虛腠理開血氣衰弱故津液泄越令多汗也其虛汗不止則變短氣柴瘦而羸瘠也亦令血脈減損經水痞澀甚者閉斷不通也四中風候中風者虛風中於人也風是四時八方之氣常以冬至之日候其八方之風從其鄉來者主長養萬物若不從其鄉來名為虛風則害萬物人體虛者則中之當時雖不即發停在肌膚後或重傷於風前後重沓因體虛則發人腑臟俞皆在背中風多從俞入隨所中之俞而發病若心中風但得偃臥不得傾側汗出若唇赤汗流者可治急灸心俞百壯若唇或青或白或黃或黑此是心壞為水面目亭亭時悚動者皆不復可治五六日而死若肝中風踞坐不得低頭若繞兩目連額上色微有青唇青而面黃者可治急灸肝俞百壯若大青黑面一黃一白者是肝已傷不可復治數日而死若脾中風踞而腹滿身通黃吐鹹水汗出者可治急灸脾俞百壯若手足青者不可復治腎中風踞而腰痛視脅左右未有黃色如餅𦻎大者可治急灸腎俞百壯若齒黃赤鬢髮直面土色不可復治肺中風偃臥而胸滿短氣冒悶汗出視目下鼻上下兩邊下行至口色白者可治急灸肺俞百壯若色黃者為肺已傷化為血而不可復治其人當妄掇空自拈衣此亦數日而死五中風口噤候中風口噤是體虛受風風入頷頰夾口之筋也手三陽之筋結入於頷頰足陽明之筋上夾於口而風挾冷乘虛而入其筋則筋攣故引牙關急而口噤六角弓反張候角弓反張是體虛受風風入諸陽之經也人陰陽經絡周環於身風邪乘虛入諸陽之經則腰背反折攣急如角弓之狀七偏風口喎候偏風口喎是體虛受風風入於夾口之筋也足陽明之筋上夾於口其筋偏虛而風因乘之使其經筋偏急不調故令口喎僻也八賊風偏枯候賊風偏枯是體偏受風風客於半身也人有勞傷血氣半身偏虛者風乘虛入客為偏風也其風邪入深真氣去邪氣獨留則為偏枯此由血氣衰損為風所客令血氣不相周榮於肌肉故令偏枯也九風眩候風眩是體虛受風風入於腦也諸腑臟之精皆上注於目其血氣與脈並上屬於腦循脈引於目系目系急故令眩也其眩不止風邪甚者變癲倒為癲疾十癲狂候癲者卒發仆地吐涎沫口喎目急手足繚戾無所覺知良久乃蘇狂者或言語倒錯或自高賢或罵詈不避親疏亦有自定之時皆由血氣虛受風邪所為人稟陰陽之氣而生風邪入並於陰則為癲入並於陽則為狂陰之與陽更有虛有實隨其虛時為邪所並則發故發癲又發狂又人在胎之時其母卒大驚動精氣並居亦令子發癲此則小兒而發癲者是非關長因血氣虛損受風邪所為又有五癲一曰陽癲二曰陰癲三曰風癲四曰濕癲五曰勞癲此蓋隨其感處之由立名又有牛馬豬雞狗之癲皆以其癲發之時聲形狀似於牛馬等故以為名也俗云病癲人忌食六畜之肉食者癲發之狀皆悉象之十一風瘙癢候風瘙癢者是體虛受風風入腠理與血氣相搏而俱往來在於皮膚之間邪氣微不能衝擊為痛故但瘙癢也十二風蠱候風蠱者由體虛受風風在皮膚之間其狀淫淫躍躍若蠱物刺一身盡痛侵傷血氣動作如蠱毒之狀謂之風蠱十三癩候癩病是賊風入百脈傷五臟連注骨髓俱傷而發於外使眉睫墮落皮肉生瘡筋爛節斷語聲嘶破而毒風之變冷熱不同故腠理髮癩形狀亦異十四氣候氣病是肺虛所為肺主氣五臟六腑皆稟氣於肺憂思恐怒居處飲食不節傷動肺氣者併成病其氣之病有虛有實其肺氣實謂之有餘則喘逆上氣其肺氣虛謂之不足則短乏少氣而有冷有熱熱則四肢煩熱也冷則手足逆冷十五心痛候心痛是臟虛受風風冷邪氣乘於心也其痛發有死者有不死成疹者心為諸臟主而藏神其正經不可傷傷之而痛者名為真心痛朝發夕死夕發朝死心之支別絡為風冷所乘而痛者故痛發乍間乍甚而成疹也十六心腹痛候心腹痛者腑臟虛弱風邪客於其間與真氣相擊故痛其痛隨氣上下或上衝於心或下攻於腹故心腹痛十七腹中痛候腹痛者由臟腑虛弱風冷邪氣乘之邪氣與正氣相擊則腹痛也十八小腹痛候小腹痛者此由胞絡之間宿有風冷搏於血氣停結小腹因風虛發動與血相擊故痛十九月水不調候婦人月水不調由勞傷氣血致體虛受風冷風冷之氣客於胞內傷衝脈任脈損手太陽少陰之經也衝任之脈皆起於胞內為經絡之海手太陽小腸之經手少陰心之經此二經為表裡主上為乳汁下為月水然則月水是經絡之餘若冷熱調和則衝脈任脈氣盛太陽少陰所主之血宣流以時而下若寒溫乖適經脈則虛有風冷乘之邪搏於血或寒或溫寒則血結溫則血消故月水乍多乍少為不調也診其脾脈沉之而濡浮之而虛苦腹脹煩滿胃中有熱不嗜食食不化大便難四肢苦痹時不仁得之房內月事不來來而並又少陰脈澀則血不來此為居經三月一來又脈微血氣俱虛年少者亡血之脈也乳子下利為可不爾者此為居經亦三月一來又經水一月再來者經來時其脈欲自如常而反微者不利不汗出者其經三月必來養生方云病憂恚泣哭以令陰陽結氣不和故令月水時少時多內熱苦渴色惡體肌枯身重二十月水不利候婦人月水不利者由勞傷血氣致令體虛而受風冷風冷客於胞內損傷衝任之脈手太陽少陰之經故也衝脈任脈為經脈之海皆起於胞內手太陽小腸之經也手少陰心之經也此二經為表裡主下為月水風冷客於經絡搏於血氣血得冷則壅滯故令月水來不宣利也診其脈從寸口邪入上者名曰解脈來至狀如琴絃苦小腹痛經月不利孔竅生瘡又左手關上脈足厥陰經也沉為陰陰虛者主月經不利腰腹痛尺脈滑血氣實經絶不利又脈左手尺來而斷絶者月水不利也又脈寸關調如故而尺脈絶不至者月經不利當患小腹引腰絞痛氣積聚上叉胸脅二十一月水來腹痛候婦人月水來腹痛者由勞傷血氣以致體虛受風冷之氣客於胞絡損衝任之脈手太陽少陰之經衝脈任脈皆起於胞內為經脈之海也手太陽小腸之經手少陰心之經也此二經共為表裡主下為月水其經血虛受風冷故月水將下之際血氣動於風冷風冷與血氣相擊故令痛也二十二月水不斷候婦人月水不斷者由損傷經血衝脈任脈虛損故也衝任之脈為經脈之海手太陽小腸之經也手少陰心之經也此二經為表裡主下為月水勞傷經脈衝任之氣虛損故不能制其經血故令月水不斷也凡月水不止而合陰陽冷氣上入臟令人身體面目痿黃亦令絶子不産也二十三月水不通候婦人月水不通者由勞損血氣致令體虛受風冷風冷邪氣客於胞內傷損衝任之脈並手太陽少陰之經致胞絡內絶血氣不通故也衝任之脈起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經為表裡主下為月水風冷傷其經血血性得溫則宣流得寒則澀閉既為冷所結搏血結在內故令月水不通又云腸中鳴則月事不來病本於胃所以然者風冷干於胃氣胃氣虛不能分別水穀使津液不生血氣不成故也又云醉以入房則納氣竭絶傷肝使月事衰少不來也所以爾者肝藏於血勞傷過度血氣枯竭於內也又先經唾血及吐血下血謂之脫血使血枯亦月事不來也又利血經水亦斷所以爾者津液減耗故也利止津液生其經自下診其腎脈微澀為不利者是月水不來也又左手關後尺內浮為陽陽絶者無膀胱脈也月事則閉又肝脈沉之而急浮之亦然時小便難苦頭眩痛腰背痛足為寒時疼月事不來時恐得之少之時有所墮墜也月水不通久則血結於內生塊變為血瘕亦作血症血水相併壅澀不宣通脾胃虛弱變為水腫也所以然者脾候身之肌肉象於土土主能克消於水水血既並脾氣衰弱不能克消故水氣流溢浸漬肌肉故腫滿也二十四帶下候帶下者由勞傷過度損動經血致令體虛受風冷風冷入於胞絡搏其血之所成也衝脈任脈為經絡之海任之為病女子則帶下而手太陽為小腸之經也手少陰心之經也心為臟主於裡小腸為腑主於表此二經之血在於婦人上為乳汁下為月水衝任之所統也衝任之脈既起於胞內陰陽過度則傷胞絡故風邪乘虛而入於胞損沖任之經傷太陽少陰之血致令胞絡之間穢液與血相兼連帶而下冷則多白熱則多赤故名帶下又帶下有三門一曰胞門二曰龍門三曰玉門已産屬胞門未産屬龍門未嫁屬玉門又未嫁女亦有三病一者經水初下陰內熱或當風或因扇得冷二者或因以寒水洗之得病又三者或見月水初下驚恐得病皆屬帶下也又婦人年五十所病下利數十日不止暮發熱小腹裡急痛腹滿手掌煩熱唇口乾燥此因曾經半産瘀血在小腹不去此疾必帶下所以知瘀血者唇口燥即是其證又婦人年五十所病但苦背痛時時腹中痛少食多厭診其脈陽微關尺小緊形脈不相應病如此在下焦此必帶下又婦人帶下六極之病脈浮即腸鳴腹滿脈緊即腹中痛脈數則陰中癢痛生瘡脈弦即陰疼掣痛二十五帶五色俱下候帶下病者由勞傷血氣損動衝脈任脈致令其血與穢液兼帶而下也衝任之脈為經脈之海經血之行內榮五臟五臟之色隨臟不同傷損經血或冷或熱而五臟俱虛損者故其色隨穢液而下為帶五色俱下二十六帶下青候此由勞傷血氣損動衝脈任脈衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水若經脈傷損衝任氣虛不能約制經血則與穢液相兼而成帶下然五臟皆稟血氣其色則隨臟而不同肝臟之色青帶下青者是肝臟虛損故帶下而挾青色二十七帶下黃候勞傷血氣損動衝脈任脈衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水若經脈傷損衝任氣虛不能約制經血則血與穢液相兼而成帶下然五臟皆稟血氣其色則隨臟不同脾臟之色黃帶下黃者是脾臟虛損故帶下而挾黃色二十八帶下赤候勞傷血氣損動衝脈任脈衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水若經脈傷損衝任氣虛不能約制經血則與穢液相兼而成帶下然五臟皆稟血氣其色則隨臟不同心臟之色赤帶下赤者是心臟虛損故帶下而挾赤色二十九帶下白候勞傷血氣損動衝脈任脈衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水若經脈傷損衝任氣虛不能約制經血則血與穢液相兼而成帶下然五臟皆稟血氣其色則隨臟不同肺臟之色白帶下白者肺臟虛損故帶下而挾白色也三十帶下黑候勞傷血氣損動衝脈任脈衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水若經脈傷損衝任氣虛不能約制經血則血與穢液相兼而成帶下然五臟皆稟血氣其色則隨臟不同腎臟之色黑帶下黑者是腎臟虛損故帶下而挾黑色也三十一帶下月水不利候帶下之病由勞傷血氣損動衝脈任脈衝任之脈起於胞內為經脈之海經血傷損故血與穢液相兼而成帶下帶下輸瀉則臟虛而重被風冷乘之入傷手太陽少陰之經則使月水不利所以爾者手太陽小腸之經也為腑主表手少陰心之經也為臟主裡此二經共合其經血上為乳汁下為月水血性得寒則澀既為風冷所乘故帶下而血澀所以月水不利也三十二帶下月水不通候帶下之病由勞傷血氣損動衝脈任脈衝脈任脈起於胞內為經脈之海經血傷損故血與穢液相兼而成帶下帶下輸瀉則臟虛而重被風冷乘之入傷手太陽少陰之經則使月水不通所以爾者手太陽小腸之經也為腑主表手少陰心之經也為臟主裡此二經共合其經血上為乳汁下為月水血性得寒則澀既為風冷所乘冷氣沉積故血結壅所以帶下月水不通凡月水不通血結積聚變成血瘕血瘕亦變面目浮腫也
