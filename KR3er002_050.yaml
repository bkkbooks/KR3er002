body:
  text: 卷之五十小兒雜病諸候六凡五十一論二百五三蟲候三蟲者長蟲赤蟲蟯蟲也為三蟲猶是九蟲之數也長蟲蛔蟲也長一尺動則吐清水而心痛貫心即死赤蟲狀如生肉動則腸鳴蟯蟲至細微形如菜蟲也居胴腸間多則為痔劇則為癩因人瘡處以生諸癰疽癬瘻瘑疥齲蟲無所不為此既九蟲之內三者而今則別立名當以其三種偏發動成病故謂之三蟲也二百六蛔蟲候蛔蟲者九蟲內之一蟲也長一尺亦有長五六寸者或因腑臟虛弱而動或因食甘肥而動其動則腹中痛發作腫聚行來上下痛有休止亦攻心痛口喜吐涎及清水貫傷心者則死診其脈腹中痛其脈法當沉弱而弦今反脈洪而大則是蛔蟲也二百七蟯蟲候蟯蟲者九蟲內之一蟲也形甚細小如今之瘑蟲狀亦因腑臟虛弱而致發動甚者則成痔瘻瘑疥也二百八寸白蟲候寸白者九蟲內之一蟲也長一寸而色白形小褊因腑臟虛弱而能發動或云飲白酒以桑樹枝貫串牛肉炙食並食生粟所作或云食生魚後即飲乳酪亦令生之其發動則損人精氣腰腳疼弱又云此蟲生長一尺則令人死也二百九脫肛候脫肛者肛門脫出也肛門大腸之候小兒患肛門脫出多因痢大腸虛冷兼用躽氣故肛門脫出謂之脫肛也二百十病㿉候㿉者陰核氣結腫大也小兒患此者多因啼怒躽氣不止動於陰氣陰氣而擊結聚不散所成也二百十一差㿉候差㿉者陰核偏腫大亦由啼怒躽氣擊於下所致其偏腫者氣偏乘虛而行故偏結腫也二百十二狐臭候人有血氣不和腋下有如野狐之氣謂之狐臭而此氣能染易著於人小兒多是乳養之人先有此病染著小兒二百十三四五歲不能語候人之五臟有五聲心之音為言小兒四五歲不能言者由在胎之時其母卒有驚怖內動於兒臟邪氣乘其心令心氣不和至四五歲不能言語也二百十四氣癭候氣癭之狀頸下皮寬內結突起膇膇然亦漸長大氣結所成也小兒啼未止因以乳飲之令氣息喘逆不得消散故結聚成癭也二百十五胸脅滿痛候看養小兒有失節度而為寒冷所傷寒氣入腹內乘虛停積後因乳哺冷熱不調觸冒宿寒與氣相擊不散在於胸脅之間故令滿痛也二百十六服湯藥中毒候小兒有𤵜患服湯藥其腸胃脆嫩不勝藥氣便致煩毒也故謂之中毒二百十七蠼螋毒繞腰痛候蠼螋蟲長一寸許身有毛如毫毛長五六分腳多而甚細多處屋壁之間云其遊走遇人則尿人影隨所尿著影處人身即應之生瘡世病之者多著腰瘡初生之狀匝匝起初結㾦瘰小者如黍粟大者如麻豆漸染生長闊大繞腰生膿汁成瘡也二百十八疣目候人有附皮肉生與肉色無異如麥豆大謂之疣子即疣目也亦有三數個相聚生者割破里狀如筋而強亦微有血而亦復生此多由風邪客於皮膚血氣變化所生故亦有藥治之瘥者亦有法術治之瘥者而多生於手足也二百十九頭瘡候腑臟有熱熱氣上衝於頭而復有風濕乘之濕熱相搏折血氣而變生瘡也二百二十頭多蝨生瘡候蝨者按九蟲論云蟯蟲多所變化亦變為蝨而小兒頭櫛沐不時則蝨生滋長偏多齧頭遂至生瘡瘡處蝨聚也謂之蝨窠然人體性自有偏多蝨者二百二十一白禿候白禿之候頭上白點斑剝初似癬而上有白皮屑久則生痂㿥成瘡遂至遍頭洗刮除其痂頭皮瘡孔如筋頭大里有膿汁出不痛而有微癢時其里有蟲甚細微難見九蟲論亦云是蟯蟲動作而成此瘡乃至自小及長大不瘥頭髮禿落故謂之白禿也二百二十二頭面身體諸瘡候腑臟熱甚熱氣衝發皮膚而外有風濕折之與血氣相搏則生瘡其狀初赤起㾦瘰後乃生膿汁隨瘥隨發或生身體或出頭面或身體頭面皆有也二百二十三惡瘡候夫人身體生瘡皆是臟熱沖外外有風濕相搏所生而風濕之氣有挾熱毒者其瘡則痛癢腫焮久不瘥故名惡瘡也二百二十四熛瘡候小兒為風熱毒氣所傷客於皮膚生熛漿而潰成瘡名為熛瘡也二百二十五瘰癧候小兒身生熱瘡必生瘰癧其狀作結核在皮肉間三兩個相連纍也是風邪搏於血氣焮結所生也二百二十六惡核候惡核者是風熱毒氣與血氣相搏結成核生頸邊又遇風寒所折遂不消不潰名為惡核也二百二十七漆瘡候人無問男女大小有稟性不耐漆者見漆及新漆器便著漆毒令頭面身體腫起隱疹色赤生瘡癢痛是也二百二十八癰瘡候六腑不和寒氣客於皮膚寒搏於血則壅遏不通稽留於經絡之間結腫頭成癰其狀腫上皮薄而澤是也熱氣乘之熱勝於寒則肉血腐敗化為膿膿潰之後其瘡不瘥故曰癰瘡二百二十九腸癰候腸癰之狀小腹微強而痛是也由寒熱氣搏於腸間血氣痞結所生也二百三十癤候腫結長一寸至二寸名之為癤亦如癰熱痛久則膿潰捻膿血盡便瘥亦是風寒之氣客於皮膚血氣壅結所成凡癰癤捻膿血不盡而瘡口便合其惡汁在裡雖瘥終能更發變成漏也二百三十一疽候五臟不調則生疽亦是寒客於皮膚折於血氣血氣痞澀不通結聚所成大體與癰相似所可為異其上如牛領之皮而硬是也癰則浮淺疽則深也至於變敗膿潰重於癰也傷骨爛筋遂至於死二百三十二疽瘡候此疽瘡者非癰疽也是瘑之類世謂之瘑疽多發於指節腳脛間相對生作細㾦瘰子幣幣而細孔瘡里有蟲癢痛搔之有黃汁出隨瘥隨發也二百三十三瘻候寒熱邪氣客於經絡使血氣痞澀初生作細瘰癧或如梅李核大或如葥干或圓或長長者至五六分不過一寸或一或兩三相連時發寒熱仍膿血不止謂之漏也皆是五臟六腑之氣不和致血氣不足而受寒熱邪氣然瘻者有鼠瘻螻蛄瘻蚯蚓瘻蠐螬等瘻以其於當病名處説之也二百三十四瘑候瘑者風濕搏於血氣所成多著手足節腕間幣幣然搔之癢痛浸淫生長呼謂之瘑以其瘡有細蟲如瘑蟲故也二百三十五疥候疥瘡多生手足指間染漸生至於身體癢有膿汁按九蟲論云蟯蟲多所變化亦變作疥其瘡里有細蟲甚難見小兒多因乳養之人病疥而染著小兒也二百三十六癬候癬病由風邪與血氣相搏於皮膚之間不散變生隱軫軫上如粟粒大作匡郭或邪或圓浸淫長大癢痛搔之有汁名之為癬小兒面上癬皮如甲錯起乾燥謂之乳癬言兒飲乳乳汁漬汙兒面變生此仍以乳汁洗之便瘥二百三十七赤疵候小兒有血氣不和肌肉變生赤色染漸長大無定或如錢大或闊三數寸是也二百三十八臍瘡候臍瘡由初生斷臍洗浴不即拭燥濕氣在臍中因解脫遇風風濕相搏故臍瘡久不瘥也臍瘡不瘥風氣入傷經脈則變為癇也二百三十九蟲胞候小兒初生頭即患瘡乃至遍身其瘡有蟲故因名蟲胞也二百四十口瘡候小兒口瘡由血氣盛兼將養過溫心有客熱熏上焦令口生瘡也二百四十一鵝口候小兒初生口裡白屑起乃至舌上生瘡如鵝口裡世謂之鵝口此由在胎時受穀氣盛心脾熱氣熏發於口故也二百四十二燕口生瘡候此由脾胃有客熱熱氣熏發於口兩吻生瘡其瘡白色如燕子之吻故名為燕口瘡也二百四十三口下黃肥瘡候小兒有涎唾多者其汁流溢浸漬於頤生瘡黃汁出浸淫肥爛挾熱者瘡汁則多也二百四十四舌上瘡候心候於舌若心臟有熱則舌上生瘡也二百四十五舌腫候心候舌脾之絡脈出舌下心脾俱熱氣發於口故舌腫也二百四十六噤候小兒初生口裡忽結聚生於舌上如黍粟大令兒不能取乳名之曰噤此由在胎時熱入兒臟心氣偏受熱故也二百四十七凍爛瘡候小兒冬月為寒氣傷於肌膚搏於血氣血氣壅澀因即生瘡其瘡亦焮腫而難瘥乃至皮肉爛謂之為凍爛瘡也二百四十八金瘡候小兒為金刃所傷謂之金瘡若傷於經脈則血出不止乃至悶頓若傷於諸臟俞募亦不可治自余腹破腸出頭碎腦露並亦難治其傷於肌肉淺則成瘡終不慮死而金瘡得風則變痙二百四十九卒驚瘡候此由金瘡未瘥忽為外物所觸及大啼呼謂為驚瘡也凡瘡驚則更血出也二百五十月食瘡候小兒耳鼻口間生瘡世謂之月食瘡隨月生死因以為名也世云小兒見月初生以手指指之則令耳下生瘡故呼為月食瘡也二百五十一耳瘡候瘡生於小兒兩耳時瘥時發亦有膿汁此是風濕搏於血氣所生世亦呼之為月食瘡也二百五十二浸淫瘡候小兒五臟有熱熏發皮膚外為風濕所折濕熱相搏身體其瘡初出甚小後有膿汁浸淫漸大故謂之浸淫瘡也二百五十三旺灼惡瘡候腑臟有熱熱熏皮膚外為濕氣所乘則變生瘡其熱偏盛者其瘡發勢亦成初生如麻子須臾旺大汁流潰爛如湯火所灼故名旺灼瘡二百五十四疳濕瘡候疳濕之病多因久利脾胃虛弱腸胃之間蟲動侵蝕五臟使人心煩懊悶其上蝕者則口鼻齒齦生瘡其下蝕者則肛門傷爛皆難治或因久痢或因臟熱嗜眠或好食甘美之食並令蟲動致生此病也二百五十五陰腫成瘡候小兒下焦熱熱氣衝陰陰頭忽腫合不得小便乃至生瘡俗云尿灰火所為也
