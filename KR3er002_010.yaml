body:
  text: 卷之十溫病諸候凡三十四論一溫病候經言春氣溫和夏氣暑熱秋氣清涼冬氣冰寒此四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃為傷寒耳其傷於四時之氣皆能為病而以傷寒為毒者以其最為殺厲之氣焉即病者為傷寒不即病者為寒毒藏於肌骨中至春變為溫病是以辛苦之人春夏必有溫病者皆由其冬時觸冒之所致也凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑其冬復有非節之暖名為冬溫之毒與傷寒大異也有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何曰病名陰陽交陰陽交者死也人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉之間而得汗者是邪卻而精勝則當食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也汗出而脈尚躁盛者死今脈不與汗相應此不稱其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死凡皮膚熱甚脈盛躁者病溫也其脈盛而滑者汗且出也凡溫病人二三日身軀熱腹滿頭痛食欲如故脈直疾八日死四五日頭痛腹滿而吐脈來細強十二日死此病不治八九日頭不疼身不痛目不赤色不變而反利脈來牒牒按不彈手時大心下堅十七日死病三四日以下不得汗脈大疾者生脈細小難得者死不治也下利腹中痛甚者死不治其湯熨針石別有正方存神攘闢今附於後養生方導引法云常以雞鳴時存心念四海神名三遍闢百邪止鬼令人不病東海神名阿明南海神名祝融西海神名巨乘北海神名禺強又云存念心氣赤肝氣青肺氣白脾氣黃腎氣黑出周其身又兼辟邪鬼欲闢卻眾邪百鬼常存心為炎火如斗煌煌光明則百邪不敢幹之可以入溫疫之中二溫病一日候溫病一日太陽受病太陽主表表謂皮膚也病在皮膚之間故頭項腰脊痛三溫病二日候溫病二日陽明受病病在於肌肉故肉熱鼻乾不得眠故可摩膏火炙發汗而愈四溫病三日候溫病三日少陽受病故胸脅熱而耳聾三陽始傳病訖未入於臟故可發汗而愈五溫病四日候溫病四日太陰受病太陰者三陰之首也三陽受病訖傳入於陰故毒氣入胸膈之內其病咽乾腹滿故可吐而愈六溫病五日候溫病五日少陰受病毒氣入腹其病口熱舌乾而引飲故可下而愈七溫病六日候溫病六日厥陰受病毒氣入腸胃其病煩滿而陰縮故可下而愈八溫病七日候溫病七日病法當愈此是三陰三陽傳病竟故也今七日病不除者欲為再經病也再經病者是經絡重受病也九溫病八日候溫病八日以上病不解者或是諸經絡重受於病或經發汗吐下之後毒氣未盡所以病證不罷也十溫病九日以上候溫病九日以上病不除者或初一經受病即不能相傳或已傳三陽訖而不能傳於三陰所以停滯累日病證不罷皆由毒氣未盡表裡受邪經絡損傷腑臟俱病也十一溫病發斑候夫人冬月觸冒寒毒者至春始發病病初在表或已發汗吐下而表證未罷毒氣不散故發斑瘡又冬月天時溫暖人感乖戾之氣未即發病至春又被積寒所折毒氣不得發泄至夏遇熱溫毒始發出於肌膚斑爛隱軫如錦文也十二溫病煩候此由陰氣少陽氣多故身熱而煩其毒氣在於心而煩者則令人悶而欲嘔若其胃內有燥糞而煩者則謬語而繞臍痛也十三溫病狂言候夫病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上其非素所能也病反能者皆陰陽爭而外並於陽四肢者諸陽之本也邪盛則四肢實實則能登高而歌熱盛於身故棄衣欲走陽盛故妄言罵詈不避親戚大熱遍身狂言而妄聞視也十四溫病嗽候邪熱客於胸腑上焦有熱其人必飲水水停心下則上乘於肺故令嗽十五溫病嘔候胃中有熱穀氣入胃與熱相併氣逆則嘔或吐下後飲水多胃虛冷亦為嘔也十六溫病噦候伏熱在胃令人胸滿胸滿則氣逆氣逆則噦若大下後胃氣虛冷亦令致噦十七溫病渴候熱氣入於腎臟腎臟惡燥熱盛則腎燥腎燥則渴引飲十八溫病取吐候溫病熱發四日病在胸膈當吐之愈有得病一二日便心胸煩滿為毒已入兼有痰實亦吐之十九溫病變成黃候發汗不解溫毒氣瘀結在胃小便為之不利故變成黃身如橘色二十溫病咽喉痛候熱毒在於胸腑三焦隔絕邪客於足少陰之絡下部脈不通熱氣上攻喉咽故痛或生瘡也二十一溫病毒攻眼候肝開竅於目肝氣虛熱毒乘虛上衝於目故赤痛重者生瘡翳也二十二溫病衄候由五臟熱結所為心主血肺主氣而開竅於鼻邪熱傷於心故衄衄者血從鼻出也二十三溫病吐血候諸陽受邪熱初在表應發汗而不發致熱毒入深結於五臟內有瘀血積故吐血也二十四溫病下利候風熱入於腸胃故令洞泄若挾毒則下黃赤汁及膿血二十五溫病膿血利候熱毒甚者傷於腸胃故下膿血如魚腦或如爛肉汁此由溫毒氣盛故也二十六溫病大便不通候脾胃有熱積發汗太過則津液少使胃干結熱在內故大便不通二十七溫病小便不通候發汗後津液少膀胱有結熱移入於小腸故小便不通也二十八溫病下部瘡候熱攻腸胃毒氣既盛穀氣漸衰故三蟲動作食人五臟則下部生瘡重者肛爛見腑臟二十九溫病勞復候謂病新瘥津液未復血氣尚虛因勞動早更生於熱熱氣還入經絡覆成病也三十溫病食復候凡得溫毒病新瘥脾胃尚虛穀氣未復若食犬豬羊肉並腸血及肥魚𧴩脂膩食此必大下利下利則不可復救又禁食餅餌𧴩膾棗慄諸生果難消物則不消化停積在於腸胃便脹滿結實大小便不通因更發熱覆成病也非但雜食梳頭洗浴諸勞事等皆須慎之三十一溫病陰陽易候陰陽易病者是男子婦人溫病新瘥未平復而與之交接因得病者名為陰陽易也其男子病新瘥未平復而婦人與之交接得病者名陽易其婦人得病雖瘥未平復男子與之交接得病者名陰易若二男二女並不相易所以呼為易者陰陽相感動其毒度著於人如換易也其病之狀身體熱沖胸頭重不舉眼中生眵四肢拘急小腹㽲痛手足拳皆即死其亦有不即死者病苦小腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱氣血虛骨髓竭便恍恍吸吸氣力轉少著床不能搖動起居仰人或引歲月方死三十二溫病交接勞復候病雖瘥陰陽未和因早房室令人陰腫縮入腹腹㽲痛名為交接之勞復也三十三溫病瘥後諸病候謂其人先有宿疢或患虛勞風冷積聚寒疝等疾因溫熱病發汗吐下之後熱邪雖退而血氣損傷腑臟皆虛故因茲而生諸病三十四溫病令人不相染易候此病皆因歲時不和溫涼失節人感乖戾之氣而生病則病氣轉相染易乃至滅門延及外人故須預服藥及為法術以防之疫癘病諸候凡三論一疫癘病候其病與時氣溫熱等病相類皆由一歲之內節氣不和寒暑乖候或有暴風疾雨霧露不散則民多疾疫病無長少率皆相似如有鬼厲之氣故云疫癘病養生方云封君達常乘青牛魯女生常乘駁牛孟子綽常乘駁馬尹公度常乘青騾時人莫知其名字為誰故曰欲得不死當問青牛道士欲得此色駁牛為上青牛次之駁馬又次之三色者順生之氣也云古之青牛者乃柏木之精也駁牛者古之神宗之先也駁馬者乃神龍之祖也云道士乘此以行於路百物之惡精疫氣之厲鬼將長揖之焉養生方導引法云延年之道存念心氣赤肝氣青肺氣白脾氣黃腎氣黑出周其身又兼辟邪鬼欲闢卻眾邪百鬼常存心為炎火如斗煌煌光明則百邪不敢幹之可以入溫疫之中二疫癘疱瘡候熱毒盛則生疱瘡瘡周匝遍身狀如火瘡色赤頭白者毒輕色黑紫瘀者毒重亦名豌豆瘡三瘴氣候夫嶺南青草黃芒瘴猶如嶺北傷寒也南地暖故太陰之時草木不黃落伏蟄不閉藏雜毒因暖而生故嶺南從仲春訖仲夏行青草瘴季夏訖孟冬行黃芒瘴量其用藥體性嶺南傷寒但節氣多溫冷藥小寒於嶺北時用熱藥亦減其錙銖三分去二但此病外候小遲因經絡之所傳與傷寒不異然陰陽受病會同表裡須明識患源不得妄攻湯艾假令宿患痼熱今得瘴毒毒得熱更煩雖形候正盛猶在於表未入腸胃不妨溫而汗之已入內者不妨平而下之假令本有冷今得溫瘴雖暴壯熱煩滿視寒正須溫藥汗之汗之不歇不妨寒藥下之夫下利治病等藥在下品藥性凶毒專主攻擊不可恆服疾去即止病若日數未入於內不可預服利藥藥盡胃虛病必乘虛而進此不可輕治治不瘥成黃疸黃疸不瘥為屍疸屍疸疾者嶺南中瘴氣土人連歷不瘥變成此病不須治也嶺北客人猶得斟酌救之病前熱而後寒者發於陽無熱而惡寒者發於陰發於陽者攻其外發於陰者攻其內其一日二日瘴氣在皮膚之間故病者頭痛惡寒腰背強重若寒氣在表發汗及針必愈三日以上氣浮於上填塞心胸使頭痛胸滿而悶宜以吐藥吐之必愈五日以上瘴氣深結在臟腑故腹脹身重骨節煩疼當下之或人得病久方告醫醫知病深病已成結非可發表解肌所當問病之得病本末投藥可專依次第也
