body:
  text: 卷之三十八婦人雜病諸候二凡一十九論三十三漏下候漏下者由勞傷血氣衝任之脈虛損故也衝脈任脈為十二經脈之海皆起於胞內而手太陽小腸之經也手少陰心之經也此二經主上為乳汁下為月水婦人經脈調適則月水以時若勞傷者以衝任之氣虛損不能制其經脈故血非時而下淋瀝不斷謂之漏下也診其寸口脈弦而大弦則為減大則為芤減即為寒芤即為虛寒虛相搏其脈為革婦人即半産而下漏又尺寸脈虛者漏血漏血脈浮不可治也養生方云懷娠未滿三月服藥自傷下血下血未止而合陰陽邪氣結因漏胎不止狀如腐肉在於子臟令內虛三十四漏下五色俱下候漏下之病由勞傷血氣衝任之脈虛損故也衝脈任脈為經脈之海起於胞內手太陽小腸之經也手少陰心之經也此二經之血主上為乳汁下為月水衝任之脈虛損不能約制其經血故血非時而下淋瀝成漏也五臟皆稟血氣虛則淋瀝漏下致五臟傷損五臟之色隨臟不同若五臟皆虛損者則漏五色隨血而下診其尺脈急而弦大者風邪入少陰女子漏下赤白又漏下赤白不止脈小虛滑者生脈大緊實數者死也又漏血下赤白日下血數斗脈急疾者死遲者生養生方云夫婦自共諍訟訟意未和平強從子臟閉塞留結為病遂成漏下黃白如膏三十五漏下青候勞傷血氣衝脈任脈虛損衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水傷損經血衝任之氣虛故血非時而下淋瀝不斷而成漏下五臟皆稟血氣肝臟之色青漏下青者是肝臟之虛損故漏下而挾青色也三十六漏下黃候勞傷血氣衝脈任脈虛損衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水傷損經血衝任之氣虛故血非時而下淋瀝不斷而成漏下五臟皆稟血氣脾臟之色黃漏下黃者是脾臟之虛損故漏下而挾黃色也三十七漏下赤候勞傷血氣衝脈任脈虛損衝脈任脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經者主下為月水傷損經血衝任之氣虛故血非時而下淋瀝不止而成漏下五臟皆稟血氣心臟之色赤漏下赤者是心臟之虛損故漏下而挾赤色也三十八漏下白候勞傷血氣衝脈任脈虛損衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水傷損經血衝任之氣虛故血非時而下淋瀝不斷而成漏下五臟皆稟血氣肺臟之色白漏下白者是肺臟之虛損故漏下而挾白色也三十九漏下黑候勞傷血氣衝脈任脈虛損衝任之脈皆起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經主下為月水傷損經血衝任之氣虛故血非時而下淋瀝不斷而成漏下五臟皆稟血氣腎臟之色黑漏下黑者是腎臟之虛損故漏下而挾黑色也四十崩中候崩中者腑臟傷損衝脈任脈血氣俱虛故也衝任之脈為經脈之海血氣之行外循經絡內榮腑臟若無傷則腑臟平和而氣血調適經下以時若勞動過度致腑臟俱傷而衝任之氣虛不能約制其經血故忽然暴下謂之崩中診其寸口脈微遲尺脈微於寸寸遲為寒在上焦但吐耳今尺脈遲而弦如此小腹痛腰脊痛者必下血也四十一白崩候白崩者是勞傷胞絡而氣極所為肺主氣氣極則肺虛冷也肺臟之色白虛冷勞極其色與胞絡之間穢液相挾崩傷而下為白崩也四十二崩中五色俱下候崩中之病是傷損衝任之脈衝任之脈皆起於胞內為經脈之海勞傷過度衝任氣虛不能統制經血故忽然崩下謂之崩中五臟皆稟血氣五臟之色隨臟不同傷損之人五臟皆虛者故五色隨崩俱下其狀白崩形如涕赤崩形如紅汁黃崩形如爛瓜汁青崩形如藍色黑崩形如干血色四十三崩中漏下候崩中之病是傷損衝任之脈衝任之脈皆起於胞內為經脈之海勞傷過度衝任氣虛不能約制經血故忽然崩下謂之崩中崩而內有瘀血故時崩時止淋瀝不斷名曰崩中漏下四十四崩中漏下五色候崩中之病是勞傷衝任之脈衝任之脈起於胞內為經脈之海勞傷過度衝任氣虛不能統制經血故忽然崩下謂之崩中而有瘀血在內遂淋瀝不斷謂之漏下漏下不止致損於五臟五臟之色隨臟不同因虛而五色與血俱下其狀白者如涕赤者如紅汁黃者如爛瓜汁青者如藍色黑者如干血色相雜而下也四十五積聚候積者五臟所生聚者六腑所成五臟之氣積名曰積六腑之氣聚名曰聚也積者其痛不離其部聚者其痛無有常處皆由陰陽不和風冷搏於臟腑而生積聚也婦人病積經久則令無子亦令月水不通所以然者積聚起於冷氣結入子臟故令無子若冷氣入於胞絡冷搏於血血冷則澀結故令月水不通四十六癖病候癖病者由冷氣結聚飲食不消停積於脅下則成癖病其狀弦急刺痛得冷則發作也四十七疝瘕候疝瘕之病由飲食不節寒溫不調氣血勞傷臟腑虛弱受於風冷冷入腹內與血氣相結所生疝者痛也瘕者假也其結聚浮假而痛推移而動婦人病之有異於丈夫者或因産後臟虛受寒或因經水往來取冷過度非獨關飲食失節多挾有血氣所成也診婦人疝瘕其脈弦急者生虛弱小者死又尺脈澀而牢為血實氣虛也其發腹痛逆滿氣上行此為婦人胞中絶傷有惡血久成結瘕得病以冬時黍穄赤而死四十八症痞候症痞者由冷熱不調飲食不節積在腹內或腸胃之間與臟相結搏其牢強推之不移名曰症言其病形徵可驗也氣壅塞為痞言其氣痞澀不宣暢也皆得冷則發動刺痛症痞之病其形冷結若冷氣入於子臟則使無子若冷氣入於胞絡搏於血氣血得冷則澀令月水不通也四十九八瘕候八瘕者皆胞胎生産月水往來血脈精氣不調之所生也腎為陰主開閉左為胞門右為子戶主定月水生子之道胞門子戶主子精神氣所出入合於中黃門玉門四邊主持關元禁閉子精臍下三寸名曰關元主藏魂魄婦人之胞三焦之腑常所從止然婦人經脈俞絡合調則月水以時來至故能生子而無病婦人榮衛經絡斷絶不通邪氣便得往入合於子臟若經血未盡而合陰陽即令婦人血脈攣急小腹重急支滿胸脅腰背相引四肢痠痛飲食不調結牢惡血不除月水不時或月前月後因生積聚如懷胎狀邪氣甚盛者令人恍惚多夢寒熱四肢不欲動陰中生氣腫內生風甚者害小便澀澀而痛淋瀝面黃黑成病則不復生子其八瘕者黃瘕青瘕燥瘕血瘕脂瘕狐瘕蛇瘕鱉瘕也黃瘕者婦人月水始下若新傷墮血氣未止臥寤未定五臟六腑虛羸精神不治因以當向大風便利陰陽開關節四邊中於風濕氣從下上入陰里稽留不去名為陰陽虛則生黃瘕之聚令人苦四肢寒熱身重淋露不欲食左脅下有血氣結牢不可得而抑苦腰背相引痛月水不利令人不産小腹急下引陰中如刀刺不得小便時苦寒熱下赤黃汁病苦如此令人無子青瘕者婦人新産未滿十日起行以湯浣洗太早陰陽虛玉門四邊皆解散子戶未安骨肉皆痛手臂不舉飲食未復內臟吸吸又當風臥不自隱蔽若居濕席令人苦寒灑灑入腹煩悶沉淖惡血不除結熱不得前後便化生青瘕瘕聚左右脅藏於背膂上與膊髀腰下攣兩足腫面目黃大小便難其後月水為之不通利或不復禁狀如崩中此自其過所致令人少子燥瘕者婦人月水下惡血未盡其人虛憊而已夏月熱行疾走若舉重移輕汗出交流氣力未平而卒以恚怒致猥咽不泄經脈攣急內結不舒煩滿少氣上達胸膈背膂小腹為急月水與氣俱不通而反以飲清水快心月水橫流衍入他臟不去有熱因生燥瘕之聚大如半杯上下腹中苦痛還兩脅下上引心而煩害飲食欲吐胸及腹中不得大息腰背重喜臥盜汗足痠疼痛久立而痛小便失時居然自出若失精月水閉塞大便難病如此者其人少子血瘕病婦人月水新下未滿日數而中止飲食過度五穀氣盛溢入他臟若大飢寒汲汲不足呼吸未調而自勞動血下未定左右走腸胃之間留絡不去內有寒熱與月水合會為血瘕之聚令人腰痛不可以俯仰橫骨下有積氣牢如石小腹裡急苦痛背膂疼深達腰腹下攣陰里若生風冷子門劈月水不時乍來乍不來此病令人無子脂瘕者婦人月水新來若生未滿三十日其人未復以合陰陽絡脈分胞門傷子戶失禁關節散五臟六腑津液流行陰道瞤動百脈關樞四解外不見其形子精與血氣相遇犯禁子精化不足成子則為脂瘕之聚令人支滿裡急痛痹引小腹重腰背如刺狀四肢不舉飲食不甘臥不安席左右走腹中切痛時瘥時甚或時少氣頭眩身體解墮苦寒惡風膀胱脹月水乍來乍去不如常度大小便血不止如此者令人無子狐瘕者婦人月水當月數來而反悲哀憂恐以遠行逢暴風疾雨雷電驚恐衣被沉濕疲倦少氣心中恍恍未定四肢懈惰振寒脈氣絶精神遊亡邪氣入於陰里不去生狐瘕之聚食人臟令人月水閉不通小腹瘀滯胸脅腰背痛陰中腫小便難胞門子戶不受男精五臟氣盛令嗜食欲嘔喜唾多所思如有娠狀四肢不舉有此病者終身無子其瘕有手足成形者殺人也未成者可治蛇瘕者婦人月水已下新止適閉未復胞門子戶勞傷陰陽未平復榮衛分行若其中風暴病羸劣飲食未調若已起當風行及度泥塗用清寒太早若坐濕地名陰陽亂腹中虛且未飲食若遠道之餘飲汙井之水不潔之食吞蛇鼠之精留絡不去因生蛇瘕之聚上食心肝長大其形若漆在臍上下還癘左右脅不得吐氣兩股脛間苦疼小腹疾小便赤黃膀胱引陰中攣急腰背痛難以動作苦寒熱之後月水有多有少有此病者不復生子其瘕手足成形者殺人未成者可治鱉瘕者婦人月水新至其人劇吐疲勞衣服沉濕不以時去若當風睡兩足踐濕地恍惚覺悟跖立未安顏色未平復見所好心為開蕩魂魄感動五內脫消若以入水浣洗沐浴不以時出神不守水精與邪氣俱入至三焦之中募玉門先閉津液妄行留絡不去因生鱉瘕之聚大如小盤令人小腹切痛惡氣走上下腹中苦痛若存若亡持之躍手下引陰里腰背亦痛不可以息月水喜敗不通面目黃黑脫聲少氣有此病者令人絶子其瘕有手足成形者殺人未成者可治五十帶下三十六候諸方説三十六疾者是十二症九痛七害五傷三固謂之三十六疾也十二症者是所下之物一者如膏二者如青血三者如紫汁四者如赤皮五者如膿痂六者如豆汁七者如葵羹八者如凝血九者如清血血似水十者如米汁十一者如月浣十二者經度不應期也九痛者一者陰中痛傷二者陰中淋痛三者小便即痛四者寒冷痛五者月水來腹痛六者氣滿並痛七者汁出陰中如蟲齧痛八者脅下皮痛九者腰痛七害者一者害食二者害氣三者害冷四者害勞五者害房六者害妊七者害睡五傷者一者窮孔痛二者中寒熱痛三者小腹急牢痛四者臟不仁五者子門不正引背痛三固者一者月水閉塞不通其餘二固者文闕不載而張仲景所説三十六種疾皆由子臟冷熱勞損而挾帶下起於陰內條目混漫與諸方不同但仲景義最玄深非愚淺能解恐其文雖異其義理實同也五十一無子候婦人無子者其事有三也一者墳墓不祀二者夫婦年命相剋三者夫病婦疹皆使無子其若是墳墓不祀年命相剋此二者非藥能益若夫病婦疹須將藥餌故得有效也然婦人挾疾無子皆由勞傷血氣冷熱不調而受風寒客於子宮致使胞內生病或月經澀閉或崩血帶下致陰陽之氣不和經血之行乖候故無子也診其右手關後尺脈浮則為陽陽脈絶無子也又脈微澀中年得此為絶産也少陰脈如浮緊則絶産惡寒脈尺寸俱微弱則絶嗣不産也其湯尉針石別有正方補益吐納今附於後養生方云吸月精凡月初出時月中時月入時向月正立不息八通仰頭吸月光精八咽之令人陰氣長婦人吸之陰氣益盛子道通陰氣長益精髓腦少小者婦人至四十九以上還生子斷緒者即有子久行不已即成仙矣
