body:
  text: 卷之二風病諸候下凡三十論三十歷節風候歷節風之狀短氣白汗出歷節疼痛不可忍屈伸不得是也由飲酒腠理開汗出當風所致也亦有血氣虛受風邪而得之者風歷關節與血氣相搏交攻故疼痛血氣虛則汗也風冷搏於筋則不可屈伸為歷節風也三十一風身體疼痛候風身體疼痛者風濕搏於陽氣故也陽氣虛者腠理易開而為風濕所折使陽氣不得發泄而與風濕相搏於分肉之間相擊故疼痛也診其脈浮而緊者則身體疼痛三十二風入腹拘急切痛候風入腹拘急切痛者是體虛受風冷風冷客於三焦經於臟腑寒熱交爭故心腹拘急切痛三十三風經五臟恍惚候五臟處於內而氣行於外臟氣實者邪不能傷虛則外氣不足風邪乘之然五臟心為神肝為魂肺為魄脾為意腎為志若風氣經之是邪干於正故令恍惚三十四刺風候刺風者由體虛膚腠開為風所侵也其狀風邪走遍於身而皮膚淫躍邪氣與正氣交爭風邪擊搏如錐刀所刺故名刺風也養生方云觸寒來者寒未解食熱物亦成刺風三十五蠱風候蠱風者由體虛受風其風在於皮膚淫淫躍躍若畫若刺一身盡痛侵傷氣血其動作狀如蠱毒故名蠱風也三十六風冷候風冷者由臟腑虛血氣不足受風冷之氣血氣得溫則宜流冷則凝澀然風之傷人有冷有熱若挾冷者冷折於氣血使人面青心悶嘔逆吐沫四肢痛冷故謂之風冷其湯尉針石別有正方補養宣導今附於後養生方導引法云一足踏地足不動一足向側如丁字樣轉身倚勢並手盡急回左右迭互二七去脊風冷偏枯不通潤又云蹲坐身正頭平叉手安頦下頭不動兩肘向上振搖上下來去七七亦持手三七放縱身心去乳房風冷腫悶魚寸不調日日損又云坐兩足長舒自縱身納氣向下使心內柔和適散然始屈一足安膝下長舒一足仰足趾向上使急仰眠頭不至席兩手急努前頭向上努挽一時各各取勢來去二七迭互亦然去腳疼腰膊冷血冷風痹日日漸損又云長舒足肚腹著席安徐看氣向下知有去處然始著兩手掌拓席努使臂直散脊背氣向下漸漸盡勢來去二七除臟腑內宿冷脈急腰膊風冷又云欲以閉氣出汗拳手屈膝側臥閉氣自極欲息氣定復閉氣如此汗出乃止復轉臥以下居上復閉氣如前汗大出乃止此主治身中有風寒欲治股脛手臂痛法屈一脛一臂伸所病者正偃臥以鼻引氣令腹滿以意推之想氣行至上溫熱即愈又云肚腹著席長舒一足向後急努足指一手舒向前盡勢將一手向背上挽足倒極勢頭仰蹙背使急先用手足斜長舒者兩向自相挽急始屈手足共頭一時取勢常記動手足先後交番上下來去二七左右亦然去背項腰膝膊井風冷疼悶脊裡倔強又云正坐兩手向後捉腕反向拓席盡勢使腹弦弦上下七左右換手亦然損腹肚冷風宿氣積胃口冷食飲進退吐逆不下又云凡學將息人先須正坐並膝頭足初坐先足趾相對足跟外扒坐上欲安穩須兩足跟向內相對足指外扒坐上覺悶痛漸漸舉身似款便坐上待共兩坐相似不痛始雙豎足跟向上坐上足趾並反向外每坐常學去膀胱內冷膝冷兩足冷疼上氣腰痛儘自消適又云長舒一足一腳屈兩手挽膝三里努膝向前身卻挽一時取勢氣內散消如似骨解迭互換足各別三七漸漸去膊脊冷風冷血筋急又云兩手向後倒挽兩足極勢頭仰足指向外努之緩急來去七始手向前直舒足自搖膝不動手足各二七去脊腰悶風冷又云身平正舒兩手向後極勢屈肘向後空捺四七轉腰垂手向下手掌四面轉之去臂內筋急又云兩手長舒合掌向下手高舉與膊齊極勢使膊悶痛然始上下搖之二七手下至髀還上下緩急輕手前後散振雙手前拓努手合掌向下七去膊內風冷疼日消散又云兩手掌倒拓兩膊井前極勢上下傍兩掖急努振搖來去三七竟手不移處努向兩肘向上急熱上下振搖二七欲得拳兩手七因相將三七去項膊筋脈急勞一手屈拳向後左一手捉肘頭向內挽之上下一時盡勢屈手散放舒指三方轉手皆極勢四七調肘膊骨筋急強兩手拓向上極勢上下來去三七手不動將兩肘向上極勢七不動手肘臂側身極勢左右回三七去頸骨冷氣風急前一十二件有此法能使氣人行之須在疾中可量三十七風熱候風熱病者風熱之氣先從皮毛入於肺也肺為五臟上蓋候身之皮毛若膚腠虛則風熱之氣先傷皮毛乃入肺也其狀使人惡風寒戰目欲脫涕唾出候之三日內及五日內目不精明者是也七八日微有青黃膿涕如彈丸大從口鼻內出為善也若不出則傷肺變咳嗽唾膿血也三十八風氣候風氣者由氣虛受風故也肺主氣氣之所行循經絡榮臟腑而氣虛則受風風之傷氣有冷有熱冷則厥逆熱則煩惋其因風所為故名風氣其湯尉針石別有正方補養宣導今附於後養生方導引法云一手前拓使急一手髮乳房向後急挽之不得努用力氣心開下散迭互相換手三七始將兩手攀膝頭急捉身向後極勢三七去腕悶疼風府雲門氣散三十九風冷失聲候風冷失聲者由風冷之氣客於會厭傷於懸癰之所為也聲氣通發事因關戶會厭是音聲之戶懸癰是音聲之關風冷客於關戶之間所以失聲也四十中冷聲嘶候中冷聲嘶者風冷傷於肺之所為也肺主氣五臟同受氣於肺而五臟有五聲皆稟氣而通之氣為陽若溫暖則陽氣和宣其聲通暢風冷為陰陰邪搏於陽氣使氣道不調流所以聲嘶也四十一頭面風候頭面風者是體虛諸陽經脈為風所乘也諸陽經脈上走於頭面運動勞役陽氣發泄腠理開而受風謂之首風病狀頭面多汗惡風病甚則頭痛又新沐中風則為首風又新沐頭未乾不可以臥使頭重身熱反得風則煩悶診其脈寸口陰陽表裡互相乘如風在首久不瘥則風入腦變為頭眩其湯尉針石別有正方補養宣導今附於後養生方云飽食仰臥久成氣病頭風又云飽食沐發作頭風又云夏不用露面臥露下墮面上令面皮厚喜成癬一云作面風又云人常須日已沒食訖食訖即更不須飲酒終天不幹嘔諸熱食膩物不飲冷醋漿喜失聲失咽熱食枕手臥久成頭風目澀養生方導引法云一手拓頤向上極勢一手向後長舒急努四方顯手掌一時俱極勢四七左右換手皆然拓頤手兩向共頭欹側轉身二七去臂膊風頭風眠睡又云解發東向坐握固不息一通舉手左右導引手掩兩耳以手復捋頭五通脈也治頭風令發不白又云端坐伸腰左右傾側閉目以鼻納氣自極七息止除頭風又云頭痛以鼻納氣徐吐出氣三十過休又云抱兩膝自棄於地不息八通治胸中上至頭諸病耳目鼻喉痛又云欲治頭痛偃臥閉氣令鼻極乃息汗出乃止又云叉兩手頭後極勢振搖二七手掌翻覆安之七頭欲得向後仰之一時一勢欲得倚斜四角急挽之三七去頭掖膊肘風四十二風頭眩候風頭眩者由血氣虛風邪入腦而引目系故也五臟六腑之精氣皆上注於目血氣與脈並於上系上屬於腦後出於項中逢身之虛則為風邪所傷入腦則腦轉而目系急目系急故成眩也診其脈洪大而長者風眩又得陽維浮者暫起目眩也風眩久不瘥則變為癲疾其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩手抱右膝著膺除風眩又云以兩手承轆轤倒懸令腳反在其上元愈頭眩風癲坐地舒兩腳以繩絆之大繩絆訖拖轆轤上來下去以兩手挽繩使腳上頭下使離地自極十二通愈頭眩風癲久行身臥空中而不墮落又云一手長舒令掌仰一手捉頤挽之向外一時極勢二七左右亦然手不動兩向側極勢急挽之二七去頸骨急強頭風腦旋喉痹膊內冷注偏風又云凡人常覺脊背倔強不問時節縮咽膊內仰面努膊井向上頭左右兩向挪之左右三七一住待血行氣動住然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰如用辰別二七除寒熱病脊腰頸項痛風痹口內生瘡牙齒風頭眩衆病盡除又云坐地交叉兩腳以兩手從曲腳中入低頭叉手項上治久寒不能自溫耳不聞聲又云腳著項上不息十二通愈大寒不覺暖熱久頑冷患耳聾目眩病久行即成法法身五六不能變也又云低頭不息六通治耳聾目癲眩咽喉不利又云伏前側牢不息六通愈耳聾目眩隨左右聾伏並兩膝耳著地牢強意多用力至大極愈耳聾目眩病久行不已耳聞十方亦能倒頭則不眩也八件有此術亦在病疾難為四十三風癲候風癲者由血氣虛邪入於陰經故也人有血氣少則心虛而精神離散魂魄妄行因為風邪所傷故邪入於陰則為癲疾又人在胎其母卒大驚精氣並居令子發癲其發則仆地吐涎沫無所覺是也原其癲病皆由風邪故也其湯尉針石別有正方補養宣導今附於後養生方云夫人見十步直牆勿順牆而臥風利吹人必發癲癇及體重人臥春夏向東秋冬向西此是常法養生方導引法云還向反望不息七通治咳逆胸中病寒熱癲疾喉不利咽乾咽寒又云以兩手承轆轤倒懸令腳反在上元愈頭眩風癲坐地舒兩腳以繩絆之以大繩絆訖拖轆轤上來下去以兩手挽繩使腳上頭下使離地自極十二通愈頭眩風癲久行身臥空中而不墜落四十四五癲病候五癲者一曰陽癲發如死人遺尿食頃乃解二曰陰癲初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反強羊鳴食頃方解由熱作汗出當風因房室過度醉飲令心意逼迫短氣脈悸得之四曰濕癲眉頭痛身重坐熱沐頭濕結腦沸未止得之五曰馬癲發作時時反目口噤手足相引身體皆熱診其脈心脈微澀並脾脈緊而疾者為癲脈也腎脈急甚為骨癲疾脈洪大而長者癲疾脈浮大附陰者癲疾脈來牢者癲疾三部脈緊急者可治發則仆地吐沫無知若強倞起如狂及遺糞者難治脈虛則可治實則死脈緊弦實牢者生脈沉細小者死脈搏大滑久久自已其脈沉小急疾不治小牢急亦不可治四十五風狂病候狂病者由風邪入並於陽所為也風邪入血使人陰陽二氣虛實不調若一實一虛則令血氣相併氣並於陽則為狂發或欲走或自高賢稱神聖是也又肝藏魂悲哀動中則傷魂魂傷則狂忘不精明不敢正當人陰縮而攣筋兩脅骨不舉毛瘁色夭死於秋皆由血氣虛受風邪致令陰陽氣相併所致故名風狂四十六風邪候風邪者謂風氣傷於人也人以身內血氣為正外風氣為邪若其居處失宜飲食不節致腑臟內損血氣外虛則為風邪所傷故病有五邪一曰中風二曰傷暑三曰飲食勞倦四曰中寒五曰中濕其為病不同風邪者發則不自覺知狂惑妄言悲喜無度是也其湯尉針石別有正方補養生宣導今附於後養生方導引法云脾主土土暖如人肉始得發汗去風冷邪氣若腹內有氣脹先須暖足摩臍上下並氣海不限遍數多為佳如得左回右轉三七和氣如用要用身內一百一十三法回轉三百六十骨節動脈搖筋氣血布澤二十四氣和潤臟腑均調和氣在用頭動轉搖振手氣向上心氣則下分明知去知來莫問平手倚腰轉身摩氣屈躄回動盡心氣放散送至湧泉一一不失氣之行度用之有益不解用者疑如氣亂四十七鬼邪候凡邪氣鬼物所為病也其狀不同或言語錯謬或啼哭驚走或癲狂昏亂或喜怒悲笑或大怖懼如人來逐或歌謠詠嘯或不肯語持針置發中入病者門取坍岸水以三尺新白布覆之橫刀膝上呼病者前矜莊觀視病者語言顏色應對不精明乃以含水噀之勿令病者起復低頭視滿三噀後熟拭之若病困劣昏冥無令強起就視之昏冥遂不知人不肯語以指彈其額近髮際曰欲愈乎猶不肯語便彈之二七曰愈愈即就鬼受以情實若脈來遲伏或如雞啄或去此邪物也若脈來弱綿綿遲伏或綿綿不知度數而顏色不變此邪病也脈來乍大乍小乍短乍長為禍脈兩手脈浮之細微綿綿不可知俱有陰脈亦細綿綿此為陰蹺陽蹺之脈也此家曾有病痱風死苦恍惚亡人為禍也脈來洪大弱者社祟脈來沉沉澀澀四肢重土祟脈來如飄風從陰趍陽風邪也一來調一來速鬼邪也脈有表無里邪之祟上得鬼病也何謂表裡寸尺為表關為里兩頭有脈關中絶不至也尺脈上不至關為陰絶寸脈下不至關為陽絶陰絶而陽微死不治也其湯尉針石別有正方補養宣導今附於後養生方云上清真人訣曰夜行常琢齒殺鬼邪又云封君達常乘青牛魯女生常乘駁牛孟子綽常乘駁馬尹公度常乘青騾時人莫知其名字為誰故曰欲得不死當問青牛道士欲得此色駁牛為上青牛次之駁馬又次之三色者順生之氣也故云青牛者乃柏木之精駁牛者古之神示之先駁馬者乃神龍之祖也云道士乘此以行於路百物之惡精疫氣之癘鬼長攝之焉養生方導引法云仙經治百病之道叩齒二七過輒咽氣二七過如此三百通乃止為之二十日邪氣悉去六十日小病愈百日大病除三蠱伏尸皆去面體光澤又無生經曰治百病邪鬼蠱毒當正偃臥閉目閉氣內視丹田以鼻徐徐納氣令腹極滿徐徐以口吐之勿令有聲令入多出少以微為之故存視五臟各如其形色又存胃中令鮮明潔白如素為之倦極汗出乃止以粉粉身摩捋形體汗不出而倦者亦可止明日復為之又當存作大雷電隆隆鬼鬼走入腹中為之不止病自除矣四十八鬼魅候凡人有為鬼物所魅則好悲而心自動或心亂如醉狂言驚怖向壁悲啼夢寐喜魘或與鬼神交通病苦乍寒乍熱心腹滿短氣不能飲食此魅之所持也四十九惡風鬚眉墮落候大風病鬚眉墮落者皆從風濕冷得之或因汗出入水得之或冷水入肌體得之或飲酒臥濕地得之或當風沖坐臥樹下及濕草上得之或體癢搔之漸漸生瘡經年不瘥即成風疾八方之風皆能為邪邪客於經絡久而不去與血氣相干則使榮衛不和淫邪散溢故面色敗皮膚傷鼻柱壞鬚眉落西北方乾為老公名曰金風一曰黑風二曰旋風三曰愒風其狀似疾此風奄奄忽忽不覺得時以經七年眉睫墮落東風震為長男名曰青風一曰終風二曰衝風三曰行龍風其狀似疾此風手腳生瘡來去有時朝發夕發以經五年眉睫墮落東北方艮為小男名曰石風一曰春風二曰遊風三曰亂風其狀似疾此風體肉頑斑白如癩以經十年眉睫墮落北風坎為中男名曰水風一曰面風二曰瓦風三曰敖風其狀似疾春秋生瘡淫淫習習類如蟲行走作無常以經十年眉睫墮落西南方坤為老母名曰穴風一曰吟風二曰臚風三曰腦風其狀似疾不覺痛癢體不生瘡真似白癩以經十年眉睫墮落東南方巽為長女名曰角風一曰因風二曰歷節風三曰膀胱風其狀似疾以此風有蟲三色頭赤腹白尾黑以經三年眉睫墮落蟲出可治南方離為中女名曰赤風一曰水風二曰搖風三曰姦風其狀似疾此風身體遊遊奕奕心不肯定肉色變異以經十年眉睫墮落西方兌為少女名曰淫風一曰缺風二曰明風三曰青風其狀似疾此風已經百日體內蒸熱眉發墮落五十惡風候凡風病有四百四種總而言之不出五種即是五風所攝一曰黃風二曰青風三曰赤風四曰白風五曰黑風凡人身中有八萬尸蟲共成人身若無八萬尸蟲人身不成不立復有諸惡橫病諸風生害於人身所謂五種風生五種蟲能害於人黑風生黑蟲黃風生黃蟲青風生青蟲赤風生赤蟲白風生白蟲此五種風皆是惡風能壞人身名曰疾風入五臟即與臟食人蟲生其蟲無量在人身中乃入骨髓來去無礙若食人肝眉睫墮落食人肺鼻柱崩倒食人脾語聲變散食人腎耳鳴啾啾或如雷聲食人心心不受觸而死脈來徐去疾上虛下實此為惡風五十一風瘙隱軫生瘡候人皮膚虛為風邪所折則起隱軫熱多則色赤風多則色白甚者癢痛搔之則成瘡五十二風瘙身體隱軫候邪氣客於皮膚復逢風寒相折則起風瘙軫若赤軫者由涼濕折於肌中之熱熱結成赤軫也得天熱則劇取冷則滅也白軫者由風氣折於肌中熱熱與風相搏所為白軫得天陰雨冷則劇出風中亦劇得晴暖則滅著衣身暖亦瘥也脈浮而洪浮即為風洪則為氣強風氣相搏隱軫身體為癢養生方云汗出不可露臥及浴使人身振寒熱風軫五十三風瘙癢候此由遊風在於皮膚逢寒則身體疼痛遇熱則瘙癢五十四風身體如蟲行候夫人虛風邪中於榮衛溢於皮膚之間與虛熱並故遊奕遍體狀若蟲行也五十五風癢候邪氣客於肌肉則令肌肉虛真氣散去又被寒搏皮膚外發腠理閉毫毛淫邪與衛氣相搏陽勝則熱陰勝則寒寒則表虛虛則邪氣往來故肉癢也凡痹之類逢熱則癢逢寒則痛五十六風㾦瘰候夫人陽氣外虛則多汗汗出當風風氣搏於肌肉與熱氣並則生㾦瘰狀如麻豆甚者漸大搔之成瘡五十七諸癩候凡癩病皆是惡風及犯觸忌害得之初覺皮膚不仁或淫淫苦癢如蟲行或眼前見物如垂絲或隱軫輒赤黑此皆為疾始起便急治之斷米穀肴鮭專食胡麻松術輩最善也夫病之生多從風起當時微發不將為害初入皮膚里不能自覺或流通四肢潛於經脈或在五臟乍寒乍熱縱橫脾腎蔽諸毛腠理壅塞難通因茲氣血精髓乖離久而不治令人頑痹或汗不流泄手足痠疼針灸不痛或在面目習習奕奕或在胸頸狀如蟲行或身體遍癢搔之生瘡或身面腫痛徹骨髓或頑如錢大狀如蠔毒或如梳或如手錐刺不痛或青赤黃黑猶如腐木之形或痛無常處流移非一或如酸棗或如懸鈴或似繩縛拘急難以俯仰手足不能搖動眼目流腫內外生瘡小便赤黃尿有餘瀝面無顏色恍惚多忘其間變狀多端毒蟲若食人肝者眉睫墮落食人肺鼻柱崩倒或鼻生瘜肉孔氣不通若食人脾語聲變散若食人腎耳鳴啾啾或如雷鼓之音若食人筋脈肢節墮落若食人皮肉頑痹不覺痛癢或如針錐所刺名曰刺風若蟲乘風走於皮肉猶若外有蟲行復有食人皮肉徹外從頭面即起為皰肉如桃核小棗從頭面起者名曰順風病從兩腳起者名曰逆風令人多瘡猶如癬疥或如魚鱗或癢或痛黃水流出初起之時或如榆莢或如錢孔或青或白或黑或黃變異無定或起或滅此等皆病之兆狀又云風起之由皆是冷熱交通流於五臟徹入骨中虛風因濕和合蟲生便即作患論其所犯多因用力過度飲食相違行房太過毛孔既開冷熱風入五臟積於寒熱寒熱之風交過通徹流行諸脈急者即患緩者稍遠所食穢雜肉蟲生日久冷熱至甚暴蟲遂多食人五臟骨髓及於皮肉筋節久久皆令壞散名曰癩風若其欲治先與雷丸等散服之出蟲見其蟲形青赤黑黃白等諸色之蟲與藥治者無有不瘥然癩名不一木癩者初得先當落眉睫面目癢如復生瘡三年成大患急治之愈不治患成火癩者如火燒瘡或斷人支節七年落眉睫急治可愈八年成疾難治金癩者是天所為也負功德祟初得眉落三年食鼻鼻柱崩倒叵治良醫能愈土癩者身體塊磊如雞子彈丸許此病宜急治之六年便成大患十五年不可治水癩者先得水病因即留停風觸發動落人眉須不急治之經年病成蟋蟀癩者蟲如蟋蟀在人身體內百節頭皆欲血出三年叵治面癩者蟲如面舉體艾白難治熏藥可愈多年叵治雨癩者斑駁或白或赤眉須墮落亦可治多年難治麻癩者狀似癬瘙身體狂癢十年成大患可急治之愈風癩者風從體入或手足刺瘡風冷痹癡不治二十年後便成大患宜急治之䖲癩者得之身體沉重狀似風癩積久成大患速治之愈酒癩者酒醉臥黍穰上因汗體虛風從外入落人眉須令人惶懼小治大愈養生禁忌云醉酒露臥不幸生癩又云魚無鰓不可食食之令人五月發癩五十八烏癩候凡癩病皆是惡風及犯觸忌害所得初覺皮毛變異或淫淫苦癢如蟲行或眼前見物如垂絲言語無定心常驚恐皮肉中或如桃李子隱軫赤黑手足頑痹針刺不痛腳下不得踏地凡食之時開口而鳴語亦如是身體瘡痛兩肘如繩縛此名黑癩五十九白癩候凡癩病語聲嘶破目視不明四肢頑痹支節火燃心裡懊熱手足俱緩背膂至急肉如遭劈身體手足隱軫起往往正白在肉裡鼻有瘜肉目生白珠當瞳子視無所見此名白癩
