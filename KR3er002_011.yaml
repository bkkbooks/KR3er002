body:
  text: 卷之十一瘧病諸候凡十四論一瘧病候夏日傷暑秋必病瘧瘧之發以時者此是邪客於風府循膂而下衛氣一日一夜常大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作常晏也衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內注於伏沖之脈其氣上行九日出於缺盆之中其氣既上故其病稍早發其間日發者由邪氣內薄五臟橫連募原其道遠其氣深其行遲不能日作故間日蓄積乃作夫衛氣每至於風府腠理而開開則邪入焉其衛氣日下一節其氣之發也不當風府其日作者奈何然風府無常衛氣之所應必開其腠理邪氣之所舍則其病已風之與瘧也相與同類而風獨常在也而瘧特以時休何也由風氣留其處瘧氣隨經絡沉以內薄故衛氣應乃作陽當陷而不陷陰當升而不升為邪所中陽遇邪則卷陰遇邪則緊卷則惡寒緊則為慄寒慄相搏故名瘧弱乃發熱浮乃汗出旦中旦發暮中暮發夫瘧其人形瘦皮必慄病瘧以月一日發當以十五日愈設不愈月盡解足太陽瘧令人腰痛頭重寒從背起先寒後熱渴渴止汗出難已刺郄中出血足少陽瘧令人身體解倦寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽足陽明瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日光火氣乃快然刺足陽明腳跗上足太陰瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰即取之足少陰瘧令人吐嘔甚久寒熱熱多寒少欲閉戶而處其病難止足厥陰瘧令人腰痛少腹滿小便不利如癃狀非癃也數小便意恐懼氣不足腸中悒悒刺足厥陰肺瘧者令人心寒寒甚熱間善驚如有所見者刺手太陰陽明心瘧者令人煩心甚欲得清水及寒多寒不甚熱甚刺手少陰肝瘧令人色蒼蒼然太息其狀若死者刺足厥陰見血脾瘧者令人疾寒腹中痛熱則腸中鳴鳴已汗出刺足太陰腎瘧令人洒洒腰脊痛宛轉大便難目眩眴眴然手足寒刺足太陽少陰胃瘧令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血肺病為瘧者乍來乍去令人心寒寒甚則熱發善驚如有所見此肺瘧證也若人本來語聲雄恍惚爾不亮拖氣用力方得出言而反於常人呼共語直視不應雖曰未病勢當不久此即肺病聲之候也察病觀疾表裡相應依源審治乃不失也心病為瘧者令人心煩其病欲飲清水多寒少熱甚若人本來心性和雅而急卒反於常倫或言未竟便住以手剔腳爪此久必死禍雖未及呼曰行屍此心病聲之候也虛則補之實則瀉之不可治者明而察之肝病為瘧者令人色蒼蒼然氣息喘悶戰掉狀如死者若人本來少於悲恚忽爾嗔怒出言反常乍寬乍急言未竟以手向眼如有所思若不即病禍必至矣此肝病聲之候也其人若虛則為寒風所傷若實則為熱氣所損陽則瀉之陰則補之脾病為瘧者令人寒則腹中痛熱則腸中鳴鳴已汗出若其人本來少於喜怒而忽反常瞋喜無度正言鼻笑不答於人此是脾病聲之候也不盈旬月禍必至也腎病為瘧者令人悽悽然腰脊痛而宛轉大便澀自掉不定手足而寒若人本來不喜不怒忽然謇而好瞋怒反於常性此腎已傷雖未發覺是其候也見人未言而前開口笑還閉口不聲舉手柵腹此是腎病聲之候虛實表裡浮沉清濁宜以察之逐以治之夫瘧脈者自弦弦數多熱弦遲多寒弦小緊者可下之弦遲者溫藥已脈數而緊者可發其汗宜針灸之脈浮大者不可針灸可吐之凡瘧先發如食傾乃可以治之過之則失時二溫瘧候夫溫瘧與寒瘧安舍溫瘧者得之冬中於風寒寒氣藏於骨髓之中至春則陽氣大發邪氣不能出因遇大暑腦髓爍脈肉消釋腠理發泄因有所用力邪氣與汗偕出此病藏於腎其氣先從內出之於外如此則陰虛而陽盛則熱衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧瘧先寒而後熱此由夏傷於大暑汗大出腠理開發因遇夏氣淒滄之水寒寒之藏於腠理皮膚之中秋傷於風則病盛矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒亦以時作名曰溫瘧夫病瘧六七日但見熱者溫瘧矣三痎瘧候夫痎瘧者夏傷於暑也其病秋則寒甚冬則寒輕春則惡風夏則多汗者然其蓄作有時以瘧之始發先起於毫毛伸欠乃作寒慄鼓頷腰脊痛寒去則外內皆熱頭痛而渴欲飲何氣使然此陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實陽虛陽明虛則寒慄鼓頷巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴欲飲此得之夏傷於暑熱氣盛藏之於皮膚之間腸胃之外此榮氣之所舍此令汗出空疏腠理開因得秋氣汗出遇風乃得之及以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行陽夜行於陰此氣得陽如外出得陰如內搏內外相搏是以日作其間日而作者謂其氣之舍深內搏於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作四間日瘧候此由邪氣與衛氣俱行於風府而有時相失不相得故邪氣內搏五臟則道遠氣深故其行遲不能與衛氣偕出是以間日而作也五風瘧候夫瘧皆生於風風者陽氣也陽主熱故衛氣每至於風府則腠理開開則邪入邪入則病作先傷於風故發熱而後寒慄六癉瘧候夫癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及之陰故但熱而不寒熱氣內藏於心而外舍分肉之間令人消鑠脫肉故命曰癉瘧其狀但熱不寒陰氣先絕陽氣獨發則少氣煩惋手足熱而嘔也七山瘴瘧候此病生於嶺南帶山瘴之氣其狀發寒熱休作有時皆由山溪源嶺嶂濕毒氣故也其病重於傷暑之瘧八痰實瘧候痰實瘧者謂患人胸膈先有停痰結實因成瘧病則令人心下脹滿氣逆煩嘔也九寒熱瘧候夫瘧者風寒之氣也邪並於陰則寒並於陽則熱故發作皆寒熱也十往來寒熱瘧候此由寒氣並於陰則發寒風氣並於陽則發熱陰陽二氣更實更虛故寒熱更往來也十一寒瘧候此由陰陽相併陽虛則陰勝陰勝則寒寒發於內而並於外所以內外俱寒故病發但戰慄而鼓頷頤也十二勞瘧候凡瘧積久不瘥者則表裡俱虛客邪未散真氣不復故疾雖暫間小勞便發十三發作無時瘧候夫衛氣一日一夜大會於風府則腠理開腠理開則邪入邪入則病作當其時陰陽相併隨其所勝故生寒熱故動作皆有早晏者若腑臟受邪內外失守邪氣妄行所以休作無時也十四久瘧候夫瘧皆由傷暑及傷風所為熱盛之時發汗吐下過度腑臟空虛榮衛傷損邪氣伏藏所以引日不瘥仍故休作也夫瘧歲歲發至三歲發連月發不解脅下有痞治之不得攻其痞但得虛其津液先其時發其汗服湯已先小寒者引衣自溫覆汗出小便自引利即愈也
