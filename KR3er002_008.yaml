body:
  text: 卷之八傷寒病諸候下凡四十四論三十四傷寒餘熱候傷寒病其人或未發汗吐下或經服藥以後而脈洪大實數腹內脹滿小便赤黃大便難或煩或渴面色變赤此為腑臟有結熱故也三十五傷寒五臟熱候傷寒病其人先苦身熱嗌乾而渴飲水即心下滿灑淅身熱不得汗惡風時咳逆者此肺熱也若其人先苦身熱嗌乾而小腹繞臍痛腹下滿狂言默默惡風欲嘔者此肝熱也若其人行若手掌心熱煩心欲嘔身熱心下滿口乾不能多飲目黃汗不出欲得寒水時妄笑者此心熱也若其人先苦身熱四肢不舉足脛寒腹滿欲嘔而泄惡聞食臭者此脾熱也若其人先苦嗌乾內熱連足脛腹滿大便難小便赤黃腰脊痛者此腎熱也三十六傷寒變成黃候陽明病無汗小便不利心中懊憹必發黃若被火額上微汗出而但小便不利亦發黃其人狀變黃如橘色或如桃枝色腹微滿此由寒濕氣不散瘀熱在於脾胃故也三十七傷寒心腹脹滿痛候此由其人先患冷癖因發熱病服冷藥及飲冷水結在心下此為臟虛動於舊癖故也或吐下以後病不解內外有熱故心腹脹滿痛此為有實也三十八傷寒宿食不消候此謂被下後六七日不大便煩熱不解腹滿而痛此為胃內有干糞挾宿食故也或先患寒癖因有宿食又感於傷寒熱氣相搏故宿食不消三十九傷寒大便不通候傷寒陽脈微而汗出少為自和汗出多為太過陽明脈實因發其汗汗出多者亦為太過太過者陽氣絶於里陽氣絶於里則津液竭熱結在內故大便牢而不通也四十傷寒小便不通候傷寒發汗後而汗出不止津液少胃內極干小腸有伏熱故小便不通四十一傷寒熱毒利候此由表實裡虛熱氣乘虛而入攻於腸胃則下黃赤汁此熱毒所為也四十二傷寒膿血利候此由熱毒傷於腸胃故下膿血如魚腦或如爛肉汁壯熱而腹痛此濕毒氣盛故也四十三傷寒利候傷寒病若表實裡虛熱乘虛而入攻於腸胃則下黃赤汁若濕毒氣盛則腹痛壯熱下膿血如魚腦或如爛肉汁若寒毒入胃則腹滿身熱下清穀下清穀者不可攻其表汗出必脹滿表裡俱虛故也傷寒六七日不利更發熱而利者其人汗出不止者死但有陰無陽故也下利有微熱其人渴脈弱者今自愈脈沉弦者下重其脈大者為未止脈微弱數者為欲自止雖發熱不死少陰病八九日而身手足盡熱熱在膀胱必便血下利脈浮數尺中自滑其人必清膿血少陰病下利若利止惡寒而拳手足溫者可治也陽明病下利其脈浮大此皆為虛弱強下之故傷寒下利日十餘行其脈反實死四十四傷寒病後胃氣不和利候此由初受病時毒熱氣盛多服冷藥以自瀉下病折以後熱勢既退冷氣乃動故使心下愊牢噫噦食臭腹內雷鳴而泄利此由脾胃氣虛冷故也四十五傷寒上氣候此由寒毒氣傷於太陰經也太陰者肺也肺主氣肺虛為邪熱所客客則脹脹則上氣也四十六傷寒咳嗽候此由邪熱客於肺也上焦有熱其人必飲水水停心下則肺為之浮肺主於咳水氣乘之故咳嗽四十七傷寒衄血候傷寒病血衄者此由五臟熱結所為也心主於血肝藏於血熱邪傷於心肝故衄血也衄者鼻血出也肺主於氣而開竅於鼻血隨氣行所以從鼻出陽明病口燥但欲漱水不欲咽者必衄衄家不可攻其表汗出額上菹急而緊直視而不能眴不得眠亡血不可攻其表汗出則寒栗而振脈浮緊發熱其身無汗自衄者愈四十八傷寒吐血候此由諸陽受邪熱初在表應發汗而汗不發致使熱毒入深結於五臟內有瘀積故吐血四十九傷寒陰陽毒候夫欲辨陰陽毒病者始得病時可看手足指冷者是陰不冷者是陽若冷至一二三寸病微若至肘膝為病極過此難治陰陽毒病無常也或初得病便有毒或服湯藥經五六日以上或十餘日後不瘥變成毒者其候身重背強喉咽痛糜粥不下毒氣攻心心腹煩痛短氣四肢厥逆嘔吐體如被打發斑此皆其候重過三日則難治陽毒者面目赤或便膿血陰毒者面目青而體冷若發赤斑十生一死若發黑斑十死一生陽毒為病面赤斑斑如錦紋喉咽痛清便膿血七日不治五日可治九日死十一日亦死五十壞傷寒候此謂得病十二日以上六經俱受病訖或已發汗吐下而病證不解邪熱留於腑臟致令病候多變故曰壞傷寒本太陽病不解轉入少陽脅下牢滿乾嘔不能食往來寒熱尚未吐下其脈沉緊與小柴胡湯若已吐下發汗溫針譫語飲柴胡證罷此為壞病知犯何逆以法治之寸口脈洪而大數而滑洪大榮氣長滑數胃氣實榮長陽即盛郁怫不得出胃實即牢大便難即乾燥三焦閉塞津液不通醫發其汗陽氣盛不用復重下之胃燥熱蓄大便遂儐小便不利榮衛相搏煩心發熱兩目如火鼻乾面正赤舌燥齒黃焦大渴故過經成壞病五十一傷寒百合病百合病者謂無經絡百脈一宗悉致病也多因傷寒虛勞大病之後不平復變成斯疾也其狀意欲食復不能食常默默欲得臥復不得臥欲出行復不能行飲食或有美時或有不用飲時如強健人而臥不能行如有寒復如無寒如有熱復如無熱口苦小便赤黃百合之病諸藥不能治得藥則劇吐利如有神靈者身形如和其人脈微數每尿輒頭痛其病六十日乃愈若尿頭不痛淅淅然者四十日愈若尿快然但眩者二十日愈體證或未病而預見或病四五日而出或病二十日一月微見其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也四十三日當愈各隨其證以治之耳五十二傷寒狐惑候夫狐惑二病者是喉陰之為病也初得狀如傷寒或因傷寒而變成斯病其狀默默欲眠目瞑不得眠臥起不安蟲食於喉咽為惑食於陰肛為狐惡飲食不欲聞食臭其人面目翕赤翕黑翕白食於上部其聲嗄食於下部其咽乾此皆由濕毒氣所為也五十三傷寒濕䘌候凡得傷寒時氣熱病腹內有熱又人食少腸胃空虛三蟲行作求食食人五臟及下部䘌病之候齒齦無色舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠如此皆為蟲食其肛肛爛見五臟即死當數看其上唇內有瘡唾血唇內如粟瘡者則心內懊憹此蟲在上食其五臟下唇內生瘡者其人不寤此蟲食下部皆能殺人五十四傷寒下部痛候此由大腸偏虛毒氣衝於肛門故下部卒痛甚者痛如鳥啄五十五傷寒病後熱不除候此謂病已間五臟尚虛客邪未散真氣不復故旦暮猶有餘熱如瘧狀此非真實但客熱也五十六傷寒病後渴候此謂經發汗吐下以後腑臟空虛津液竭絶腎家有餘熱故渴五十七傷寒病後不得眠候夫衛氣晝行於陽夜行於陰陰主夜夜主臥謂陽氣盡陰氣盛則目瞑矣今熱氣未散與諸陽並所以陽獨盛陰偏虛雖復病後仍不得眠者陰氣未復於本故也五十八傷寒病後虛羸候其人血氣先虛復為虛邪所中發汗吐下之後經絡損傷陰陽竭絶熱邪始散真氣尚少五臟猶虛穀神未復無津液以榮養故虛羸而生病焉五十九傷寒病後不能食候此由陽明太陰受病被下之後其熱已除而脾胃為之虛冷穀氣未復故不能食也六十傷寒病後虛汗候夫諸陽在表陽氣虛則自汗心主於汗心臟偏虛故其液妄出也六十一傷寒內有瘀血候夫人先瘀結在內因傷寒病若熱搏於久瘀則發熱如狂若有寒則小腹滿小便反利此為血瘀宜下之其脈沉結者血證諦也六十二傷寒毒攻眼候肝開竅於目肝氣虛熱乘虛上衝於目故目赤痛重者生瘡翳白膜瘜肉六十三傷寒毒攻手足候此由熱毒氣從內而出循經絡攻於手足也人五臟六腑井滎俞皆出於手足指故毒從臟腑而出六十四傷寒毒流腫候人陰陽俱虛濕毒氣與風熱相搏則榮衛澀榮衛澀則血氣不散血氣不散則邪熱致壅隨其經絡所生而流腫也六十五傷寒病後腳氣候此謂風毒濕氣滯於腎經腎主腰腳今腎既濕故腳弱而腫其人小腸有餘熱即小便不利則氣上腳弱而氣上故為腳氣也六十六傷寒病後霍亂候霍亂吐下利止後更發熱傷寒其脈微澀本是霍亂今是傷寒卻四五日至陰經上轉入陰當利本素嘔下利者不治若其人似欲大便但反失氣而仍不利是為更屬陽明便必強二十二日愈所以然者經竟故也下利後便當強強則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈若不愈者不屬陽明也惡寒脈浮而後利利止必亡血六十七傷寒病後瘧候病後邪氣未散陰陽尚虛因為勞事致二氣交爭陰勝則發寒陽勝則發熱故寒熱往來有時休作而成瘧也六十八傷寒病後渴利候此謂大渴飲水而小便多也其人先患勞損大病之後腎氣虛則熱熱乘之則腎燥腎燥則渴渴則引水腎虛則不能制水故飲水數升小便亦數升名曰渴利也六十九傷寒肺痿候大發汗後因復下之則亡津液而小便反利者此為上虛不能制於下也虛邪中於肺肺痿之病也欲咳而不能唾濁涎沫此為肺痿之病也七十傷寒失聲候邪客於肺肺主聲而通於氣今外邪與真氣相搏真氣虛而邪氣勝故聲為之不通也七十一傷寒夢泄精候邪熱乘於腎則陰氣虛陰氣虛則夢交通腎藏精今腎虛不能制於精故因夢而泄七十二傷寒勞復候傷寒病新瘥津液未復血氣尚虛若勞動早更復成病故勞復也若言語思慮則勞神梳頭澡洗則勞力勞則生熱熱氣乘虛還入經絡故復病也其脈沉緊者宜下之七十三傷寒病後食復候傷寒病新瘥及大病之後脾胃尚虛穀氣未復若食豬肉腸血肥魚及油膩物必大下利醫所不能治也必至於死若食餅餌𦻎黍飴餔𧴩鱠棗栗諸果脯物及牢強難消之物胃氣虛弱不能消化必更結熱適以藥下之則胃氣虛冷大利難禁不下之必死下之亦危皆難救也大病之後多坐此死不可不慎護也夫病之新瘥後但得食糜粥寧少食乃飢慎勿飽不得他有所食雖思之勿與引日轉久可漸食羊肉糜若羹慎不可食豬狗等肉七十四傷寒病後令不復候傷寒病後多因勞動不節飲食過度更發於病名之為復復者謂復病如初也此由經絡尚虛血氣未實更致於病耳令預服藥及為方法以防之故云令不復也七十五傷寒陰陽易候陰陽易病者是男子婦人傷寒病新瘥未平復而與之交接得病者名為陰陽易也其男子病新瘥未平復而婦人與之交接得病者名陽易其婦人得病新瘥未平復而男子與之交接得病者名陰易若二男二女並不相易所以呼為易者陰陽相感動其毒度著於人如換易也其得病之狀身體重小腹裡急或引陰中拘攣熱上衝胸頭重不能舉眼內生䁾四肢拘急小腹㽲痛手足拳皆即死其亦有不即死者病苦小腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱氣血虛骨髓空竭便恍恍吸吸氣力轉少著床不能搖動起居仰人或引歲月方死七十六傷寒交接勞復候夫傷寒病新瘥未滿百日氣力未平復而以房室者略無不死也有得此病愈後六十日其人已能行射獵因而房室即吐涎而死病雖云瘥若未平復不可交接必小腹急痛手足拘拳二時之間亡範汪方云故督郵顧子獻得病已瘥未健詣華敷視脈敷曰雖瘥尚虛未平復陽氣不足勿為勞事也余勞尚可女勞即死臨死當吐舌數寸獻婦聞其瘥從百餘里來省之住數宿止交接之間三日死婦人傷寒雖瘥未滿百日氣血骨髓未牢實而合陰陽快者當時乃未即覺惡經日則令百節解離經絡緩弱氣血虛骨髓空竭便恍恍吸吸氣力不足著床不能動搖起居仰人食如故是其證也丈夫亦然其新瘥虛熱未除而快意交接者皆即死若瘥後與童男交接者多不發覆復者亦不必死七十七傷寒令不相染易候傷寒之病但人有自觸冒寒毒之氣生病者此則不染著他人若因歲時不和溫涼失節人感其乖戾之氣而發病者此則多相染易故須預服藥及為方法以防之
