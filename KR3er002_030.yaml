body:
  text: 卷之三十唇口病諸候凡十七論一口舌瘡候手少陰心之經也心氣通於舌足太陰脾之經也脾氣通於口腑臟熱盛熱乘心脾氣衝於口與舌故令口舌生瘡也診其脈浮則為陽陽數者口生瘡其湯熨針石別有正方補養宣導今附於後養生方導引法云凡人常覺脊背崛強不問時節縮咽膊內仰面努膊井向上頭左右兩向挼之左右三七一住待血氣行動定然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰如用辰別二七除寒熱病脊腰頸項痛風痹口內生瘡牙齒風頭眩終盡除也二緊唇候脾與胃合胃為足陽明其經脈起於鼻環於唇其支脈入絡於脾脾胃有熱氣發於唇則唇生瘡而重被風邪寒濕之氣搏於瘡則微腫濕爛或冷或熱乍瘥乍發積月累年謂之緊唇亦名瀋唇三唇瘡候脾與胃合足陽明之經胃之脈也其經起於鼻環於唇其支脈入絡於脾脾胃有熱氣發於唇則唇生瘡四唇生核候足陽明為胃之經其支脈環於唇入絡於脾然脾胃為表裡有風熱邪氣乘之而沖發於唇與血氣相搏則腫結外為風冷乘其結腫不消則成核五口吻瘡候足太陰為脾之經其氣通於口足陽明為胃之經手陽明為大腸之經此二經脈交併於口其腑臟虛為風邪濕熱所乘氣發於脈與津液相搏則生瘡恆濕爛有汁世謂之肥瘡亦名燕口瘡六唇口面皴候唇口面皴者寒時觸冒風冷冷折腠理傷其皮膚故令皴劈經絡之氣諸陽之會皆在於面其脈有環唇夾於口者若血氣實者雖勁風嚴寒不能傷之虛則腠理於面受邪故得風冷而皴劈也又冬時以暖湯洗面及向火外假熱氣動於腠理而觸風冷亦令病皴七兔缺候人有生而唇缺似兔唇故謂之兔缺世云由婦人妊娠時見兔及食兔肉使然八口臭候口臭由五臟六腑不調氣上胸膈然腑臟氣臊腐不同蘊積胸膈之間而生於熱沖發於口故令臭也養生方云空腹不用見臭屍氣入脾舌上白黃起口常臭也九口舌乾焦候手少陰心之經也其氣通於舌足太陰脾之經也其氣通於口腑臟虛熱氣乘心脾津液竭燥故令口舌乾焦也診其右手寸口名曰氣口以前脈沉為陰手太陰肺之經也其脈虛者病苦少氣不足以息嗌乾無津液故也又右手關上脈浮為陽足陽明胃之經也其脈虛者病苦唇口乾又左手關上脈浮為陽足少陽膽之經也其脈實者病苦腹中滿飲食不下咽乾十舌腫強候手少陰為心之經其氣通於舌足太陰脾之經其氣通於口太陰之脈起於足大指入連舌本心脾虛為風熱所乘邪隨脈至舌熱氣留心血氣壅澀故舌腫舌腫脈脹急則舌腫強十一謇吃候人之五臟六腑稟四時五行之氣陰陽相扶剛柔相生若陰陽和平血氣調適則言語無滯吐納應機若陰陽之氣不和腑臟之氣不足而生謇吃此則稟性有闕非針藥所療治也若腑臟虛損經絡受邪亦令語言謇吃所以然者心氣通於舌脾氣通於口脾脈連舌本邪乘其臟而搏於氣發言氣動邪隨氣而干之邪氣與正氣相交搏於口舌之間脈則痞澀氣則壅滯亦令言謇吃此則可治養生方云憤滿傷神神通於舌損心則謇吃十二重舌候舌心之候也脾之脈起於足大指入連於舌本心脾有熱熱氣隨脈衝於舌本血脈脹起變生如舌之狀在於舌本之下謂之重舌十三懸癰腫候懸癰為音聲之關也喉嚨氣之所上下五臟六腑有伏熱上衝於喉咽熱氣乘於懸癰或長或腫十四咽喉垂倒候喉嚨者氣之所上下也五臟六腑呼吸之道路腑臟有風邪熱氣上衝咽喉則腫垂故謂之垂倒十五失欠頷車蹉候腎主欠陰陽之氣丁引則欠諸陽之筋脈有循頷車者欠則動於筋脈筋脈挾有風邪邪因欠發其急疾故令失欠頷車蹉也十六數欠候腎主欠而腎為陰也陽氣主上陰氣主下其陰積於下者而陽未盡陽引而上陰引而下陰陽相引二氣交爭而挾有風者欠則風動風動與氣相擊故欠數十七失枕候失枕頭項有風在於筋之間因臥而氣血虛者值風發動故失枕咽喉心胸病諸候凡十一論一喉痹候喉痹者喉里腫塞痹痛水漿不得入也人陰陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結蘊積而生熱故喉腫塞而痹痛脈沉者為陰浮者為陽若右手關上脈陰陽俱實者是喉痹之候也亦令人壯熱而惡寒七八日不治則死其湯熨針石別有正方補養宣導今附於後養生方導引法云兩手拓兩頰手不動摟肘使急腰內亦然住定放兩肘頭向外肘膊腰氣散盡勢大悶始起來去七通去喉痹又云一手長舒令掌仰一手捉頦挽之向外一時極勢二七左右亦然手不動兩向側極勢急挽之二七去頸骨急強頭風腦旋喉痹膊內冷注偏風二馬喉痹候馬喉痹者謂熱毒之氣結於喉間腫連頰而微壯熱煩滿而數吐氣呼之為馬喉痹三喉中生谷賊不通候谷賊者禾里有短穗而強澀者是也誤作米而人食之則令喉里腫結不通今風熱氣在於喉間與血氣相搏則生腫結如食谷賊者也故謂之喉中生谷賊不急治亦能殺人四狗咽候喉內忽有氣結塞不通世謂之狗咽此由風熱所作與喉痹之狀相似但俗云誤吞狗毛所作又云治此病者以一摶飯共狗分食便瘥所以謂之狗咽五咽喉瘡候咽喉者脾胃之候也由脾胃熱其氣上衝喉咽所以生瘡其瘡或白頭或赤根皆由挾熱所致六屍咽候屍咽者謂腹內屍蟲上食人喉咽生瘡其狀或癢或痛如甘䘌之候七喉咽腫痛候喉咽者脾胃之候氣所上下脾胃有熱熱氣上衝則喉咽腫痛夫生腫痛者皆挾熱則為之若風毒結於喉間其熱盛則腫塞不通而水漿不入便能殺人八喉癰候六腑不和血氣不調風邪客於喉間為寒所折氣壅而不散故結而成癰凡結腫一寸為癤二寸至五寸為癰九咽喉不利候腑臟冷熱不調氣上下哽澀結搏於喉間吞吐不利或塞或痛故言喉咽不利十心痹候思慮煩多則操損心心虛故邪乘之邪積而不去則時害飲食心裡愊愊如滿蘊蘊而痛是謂之心痹診其脈沉而弦者心痹之候也十一胸痹候寒氣客於五臟六腑因虛而發上衝胸間則胸痹胸痹之候胸中愊愊如滿噎塞不利習習如癢喉里澀唾燥甚者心裡強痞急痛肌肉苦痹絞急如刺不得俯仰胸前皮皆痛手不能犯胸滿短氣咳唾引痛煩癖白汗出或徹背膂其脈浮而微者是也不治數日殺人其湯熨針石別有正方補養宣導今附於後養生方云以右足踐左足上除胸痹食熱嘔四肢病諸候凡十四論一代指候代指者其指先腫焮焮熱痛其色不黯然後方緣爪甲邊結膿極者爪甲脫也亦名代甲亦名糟指亦名土𣦶灬火彡一作灶夫爪甲筋之餘也由筋骨熱盛氣澀不通故腫結生膿而爪甲脫二手足發胝候人手足忽然皮厚澀而圓短如繭者謂之胼胝此由血氣沉行不榮其表故皮澀厚而成胝三手足逆鱸候手足爪甲際皮剝起謂之逆鱸風邪入於腠理血氣不和故也四肉刺候腳趾間生肉如刺謂之肉刺肉刺者由著靴急小趾相揩而生也五肉裂候肉裂者皮急肉坼破也由腠理虛風邪乘之與血氣相沖擊隨所擊處而肉坼裂也六手足皸裂候皸裂者肌肉破也言科時觸冒風寒手足破故謂之皸裂七屍腳候屍腳者腳跟坼破之名也亦是冬時觸犯寒氣所以然又言腳踏死屍所臥地亦令腳坼破八足尰候尰病者自膝以下至踝及趾俱腫直是也皆由血氣虛弱風邪傷之經絡痞澀而成也亦言江東諸山縣人多病尰云彼土有草名尰草人行誤踐觸之則令病尰九五指筋攣不得屈伸候筋攣不得屈伸者是筋急攣縮不得伸也筋得風熱則弛縱得風冷則攣急十四肢痛無常處候四肢痛無常處者手足指節皆卒然而痛不在一處其痛處不腫色亦不異但肉裡掣痛如錐刀所刺由體虛受於風邪風邪隨氣而行氣虛之時邪氣則勝與正氣交爭相擊痛隨虛而生故無常處也十一腳跟頹候腳跟頹者腳跟忽痛不得著地世呼為腳跟頹十二腳中忽有物牢如石如刀錐所刺候言腳下有結物牢硬如石痛如錐刀所刺此由腎經虛風毒之氣傷之與血氣相擊故痛而結硬不散十三土落腳趾內候此由腳趾先有瘡而土落瘡里更令瘡腫痛亦令人憎寒壯熱十四腳破候腳破者腳心坼開也世謂之腳破腳心腎脈所出由腎氣虛風邪客於腠理致使津液不榮故坼破也
