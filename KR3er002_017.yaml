body:
  text: 卷之十七痢病諸候凡四十論一水穀痢候水穀痢者由體虛腠理開血氣虛春傷於風邪氣留連在肌肉之內後遇脾胃大腸虛弱而邪氣乘之故為水穀痢也脾與胃為表裡胃者脾之腑也為水穀之海脾者胃之臟也其候身之肌肉而脾氣主消水穀水穀消其精化為榮衛中養臟腑充實肌膚大腸肺之腑也為傳導之官變化出焉水穀之精化為血氣行於經脈其糟粕行於大腸也肺與大腸為表裡而肺主氣其候身之皮毛春陽氣雖在表而血氣尚弱其飲食居處運動勞役血氣虛者則為風邪所傷客在肌肉之間後因脾胃氣虛風邪又乘虛而進入於腸胃其脾氣弱則不能剋制水穀故糟粕不結聚而變為痢也又新食竟取風名為胃風其狀惡風頭多汗膈下塞不通食飲不下腹滿形瘦腹大失衣則瞋滿食寒則洞泄其洞泄者痢無度也若胃氣竭者痢絶則死診其脈微手足寒難治也脈大手足溫易治下白沫脈沉則生浮則死身不熱脈不懸絶滑大者生懸澀者死以臟期之也脈絶而手足寒者死脈還手足溫者生脈不還者死脈緩時小結生洪大數者死懸絶而澀者死細微而澀者緊大而滑者死得代絶脈者亦死養生方云秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣精此秋氣之應也養收之道也逆之則傷肺冬為飧泄又云五月勿食未成核果及桃棗發癰癤不爾發寒熱變黃疸又為泄痢二久水穀痢候夫久水穀痢者由脾胃大腸虛弱風邪乘之則泄痢虛損不復遂連滯涉引歲月則為久痢也然痢久則變嘔噦胃弱氣逆不下食故嘔逆也氣逆而外冷氣乘之與胃氣相折不通故噦也嘔又變為䘌蟲動食於五臟也凡諸蟲在人腹內居腸胃之間痢則腸胃虛弱蟲動侵食若上食於臟則心悶齒齦紫黑唇白齒齦生瘡下食於肛門則穀道傷爛而開也亦有變為水腫所以然者水氣入胃腸虛則泄大腸金也脾土也金土母子也脾候身之肌肉性本克消水穀也痢由脾弱腸虛金土氣衰母子俱病不復相扶不能剋水致水氣流溢浸漬肌肉故變腫也亦有不及成腫而五臟傷敗水血並下而五臟五色隨之而出謂之五液俱下也凡如此者多死而嘔噦腫䘌治之時有瘥者若五液俱下者必死五臟傷敗故也三赤白痢候凡痢皆由榮衛不足腸胃虛弱冷熱之氣乘虛入客於腸間腸虛則泄故為痢也然其痢而赤白者是熱乘於血血滲腸內則赤也冷氣入腸搏於腸間津液凝滯則白也冷熱相交故赤白相雜重者狀如膿涕而血雜之輕者白膿上有赤脈薄血狀如魚脂腦世謂之魚腦痢也四久赤白痢候久赤白痢者是冷熱不調熱乘於血血滲腸間與津液相雜而下甚者腸虛不復故赤白連滯久不瘥也凡痢久不瘥脾胃虛弱則變嘔噦胃弱氣逆故嘔也氣逆而外有冷折之不通故噦亦變為䘌蟲食人五臟也三尸九蟲常居人腸胃腸胃虛則動上食於五臟則心懊而悶齒齦唇口並生瘡下食於腸則肛門傷爛而穀道開也輕者可治重者致死也五赤痢候此由腸胃虛弱為風邪所傷則挾熱熱乘於血則血流滲入腸與痢相雜下故為赤痢六久赤痢候久赤痢者由體虛熱乘於血血滲腸間故痢赤腸胃虛不平復其熱不退故經久不瘥胃氣逆則變嘔噦也胃虛穀氣衰蟲動侵食則變為䘌七血痢候血痢者熱毒折於血血滲入大腸故也血之隨氣循環經絡通行臟腑常無停積毒熱氣乘之遇腸虛者血滲入於腸腸虛則泄故為血痢也身熱者死身寒者生診其關上脈芤大便去血暴下血數升也八久血痢候此由體虛受熱熱折於血血滲入腸故成血痢熱不歇胃虛不復故痢血久不瘥多變嘔噦及為濕䘌九膿血痢候夫春陽氣在表人運動勞役腠理則開血氣虛者傷於風至夏又熱氣乘之血性得熱則流散其遇大腸虛血滲入焉與腸間津液相搏積熱蘊結血化為膿腸虛則泄故成膿血痢也所以夏月多苦膿血痢腸胃虛也診其脾脈微澀者為內潰多下血膿又脈懸絶則死滑大則生脈微小者生實急者死脈沉細虛遲者生數疾大而有熱者死十久膿血痢候久膿血痢者熱毒乘經絡血滲腸內則變為膿血痢熱久不歇腸胃轉虛故痢久不斷皆變成濕䘌及嘔噦也十一冷痢候冷痢者由腸胃虛弱受於寒氣腸虛則泄故為冷痢也凡痢色青色白色黑並皆為冷痢色黃色赤並是熱也故痢色白食不消謂之寒中也診其脈沉則生浮則死也十二久冷痢候久冷痢者由腸虛而寒積故冷痢久不斷也而廩丘公說云諸下悉寒也凡人腸中大便有寒則常鴨溏有熱則儐硬人見病身體發熱而下便謂熱下非也平常恆自將節飲食衣被調適其人無宿寒者大便自調強人適發越薄衣冷飲食表有熱不覺里冷而胃內潛冷冷即下也今始發熱而下當與理中湯加大附子一枚連服三四劑重覆令微汗出微汗出則熱除不復思冷胃氣溫暖下與發熱俱瘳矣宿寒之家其人常自患冷躡濕地若足踏凍地或衣被薄皆發風下最惡何謂風下當風吹腰腹冷氣徹里而暴下者難治也久痢胃虛氣逆則變嘔嘔而氣逆遇冷折之氣逆不通則變噦亦變濕䘌也胃虛蟲動故也十三熱痢候此由腸胃虛弱風邪挾熱乘之腸虛則泄故為熱痢也其色黃若熱甚黃而赤也十四久熱痢候此由腸虛熱積其痢連滯故久不瘥也痢久胃氣虛則變嘔嘔而氣逆遇冷折之氣不通則變噦亦變濕䘌也胃虛蟲動故也十五冷熱痢候夫冷熱痢者由腸胃虛弱宿有寒而為寒熱所傷冷熱相乘其痢乍黃乍白是也若熱搏於血血滲腸間則變為血痢也而冷伏腸內搏津液則變凝白則成白滯亦變赤白痢也其湯尉針石別有正方補養宣導今附於後養生方導引法云泄下有寒者微引氣以息內腹徐吹息以鼻引氣氣足復前即愈其有熱者微呼以去之十六雜痢候雜痢謂痢色無定或水穀或膿血或青或黃或赤或白變雜無常或雜色相兼而痢也挾熱則黃赤熱甚則變膿血也冷則白冷甚則青黑皆由飲食不節冷熱不調胃氣虛故變易十七休息痢候休息痢者胃脘有停飲因痢積久或冷氣或熱氣乘之氣動於飲則飲動而腸虛受之故為痢也冷熱氣調其飲則靜而痢亦休也腸胃虛弱易為冷熱其邪氣或動或靜故其痢乍發乍止謂之休息痢也十八白滯痢候白滯痢者腸虛而冷氣客之搏於腸間津液凝滯成白故為白滯痢也十九痢如膏候痢如膏者是由臟腑虛冷冷氣入於大腸成痢冷氣積腸又虛滑脂凝如膏也二十蠱注痢候此由歲時寒暑不調則有濕毒之氣傷人隨經脈血氣漸至於臟腑大腸虛者毒氣乘之毒氣挾熱與血相搏則成血痢也毒氣侵食於臟腑如病蠱注之家痢血雜膿瘀黑有片如雞肝與血雜下是也二十一腸蠱痢候腸蠱痢者冷熱之氣入在腸間先下赤後下白連年不愈侵傷於臟腑下血雜白如病蠱之狀名為腸蠱痢也二十二下痢便腸垢候腸垢者腸間津汁垢膩也由熱痢蘊積腸間虛滑所以因下痢而便腸垢也二十三不伏水土痢候夫四方之氣溫涼不同隨方嗜欲因以成性若移其舊土多不習伏必因飲食以入腸胃腸胃不習便為下痢故名不伏水土痢也即水穀痢是也二十四嘔逆吐痢候嘔逆吐痢者由腸胃虛邪氣並之臟腑之氣自相乘克也脈經云心乘肝則吐痢心火也肝木也火木子母也火乘於木子扶母也此為二臟偏實也大腸金也胃土也金土母子也大腸虛則金氣衰微不能扶土致令胃氣虛弱此兩腑偏虛也木性剋土火性剋金是為火木相扶心肝俱盛而金畏於火土畏於木則為腸胃皆弱腸虛弱則泄痢胃虛弱則嘔吐故嘔逆而復吐痢也診其關上脈數其人吐跗陽脈微而澀微則下痢澀即吐逆也二十五痢兼煩候春傷於風邪氣留連因飲食不節腸胃虛弱邪氣乘之則變為痢痢則腑臟俱虛水氣相併上乘於心心氣不宣暢痞滿在內故令痢而兼煩者也二十六痢兼渴候夫水穀之精化為血氣津液以養臟腑臟腑虛受風邪邪入於腸胃故痢痢則津液空竭腑臟虛燥故痢而兼渴也渴而引飲則痢不止翻益水氣脾胃已虛不能克消水水氣流溢浸漬肌肉則變腫也二十七下痢口中及腸內生瘡候凡痢口裡生瘡則腸間亦有瘡也所以知者猶如傷寒熱病胃爛身則發瘡也此由挾熱痢臟虛熱氣內結則瘡生腸間熱氣上衝則瘡生口裡然腸間口裡生瘡皆胃之虛熱也胃虛穀氣弱則九蟲三尸發動則變成䘌二十八痢兼腫候痢兼腫者是痢久脾虛水氣在於肌肉之所為也脾與胃合俱象土脾候身之肌肉胃為水穀之海而以脾氣克消水穀也風邪在內腸胃虛弱則水穀變為痢也膀胱與腎合俱象水膀胱為津液之腑小腸與心合俱象火而津液之水行於小腸下為小便也土性本剋水今因痢脾胃虛弱土氣衰微不能剋制於水致令水得妄行不流於小腸而浸漬臟腑散流皮膚與氣相搏腠理壅閉故痢而腫也二十九痢穀道腫痛候是由風冷客於腸胃腸胃虛則痢痢久腸虛風邪客於肛門邪氣與真氣相搏故令腫痛也三十痢後虛煩候夫體虛受風冷風冷入於腸故痢痢後虛煩者由腑臟尚虛而氣內搏之所為也水穀之精以養臟腑痢則水穀減耗致令腑臟微弱痢斷之後氣未調理不能宣暢則膚腠還相搏臟腑臟腑既虛而使氣還相搏故令虛煩三十一痢後腫候痢後腫由脾胃尚虛肌肉為風水所乘故也脾胃虛弱受於風邪則水穀變成痢脾與胃為表裡俱象土胃為水穀之海脾候肌肉土性剋水而痢者則脾胃虛弱土氣衰微不能剋水令水妄行散溢肌肉痢雖得斷水猶未消肌肉先受風邪風水相搏膚腠閉密而成腫也三十二痢後不能食候痢後不能食由脾胃虛弱氣逆胸間之所為也風邪入於腸胃而痢痢則水穀減耗脾胃虛弱痢斷之後脾胃尚虛不勝於食邪搏於氣逆上胃弱不能食也三十三痢後腹痛候痢後腹痛者體虛受風冷風冷入於腸胃則痢後腹痛是臟氣猶虛風冷餘熱未盡臟腑未平腹冷氣在內與臟腑相搏真邪相擊故令腹痛也三十四痢後心下逆滿候痢後而心下逆滿此由臟虛心下有停飲氣逆乘之所為也風邪入腸胃則下痢下痢則腑臟虛弱痢斷之後腑臟猶未調和邪氣尚不消盡邪乘於氣則氣逆與飲食相搏而上故令心下逆滿也三十五脫肛候脫肛者肛門脫出也多因久痢後大腸虛冷所為肛門為大腸之候大腸虛而傷於寒痢而用氣𠸯其氣下衝則肛門脫出因謂脫肛也三十六大下後噦候夫風冷在內入於腸胃則成大下下斷之後脾胃虛氣逆遇冷折之其氣不通則令噦也三十七穀道生瘡候穀道肛門大腸之候也大腸虛熱其氣熱結肛門故令生瘡三十八穀道蟲候穀道蟲者由胃弱腸虛而蟯蟲下乘之也穀道肛門大腸之候蟯蟲者九蟲之內一蟲也在於腸間若腑臟氣實則蟲不妄動胃弱腸虛則蟯蟲乘之輕者或癢或蟲從穀道中溢出重者侵食肛門瘡爛三十九穀道癢候穀道癢者由胃弱腸虛則蟯蟲下侵穀道重者食於肛門輕者但癢也蟯蟲狀極細微形如今之蝸蟲狀也四十穀道赤痛候肛門為大腸之候其氣虛為風熱所乘熱氣擊搏故令穀道赤痛也
