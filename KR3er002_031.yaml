body:
  text: 卷之三十一癭瘤等病諸候凡一十五論一癭候癭者由憂恚氣結所生亦曰飲沙水沙隨氣入於脈搏頸下而成之初作與癭核相似而當頸下也皮寬不急垂捶捶然是也恚氣結成癭者但垂核捶捶無脈也飲沙水成癭者有核㿔㿔無根浮動在皮中又云有三種癭有血癭可破之有瘜肉癭可割之有氣癭可具針之養生方云諸山水黑土中出泉流者不可久居常食令人作癭病動氣增患二瘤候瘤者皮肉中忽腫起初如梅李大漸長大不痛不癢又不結強言留結不散謂之為瘤不治乃至塸大則不復消不能殺人亦慎不可輒破三腦濕候腦濕謂頭上忽生肉如角謂之腦濕言腦濕氣蘊蒸衝擊所生也四黑痣候黑痣者風邪搏於血氣變化所生也夫人血氣充盛則皮膚潤悅不生疵瘕若虛損則黑痣變生然黑痣者是風邪變其血氣所生也若生而有之者非藥可治面及體生黑點為黑痣亦云黑子五赤疵候面及身體皮肉變赤與肉色不同或如手大或如錢大亦不癢痛謂之赤疵此亦是風邪搏於皮膚血氣不和所生也六白癜候白癜者面用頸項身體皮肉色變白與肉色不同亦不癢痛謂之白癜亦是風邪搏於皮膚血氣不和所生也七癧瘍候癧瘍者人有頸邊胸前掖下自然斑剝點相連色微白而圓亦有烏色者亦無痛癢謂之癧瘍風此亦是風邪搏於皮膚血氣不和所生也八疣目候疣目者人手足邊忽生如豆或如結筋或五個或十個相連肌里粗強於肉謂之疣目此亦是風邪搏於肌肉而變生也九鼠乳候鼠乳者身面忽生肉如鼠乳之狀謂之鼠乳此亦是風邪搏於肌肉而變生也十多忘候多忘者心虛也心主血脈而藏於神若風邪乘於血氣使陰陽不和時相併隔乍虛乍實血氣相亂致心神虛損而多忘養生方云丈夫頭勿北首臥神魂不安多愁忘十一嗜眠候嗜眠者由人有腸胃大皮膚澀者則令分肉不開解其氣行則於陰而遲留其陽氣不精神明爽錯塞故令嗜眠其湯熨針石別有正方補養宣導今附於後養生方導引法云踑踞交兩手內屈腳中入且兩手急引之愈久寐精氣不明交腳踑踞凡故言踑踞以兩手從內屈腳中入左手從右趺腕上入左足隨孔下右手從左足腕上入右足隨孔下出抱兩腳急把兩手極引二通愈久寐精神不明久行則不睡長精明又云一手拓頦向上極勢一手向後長舒急努四方顯手掌一時俱極勢四七左右換手皆然拓頦手兩向共頭欹側轉身二七去臂膊風眠睡尋用永吉日康十二鼾眠候鼾眠者眠里喉咽間有聲也人喉嚨氣上下也氣血若調雖寤寐不妨宣暢氣有不和則衝擊喉咽而作聲也其有肥人眠作聲者但肥人氣血沉厚迫隘喉間澀而不利亦作聲十三體臭候人有體氣不和使精液雜穢故令身體臭也其湯熨針石別有正方補養宣導今附於後養生方云以手掩口鼻臨日微氣久許時手中生液速以手摩面目常行之使人體香十四狐臭候人腋下臭如蔥豉之氣者亦言詔狐貍之氣者故謂之狐臭此皆血氣不和蘊積故氣臭十五漏腋候腋下常濕仍臭生瘡謂之漏腋此亦是氣血不和為風邪所搏津液蘊瘀故令濕臭丹毒病諸候凡一十三論一丹候丹者人身體忽然焮赤如丹塗之狀故謂之丹或發手足或發腹上如手掌大皆風熱惡毒所為重者亦有疽之類不急治則痛不可堪久乃壞爛去膿血數升若發於節間便斷人四肢毒入腹則殺人小兒得之最忌二白丹候白丹者初發癢痛微虛腫如吹軫起不痛不赤面白色由挾風冷故使色白也三黑丹候黑丹者初發亦癢痛或熛腫起微黑色由挾風冷故色黑也四赤丹候赤丹者初發軫起大者如連錢小者如麻豆肉上慄如雞冠肌理由風毒之重故使赤也亦名茱萸丹五丹軫候丹軫者肉色不變又不熱但起隱軫相連而微癢故謂之丹也六室火丹候室火丹初發時必在腓腸如指大長三二寸皮色赤而熱是也七天灶火丹候天灶火丹發時必在於兩股里漸引至陰頭而赤腫是也八廢灶火丹候廢灶火丹發時必於足趺上而皮色赤者是也九尿灶火丹候尿灶火丹發於胸腹及臍連陰頭皆赤是也十熛火丹候熛火丹者發於背亦在於臂皮色赤是也十一瘑火丹候瘑火丹者發於髀而散走無常處著皮赤是也十二螢火丹候螢火丹者發於膊至脅皮赤是也十三石火丹候石火丹者丹發通身似纈目突如粟是也皮色青黑腫病諸候凡一十七論一諸腫候腫之生也皆由風邪寒熱毒氣客於經絡使血澀不通壅結皆成腫也其風邪所作者腫無頭無根浮在皮上如吹之狀也不赤不痛或腫或散不常腫其寒氣與血相搏作者有頭有根色赤腫痛其熱毒作者亦無正頭但急腫久不消熱氣結盛壅則為膿其候非一故謂之諸腫二風腫候凡人忽發腫或著四肢或在胸背或著頭項水牢如畔大虛腫回回如吹之狀不痛不赤著四肢者乃欲不遂令人煩滿短氣身體常冷皆由冬月遇濕風入人肌里至春復適大寒風不得出氣壅肌間不自覺至夏取風涼濕氣聚不散而成腫久不瘥氣結盛生熱乃化為膿血並皆爛敗則殺人右手關上脈浮而虛者病腫三卒風腫候人卒有腫不痛不赤移無常處而兼癢由先無患偶腠理虛而逢風所作也四風毒腫候風毒腫者其先赤痛飈熱腫上生瘭漿如火灼是也五毒腫候毒腫之候與風腫不殊時令人壯熱其邪毒甚者入腹殺人六毒腫入腹候此候與前毒腫不殊但言腫熱漸盛入腹故也毒入腹之候先令人敕嗇惡寒心煩悶而嘔逆氣急而腹滿如此者殺人七惡核腫候惡核者肉裡忽有核累累如梅李小如豆粒皮肉燥痛左右走身中卒然而起此風邪挾毒所成其亦似射工毒初得無常處多惻惻痛不即治毒入腹煩悶惡寒即殺人久不瘥則變作瘻八腫核候凡腫挾風冷則不消而結成核也九氣腫候氣腫者其狀如癰無頭虛腫色不變皮上急痛手才著便即痛此風邪搏於氣所生也十氣痛候人身忽然有一處痛如打不可堪耐亦乍走身間發作有時痛發則小熱痛靜便如冰霜所加故云氣痛亦由體虛受風邪所侵遇寒氣而折之邪氣不出故也十一惡脈候惡脈者身里忽赤絡脈起巃嵸聚如死蚯蚓狀看乍中似有水在脈中長短皆逐其絡脈所生是也由春冬受惡風入絡脈中其血瘀結所生久不瘥緣脈結而成瘻十二惡肉候惡肉者身里忽有肉如小豆突出細細長乃如牛馬乳亦如雞冠之狀不癢不痛久不治長不已由春疼被惡風所傷風入肌肉結瘀血積而生也十三腫有膿使潰候腫壯熱結盛則血化為膿若不早出膿膿食筋爛骨則不可治也十四腫潰後候凡癰腫既潰訖膿汁須及時而盡若汁不盡還復結腫如初腫之候無異即稍難治十五遊腫候遊腫之候青黃赤白無復定色遊走皮膚之間肉上微光是也十六日遊腫候日遊腫其候與前遊腫相似但手近之微痛如復小癢為異世言犯角日遊神之所作十七流腫候流腫凡有兩候有熱有冷冷腫者其痛隱隱然沉深著臂膊在背上則腫起憑憑然而急痛若手按及針灸之即腫起是也熱腫者四肢熱如火炙之狀移無常處或如手或如盤著背腹是劇則皆熱如火遍身熠熠然五心煩熱唇口乾燥如注之狀此皆風邪搏血氣所生以其移無常處故謂流腫疔瘡病諸候凡一十三論一疔瘡候疔瘡者風邪毒氣搏於肌肉所生也凡有十種一者瘡頭烏而強凹二者瘡頭白而腫實三者瘡頭如豆垽色四者瘡頭似葩紅色五者瘡頭內有黑脈六者瘡頭赤紅而浮虛七者瘡頭葩而黃八者瘡頭如金薄九者瘡頭如茱萸十得瘡頭如石榴子亦有初如風軫氣搔破青黃汁出里有赤黑脈而小腫亦有全不令人知忽以衣物觸及摸著則痛若故取便不知處亦有肉突起如魚眼之狀赤黑慘痛徹骨久結皆變至粕成瘡瘡下深孔如大針穿之狀初作時突起如丁蓋故謂之疔瘡令人惡寒四肢強痛兼忉忉然牽痛一二日瘡便變焦黑色腫大光起根硬強全不得近痠痛皆其候也在手足頭面骨節間者最急其餘處則可也毒入腹則煩悶恍惚不佳或如醉患此者三二日便死養生方云人汗入諸食內食之作疔瘡二雄疔瘡候雄疔瘡者大如錢孔烏黶似灸瘡四畔泡漿色赤又有赤粟乃言瘡而不腫刺之不痛而兼熱者名為雄疔瘡三雌疔瘡候雌疔瘡者頭小黃向里黶亦似灸瘡四畔泡漿外赤大如錢孔而多汁腫而不痛瘡內有十字畫而兼冷者謂之雌疔瘡四紫色火赤疔瘡候此瘡色紫赤如火之色即謂紫色火赤疔瘡也五牛疔瘡候牛疔瘡皮色不異但腫而頭黑挑之黃水出四邊赤似茱萸房者名為牛疔瘡六魚臍疔瘡候此瘡頭破之黃水出四畔浮漿起狹長似魚臍故謂之魚臍疔瘡七赤根疔瘡候瘡形狀如赤豆或生掖下如鴨子大者世人不識但見其赤即謂之赤根疔瘡八犯疔瘡候犯疔瘡謂疔瘡欲瘥更犯觸之若大嗔及食豬魚麻子並狐臭人氣熏之皆能觸犯之則更極乃甚於初更令瘡熱焮腫先寒後熱四肢沉重頭痛心驚嘔逆煩悶則不可治九疔瘡腫候疔瘡腫謂此瘡熱氣乘之與寒毒相搏而成腫十犯疔瘡腫候犯疔瘡腫謂瘡腫欲瘥更犯觸之瘡勢轉劇乃甚於初或腫熱疼掣或心悶恍惚或四肢沉重或嘔逆煩心此皆犯瘡之候多能殺人十一疔腫候此由是疔瘡而帶焮腫而無根者也十二疔瘡久不瘥候瘡久不瘥謂此疔瘡膿汁不止亦平陷不滿皆由過冷所作也十三犯疔腫候犯疔腫謂病疔腫而或飲食或居處觸犯之令腫增極也
