body:
  text: 卷之一風病諸候上凡二十九論一中風候中風者風氣中於人也風是四時之氣分布八方主長養萬物從其鄉來者人中少死病不從其鄉來者人中多死病其為病者藏於皮膚之間內不得通外不得泄其入經脈行於五臟者各隨臟腑而生病焉心中風但得偃臥不得傾側汗出若唇赤汗流者可治急灸心俞百壯若唇或青或黑或白或黃此是心壞為水面目亭亭時悚動者皆不可復治五六日而死肝中風但踞坐不得低頭若繞兩目連額上色微有青唇青面黃者可治急灸肝俞百壯若大青黑面一黃一白者是肝已傷不可復治數日而死脾中風踞而腹滿身通黃吐咸汁出者可治急灸脾俞百壯若手足青者不可復治腎中風踞而腰痛視脅左右未有黃色如餅粢大者可治急灸腎俞百壯若齒黃赤鬢髮直面土色者不可復治肺中風偃臥而胸滿短氣冒悶汗出視目下鼻上下兩旁下行至口色白者可治急灸肺俞百壯若色黃者為肺已傷化為血不可復治其人當妄掇空指地或自拈衣尋縫如此數日而死診其脈虛弱者亦風也緩大者亦風也浮虛者亦風也滑散者亦風也二風癔候風邪之氣若先中於陰病發於五臟者其狀奄忽不知人喉里噫噫然有聲舌強不能言發汗身軟者可治眼下及鼻人中左右上白者可治一黑一赤吐沫者不可治汗不出體直者七日死三風口噤候諸陽經筋皆在於頭手三陽之筋並結入頷頰足陽明之筋上夾於口諸陽為風寒所客則筋急故口噤不開也診其脈遲者生四風舌強不得語候脾脈絡胃夾咽連舌本散舌下心之別脈系舌本今心脾二臟受風邪故舌強不得語也五風失音不語候喉嚨者氣之所以上下也會厭者音聲之戶舌者聲之機唇者聲之扇風寒客於會厭之間故卒然無音皆由風邪所傷故謂風失音不語養生方云醉臥當風使人發喑六賊風候賊風者謂冬至之日有疾風從南方來名曰虛風此風至能傷害於人故言賊風也其傷人也但痛不可得按抑不可得轉動痛處體卒無熱傷風冷則骨解深痛按之乃應骨痛也但覺身內索索冷欲得熱物尉痛處即小寬時有汗久不去重遇冷氣相搏乃結成瘰癧及偏枯遇風熱氣相搏乃變附骨疽也七風痙候風痙者口噤不開背強而直如發癇之狀其重者耳中策策痛卒然身體痙直者死也由風邪傷於太陽經復遇寒濕則發痙也診其脈策策如弦直上下者風痙脈也八風角弓反張候風邪傷人令腰背反折不能俯仰似角弓者由邪入諸陽經故也九風口喎候風邪入於足陽明手太陽之經遇寒則筋急引頰故使口喎僻言語不正而目不能平視診其脈浮而遲者可治養生方云夜臥當耳勿得有孔風入耳中喜令口喎十柔風候血氣俱虛風邪併入在於陽則皮膚緩在於陰則腹裡急柔風之狀四肢不能收裡急不能仰十一風痱候風痱之狀身體無痛四肢不收神智不亂一臂不隨者風痱也時能言者可治不能言者不可治十二風腲退候風腲退者四肢不收身體疼痛肌肉虛滿骨節懈怠腰腳緩弱不自覺知是也由皮肉虛弱不勝四時之虛風故令風邪侵於分肉之間流於血脈之內使之然也經久不瘥即變成水病十三風偏枯候風偏枯者由血氣偏虛則腠理開受於風濕風濕客於半身在分腠之間使血氣凝澀不能潤養久不瘥真氣去邪氣獨留則成偏枯其狀半身不隨肌肉偏枯小而痛言不變智不亂是也邪初在分腠之間宜溫臥取汗益其不足損其有餘乃可復也診其胃脈沉大心脈小牢急皆為偏枯男子則發左女子則發右若不喑舌轉者可治三十日起其年未滿二十者三歲死又左手尺中神門以後脈足太陽經虛者則病惡風偏枯此由愁思所致憂慮所為其湯尉針石別有正方補養宣導今附於後養生方導引法云正倚壁不息行氣從頭至足止愈疽疝大風偏枯諸風痹又云仰兩足指五息止引腰背痹偏枯令人耳聞聲常行眼耳諸根無有挂礙又云以背正倚展兩足及指暝心從頭上引氣想以達足之十趾及足掌心可三七引候掌心似受氣止蓋謂上引泥丸下達湧泉是也又云正住倚壁不息行氣從口趣令氣至頭始止治疽痹大風偏枯又云一足踏地足不動一足向側相轉身欹勢並手盡急回左右迭互二七去脊風冷偏枯不通潤十四風四肢拘攣不得屈伸候此由體虛腠理開風邪在於筋故也春遇痹為筋痹則筋屈邪客關機則使筋攣邪客於足太陽之絡令人肩背拘急也足厥陰肝之經也肝通主諸筋王在春其經絡虛遇風邪則傷於筋使四肢拘攣不得屈伸診其脈急細如弦者筋急足攣也若筋屈不已又遇於邪則移變入肝其病狀夜臥則驚小便數其湯尉針石別有正方補養宣導今附於後養生方導引法云手前後遞互拓極勢三七手掌向下頭低面心氣向下至湧泉倉門卻努一時取勢散氣放縱身氣平頭動膊前後欹側柔膊二七去膊井冷血筋急漸漸如消又云兩手抱左膝伸腰鼻納氣七息展右足除難屈伸拜起脛中痛萎又云兩手抱右膝著膺除下重難屈伸又云踞坐伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息展右足著外除難屈伸拜起脛中疼痹又云立身上下正直一手上拓仰手如似推物勢一手向下如捺物極勢上下來去換易四七去膊內風兩膊井內冷血兩掖筋脈攣急又云踞坐伸左腳兩手抱右膝伸腰以鼻納氣自極七息展左足著外除難屈伸拜起脛中疼痹十五風身體手足不隨候風身體手足不隨者由體虛腠理開風氣傷於脾胃之經絡也足太陰為脾之經脾與胃合足陽明為胃之經胃為水穀之海也脾候身之肌肉主為胃消行水穀之氣以養身體四肢脾氣弱即肌肉虛受風邪所侵故不能為胃通行水穀之氣致四肢肌肉無所稟受而風邪在經絡搏於陽經氣行則遲機關緩縱故令身體手足不隨也診脾脈緩者為風痿四肢不用又心脈腎脈俱至則難以言九竅不通四肢不舉腎脈來多即死也其湯尉針石別有正方補養宣導今附於後養生方導引法云極力左右振兩臀不息九通愈臀痛勞倦風氣不隨振兩臀者更互踶趥猶言厥九通中間偃伏皆為之名蝦蟆行氣久行不已愈臀痛勞倦風氣不隨不覺痛癢作種種形狀又云偃臥合兩膝布兩足伸腰口納氣振腹自極七息除壯熱疼痛兩脛不隨又云治四肢疼悶及不隨腹內積氣床席必須平穩正身仰臥緩解衣帶枕高三寸握固握固者以兩手各自以四指把手拇指舒臂令去身各五寸兩腳豎指相去五寸安心定意調和氣息莫思餘事專意念氣徐徐漱醴泉漱醴泉者以舌舐略唇口牙齒然後咽唾徐徐以口吐氣鼻引氣入喉須微微緩作不可卒急強作待好調和引氣吐氣勿令自聞出入之聲每引氣心心念送之從腳趾頭使氣出引氣五息六息一出之為一息一息數至十息漸漸增益得至百息二百息病即除愈不用食生菜及魚肥肉大飽食後喜怒憂恚悉不得輒行氣惟須向曉清靜時行氣大佳能愈萬病十六風濕痹身體手足不隨候風寒濕三氣合而為痹其三氣時來亦有偏多偏少而風濕之氣偏多者名風濕痹也人腠理虛者則由風濕氣傷之搏於血氣血氣不行則不宣真邪相擊在於肌肉之間故其肌膚盡痛然諸陽之經宣行陽氣通於身體風濕之氣客在肌膚初始為痹若傷諸陽之經陽氣行則遲緩而機關弛縱筋脈不收攝故風濕痹而復身體手足不隨也十七風痹手足不隨候風寒濕三氣合而為痹風多者為風痹風痹之狀肌膚盡痛諸陽之經盡起於手足而循行於身體風寒之客肌膚初始為痹後傷陽經隨其虛處而停滯與血氣相搏血氣行則遲緩使機關馳縱故風痹而復手足不隨也其湯尉針石別有正方補養宣導今附於後養生方導引法云左右拱兩臂不息九通治臂足痛勞倦風痹不隨十八風半身不隨候風半身不隨者脾胃氣弱血氣偏虛為風邪所乘故也脾胃為水穀之海水穀之精化為血氣潤養身體脾胃既弱水穀之精潤養不周致血氣偏虛而為風邪所侵故半身不隨也診其寸口沉細名曰陽內之陰病苦悲傷不樂惡聞人聲少氣時汗出臂偏不舉又寸口偏絶者則偏不隨其兩手盡絶者不可治也十九偏風候偏風者風邪偏客於身一邊也人體有偏虛者風邪乘虛而傷之故為偏風也其狀或不知痛癢或緩縱或痹痛是也其湯尉針石別有正方補養宣導今附於後養生方導引法云一手長舒令掌仰一手捉頦挽之向外一時極勢二七左右亦然手不動兩向側極勢急挽之二七去頸骨急強頭風腦旋喉痹膊內冷注偏風又云一足踏地一手向後長舒努之一手捉湧泉急挽足努手挽一時極勢左右易俱二七治上下偏風陰氣不和二十風嚲曳候風嚲曳者肢體弛緩不收攝也人以胃氣養於肌肉經絡也胃若衰損其氣不實經脈虛則筋肉懈惰故風邪搏於筋而使嚲曳也二十一風不仁候風不仁者由榮氣虛衛氣實風寒入於肌肉使血氣行不宣流其狀搔之皮膚如隔衣是也診其寸口脈緩則皮膚不仁不仁脈虛數者生牢急疾者死其湯尉針石別有正方補養宣導今附於後養生方導引法云赤松子曰偃臥展兩脛兩手足外踵指相向以鼻納氣自極七息除死肌不仁足寒又云展兩足上除不仁脛寒之疾也二十二風濕痹候風濕痹病之狀或皮膚頑厚或肌肉痠痛風寒濕三氣雜至合而成痹其風濕氣多而寒氣少者為風濕痹也由血氣虛則受風濕而成此病久不瘥入於經絡搏於陽經亦變令身體手足不隨其湯尉針石別有正方補養宣導今附於後養生方導引法云任臂不息十二通愈足濕痹不任行腰脊痹痛又正臥疊兩手著背下伸兩腳不息十二通愈足濕痹不任行腰脊痛痹有偏患者患左壓右足患右壓左足久行手亦如足用行滿十方止又云以手摩腹從足至頭正臥蜷臂導引以手持引足住任臂閉氣不息十二通以治痹濕不可任腰脊痛二十三風濕候風濕者是風氣與濕氣共傷於人也風者八方之虛風濕者水濕之蒸氣也若地下濕復少霜雪其山水氣蒸兼值暖腲退人腠理開便受風濕其狀令人懈惰精神昏憒若經久亦令人四肢緩縱不隨入臟則喑啞口舌不收或腳痹弱變成腳氣其湯尉針石別有正方補養宣導今附於後養生方真誥云櫛頭理髮欲得多過通流血脈散風濕數易櫛更番用之二十四風痹候痹者風寒濕三氣雜至合而成痹其狀肌肉頑厚或疼痛由人體虛腠理開故受風邪也病在陽曰風在陰曰痹陰陽俱病曰風痹其以春遇痹為筋痹則筋屈筋痹不已又遇邪者則移入肝其狀夜臥則驚飲多小便數夏遇痹者為脈痹則血凝不流令人萎黃脈痹不已又遇邪者則移入心其狀心下鼓氣暴上逆喘不通嗌乾喜噫長夏遇痹者為肌痹在肉則不仁肌痹不已復遇邪者則移入脾其狀四肢懈惰發咳嘔汁秋遇痹者為皮痹則皮膚無所知皮痹不已又遇邪者則移入於肺其狀氣奔痛冬遇痹者為骨痹則骨重不可舉不隨而痛骨痹不已又遇邪者則移入於腎其狀喜脹診其脈大而澀者為痹脈來急者為痹其湯尉針石別有正方補養宣導今附於後養生方云因汗入水即成骨痹又云忍尿不便膝冷成痹又云大汗勿偏脫衣喜偏風半身不隨養生經要集云大汗急敷粉著汗濕衣令人得瘡大小便不利養生方導引法云一曰以右踵拘左足拇趾除風痹二曰以左踵拘右足拇趾除厥痹三曰兩手更引足趺置膝上除體痹又云偃臥合兩膝頭翻兩足伸腰口納氣脹腹自極七息除痹痛熱痛兩脛不隨又云踞坐伸腰以兩手引兩踵以鼻納氣自極七息引兩手布兩膝除痹嘔又云偃臥端展兩手足臂以鼻納氣自極七息搖足三十而止除胸足寒周身痹厥逆又云正倚壁不息行氣從頭至足止愈大風偏枯諸痹又云左右手夾據地以仰引腰五息止去痿痹利九竅又云仰兩足指五息止引腰背痹偏枯令人耳聞聲久行眼耳諸根無有挂礙又云踞坐伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息展右足著外除難屈伸拜起脛中疼痛痹又云左右拱兩臂不息九通治臂足痛勞倦風痹不隨又云凡人常覺脊背皆倔強而悶不問時節縮咽膊內仰面努膊井向上頭左右兩向挪之左右三七一住待血行氣動定然始更用初緩後急不得先急後緩若無病人常欲得日起午時日沒三辰如用辰別二七除寒熱病脊腰頸項痛風痹口內生瘡牙齒風頭眩盡除二十五血痹候血痹者由體虛邪入於陰經故也血為陰邪入於血而痹故為血痹也其狀形體如被微風所吹此由憂樂之人骨弱肌膚盛因疲勞汗出臥不時動搖膚腠開為風邪所侵也診其脈自微澀在寸口關上小緊血痹也宜可針引陽氣令脈和緊去則愈二十六風驚邪候風驚邪者由體虛風邪傷於心之經也心為手少陰之經心氣虛則風邪乘虛傷其經入舍於心故為風驚邪也其狀乍驚乍喜恍惚失常是也二十七風驚悸候風驚悸者由體虛心氣不足心之腑為風邪所乘或恐懼憂迫令心氣虛亦受於風邪風邪搏於心則驚不自安驚不已則悸動不定其狀目精不轉而不能呼診其脈動而弱者驚悸也動則為驚弱則為悸二十八風驚恐候風驚恐者由體虛受風入乘臟腑其狀如人將捕之心虛則驚肝虛則恐足厥陰為肝之經與膽合足少陽為膽之經主決斷衆事心肝虛而受風邪膽氣又弱而為風所乘恐如人捕之二十九風驚候風驚者由體虛心氣不足為風邪所乘也心藏神而主血脈心氣不足則虛虛則血亂血亂則氣並於血氣血相併又被風邪所乘故驚不安定名為風驚診其脈至如數使人暴驚三四日自已養生方云精藏於玉房交接太數則失精失精者令人悵悵心常驚悸
