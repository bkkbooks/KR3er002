body:
  text: 卷之四十六小兒雜病諸候二凡三十四論三十時氣病候時氣病者是四時之間忽有非節之氣如春時應暖而反寒夏時應熱而反冷秋時應涼而反熱冬時應寒而反溫其氣傷人為病亦頭痛壯熱大體與傷寒相似無問長幼其病形證略同言此時通行此氣故名時氣世亦呼為天行三十一天行病發黃候四時之間忽有非節之氣傷人謂之天行大體似傷寒亦頭痛壯熱其熱入於脾胃停滯則發黃也脾與胃合俱象土其色黃而候於肌肉熱氣蘊積其色蒸發於外故發黃也三十二時氣腹滿候時氣之病是四時之間忽有非節之氣傷人其病狀似傷寒亦頭痛壯熱也而腹滿者是熱入腹與臟氣相搏氣痞澀在內故令腹滿若毒而滿者毒氣乘心煩懊者死三十三時氣病結熱候時氣之病是四時之間忽有非節之氣傷人其病狀似傷寒亦頭痛壯熱熱入腹內與腑臟之氣相結謂之結熱熱則大小腸痞澀大小便難而苦煩熱是也三十四敗時氣病候時氣之病是四時之間忽有非節之氣傷人其病狀似傷寒亦頭痛壯熱若施治早晚失時投藥不與病相會致令病連滯不已乍瘥乍劇或寒或熱敗壞之證無常是也三十五時氣病兼瘧候時氣之病是四時之間忽有非節之氣傷人其病狀似傷寒亦頭痛壯熱而又兼瘧者是日數未滿本常壯熱而邪不退或乘於陰或乘於陽其乘於陽陽爭則熱其乘於陰陰爭則寒陰陽之氣為邪所並互相乘加故發寒熱成瘧也三十六時氣病得吐下後猶熱候時氣之病是四時之間忽有非節之氣傷人其病似傷寒亦頭痛壯熱而得吐下之後壯熱猶不歇者是腸胃宿虛而又吐利則為重虛其熱乘虛而入里則表裡俱熱停滯不歇故雖吐下而猶熱也三十七時氣病後不嗜食麵青候時氣之病是四時之間忽有非節之氣傷人客於肌膚與血氣相搏故頭痛壯熱熱歇之後不嗜食而面青者是胃內餘熱未盡氣滿故不嗜食也諸陽之氣俱上榮於面陽虛未復本帶風邪風邪挾冷冷搏於血氣故令面青也三十八時氣病發復候時氣之病發復者是四時之間忽有非節之氣傷人客於肌膚搏於血氣蘊積則變壯熱頭痛熱退之後氣血未和腑臟熱勢未盡或起早勞動或飲食不節故其病重發謂之復也然發覆多重於初病者血氣已虛重傷故也三十九溫病候溫病者是冬時嚴寒人有觸冒之寒氣入肌肉當時不即發至春得暖氣而發則頭痛壯熱謂之溫病又冬時應寒而反暖其氣傷人即發亦使人頭痛壯熱謂之冬溫病凡邪之傷人皆由觸冒所以感之小兒雖不能觸冒其乳母抱持解脫不避風邪冷熱之氣所以感病也四十溫病下利候溫病者是冬時嚴寒人有觸冒之寒氣入肌肉當時不即發至春成病得暖氣而發則頭痛壯熱謂之溫病又冬時應寒而反溫其氣傷人即發成病使人頭痛壯熱謂之冬溫病也其下利者是腸胃宿虛而感於溫熱之病熱氣入於腸胃與水穀相搏腸虛則泄故下利也四十一溫病鼻衄候溫病者是冬時嚴寒人有觸冒之寒氣入肌肉當時不即發至春得暖氣而發則頭痛壯熱謂之溫病又冬時應寒而反溫其氣傷人即發成病謂之冬溫病並皆頭痛壯熱其鼻衄者熱乘於氣而入血也肺候身之皮毛主於氣開竅於鼻溫病則邪先客皮膚而搏於氣結聚成熱熱乘於血血得熱則流散發從鼻出者為衄也凡候熱病鼻欲衄其數發汗汗不出或初染病已來都不汗而鼻燥喘息鼻氣有聲如此者必衄也小兒衄止至一升數合熱因得歇若至一斗數升則死矣四十二溫病結胸候溫病是冬時嚴寒人有觸冒之寒氣入肌肉當時不即發至春得暖氣而發則頭痛壯熱謂之溫病又冬時應寒而反溫其氣傷人即發成病謂之冬溫病並皆頭痛壯熱凡溫熱之病四五日之後熱入里內熱腹滿者宜下之若熱未入里而下之早者裡虛氣逆熱結胸上則胸痞滿短氣謂之結胸也四十三患斑毒病候斑毒之病是熱氣入胃而胃主肌肉其熱挾毒蘊積於胃毒氣熏發於肌肉狀如蚊蚤所齧赤斑起周匝遍體此病或是傷寒或時氣或溫病皆由熱不時歇故熱入胃變成毒乃發斑也凡發赤斑者十生一死黑者十死一生四十四黃病候黃病者是熱入脾胃熱氣蘊積與穀氣相搏蒸發於外故皮膚悉黃眼亦黃脾與胃合俱象土候肌肉其色黃故脾胃內熱積蒸發令肌膚黃此或是傷寒或時行或溫病皆由熱不時解所以入胃也凡發黃而下利心腹滿者死診其脈沉細者死又有百日半歲小兒非關傷寒溫病而身微黃者亦是胃熱慎不可灸也灸之則熱甚此是將息過度所為微薄其衣數與除熱粉散粉之自歇不得妄與湯藥及灸也四十五黃疸病候黃疸之病由脾胃氣實而外有溫氣乘之變生熱脾與胃合候肌肉俱象土其色黃胃為水穀之海熱搏水穀氣蘊積成黃蒸發於外身疼膊背強大小便澀皮膚面目齒爪皆黃小便如屋塵色著物皆黃是也小便宣利者易治若心腹滿小便澀者多難治也不渴者易治渴者難治脈沉細而腹滿者死也四十六胎疸候小兒在胎其母臟氣有熱熏蒸於胎到生下小兒體皆黃謂之胎疸也四十七瘧病候瘧病者由夏傷於暑客於皮膚至秋因勞動血氣腠理虛而邪乘之動前暑熱正邪相擊陰陽交爭陽盛則熱陰盛則寒陰陽更盛更虛故發寒熱陰陽相離則寒熱俱歇若邪動氣至交爭復發故瘧休作有時其發時節漸晏者此由邪客於風府循膂而下衛氣一日一夜常大會於風府其明日日下一節故其作日晏其發早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏沖之脈其氣上行九日出於缺盆之內其氣既上故其病發更早其間日發者由邪氣內薄五臟橫連募原其道遠其氣深其行遲不能日作故間日蓄積乃發也小兒未能觸冒於暑而亦病瘧者是乳母抱持解脫不避風者也四十八瘧後餘熱候夫風邪所傷是客於皮膚而痰飲漬於臟腑致令血氣不和陰陽交爭若真氣勝則邪氣退邪氣未盡故發瘧也邪氣雖退氣血上虛邪氣干於真氣臟腑壅痞熱氣未散故餘熱往來也四十九患瘧後脅內結硬候瘧是夏傷於暑熱客於皮膚至秋復為風邪所折陰陽交爭故發寒熱其病正發寒熱交爭之時熱氣乘臟臟則燥而渴渴而引飲飲停成癖結於脅下故瘥後脅內結硬也五十瘧後內熱渴引飲候瘧病者是夏傷於暑熱客於皮膚至秋復為風邪所折陰陽交爭故發寒熱成瘧凡瘧發欲解則汗汗則津液減耗又熱乘於臟臟虛燥其瘧瘥之後腑臟未和津液未復故內猶熱渴而引飲也若引飲不止小便澀者則變成癖也五十一寒熱往來候風邪外客於皮膚內而痰飲漬於腑臟致令血氣不和陰陽更相乘克陽勝則熱陰勝則寒陰陽之氣為邪所乘邪與正相干陰陽交爭時發時止則寒熱往來也五十二寒熱往來五臟煩滿候風邪外客於皮膚內而痰飲漬於腑臟致令血氣不和陰陽交爭故寒熱往來而熱乘五臟氣積不泄故寒熱往來而五臟煩滿五十三寒熱往來腹痛候風邪外客於皮膚內而痰飲漬於腑臟血氣不和則陰陽交爭故寒熱往來而臟虛本挾宿寒邪入於臟與寒相搏而擊於臟氣故寒熱往來而腹痛也五十四寒熱結實候外為風邪客於皮膚內而痰飲漬於腑臟使血氣不和陰陽交爭則發寒熱而臟氣本實復為寒熱所乘則積氣在內使人胸脅心腹煩熱而滿大便苦難小便亦澀是為寒熱結實五十五寒熱往來食不消候風邪外客於皮膚內有痰飲漬於腑臟使血氣不和陰陽交爭則寒熱往來其脾胃之氣宿挾虛冷表雖寒熱而內冷發動故食不消也五十六寒熱往來能食不生肌肉候風邪外客於皮膚內而痰飲漬於腑臟使血氣不和陰陽交爭故發寒熱往來胃氣挾熱熱則消穀谷消則引食陰陽交爭為血氣不和血氣不和則不能充養身體故寒熱往來雖能食而不生肌肉也五十七胃中有熱候小兒血氣俱盛者則腑皆實故胃中生熱其狀大便則黃四肢壯翕然體熱者是也五十八熱煩候小兒臟腑實血氣盛者表裡俱熱則苦煩躁不安皮膚壯熱也五十九熱渴候小兒血氣盛者則腑臟生熱熱則臟燥故令渴六十中客忤候小兒中客忤者是小兒神氣軟弱忽有非常之物或未經識見之人觸之與鬼神氣相忤而發病謂之客忤也亦名中客又名中人其狀吐下青黃白色水穀解離腹痛反倒夭矯面變易五色其狀似癇但眼不上搖耳其脈弦急數者是也若失時不治久則難治若乳母飲酒過度醉及房勞喘後乳者最劇能殺兒也六十一為鬼所持候小兒神氣軟弱精爽微羸而神魂被鬼所持録其狀不覺有餘疾直爾萎黃多大啼喚口氣常臭是也六十二卒死候小兒卒死者是三虛而遇賊風故無病倉卒而死也三虛者乘年之衰一也逢月之空二也失時之和三也有人因此三虛復為賊風所傷使陰氣偏竭於內陽氣阻隔於外而壅閉陰陽不通故暴絶而死也若腑臟未竭良久乃蘇亦有兼挾鬼神氣者皆有頃邪退乃生也凡中客忤及中惡卒死而邪氣不盡停滯心腹久乃發動多發成注也六十三中惡候小兒中惡者是鬼邪之氣卒中於人也無問大小若陰陽順理榮衛平和神守則強邪不干正若精氣衰弱則鬼毒惡氣中之其狀先無他病卒然心腹刺痛悶亂欲死是也凡中惡腹大而滿脈緊大而浮者死緊細而微者生余勢不盡停滯臟腑之間更發後變為注也
