body:
  text: 卷之二十二霍亂病諸候凡二十四論一霍亂候霍亂者由人溫涼不調陰陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛者則先吐先腹痛者則先利心腹並痛者則吐利俱發挾風而實者身發熱頭痛體疼而復吐利虛者但吐利心腹刺痛而已亦有飲酒食肉腥膾生冷過度因居處不節或露臥濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷則不磨不磨則水穀不消化亦令清濁二氣相干脾胃虛弱便則吐利水穀不消則心腹脹滿皆成霍亂霍亂有三名一名胃反言其胃氣虛逆反吐飲食也二名霍亂言其病揮霍之間便致繚亂也三名走哺言其哺食變逆者也診其脈來代者霍亂又脈代而絶者亦霍亂也霍亂脈大可治微細不可治霍亂吐下脈微遲氣息劣口不欲言者不可治養生方云七月食蜜令人暴下發霍亂二霍亂心腹痛候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而心腹痛者是風邪之氣客於臟腑之間冷氣與真氣相擊或上攻心或下攻腹故心腹痛也三霍亂嘔吐候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而嘔吐者是冷氣客於腑臟之間或上攻於心則心痛或下攻於腹則腹痛若先心痛者則先吐先腹痛者則先利而此嘔吐是冷入於胃胃氣變亂冷邪既盛穀氣不和胃氣逆上故嘔吐也四霍亂心腹脹滿候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而心腹脹滿者是寒氣與臟氣相搏真邪相攻不得吐利故令心腹脹滿其有吐利過多臟虛邪猶未盡邪搏於氣氣不宣發亦令心腹脹滿五霍亂下痢候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而下痢是冷氣先入於腸胃腸胃之氣得冷則交擊而痛故霍亂若先腹痛者則行利也六霍亂下痢不止候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而下痢不止者因腸胃俱冷而挾宿虛穀氣不消腸滑故洞下不止也痢不止虛冷氣極冷入於筋則變轉筋其胃虛冷氣乘之亦變嘔噦七霍亂欲死候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂欲死者由飲食不消冷氣內搏或未得吐利或雖得吐利冷氣未歇致真邪相干陰陽交爭氣厥不理則煩悶逆滿困乏故欲死也八霍亂嘔噦候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而嘔噦者由吐利後胃虛而逆則嘔氣逆遇冷折之氣不通則噦九霍亂煩渴候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而煩渴者由大吐逆上焦虛氣不調理氣乘於心則煩悶大痢則津液竭津液竭則臟燥臟燥則渴煩渴不止則引飲引飲則痢亦不止也十霍亂心煩候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而心煩者由大吐大痢腑臟氣暴極夫吐者胃氣逆也痢者腸虛也若大吐大痢虛逆則甚三焦不理五臟未和冷搏於氣逆上乘心故心煩亦有未經吐利心煩者是冷氣入於腸胃水穀得冷則不消蘊瘀不宣氣亦逆上故亦心煩十一霍亂乾嘔候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂乾嘔者由吐下之後脾胃虛極三焦不理氣痞結於心下氣時逆上故乾嘔乾嘔者謂欲嘔而無所出也若更遇冷冷折於胃氣胃氣不通則變成噦十二霍亂心腹築悸候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而心腹築悸者由吐下之後三焦五臟不和而水氣上乘於心故也腎主水其氣通於陰吐下三焦五臟不和故腎氣亦虛不能制水水不下宣與氣俱上乘心其狀起齊下上從腹至心氣築築然而悸動不定也十三霍亂嘔而煩候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂嘔而煩者由吐下後胃虛而氣逆故嘔也氣逆乘心故煩所以嘔而煩也十四乾霍亂候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂者多吐痢也乾霍亂者是冷氣搏於腸胃致飲食不消但腹滿煩亂絞痛短氣其腸胃先挾實故不吐痢名為乾霍亂也十五霍亂四逆候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而大吐下後其腸胃俱虛乃至汗出其脈欲絶手足皆冷名為四逆四逆者謂陰陽卒厥絶也十六霍亂轉筋候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而轉筋者由冷氣入於筋故也足之三陰三陽之筋起於人足指手之三陰三陽之筋起於手指並循絡於身夫霍亂大吐下之後陰陽俱虛其血氣虛極則手足逆冷而榮衛不理冷搏於筋則筋為之轉冷入於足之三陰三陽則腳筋轉入於手之三陰三陽則手筋轉隨冷所入之筋筋則轉轉者皆由邪冷之氣擊動其筋而移轉也十七中惡霍亂候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂而云中惡者謂鬼氣卒中於人也其狀卒然心腹絞痛而客邪內擊與飲食寒冷相搏致陰陽之氣亦相干亂腸胃虛則變吐利煩毒為中惡霍亂也十八霍亂諸病候霍亂之病由冷熱不調飲食不節陰陽錯亂清濁之氣相干在腸胃之間發則心腹絞痛吐利腑臟虛弱或煩或渴或嘔噦或手足冷或本挾宿疹今因虛而發也十九霍亂後諸病候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂而霍亂之後榮衛未和調腑臟尚虛冷或吐痢不止嘔逆未定或宿疹乘虛而發更生諸病也二十霍亂後煩躁臥不安候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂之後而煩躁臥不安者由吐下之後腑臟虛極陰陽未理血虛氣亂故血氣之行未復常度內乘於腑臟故煩躁而不得安臥也二十一霍亂後不除候冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂之後而不除者由吐胸膈宿食不盡或不得吐而但痢其冷氣不散因而著食入胃胃氣未和故猶脹痛煩滿謂之不除也二十二轉筋候轉筋者由榮衛氣虛風冷氣搏於筋故也手足之三陰三陽之筋皆起於手足指而並絡於身若血氣不足陰陽虛者風冷邪氣中於筋隨邪所中之筋筋則轉轉者謂其轉動也經云足太陽下血氣皆少則喜轉筋喜踵下痛者是血氣少則易虛虛而風冷乘之故也診其左手關上肝脈也沉為陰陰實者肝實也苦肉動轉筋左手尺中名神門以後脈足少陰經也浮為陽陽虛者病苦轉筋其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥展兩脛兩手足外踵指相向以鼻納氣自極七息除兩膝寒脛骨疼轉筋又法覆臥傍視立兩踵伸腰鼻納氣去轉筋又云張脛兩足指號五息止令人不轉筋極自用力張腳痛挽兩足指號言寬大去筋節急攣躄痛久行身開張又云覆臥傍視立兩踵伸腰以鼻納氣自極七息已除腳中弦痛轉筋腳痠疼一本云治腳弱二十三筋急候凡筋中於風熱則弛縱中於風冷則攣急十二經筋皆起於手足指循絡於身也體虛弱若中風寒隨邪所中之筋則攣急不可屈伸其湯尉針石別有正方補養宣導今附於後養生方導引法云兩手抱足頭不動足向口面受氣衆節氣散來往三七欲得捉足左右側身各各急挽腰不動去四肢腰上下髓內冷血脈冷筋急又云一足向前互跪押踹極勢一手向前長努拓勢一足向後屈一手搦解溪急挽盡勢膝頭摟席使急面頭漸舉氣融散流向下左右換易四七去腰伏菟掖下悶疼髓筋急又云長舒一足一腳屈兩手抱膝三里努膝向前身卻挽一時取勢氣內散消如似骨解遞互換足各別三七漸漸去膊脊冷風冷血筋急又云張脛兩足指號五息止令人不轉筋極自用力張腳痛挽兩足指號言寬大去筋節急攣躄痛久行身開張又云雙手反向拓腰仰頭向後努急手拓處不動展兩肘頭相向極勢三七去兩臂膊筋急冷血咽骨掘弱又云一手拓前極勢長努一手向後長舒盡勢身似夫形左右迭互換手亦二七腰脊不動去身內八節骨肉冷血筋髓虛頸項膊急又云一足踏地一手向前長舒一足向後極勢長舒一手一足一時盡意急振二七左右亦然去髓疼筋急百脈不和又云兩手掌倒拓兩膊並前極勢上下傍兩掖急努振搖來去三七竟手不移處努兩肘向上急勢上下振搖二七欲得卷兩手七自相將三七去項膊筋脈急勞一手屈卷向後左一手捉肘頭向內挽之上下一時盡勢屈手散放舒指三方轉手皆極勢四七調肘膊骨筋急強兩手拓向上極勢上下來往三七手不動將兩肘向上極勢七不動手肘臂側身極勢左右回三七去頸骨冷氣風急二十四結筋候凡筋中於風熱則弛縱中於風冷則攣急十二經之筋皆起於手足指而絡於身也體虛者風冷之氣中之冷氣停積故結聚謂之結筋也
