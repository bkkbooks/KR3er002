body:
  text: 卷之四虛勞病諸候下凡三十六論四十虛勞骨蒸候夫蒸病有五一曰骨蒸其根在腎旦起體涼日晚即熱煩躁寢不能安食無味小便赤黃忽忽煩亂細喘無力腰疼兩足逆冷手心常熱蒸盛過傷內則變為疳食人五臟二曰脈蒸其根在心日增煩悶擲手出足翕翕思水口唾白沫睡即浪言或驚恐不定脈數若蒸盛之時或變為疳臍下悶或暴利不止三曰皮蒸其根在肺必大喘鼻乾口中無水舌上白小便赤如血蒸盛之時胸滿或自稱得注熱兩脅下脹大嗽口內唾血四曰肉蒸其根在脾體熱如火煩躁無汗心腹鼓脹食即欲嘔小便如血大便秘澀蒸盛之時身腫目赤寢臥不安五曰內蒸亦名血蒸所以名內蒸者必外寒而內熱把手附骨而內熱甚其根在五臟六腑其人必因患後得之骨肉自消飯食無味或皮燥而無光澤蒸盛之時四肢漸細足趺腫起又有二十三蒸一胞蒸小便黃赤二玉房蒸男則遺瀝漏精女則月候不調三腦蒸頭眩悶熱四髓蒸髓沸熱五骨蒸齒黑六筋蒸甲焦七血蒸發焦八脈蒸脈不調九肝蒸眼黑十心蒸舌乾十一脾蒸唇焦十二肺蒸鼻乾十三腎蒸兩耳焦十四膀胱蒸右耳偏焦十五膽蒸眼白失色十六胃蒸舌下痛十七小腸蒸下唇焦十八大腸蒸鼻右孔干痛十九三焦蒸亦雜病乍寒乍熱二十肉蒸二十一膚蒸二十二皮蒸二十三氣蒸遍身熱凡諸蒸患多因熱病患愈後食牛羊肉及肥膩或酒或房觸犯而成此疾久蒸不除多變成疳必須先防下部不得輕妄治也四十一虛勞舌腫候心候舌養於血勞傷血虛為熱氣所乘又脾之大絡出於舌下若心脾有熱故令舌腫四十二虛勞手足皮剝候此由五臟之氣虛少故也血行通榮五臟五臟之氣潤養肌膚虛勞內傷血氣衰弱不能外榮於皮故皮剝也四十三虛勞浮腫候腎主水脾主土若脾虛則不能剋制於水腎虛則水氣流溢散於皮膚故令身體浮腫若氣血俱澀則多變為水病也四十四虛勞煩悶候此由陰陽俱虛陰氣偏少陽氣暴勝則熱乘於心故煩悶也四十五虛勞凝唾候虛勞則津液減少腎氣不足故也腎液為唾上焦生熱熱沖咽喉故唾凝結也四十六虛勞嘔逆唾血候夫虛勞多傷於腎腎主唾肝藏血胃為水穀之海胃氣逆則嘔腎肝損傷故因嘔逆唾血也四十七虛勞嘔血候此內傷損於臟也肝藏血肺主氣勞傷於血氣氣逆則嘔肝傷則血隨嘔出也損輕則唾血傷重則吐血四十八虛勞鼻衄候肺主氣而開竅於鼻肝藏血血之與氣相隨而行俱榮於臟腑今勞傷之人血虛氣逆故衄衄者鼻出血也四十九虛勞吐下血候勞傷於臟腑內崩之病也血與氣相隨而行外養肌肉內榮臟腑臟腑傷損血則妄行若胸膈氣逆則吐血也流於腸胃腸虛則下血也若腸虛而氣覆逆者則吐血下血表虛者則汗血皆由傷損極虛所致也五十虛勞吐利候夫大腸虛則泄利胃氣逆則嘔吐虛勞又腸虛胃逆者故吐利五十一虛勞兼痢候臟腑虛損傷於風冷故也胃為水穀之海胃冷腸虛則痢也五十二虛勞秘澀候此由腸胃間有風熱故也凡腸胃虛傷風冷則泄利若實有風熱則秘澀也五十三虛勞小便利候此由下焦虛冷故也腎主水與膀胱為表裡膀胱主藏津液腎氣衰弱不能制於津液胞內虛冷水下不禁故小便利也五十四虛勞小便難候膀胱津液之腑腎主水二經共為表裡水行於小腸入於胞而為溲便今胞內有客熱熱則水液澀故小便難五十五虛勞小便餘瀝候腎主水勞傷之人腎氣虛弱不能藏水胞內虛冷故小便後水液不止而有餘瀝及脈微細者小便餘瀝也五十六虛勞小便白濁候勞傷於腎腎氣虛冷故也腎主水而開竅在陰陰為溲便之道胞冷腎損故小便白而濁也五十七虛勞少精候腎主骨髓而藏於精虛勞腎氣虛弱故精液少也診其脈左手尺中陰絕者無腎脈也苦足下熱兩髀裡急主精氣竭少為勞傷所致也五十八虛勞尿精候腎氣衰弱故也腎藏精其氣通於陰勞傷腎虛不能藏於精故因小便而精液出也五十九虛勞溢精見聞精出候腎氣虛弱故精溢也見聞感觸則動腎氣腎藏精今虛弱不能制於精故因見聞而精溢出也六十虛勞失精候腎氣虛損不能藏精故精漏失其病小腹弦急陰頭寒目眶痛發落診其脈數而散者失精脈也凡脈芤動微緊男子失精也六十一虛勞夢泄精候腎虛為邪所乘邪客於陰則夢交接腎藏精今腎虛不能制精因夢感動而泄也六十二虛勞喜夢候夫虛勞之人血氣衰損臟腑虛弱易傷於邪邪從外集內未有定舍反淫於臟不得定處與榮衛俱行而與魂魄飛揚使人臥不得安喜夢氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足於外若陰氣盛則夢涉大水而恐懼陽氣盛則夢大火燔爇陰陽俱盛則夢相殺上盛則夢飛下盛則夢墜甚飽則夢行甚飢則夢臥肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢喜笑恐畏脾氣盛則夢歌樂體重身不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而瀉之立已厥氣客於心則夢見山嶽熛火客於肺則夢飛揚見金鐵之器奇物客於肝則夢見山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢見臨深沒於水中客於膀胱則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢遊聚邑街衢客於膽則夢鬥訟自割客於陰則夢接內客於項則夢多斬首客於脛則夢行走而不能前又居深地中客於股肱則夢袂節拜起客於胞䐈則夢溲便凡此十五不足者至而補之立已尋其茲夢以設法治則病無所逃矣六十三虛勞尿血候勞傷而生客熱血滲於胞故也血得溫而妄行故因熱流散滲於胞而尿血也六十四虛勞精血出候此勞傷腎氣故也腎藏精精者血之所成也虛勞則生七傷六極氣血俱損腎家偏虛不能藏精故精血俱出也六十五虛勞膝冷候腎弱髓虛為風冷所搏故也腎居下焦主腰腳其氣榮潤骨髓今腎虛受風寒故令膝冷也久不已則腳痠疼屈弱其湯熨針石別有正方補養宣導今附於後養生方導引法云兩手反向拓席一足跪坐上一足屈如仰面看氣道眾處散適極勢振四七左右亦然始兩足向前雙踏極勢二七去胸腹病膝冷臍悶又云與跪調和心氣向下至足意想氣索索然流布得所始漸漸平身舒手傍肋如似手掌納氣出氣不止面覺急悶即起背至地來去二七微減去膝頭冷膀胱宿病腰脊強臍下冷悶又云舒兩足坐散氣向湧泉可三通氣徹到始收右足屈卷將兩手急捉腳湧泉挽足踏手挽一時取勢手足用力送氣向下三七不失氣之行度數尋去腎內冷氣膝冷腳疼又云跪一足坐上兩手髀內卷足努踹向下身外扒一時取勢向心來去二七左右亦然去痔五勞足臂疼悶膝冷陰疼又云臥展兩脛足十指相柱伸兩手身旁鼻納氣七息除兩脛冷腿骨中痛又云偃臥展兩脛兩手足外踵指相向以鼻納氣自極七息除兩膝寒脛骨疼轉筋又云兩足指向下柱席兩湧泉相拓坐兩足跟頭兩膝頭外扒手身前向下盡勢七通去勞損陰疼膝冷脾瘦腎干又云兩手抱兩膝極勢來去搖之七七仰頭向後去膝冷又云偃臥展兩脛兩足指左向直兩手身旁鼻納氣七息除死肌及脛寒又云立兩手搦腰遍使身正放縱氣下使得所前後振搖七七足並頭兩向振搖二七頭上下搖之七縮咽舉兩膊仰柔脊冷氣散令臟腑氣向湧泉通徹又云互跪兩手向後手掌合地出氣向下始漸漸向下覺腰脊大悶還上來去二七身正左右散氣轉腰三七去臍下冷悶膝頭冷解谿內病六十六虛勞陰冷候陰陽俱虛弱故也腎主精髓開竅於陰今陰虛陽弱血氣不能相榮故使陰冷也久不已則陰萎弱六十七虛勞髀樞痛候勞傷血氣膚腠虛疏而受風冷故也腎主腰腳腎虛弱則為風邪所乘風冷客於髀樞之間故痛也六十八虛勞偏枯候夫勞損之人體虛易傷風邪風邪乘虛客於半身留在肌膚未即發作因飲水水未消散即勞於腎風水相搏乘虛偏發風邪留止血氣不行故半身手足枯細為偏枯也六十九虛勞陰萎候腎開竅於陰若勞傷於腎腎虛不能榮於陰器故萎弱也診其脈瞥瞥如羹上肥陽氣微連連如蜘蛛絲陰氣衰陰陽衰微而風邪入於腎經故陰不起或引小腹痛也養生方云水銀不得近陰令玉莖消縮七十虛勞陰痛候腎氣虛損為風邪所侵邪氣流入於腎經與陰氣相擊真邪交爭故令陰痛但冷者唯痛挾熱則腫其湯熨針石別有正方補養宣導今附於後養生方導引法云兩足指向下柱席兩湧泉相拓坐兩足跟頭兩膝頭外扒手身前向下盡勢七通去勞損陰痛膝冷七十一虛勞陰腫候此由風熱客於腎經腎經流於陰器腎虛不能宣散故致腫也七十二虛勞陰疝腫縮候疝者氣痛也眾筋會於陰器邪客於厥陰少陰之經與冷氣相搏則陰痛腫而攣縮七十三虛勞陰下癢濕候大虛勞損腎氣不足故陰冷汗液自泄風邪乘之則瘙癢其湯熨針石別有正方補養宣導今附於後養生方導引法云偃臥令兩手布膝頭取踵置尻下以口納氣腹脹自極以鼻出氣七息除陰下濕少腹裡痛膝冷不隨七十四虛勞陰瘡候腎榮於陰器腎氣虛不能制津液則汗濕虛則為風邪所乘邪客腠理而正氣不泄邪正相干在於皮膚故癢搔之則生瘡七十五風虛勞候風虛者百疴之長勞傷之人血氣虛弱其膚腠虛疏風邪易侵或遊易皮膚或沉滯臟腑隨其所感而眾病生焉其湯熨針石別有正方補養宣導今附於後養生方導引法云屈一足指向地努之使急一手倒挽足解谿向心極勢腰足解谿頭如似骨解氣散一手向後拓席一時盡勢三七左右換手亦然去手足腰膊風熱急悶又云抑頭卻背一時極勢手向下至膝頭直腰面身正還上來去三七始正身縱手向下左右動腰二七上下挽背脊七漸去背脊臂膊腰冷不和頭向下努手長舒向背上高舉手向上共頭漸漸五寸一時極勢手還收向心前向背後去來和諧氣共力調不欲氣強於力不欲力強於氣二七去胸背前後筋脈不和氣血不調又云伸左脛屈右膝內壓之五息止引肺氣去風虛令人目明依經為之引肺中氣去風虛病令人目明夜中見色與晝無異
