body:
  text: 卷之二十四注病諸候凡三十四論一諸注候凡注之言住也謂邪氣居住人身內故名為注此由陰陽失守經絡空虛風寒暑濕飲食勞倦之所致也其傷寒不時發汗或發汗不得真汗三陽傳於諸陰入於五臟不時除瘥留滯宿食或冷熱不調邪氣流注或乍感生死之氣或卒犯鬼物之精皆能成此病其變狀多端乃至三十六種九十九種而方不皆顯其名也又有九種注一曰風注皮肉掣振或遊易不定一年之後頭髮墮落頸項掣痛骨立解鳴兩目疼鼻中酸切牙齒蟲蝕又云其病人欲得解頭卻巾頭痛此名溫風病人體熱頭痛骨節厥強此名汗風或遊腫在腹或在手腳此名柔風或啖食眠臥汗出此名水風或腦轉肉裂目中系痛不欲聞人語聲此名大風或不覺絶倒口有白沫此名絶風或被髮狂走打破人物此名顛風或叫呼罵詈獨語談笑此名狂風或口噤面喎戾四肢不隨此名寄風或體上生瘡眉毛墮落此名糾風或頑痹如蠔螫或瘡或癢或痛此名蠔風或舉身戰動或鼻塞此名罩風又云人死三年之外魂神因作風塵著人成病則名風注二曰寒注心腹懊痛嘔沫二年之後大便便血吐逆青沫心懊痛硬腹滿腰脊疼強痛三曰氣注走入神機妄言百日之後體皮腫起乍來乍去一年之後體滿失顏色三年之後變吐作蟲難治四曰生注心脅痛轉移無常三日之後體中痛移易牽掣沖絞心脅一年之後顏目赤精澤青黑二年之後咳逆下痢變作蟲難治五曰涼注心下乍熱乍寒一年之後四肢重喜臥噫酢體常浮腫往來不時皮肉黑羸瘦生澼目黃爪甲及口唇青六曰酒注體氣動熱氣從胸中上下無處不痛一年之後四肢重喜臥喜噦噫酸體面浮腫往來不時七曰食注心下硬痛懊憹徹背一年之後令人羸瘦虛腫先從腳起體肉變黑臍內時絞痛八曰水注手腳起腫百日之後體肉變黃發落目失明一年之後難治三年身體腫水轉盛體生蟲死不可治九曰尸注體痛牽掣非常七日之後體肉變白駁咽喉內吞如有物兩脅裡硬時痛凡欲知是注非注取紙覆痛處燒頭髮令焦以簇紙上若是注發黏著紙此注氣引之也若非注發即不著紙診其注病脈浮大可治細而數難治養生方云諸濕食不見影食之成卒注二風注候注之言住也言其連滯停住也風注之狀皮膚遊易往來痛無常處是也由體虛受風邪邪氣客於榮衛隨氣行遊故謂風注其湯燙針石別有正方補養宣導今附於後養生方導引法云兩手交拓兩膊頭面兩肘頭仰上極勢身平頭仰同時取勢肘頭上下三七搖之去膊肘風注咽項急血脈不通三鬼注候注之言住也言其連滯停住也人有先無他病忽被鬼排擊當時或心腹刺痛或悶絶倒地如中惡之類其得瘥之後餘氣不歇停住積久有時發動連滯停住乃至於死死後注易傍人故謂之鬼注四五注候注者住也言其連滯停住死又注易傍人也注病之狀或乍寒乍熱或皮膚淫躍或心腹脹刺痛或支節沉重變狀多端而方云三十六種九十九種及此等五注病皆不顯出其名大體與諸注皆同五轉注候轉注言死又注易傍人轉注之狀與諸注略同以其在於身內移轉無常故謂之轉注六生注候注者住也言其病連滯停住死又注易傍人也人有陰陽不調和血氣虛弱與患注人同共居處或看侍扶接而注氣流移染易得上與病者相似故名生注七死注候人有病注死者人至其家染病與死者相似遂至於死復易傍人故謂之死注八邪注候注者住也言其病連滯停住死又注易傍人也凡云邪者不正之氣也謂人之腑臟血氣為正氣其風寒暑濕魅鬾魍魎皆謂為邪也邪注者由人體虛弱為邪氣所傷貫注經絡留滯腑臟令人神志不定或悲或恐故謂之邪注九氣注候注者住也言其病連滯停住死又注易傍人也風邪搏於肺氣所為也肺主氣氣通行表裡邪乘虛弱故相搏之隨氣遊走衝擊痛無定所故名為氣注十寒注候人虛為寒邪所傷又搏於陰陰氣久不泄從外流內結積其病之狀心腹痛而嘔沫爪青休作有時至冬便劇故史為寒注也十一寒熱注候注者住也言其病連滯停住死又注易傍人也陰陽俱虛腑臟不和為風邪搏於血氣血者陰也氣者陽也邪搏於陰則寒搏於陽則熱致使陰陽不調互相乘加故發寒熱去來連年有時暫瘥而復發故謂之寒熱注十二冷注候注者住也言其病連滯停住死又注易傍人也陰陽偏虛為冷邪所傷留連腑臟停滯經絡內外貫注得冷則發腹內時時痛骨節痠疼故謂之冷注其湯尉針石別有正方補養宣導今附於後養生方導引法云一手長舒令掌仰一手捉頦挽之向外一時極勢二七左右亦然手不動兩向側極勢急挽之二七去頸骨急強頭風腦旋喉痹膊內冷注偏風十三蠱注候注者住也言其病連滯停住死又注易傍人也蠱是聚蛇蟲之類以器皿盛之令其自相啖食余有一個存者為蠱也而能變化人有造作敬事之者以毒害於他多於飲食內而行用之人中之者心悶腹痛其食五臟盡則死有緩有急急者倉卒十數日之間便死緩者延引歲月遊走腹內常氣力羸憊骨節沉重發則心腹煩懊而痛令人所食之物亦變化為蠱漸侵食腑臟盡而死死則病流注染著傍人故謂之蠱注十四毒注候注者住也言其病連滯停住死又注易傍人也毒者是鬼毒之氣因飲食入人腹內或上至喉間狀如有物吞吐不出或遊走身體痛如錐刀所刺連滯停久故謂之毒注十五惡注候注者住也言其病連滯停住死又注易傍人也惡注者惡毒之氣人體虛者受之毒氣入於經絡遂流移心腹其狀往來擊痛痛不一處故名為惡注十六注忤候注者住也言其病連滯停住死又注易傍人也忤者犯也人有卒然心腹擊痛乃至頓悶謂之客忤是觸犯鬼邪之毒氣當時療治雖歇餘毒不盡留住身體隨血氣而行發則四肢肌肉淫奕或五內刺痛時休時作其變動無常是因犯忤得之成注故名為注忤十七遁注候注者住也言其病連滯停住死又注易傍人也由人體虛受邪毒之氣停遁經絡臟腑之間發則四肢沉重而腹內刺痛發作無時病亦無定以其停遁不瘥故謂之遁注養生方云背汗倚壁成遁注又雞肉合獺肉食之令人病成遁注十八走注候注者住也言其病連滯停住死又注易傍人也人體虛受邪氣邪氣隨血而行或淫奕皮膚去來擊痛遊走無有常所故名為走注養生方云食米甘甜粥變成走注又兩脅也十九溫注候注者住也言其病連滯停住死又注易傍人也人有染溫熱之病瘥後餘毒不除停滯皮膚之間流入臟腑之內令人血氣虛弱不甚變食或起或臥沉滯不瘥時時發熱名為溫注二十喪注候注者住也言其病連滯停住死又注易傍人也人有臨尸喪體虛者則受其氣停經絡腑臟若觸見喪柩便即動則心腹刺痛乃至變吐故謂之喪注二十一哭注候注者住也言其病連滯停住死又注易傍人也人有因哭泣悲傷情性感動腑臟致虛凶邪之氣因入腹內使人四肢沉重其後若自哭及聞哭聲悵然不能自禁持悲感不已故謂之哭注二十二殃注候注者住也言其病連滯停住死又注易傍人也人有染疫癘之氣致死其餘殃不息流注子孫親族得病證狀與死者相似故名為殃注二十三食注候注者住也言其病連滯停住死又注易傍人也人有因吉凶坐席飲啖而有外邪惡毒之氣隨食飲入五臟沉滯在內流注於外使人肢體沉重心腹絞痛乍瘥乍發以其因食得之故謂之食注二十四水注候注者住也言其病連滯停住死又注易傍人也人腎虛受邪不能通傳水液故也腎與膀胱合俱主水膀胱為津液之腑腎氣下通於陰若腎氣平和則能通傳水液若虛則不能通傳脾與胃合俱主土胃為水穀之海脾候身之肌肉土性本剋水今腎不能通傳則水氣盛溢致令脾胃翻弱不能剋水故水氣流散四肢內潰五臟令人身體虛腫腹內鼓脹淹滯積久乍瘥乍甚故謂之水注二十五骨注候注者住也言其病連滯停住死又注易傍人也凡人血氣虛為風邪所傷初始客在皮膚後重遇氣血勞損骨髓空虛遂流注停滯令人氣血減耗肌肉消盡骨髓間時吸吸而熱或濈濈而汗柴瘦骨立故謂之骨注二十六血注候注者住也言其病連滯停住死又注易傍人也人血氣虛為邪所乘故也心主血脈心為五臟之主血虛受邪心氣亦不足其狀邪氣與血並心心守虛恍惚不定邪並於血則經脈之內淫奕沉重往來休作有時連注不瘥故謂之血注二十七濕痹注候注者住也言其病連滯停住死又注易傍人也凡有人風寒濕三氣合至而為痹也濕痹者是濕氣多也名為濕痹濕痹之狀四肢或緩或急骨節疼痛邪氣往來連注不瘥休作無度故為濕痹注二十八勞注候注者住也言其病連滯停住死又注易傍人也人大勞虛而血氣空竭為風邪所乘致不平復小運動便四肢體節沉重虛吸啜乏汗出連滯不瘥小勞則極故謂之勞注二十九微注候注者住也言其病連滯停住死又注易傍人也人血氣虛損為微風所乘搏人血氣在於皮膚絡脈之間隨氣遊走與氣相擊而痛去來無有常處但邪勢浮薄去來幾微而連滯不瘥故謂之微注三十泄注候注者住也言其病連滯停住死又注易傍人也人腑臟虛弱其氣外泄致風邪內侵邪搏於氣乘心之經絡則心痛如蟲齧氣上搏喉間如有物之狀吞吐不去發作有時連注不瘥故謂之泄注三十一石注候注者住也言其病連滯停住死又注易傍人也人血氣虛為風冷邪氣客在皮膚折於血氣或痛或腫其牢強如石故謂之石注三十二産注候注者住也言其病連滯停住死又注易傍人也人産後經絡空虛血氣傷竭為風邪所搏致不平復虛乏羸極血氣減少形體柴瘦沉痼不已因産後得之故謂之産注三十三土注候注者住也言其病連滯停住死又注易傍人也夫五行金木水火土六甲之辰並有禁忌人稟陰陽而生含血氣而長人之五臟配合五行土內主於脾氣為五行五臟之主其所禁忌尤難觸犯人有居住穿鑿地土不擇便利觸犯禁害土氣與人血氣相感便致疾病其狀土氣流注皮膚連入腑臟骨節沉重遍身虛腫其腫自破故謂之土注三十四飲注候注者住也言其病連滯停住死又注易傍人也人飲水漿多水氣不消停積為飲而重因體虛受風冷風冷搏於飲則成結實風飲俱乘於腑臟使陰陽不宣寒熱來往沉滯積月纍時故名為飲注
