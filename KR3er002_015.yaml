body:
  text: 卷之十五五臟六腑病諸候凡十三論一肝病候肝象木旺於春其脈弦其神魂其華在爪其充在筋其聲呼其臭臊其味酸其液泣其色青其藏血足厥陰其經也與膽合膽為腑而主表肝為臟而主裡肝氣盛為血有餘則病目赤兩脅下痛引小腹善怒氣逆則頭眩耳聾不聰頰腫是肝氣之實也則宜瀉之肝氣不足則病目不明兩脅拘急筋攣不得太息爪甲枯面青善悲恐如人將捕之是肝氣之虛也則宜補之於四時病在肝愈於夏夏不愈甚於秋秋不死待於冬起於春於日愈在丙丁丙丁不愈加於庚辛庚辛不死待於壬癸起於甲乙於時平旦慧下哺甚夜半靜禁當風肝部左手關上是也平肝脈來綽綽如按琴瑟之弦如揭長竿末梢曰肝平春以胃氣為本春肝木王其脈弦細而長是平脈也反得微澀而短者是肺之乘肝金之剋木大逆十死不治反得浮大而洪者是心乘肝子之扶母雖病當愈反得沉濡滑者是腎乘肝母之歸子雖病當愈反得大而緩者是脾之乘肝為土之陵木土之畏木雖病不死病肝脈來盛實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死真肝脈至中外急如循刀刃賾賾然如新張弓弦色青白不澤毛折乃死養生方云春三月此謂發陳天地俱生萬物以榮夜臥早起闊步於庭被髮緩形以使春志生生而勿殺與而勿奪賞而勿罰此春氣之應也養生之道也逆之則傷於肝夏變為寒則奉長生者少養生方導引法云肝臟病者愁憂不樂悲思嗔怒頭旋眼痛呵氣出而愈二心病候心象火旺於夏其脈如鉤而洪大其候舌其聲言其臭焦其味苦其液汗其養血其色赤其藏神手少陰其經也與小腸合小腸為腑而主表心為臟而主裡心氣盛為神有餘則病胸內痛脅支滿脅下痛膺背膊胛間痛兩臂內痛喜笑不休是心氣之實也則宜瀉之心氣不足則胸腹大脅下與腰背相引痛驚悸恍惚少顏色舌本強善憂悲是為心氣之虛也則宜補之於四時病在心愈於長夏長夏不愈甚於冬冬不死待於春起於夏於日愈在戊己戊己不愈加於壬癸壬癸不死待於甲乙起於丙丁於時日中慧夜半甚平旦靜禁溫衣熱食心部在左手寸口是也平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本夏心火王其脈浮洪大而散名曰平脈也反得沉濡滑者腎之乘心水之剋火為大逆十死不治反得弦而長是肝乘心母歸子雖病當愈反得大而緩是脾乘心子之扶母雖病當愈反得微澀而短是肺之乘心金之陵火為微邪雖病不死病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後倨如操帶鉤曰心死真心脈至堅而搏如循薏苡纍纍然其色赤黑不澤毛折乃死其湯尉針石別有正方補養宣導今附於後養生方云夏三月此謂蕃莠天地氣交萬物英實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧養生方導引法云心臟病者體有冷熱若冷呼氣出若熱吹氣出又云左脅側臥口納氣申臂直腳以鼻出之周而復始除心下不便也三脾病候脾象土王於長夏其脈緩其形口其聲歌其臭香其味甘其液涎其養形肉其色黃而藏意足太陰其經也與胃合胃為腑主表脾為臟主裡脾氣盛為形有餘則病腹脹溲不利身重苦飢足萎不收行善瘈腳下痛是為脾氣之實也則宜瀉之脾氣不足則四肢不用後泄食不化嘔逆腹脹腸鳴是為脾氣之虛也則宜補之於四時病在脾愈在秋秋不愈甚於春春不死待於夏起於長夏於日愈於庚辛庚辛不愈加於甲乙甲乙不死待於丙丁起於戊己於時日昳慧平旦甚下晡靜脾欲緩急食甘以緩之用苦以瀉之甘以補之禁溫食飽食濕地濡衣脾部在右手關上是也平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本六月脾土旺其脈大阿阿而緩名曰平脈也反得弦而急是肝之乘脾木之剋土為大逆十死不治反得微澀而短是肺之乘脾子之扶母不治自愈反得浮而洪者是心乘脾母之歸子當瘥不死反得沉濡而滑者是腎之乘脾水之陵土為微邪當瘥脾脈長長而弱來疏去穊再至曰平三至曰離經四至曰奪精五至曰死六至曰命盡病脾脈來實而盛數如雞舉足曰脾病死脾脈來堅鋭如烏之喙如鳥之距如屋之漏如水之溜曰脾死真脾脈至弱而乍數乍疏其色青黃不澤毛折乃死養生方導引法云脾臟病者體面上游風習習痛身體癢煩悶疼痛用嘻氣出四肺病候肺象金旺於秋其脈如毛而浮其候鼻其聲哭其臭腥其味辛其液涕其養皮毛其藏氣其色白其神魄手太陰其經與大腸合大腸為腑主表肺為臟主裡肺氣盛為氣有餘則病喘咳上氣肩背痛汗出尻陰股膝踹脛足皆痛是為肺氣之實也則宜瀉之肺氣不足則少氣不能報息耳聾嗌乾是為肺氣之虛也則宜補之於四時病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋於日愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛於時下晡慧夜半靜日中甚肺欲收急食酸以收之用酸補之辛瀉之禁寒飲食寒衣肺部在右手關前寸口是也平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本秋肺金王其脈浮澀而短是曰平脈也反得浮大而洪者是心之乘肺火之剋金為大逆十死不治也反得沉濡而滑者是腎之乘肺子之扶母病不治自愈反得緩大而長阿阿者是脾之乘肺母之歸子雖病當愈反得弦而長者是肝之乘肺木之陵金為微邪雖病當愈肺脈來泛泛而輕如微風吹鳥背上毛再至曰平三至曰離經四至曰奪精五至曰死六至曰命盡病肺脈來上下如循雞羽曰肺病肺病其色白身體但寒無熱時時欲咳其脈微遲為可治死肺脈來如物之浮如風吹毛曰肺死秋胃微毛曰平胃氣少毛多曰肺病但如毛無胃氣曰死毛有弦曰春病弦甚曰今病真肺脈至大而虛如毛羽中人膚其色赤白不澤毛折乃死其湯尉針石別有正方補養宣導今附於後養生方云多語則氣爭肺脹口燥又云秋三月此為容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋形收斂神氣使秋氣平無外其志使肺氣清此秋氣之應也養收之道也逆之則傷肺冬為飧泄養生方導引法云肺臟病者體胸背痛滿四肢煩悶用噓氣出又云以兩手據地覆之口納氣鼻出之除胸中肺中病也五腎病候腎象水旺於冬其脈如石而沉其候耳其聲呻其臭腐其味鹹其液唾其養骨其色黑其神志足少陰其經也與膀胱合膀胱為腑主表腎為臟主裡腎氣盛為志有餘則病腹脹飧泄體腫喘咳汗出憎風面目黑小便黃是為腎氣之實也則宜瀉之腎氣不足則厥腰背冷胸內痛耳鳴苦聾是為腎氣之虛也則宜補之於四時病在腎愈在春春不愈甚於長夏長夏不死待於秋起於冬於日愈於甲乙甲乙不愈加於戊己戊己不死待於庚辛起於壬癸於時夜半慧日乘四季甚下晡靜腎欲堅急食苦以堅之咸以瀉之苦以補之無犯塵垢無衣炙衣腎部在左手關後尺中是也平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本冬腎水王其脈沉濡而滑名曰平脈也反得浮大而緩者是脾之乘腎土之剋水為大逆十死不治反得浮澀而短者是肺之乘腎母之歸子為虛邪雖病易治反得弦細長者是肝之乘腎子之扶母為實邪雖病自愈反得浮大而洪者是心之乘腎火之陵水為微邪雖病治之不死也病腎脈來如引葛按之益堅曰腎病腎風水其脈大緊身無痛形不瘦不能食善驚驚以心萎者死死腎脈來發如奪索辟辟如彈石曰腎死冬胃微石曰平胃少石多曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病藏真下於腎腎藏骨髓之氣真腎脈至搏而絶如彈石辟辟然其色黃黑不澤毛折乃死諸真藏脈見者皆死不治其湯尉針石別有正方補養宣導今附於後養生方云冬三月此為閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應也養藏之道也逆之則傷腎春為萎厥養生方導引法云腎臟病者咽喉窒塞腹滿耳聾用呬氣出又云兩足交坐兩手捉兩足解溪換之極勢頭仰來去七去腎氣壅塞六膽病候膽象木旺於春足少陽其經也肝之腑也決斷出焉諸腑臟皆取決斷於膽其氣盛為有餘則病腹內冒冒不安身軀軀習習是為膽氣之實也則宜瀉之膽氣不足其氣上溢而口苦善太息嘔宿汁心下淡淡如人將捕之嗌中介介數唾是為膽氣之虛也則宜補之七小腸病候小腸象火旺於夏手太陽其經也心之腑也水液之下行為溲便者流於小腸其氣盛為有餘則病小腸熱焦竭乾澀小腸䐜脹是為小腸之氣實也則宜瀉之小腸不足則寒氣客之腸病驚跳不言乍來乍去是為小腸氣之虛也則宜補之八胃病候胃象土旺於長夏足陽明其經也脾之腑也為水穀之海諸臟腑皆受水穀之氣於胃其氣盛為有餘則病腹䐜脹氣滿是為胃氣之實也則宜瀉之胃氣不足則飢而不受水穀飧泄嘔逆是為胃氣之虛也則宜補之胃脈實則脹虛則泄關脈滑胃中有熱脈滑為實氣滿不欲食關脈浮積熱在胃內九大腸病候大腸象金旺於秋手陽明其經也肺之腑也為傳導之官變化糟粕出焉其氣盛為有餘則病腸內切痛如錐刀刺無休息腰背寒痹攣急是為大腸氣之實則宜瀉之大腸氣不足則寒氣客之善泄是大腸之氣虛也則宜補之診其右手寸口脈手陽明經也脈浮則為陽陽實者大腸實也若腸內切痛如錐刀刺無休息時十膀胱病候膀胱象水旺於冬足太陽其經也腎之腑也五穀五味之津液悉歸於膀胱氣化分入血脈以成骨髓也而津液之餘者入胞則為小便其氣盛為有餘則病熱胞澀小便不通小腹偏腫痛是為膀胱氣之實也則宜瀉之膀胱氣不足則寒氣客之胞滑小便數而多也面色黑是膀胱氣之虛也則宜補之其湯尉針石別有正方補養宣導今附於後養生方導引法云蹲坐欹身弩兩手向前仰掌極勢左右轉身腰三七去膀胱內冷血風骨節急強又云互跪調和心氣向下至足意里想氣索索然流布得所始漸漸平身舒手傍肋如似手掌納氣出氣不止而覺急悶即起脊至地來去二七微減膝頭冷膀胱宿病腰脊強齊下冷悶十一三焦病候三焦者上焦中焦下焦是也上焦之氣出於胃上口並咽以上貫鬲布胸內走掖循太陰之分而行上至舌下至足陽明常與榮衛俱行主內而不出也中焦之氣亦並於胃口出上焦之後此受氣者泌糟粕承津液化為精微上注於肺脈乃化而為血主不上不下也下焦之氣別回腸注於膀胱而滲入焉主出而不內故水穀常並居於胃成糟粕而俱下於大腸也謂此三氣焦乾水穀分別清濁故名三焦三焦為水穀之道路氣之所終始也三焦氣盛為有餘則脹氣滿於皮膚內輕輕然而不牢或小便澀或大便難是為三焦之實也則宜瀉之三焦之氣不足則寒氣客之病遺尿或泄利或胸滿或食不消是三焦之氣虛也則宜補之診其寸口脈遲上焦有寒尺脈遲下焦有寒尺脈浮者客陽在下焦十二五臟橫病候夫五臟者肝象木心象火脾象土肺象金腎象水其氣更休更旺互虛互實自相乘克內生於病此為正經自病非外邪傷之也若寒溫失節將適乖理血氣虛弱為風濕陰陽毒氣所乘則非正經自生是外邪所傷故名橫病也其病之狀隨邪所傷之臟而形證見焉其湯尉針石別有正方補養宣導今附於後養生方導引法云從膝以下有病當思齊下有赤光內外連沒身也從膝以上至腰有病當思脾黃光從腰以上至頭有病當思心內赤光病在皮膚寒熱者當思肝內青緑光皆當思其光內外連而沒已身閉氣收光以照之此消疾卻邪甚驗篤信精思行之病無不愈十三脾脹病候脾脹病者是脾虛為風邪所乘正氣與邪氣交結令脾氣不宣調擁聚而脹也其病喜噦四肢急體重不能勝衣也
