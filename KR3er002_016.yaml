body:
  text: 卷之十六心痛病諸候凡五論一心痛候心痛者風冷邪氣乘於心也其痛發有死者有不死者有久成疹者心為諸臟主而藏神其正經不可傷傷之而痛為真心痛朝發夕死夕發朝死心有支別之絡脈其為風冷所乘不傷於正經者亦令心痛則乍間乍甚故成疹不死又心為火與諸陽會合而手少陰心之經也若諸陽氣虛少陰之經氣逆謂之陽虛陰厥亦令心痛其痛引喉是也又諸臟虛受病氣乘於心者亦令心痛則心下急痛謂之脾心痛也足太陰為脾之經與胃合足陽明為胃之經氣虛逆乘心而痛其狀腹脹歸於心而痛甚謂之胃心痛也腎之經足少陰是也與膀胱合膀胱之經足太陽是也此二經俱虛而逆逆氣乘心而痛者其狀下重不自收持苦泄寒中為腎心痛也診其心脈微急為心痛引背食不下寸口脈沉緊苦心下有寒時痛關上脈緊心下苦痛左手寸口脈沉則為陰絶陰絶者無心脈也苦心下毒痛二久心痛候心為諸臟主其正經不可傷傷之而痛者則朝發夕死夕發朝死不暇展治其久心痛者是心之支別絡脈為風邪冷熱所乘痛也故成疹不死發作有時經久不瘥也三心懸急懊痛候心與小腸合為表裡俱象於火而火為陽氣也心為諸臟主故正經不受邪若為邪所傷而痛即死若支別絡脈為風邪所乘而痛則經久成疹其痛懸急懊者是邪迫於陽氣不得宣暢壅瘀生熱故心如懸而急煩懊痛也四心痛多唾候心痛而多唾者停飲乘心之絡故也停飲者水液之所為也心氣通於舌心與小腸合俱象火小腸心之腑也其水氣下行於小腸為溲便則心絡無有停飲也膀胱與腎俱象水膀胱為腎之腑主藏津液腎之液上為唾腎氣下通於陰若腑臟和平則水液下流宣利若冷熱相乘致腑臟不調津液水飲停積上迫於心令心氣不宣暢故痛而多唾也五心痛不能飲食候心痛而不能飲食者積冷在內客於脾而乘心絡故也心陽氣也冷陰氣也冷乘於心陰陽相乘冷熱相擊故令痛也脾主消水穀冷氣客之則脾氣冷弱不勝於水谷也心為火脾為土是母子也俱為邪所乘故痛復不能飲食也腹痛病諸候凡四論一腹痛候腹痛者由腑臟虛寒冷之氣客於腸胃募原之間結聚不散正氣與邪氣交爭相擊故痛其有陰氣搏於陰經者則腹痛而腸鳴謂之寒中是陽氣不足陰氣有餘者也診其寸口脈沉而緊則腹痛尺脈緊臍下痛脈沉遲腹痛脈來觸觸者少腹痛脈陰弦則腹痛凡腹急痛此里之有病其脈當沉若細而反浮大故當愈矣其人不即愈者必當死以其病與脈相反故也其湯尉針石別有正方補養宣導今附於後養生方導引法云治股脛手臂痛法屈一脛臂中所痛者正偃臥口鼻閉氣腹痛以意推之想氣往至痛上俱熱即愈又云偃臥展兩脛兩手仰足指以鼻納氣自極七息除腹中弦急切痛又云正偃臥以口徐徐納氣以鼻出之除裡急飽食後咽氣數十令溫中若氣寒者使人乾嘔腹痛口納氣七十所大振腹咽氣數十兩手相摩令熱以摩腹令氣下又云偃臥仰兩足兩手鼻納氣七息除腹中弦切痛二久腹痛候久腹痛者臟腑虛而有寒客於腹內連滯不歇發作有時發則腸鳴而腹絞痛謂之寒中是冷搏於陰經令陽氣不足陰氣有餘也寒中久痛不瘥冷入於大腸則變下痢所以然者腸鳴氣虛故也腸虛則泄故變下痢也三腹脹候腹脹者由陽氣外虛陰氣內積故也陽氣外虛受風冷邪氣風冷陰氣也冷積於腑臟之間不散與脾氣相擁虛則脹故腹滿而氣微喘診其脈右手寸口氣口以前手陽明經也脈浮為陽按之牢強謂之為實陽實者病腹滿氣喘嗽右手關上脈足太陰經也陰實者病腹脹滿煩擾不得臥也關脈實即腹滿響關上脈浮而大風在胃內腹脹急心內淡淡食欲嘔逆關脈浮腹滿不欲食脈浮為是虛滿左手尺中神門以後脈足少陰經沉者為陰陰實者病苦小腹滿左手尺中陰實者腎實也苦腹脹善鳴左手關後尺中脈浮為陽陽實者膀胱實也苦少腹滿引腰痛脈來外澀者為奔腹脹滿也病苦腹滿而喘脈反滑利而沉皆為逆死不治腹脹脈浮者生虛小者死其湯尉針石別有正方補養宣導今附於後養生方導引法云蹲坐住心卷兩手發心向下左右手搖臂遞互欹身盡膊勢卷頭築肚兩手衝脈至臍下來去三七漸去腹脹肚急悶食不消化又云腹中苦脹有寒以口呼出氣三十過止又云若腹中滿食飲苦飽端坐伸腰以口納氣數十滿吐之以便為故不便復為之有寒氣腹中不安亦行之又云端坐伸腰口納氣數十除腹滿食飲過飽寒熱腹中痛病又云兩手向身側一向偏相極勢發頂足氣散下欲似爛物解散手掌指直舒左右相皆然去來三七始正身前後轉動膊腰七去腹肚脹膀胱腰脊臂冷血脈急強悸也又云苦腹內滿飲食善飽端坐伸腰以口納氣數十以便為故不便復為又云脾主土土暖如人肉始得發汗去風冷邪氣若腹內有氣脹先須暖足摩臍上下並氣海不限遍數多為佳始得左回右轉三七和氣如用要用身內一百一十三法回轉三百六十骨節動脈搖筋氣血布澤二十四氣和潤臟腑均調和氣在用頭動轉搖振手氣向上心氣向下分明知去知來莫問平手欹腰轉身摩氣屈蹙迥動盡心氣放散送至湧泉一一不失氣之行度用之有益不解用者疑如氣亂四久腹脹候久腹脹者此由風冷邪氣在腹內不散與臟腑相搏脾虛故脹其脹不已連滯停積時瘥時發則成久脹也久脹不已則食不消而變下痢所以然者脾胃為表裡脾主消水穀胃為水穀之海脾虛寒氣積久脾氣衰弱故食不消也而冷移入大腸大腸為水穀糟粕之道路虛而受冷故變為痢也心腹痛病諸候凡七論一心腹痛候心腹痛者由腑臟虛弱風寒客於其間故也邪氣發作與正氣相擊上衝於心則心痛下攻於腹則腹痛上下相攻故心腹絞痛氣不得息診其脈左手寸口人迎以前脈手厥陰經也沉者為陰陰虛者病苦心腹痛難以言心如寒狀心腹㽲痛不得息脈細小者生大堅疾者死心腹痛脈沉細小者生浮大而疾者死其湯尉針石別有正方補養宣導今附於後養生方導引法云行大道常度日月星辰清淨以雞鳴安身臥嗽口三咽之調五臟殺蠱蟲治心腹痛令人長生二久心腹痛候久心腹痛者由寒客於腑臟之間與血氣相搏隨氣上下攻擊心腹絞結而痛臟氣虛邪氣盛停積成疹發作有時為久心腹痛也然心腹久痛冷氣結聚連年積歲日月過深變為寒疝三心腹相引痛候心腹相引痛者足太陰之經與絡俱虛為寒冷邪氣所乘故也足太陰是脾之脈起於足大指之端上循屬脾絡胃其支脈復從胃別上注心經入於胃絡注於心此二脈俱虛為邪所乘正氣與邪氣交爭在於經則胃脘急痛在於絡則心下急痛經絡之氣往來邪正相擊在於其間所以心腹相引痛也太陰厥逆䯒急攣心腹引於腹也四心腹脹候心腹脹者臟虛而邪氣客之乘於心脾故也足太陰脾之經也脾虛則脹足少陰腎之經也其脈起於足小指之下循行上絡膀胱其直者從腎上入肺其支者從肺出絡於心臟虛邪氣客於二經與正氣相搏積聚在內氣並於脾脾虛則脹故令心腹煩滿氣急而脹也診其脈遲而滑者脹滿也其湯尉針石別有正方補養宣導今附於後養生方導引法云伸右脛屈左膝內壓之五息引脾去心腹寒熱胸臆邪脹依經為之引脾中熱氣出去心腹中寒熱胸臆中邪氣脹滿久行無有寒熱時節之所中傷名為真人之方五久心腹脹候久心腹脹者由腑臟不調寒氣乘之入並於心脾脾虛則脹停積成疹有時發動故為久也久脹不已脾虛寒氣積胃氣亦冷脾與胃為表裡也此則腑臟俱冷令飲食不消若寒移入大腸則變下痢六胸脅痛候胸脅痛者由膽與肝及腎之支脈虛為寒氣所乘故也足少陽膽之經也其支脈從目兌眥貫目下行至胸循脅裡足厥陰肝之經也其脈起足大指叢毛上循入腹貫膈布脅肋足少陰腎之經也其支脈從肺出絡心注胸中此三經之支脈並循行胸脅邪氣乘於胸脅故傷其經脈邪氣之與正氣交擊故令胸脅相引而急痛也診其寸口脈弦而滑弦即為痛滑即為實痛即為急實即為躍弦滑相搏即胸脅搶息痛也七卒苦煩滿叉胸脅痛欲死候此由手少陽之絡脈虛為風邪所乘故也手少陽之脈起小指次指之端上循入缺盆布亶中散絡心包風邪在其經邪氣迫於心絡心氣不得宣暢故煩滿乍上攻於胸或下引於脅故煩滿而叉胸脅痛也若經久邪氣留連搏於臟則成積搏於腑則成聚也
