body:
  text: 卷之二十九鼻病諸候凡十一論一鼻衄候經云脾移熱於肝則為驚衄脾土也肝木也木本剋土今脾熱為土氣翻盛逆往乘木是木之虛不能制土故受脾之移熱也肝之神為魂而藏血虛熱則魂神不定故驚也凡血與氣內榮腑臟外循經絡相隨而行於身周而復始血性得寒則凝澀熱則流散而氣肺之所主也肺開竅於鼻熱乘於肺則氣亦熱也血氣俱熱血隨氣發出於鼻為鼻衄診其寸口微芤者衄血寸脈血苦寒為是衄血寸脈微弱尺脈澀弱則發熱澀為無血其人必厥微嘔夫厥當眩不眩而反頭痛痛為實下虛上實必衄也肝脈大喜為衄脈陰陽錯而浮必衄血脈細而數數反在上法當吐而不吐其面顴上小赤眼中白膚上自有細赤脈如發其趣至黑瞳子上者當衄病人面無血色無寒熱脈沉弦者衄也衄發從春至夏為太陽衄從秋至冬為陽明衄連日不止者其脈輕輕在肌尺中自浮目精暈黃衄必未止若暈黃去目睛了慧知衄今止脈滑小弱者生實大者死診衄人其脈小滑者生大躁者死不治也鼻衄脈沉細者生浮大而牢者死養生方云思慮則傷心心傷則吐衄血二鼻衄不止候肝藏血肺主氣開竅於鼻血之與氣相隨而行內榮腑臟外循經絡腑臟有熱熱乘血氣血性得熱即流溢妄行發於鼻者為鼻衄臟虛血盛故衄不止三鼻大衄候鼻衄由血氣虛熱故也肝藏血肺主氣而開竅於鼻血之與氣相隨而行循於經絡榮於腑臟若榮傷過度腑臟生熱熱乘血氣血性得熱則流散妄行從鼻出者謂之衄其云鼻大衄者是因鼻衄而口鼻皆出血故云鼻大大衄也四鼻久衄候鼻衄由熱乘血氣也肝藏血肺主氣開竅於鼻勞損臟腑血氣生熱血得熱則流散妄行隨氣發於鼻者各為鼻衄臟虛不復勞熱停積故衄經久不瘥五鼻齆候肺主氣其經手太陰之脈也其氣通鼻若肺臟調和則鼻氣通利而知臭香若風冷傷於臟腑而邪氣乘於太陰之經其氣蘊積於鼻者則津液壅塞鼻氣不宣調故不知香臭而為齆也其湯尉針石別有正方補養宣導今附於後養生方導引法云東向坐不息三通手捻鼻兩孔治鼻中患交腳踑坐治鼻中患通腳癰瘡去其涕唾令鼻道通得聞香臭久行不已徹聞十方六鼻生瘡候鼻是肺之候肺氣通於鼻其臟有熱氣衝於鼻故生瘡也其湯尉針石別有正方補養宣導今附於後養生方導引法云踞坐合兩膝張兩足不息五通治鼻瘡七鼻瘜肉候肺氣通於鼻肺臟為風冷所乘則鼻氣不和津液壅塞而為鼻齆冷搏於血氣停結鼻內故變生瘜肉其湯尉針石別有正方補養宣導今附於後養生方導引法云端坐伸腰徐徐以鼻納氣以右手捻鼻徐徐閉目吐氣除目暗淚苦出鼻中瘜肉耳聾亦能除傷寒頭痛洗洗皆當以汗出為度又云東向坐不息三通以手捻鼻兩孔治鼻中瘜肉八鼻窒塞氣息不通候肺氣通於鼻其臟為風冷所傷故鼻氣不宣利壅塞成齆冷氣結聚搏於血氣則生瘜肉冷氣盛者則瘜肉生長氣息窒塞不通也九鼻涕候夫津液涕唾得熱即乾燥得冷則流溢不能自收肺氣通於鼻其臟有冷冷隨氣入乘於鼻故使津涕不能自收十鼻痛候肺氣通於鼻風邪隨氣入於鼻內搏於血氣邪正相擊氣道不宣故鼻痛十一食諸物誤落鼻內候頏顙之間通於鼻道氣入有食物未及下喉或因言語或因噫咳而氣則逆故食物因氣逆者誤落鼻內耳病諸候凡九論一耳聾候腎為足少陰之經而藏精氣通於耳耳宗脈之所聚也若精氣調和則腎臟強盛耳聞五音若勞傷血氣兼受風邪損於腎臟而精脫精脫者則耳聾然五臟六腑十二經脈有絡於耳者其陰陽經氣有相併時並則有臟氣逆名之為厥厥氣相搏入於耳之脈則令聾其腎病精脫耳聾者候頰顴其色黑手少陽之脈動而氣厥逆而耳聾者其候耳內輝輝焞焞也手太陽厥而聾者其候聾而耳納氣滿其湯尉針石別有正方補養宣導今附於後養生方云勿塞故井及水瀆令人耳聾目盲養生方導引法云坐地交叉兩腳以兩手從曲腳中入低頭叉手項上治久寒不自溫耳不聞聲又云腳著項上不息十二通必愈大寒不覺暖熱久頑冷患耳聾目眩久行即成法法身五六不能變二耳風聾候足少陰腎之經宗脈之所聚其氣通於耳其經脈虛風邪乘之風入於耳之脈使經氣痞塞不宣故為風聾風隨氣脈行於頭腦則聾而時頭痛故謂之風聾三勞重聾候足少陰腎之經宗脈之所聚其氣通於耳勞傷於腎宗脈則虛損血氣不足故為勞聾勞聾為病因勞則甚有時將適得所血氣平和其聾則輕四久聾候足少陰腎之經宗脈之所聚其氣通於耳勞傷於腎宗脈虛損血氣不足為風邪所乘故成耳聾勞傷甚者血氣虛極風邪停滯故為久聾五耳鳴候腎氣通於耳足少陰腎之經宗脈之所聚勞動經血而血氣不足宗脈虛風邪乘虛隨脈入耳與氣相擊故為耳鳴診其右三手脈寸口名曰氣以前脈浮則為陽手陽明大腸脈也沉則為陰手太陰肺肺也陰陽俱虛者皮為血氣虛損宗脈不足病苦耳鳴嘈嘈眼時妄見光此是肺與大腸俱虛也右手尺中神門以後脈浮為陽足太陽膀胱脈也虛者膀胱虛也腎與膀胱合病苦耳鳴忽然不聞時惡風膀胱虛則三焦實也膀胱為津液之府若三焦實則克消津液克消津液故膀胱虛也耳鳴不止則變成聾六聤耳候耳者宗脈之所聚腎氣之所通足少陰腎之經也勞傷血氣熱乘虛也入於其經邪隨血氣至耳熱氣聚則生膿汁故謂之聤耳七耳疼痛候凡患耳中策策痛者皆是風入於腎之經也不治流入腎則卒然變脊強背直成痙也若因痛而腫生癰癤膿潰邪氣歇則不成痙所以然者足少陰為腎之經宗脈之所聚其氣通於耳上焦有風邪入於頭腦流至耳內與氣相擊故耳中痛耳為腎候其氣相通腎候腰脊主骨髓故邪流入腎脊強背直八耳盯聹候耳耵聹者耳里津液結聚所成人耳皆有之輕者不能為患若加以風熱乘之則結硬成丸核塞耳亦令耳暴聾九耳瘡候足少陰為腎之經其氣通於耳其經虛風熱乘之隨脈入於耳與血氣相搏故耳生瘡牙齒病諸候凡二十一論一牙齒痛候牙齒痛者是牙齒相引痛牙齒是骨之所終髓之所養手陽明之支脈入於齒若髓氣不足陽明脈虛不能榮於牙齒為風冷所傷故疼痛也又有蟲食於牙齒則齒根有孔蟲居其間又傳受余齒亦綿疼痛此則針灸不瘥敷藥蟲死乃痛止二牙痛候牙齒皆是骨之所終髓氣所養而手陽明支脈入於齒脈虛髓氣不足風冷傷之故疼痛也又蟲食於齒則根有孔蟲於其間又傳受余齒亦痛掣難忍若蟲痛非針灸可瘥敷藥蟲死乃痛止三齒痛候手陽明之支脈入於齒齒是骨所終髓之所養若風冷客於經絡傷髓冷氣入齒根則齒痛若蟲食齒而痛者齒根有孔蟲在其間此則針灸不瘥敷藥蟲死痛乃止其湯尉針石別有正方補養宣導今附於後養生方云常向本命日櫛發之始叩齒九通陰咒曰太帝散靈五老反真泥丸玄華保精長存左拘隱月右引根六合清練百神受恩咒畢咽唾三過常數行這使齒不痛發牢不白頭腦不痛養生方導引法云東向坐不息四通琢齒二七治齒痛病大張口琢齒二七一通二七又解四通中間其二七大勢以意消息瘥病而已不復疼痛解病鮮白不梨亦不疏離久行不已能破金剛又云東向坐不息四通上下琢齒三十六下治齒痛四風齒候手陽明之支脈入於齒頭面有風陽明之脈虛風乘虛隨脈流入於齒者則令齒有風微腫而根浮也其湯尉針石別有正方補養宣導今附於後養生方導引法云凡人常覺脊背皆崛強而悶不問時節縮咽膊內仰面努膊井向上頭左右兩向挪之左右三七一住待血行氣動定然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰如用辰別三七除寒熱病脊腰頭頸項痛風痹口內生瘡牙齒風頭眩終盡除也五齒齦腫候手陽明之支脈入於齒頭面有風風氣流入陽明之脈與齦間血氣相搏故成腫養生方云水銀不得近牙齒發齦腫善落齒六齒間血出候手陽明之支脈入於齒頭面有風而陽明脈虛風挾熱乘虛入齒齦搏於血故血出也七牙齒蟲候牙齒蟲是蟲食牙又食於齒亦令牙齒疼痛皆牙齒根有孔蟲居其內食牙齒盡又度食余牙齒八牙蟲候牙蟲是蟲食於牙牙根有孔蟲在其間亦令牙疼痛食一牙盡又度食余牙九齒蟲候齒蟲是蟲食於齒齒根有孔蟲在其間亦令齒疼痛食一齒盡又度食余齒養生方云雞鳴時常叩齒三十六下長行之齒不蠹蟲令人齒牢又云朝未起早漱口中唾滿口乃吞之輒琢齒二七過如此者三乃止名曰煉精使人丁壯有顏色去蟲而牢齒又云人能恆服玉泉必可丁壯妍悅去蟲牢齒玉泉謂口中唾也十齒齲注候手陽明之支脈入於齒足陽明脈有入於頰遍於齒者其經虛風氣客之結搏齒間與血氣相乘則齦腫熱氣加之膿汁出而臭侵食齒齦謂之齲齒亦曰風齲養生方云朝夕琢齒齒不齲又云食畢常漱口數過不爾使人病齲齒十一齒䘌候齒䘌者是蟲食齒至齦膿爛汁臭如蝕之狀故謂之齒䘌十二齒挺候手陽明之支脈入於齒頭面有風冷傳入其脈令齒齦間津液化為膿汁血氣虛竭不能榮於齒故齒根露而挺出十三齒動搖候手陽明之支脈入於齒足陽明之脈又遍於齒齒為骨之所終髓之所養經脈虛風邪乘之血氣不能榮潤故令動搖十四齒落不生候齒牙皆是骨之所終髓之所養手陽明足陽明之脈併入於齒若血氣充實則骨髓強盛其齒損落猶能更生若血氣虛耗風冷乘之致令齒或齲或齦落者不能復生十五齒音離候齒音離者是風冷客於齒齦間令齒齦落而膿出其齒則疏語則齒間有風過之聲世謂之齒音離也十六牙齒歷蠹候牙齒皆是骨之所終髓之所養也手陽明足陽明之脈皆入於齒風冷乘其經脈則髓骨血損不能榮潤於牙齒故令牙齒黯黑謂之歷蠹十七齒漏候手陽明之支脈入於齒風邪客於經脈流滯齒根使齦腫膿汁出愈而更發謂之齒漏十八齒齭候齒者骨之所終髓之所養髓弱骨虛風氣客之則齒齭十九拔齒損候手陽明足陽明之脈併入於齒拔齒而損脈者則經血不止臟虛而眩悶二十齘齒候齘齒者是睡眠而相磨切也此由血氣虛風邪客於牙車筋脈之間故因睡眠氣息喘而邪動引其筋脈故上下齒相磨切有聲謂之齘齒二十一齒黃黑候齒者骨之所終髓之所養手陽明足陽明之脈皆入於齒風邪冷氣客於經脈髓虛血弱不能榮養於骨枯燥無潤故令齒黃黑也
