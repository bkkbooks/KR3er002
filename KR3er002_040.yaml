body:
  text: 卷之四十婦人雜病諸候四凡五十論九十二霍亂候陰陽清濁相干謂之氣亂氣亂在腸胃為霍亂也多因飲食過度冒觸風冷冷氣入於腹內脾氣得冷則不消水穀胃氣得冷則吐逆腸氣得冷則下利其先心痛者先吐先腹痛者先利心腹俱痛吐利併發其有頭痛壯熱而吐利者由體盛而挾風之氣搏之外與血氣交爭故頭痛發熱也內乘腸胃故霍亂吐利也九十三嘔吐候胃氣逆則嘔吐胃為水穀之海其氣不調而有風冷乘之冷搏於胃氣胃氣逆則嘔吐也九十四嬖子小兒注車船候無問男子女人乘車船則心悶亂頭痛吐逆謂之注車注船特由質性自然非關宿挾病也九十五與鬼交通候人稟五行秀氣而生承五臟神氣而養若陰陽調和則臟腑強盛風邪鬼魅不能傷之若攝衛失節而血氣虛衰則風邪乘其虛鬼干其正然婦人與鬼交通者臟腑虛神守弱故鬼氣得病之也其狀不欲見人如有對忤獨言笑或時悲泣是也脈來遲伏或如鳥啄皆邪物病也又脈來綿綿不知度數而顏色不變此亦病也九十六夢與鬼交通候夫臟虛者喜夢婦人夢與鬼交亦由腑臟氣弱神守虛衰故乘虛因夢與鬼交通也九十七腳氣緩弱候腳氣之病由人體虛溫濕風毒之氣先客於腳從下而上動於氣故名腳氣也江東嶺南土地卑下風濕之氣易傷於人初得此病多不即覺或先無他疾而忽得之或因眾病後得之此病初甚微飲食嬉戲氣力如故當熟察之其狀從膝至腳有不仁或若痹或淫淫如蟲沖或微腫或酷冷或疼痛或緩縱不隨或有攣急或有至困能飲食或有不能食者或有見飲食而嘔吐惡聞食臭者或有物如脂發於腨腸逆上衝心氣上者或有舉體轉筋者或壯熱頭痛者或心胸沖悸寢處不欲見明或腹內苦痛而兼下者或言語錯亂喜忘誤者或眼濁精神昏憒者此皆其證候也治之緩者便上入腹腹或腫胸脅滿上氣賁便死急者不全日緩者二三日也其病既入臟證皆相似但脈有三品若脈浮大而緩宜服續命湯兩劑若風盛者宜作越婢湯加朮四兩若脈轉快而緊宜服竹瀝湯若脈微宜服風引湯二三劑其緊快之脈是三品之最惡脈也脈浮大者病在外沉細者病在內皆當急治之治之緩慢則上氣便死也九十八腳氣腫滿候溫濕風毒從腳而上故令四肢懈惰緩弱疼痹甚則上攻名腳氣而津液為風濕所折則津液痞澀而蓄積成水內則浸漬臟腑外則流溢皮膚故令腠理脹密水氣積不散故腫也九十九淋候淋者腎虛而膀胱熱也膀胱與腎為表裡俱主水行於胞者為小便也腑臟不調為邪所乘腎虛則小便數膀胱熱則小便澀其狀小便痛疼澀數淋瀝不宣故謂之淋也一百石淋候淋而出石謂之石淋腎主水水結則化為石故腎客沙石腎為熱所乘則成淋腎虛則不能制石故淋而出石細者如麻如豆大者亦有結如皂莢核狀者發則塞痛悶絕石出乃歇一百一胞轉候胞轉之病由胞為熱所迫或忍小便俱令水氣還迫於胞屈闢不得充張外水應入不得入內溲應出不得出內外壅脹不通故為胞轉其狀小腹急痛不得小便甚者至死張仲景云婦人本肥盛頭舉身滿今反羸瘦頭舉空減胞系了戾亦致胞轉一百二小便不利候腎與膀胱為表裡俱主水水行小腸入胞為小便熱搏其臟熱氣蘊積水行則澀故小便不利也一百三小便不通候水行於小腸入胞為小便腎與膀胱俱主水此二經為臟腑若內生大熱熱氣入小腸及胞胞內熱故小便不通令小腹脹滿氣喘息也一百四大便不通候三焦五臟不調和冷熱之氣結於腸胃津液竭燥大腸壅澀故大便不通張仲景云婦人經水過多亡津液者亦大便難也一百五大小便不利候冷熱不調大小腸有遊氣壅在大小腸不得宣散蓄積結生熱故大小便澀不流利也一百六大小便不通候腑臟不和榮衛不調陰陽不相通大小腸痞結名曰關格關格故大小便不通自有熱結於大腸則大便不通熱結於小腸則小便不通今大小便不通者是大小二腸受客熱結聚則大小便不通此止客熱暴結非陰陽不通流故不稱關格而直云大小便不通一百七遺尿候腎與膀胱為表裡而俱主水腎氣通於陰而小便水液之下行者也腎虛冷冷氣入胞胞虛冷不能制小便故遺尿一百八小便數候腎與膀胱為表裡俱主於水腎氣通於陰此二經虛而有熱乘之熱則小便澀虛則小便數熱澀數也一百九下利候腸胃虛弱為風邪冷熱之氣所乘腸虛則泄故變為利也此下利是水穀利也熱色黃冷色白一百十滯利候滯利由冷熱不調大腸虛冷熱氣客於腸間熱氣乘之則變赤冷氣乘之則變白冷熱相交則赤白相雜而連滯不止名為滯利也其狀白膿如涕而有血雜亦有少血者如白膿涕而有赤脈如魚腦又名魚腦利一百十一血利候熱乘血入於大腸為血利也血之隨氣外行經絡內通臟腑皆無滯積若冒觸勞動生於熱熱乘血散滲入大腸腸虛相化故血利也一百十二陰癢候婦人陰癢是蟲食所為三蟲九蟲在腸胃之間因臟虛蟲動作食於陰其蟲作勢微則癢重者乃痛一百十三脫肛候肛門大腸候也大腸虛冷其氣下衝者肛門反出亦有因產用力努偃氣衝其肛亦令反出也一百十四陰腫候陰腫者是虛損受風邪所為胞絡虛而有風邪客之風氣乘於陰與血氣相搏令氣血痞澀腠理壅閉不得泄越故令陰腫也一百十五陰痛候陰痛之病由胞絡傷損致臟虛受風邪而三蟲九蟲因虛動作食陰則痛者其狀成瘡其風邪乘氣衝擊而痛者無瘡但疼痛而已一百十六陰瘡候陰瘡者由三蟲九蟲動作侵食所為也諸蟲在人腸胃之間若腑臟調和血氣充實不能為害若勞傷經絡腸胃虛損則動作侵食於陰輕者或癢或痛重者生瘡也診其少陰之脈滑而數者陰中生瘡也一百十七陰挺出下脫候胞絡傷損子臟虛冷氣下衝則令陰挺出謂之下脫亦有因產而用力偃氣而陰下脫者診其少陰脈浮動浮則為虛動則為悸故令下脫也一百十八陰冷候胞絡勞傷子臟虛損風冷客之冷乘於陰故令冷也一百十九陰中生瘜肉候此由胞絡虛損冷熱不調風邪客之邪氣乘於陰搏於血氣變而生瘜肉也其狀如鼠乳一百二十㿉候此或因帶下或舉重或因產時用力損於胞門損於子臟腸下乘而成㿉一百二十一痔病候痔病由勞傷經絡而血流滲之所成也而有五種肛邊生瘡如鼠乳出在外時出膿血者牡痔也肛邊腫生瘡而出血者牝痔也肛邊生瘡癢而復痛出血者脈痔也肛邊腫核痛發寒熱而出血者腸痔也因便而清血出者血痔也一百二十二寸白候寸白是九蟲內之一蟲也凡九蟲在人腹內居腸胃之間腑臟氣實則蟲不動不為人害虛者蟲便發動滋長乃至斃人又云飲白酒以桑枝貫牛肉炙食食生慄生魚仍飲乳酪能變生寸白者也一百二十三陰臭候陰臭由子臟有寒寒搏於津液蘊積氣衝於陰故變臭也一百二十四尿血候血性得寒則凝得熱則流散若勞傷經絡其血虛熱滲入胞故尿血也一百二十五大便血候勞傷經脈則生熱熱乘於血血得熱則流散滲入於大腸故大便血也一百二十六失精候腎與膀胱合而腎藏精若勞動膀胱傷損腎氣則表裡俱虛不收制於精故失精也一百二十七乳腫候足陽明之經胃之脈也其直者從缺盆下於乳因勞動則腠理虛受風邪入於榮衛榮衛痞澀血氣不流熱結於乳故令乳腫其結腫不散則成癰一百二十八妒乳候此由新產後兒未能飲之及飲不泄或斷兒乳捻其汁法不盡皆令乳汁蓄結與血氣相搏即壯熱大渴引飲牢強掣痛手不得近是也初覺便以手助捻其汁並令傍人助嗍引之不爾成瘡有膿其熱勢盛則成癰一百二十九乳癰候腫結皮薄以澤是癰也足陽明之經脈有從缺盆下於乳者勞傷血氣其脈虛腠理虛寒客於經絡寒搏於血則血澀不通其氣又歸之氣積不散故結聚成癰者癰氣不宣與血相搏則生熱熱盛乘於血血化成膿亦有因乳汁蓄結與血相搏蘊積生熱結聚而成乳癰年四十已還治之多愈年五十以上慎不當治之多死不治自當終年又懷娠髮乳癰腫及體結癰此無害也蓋懷胎之癰病起陽明陽明胃之脈也主肌肉不傷臟故無害診其右手關上脈沉則為陰虛者則病乳癰乳癰久不瘥因變為瘻養生方云熱食汗出露乳傷風喜髮乳腫名吹乳因喜作癰一百三十髮乳潰後候此謂癰疽發於乳膿潰之後或虛惙或疼痛或渴也凡髮乳潰後出膿血多則腑臟虛燥則渴而引飲飲入腸胃腸胃虛則變下痢也一百三十一乳瘡候此謂膚腠理虛有風濕之氣乘虛客之與血氣相搏而熱加之則生瘡也一百三十二疽髮乳候腫而皮強上如牛領之皮謂之疽也足陽明之脈有從缺盆下於乳者其脈虛則腠理開寒氣客之寒搏於血則血澀不通故結腫而氣又歸之熱氣淳盛故成疽也熱久不散則肉敗為膿也一百三十三乳結核候足陽明之經脈有從缺盆下於乳者其經虛風冷乘之冷折於血則結腫夫腫熱則變敗血為膿冷則核不消又重疲勞動氣而生熱亦焮烊其湯熨針石別有正方補養宣導今附於後養生方導引法云踑踞以兩手從曲腳內入據地曲腳加其上舉尻其可用行氣愈瘰癧乳痛交兩腳以兩手從曲腳極捖舉十二通愈瘰癧乳痛也一百三十四乳石癰候乳石癰之狀微強不甚大不赤微痛熱熱自歇是足陽明之脈有下於乳者其經虛為風寒氣客之則血澀結成癰腫而寒多熱少者則無大熱但結核如石謂之乳石癰一百三十五發背候五臟不調則致疽疽者腫結皮強如牛領之皮六腑不和則致癰癰者腫結薄以澤是也腑與臟為表裡其經脈循行於身俞皆在背腑臟不調和而腠理開受於風寒折於血則結聚成腫深則為疽淺乃為癰隨寒所客之處血則痞澀不通熱又加之故成癰疽發背也一百三十六改訾候此為內癰發於脅名為改訾由邪氣聚在下管與經絡血氣相搏所生也至其變敗狀如癰疽一百三十七髮乳後渴候此謂髮乳膿潰之後血氣虛竭腑臟焦燥故令渴也渴引飲水止飲入腸胃則變為下痢也一百三十八髮乳下痢候此謂髮乳而腸胃虛受冷則下痢也大腸為金水穀之道胃為土水穀之海也金土子母而足陽明為胃之經其脈有從缺盆下於乳者因勞傷其脈虛而受風寒風寒搏血氣血痞澀不通故結癰腫腫結皮薄以澤者為癰而風氣乘虛入胃則水穀糟粕變敗不結聚腸虛則泄為痢金土子母俱虛故髮乳而復痢也又髮乳渴引飲多亦變痢也一百三十九髮乳久不瘥候此謂髮乳癰而有冷氣乘之故癰疽結經久不消不潰而為冷所客則膿汁出不盡而久不瘥一百四十髮乳余核不消候此謂髮乳之後餘熱未盡而有冷氣乘之故余核不消復遇熱蘊積為膿亦有淋瀝不瘥而變為瘻也一百四十一髮乳瘻候此謂因發癰瘡而膿汁未盡其瘡暴瘥則惡汁內食後更發則成瘻者也
