body:
  text: 卷之三十六獸毒病諸候凡四論一馬齧踏人候凡人被馬齧踏及馬骨所傷刺並馬韁靽勒所傷皆為毒瘡若腫痛致煩悶是毒入腹亦斃人二馬毒入瘡候凡人先有瘡而乘馬馬汗並馬毛垢及馬屎尿及坐馬皮韉並能有毒毒氣入瘡致焮腫疼痛煩熱毒入腹亦斃人三狾狗齧候凡狾狗齧人七日輒一發過三七日不發則無苦也要過百日方大免耳當終身禁食犬肉及蠶蛹食此發則死不可救矣瘡未愈之間禁食生魚豬雞膩過一年禁之乃佳但於飯下蒸魚及於肥器中食便發若人曾食落葵得犬齧者自難治若瘡瘥十數年後食落葵便發四狗齧重發候凡被狗齧瘡忌食落葵及狗肉云雖瘥經一二年但食此者必重發重發者與初被齧不殊其狾狗齧瘡重發則令人狂亂如狾狗之狀蛇毒病諸候凡五論一蛇螫候凡中蛇不應言蛇皆言蟲及云地索勿正言其名也惡蛇之類甚多而毒有瘥劇時四月五月中青蝰三角蒼虺白頸大蜴六月七月中竹狩艾蝮黑甲赤目黃口反鉤白蝰三角此皆蛇毒之猛者中人不即治多死又有赤連黃頷之類復有六七種而方不盡記其名水中黑色者名公蠣山中一種亦相似不常聞螫人又有鉤蛇尾如鉤能倒牽人獸入水沒而食之又南方有𠯜蛇人忽傷之不死終身伺覓其主不置雖百人眾中亦直來取之惟遠去出百里乃免耳又有柂蛇長七八尺如船柂狀毒人必死即削取船柂煮汁漬之便瘥但蛇例雖多今皆以青條熇尾白頸艾蝮其毒尤劇大者中人若不即治一日間舉體洪腫皮肉坼爛中者尚可得二三日也凡被蛇螫第一禁第二藥無此二者有全劑雄黃麝香可預辦故山居者宜令知禁法也又惡蛇螫者人即頭解散言此蛇名黑帝其瘡冷如凍凌此大毒惡不治一日即死若頭不散此蛇名赤帝其毒小輕瘡上冷不治故得七日死凡蛇瘡未愈禁熱食熱食便發治之依初被螫法也二蝮蛇螫候凡蝮中人不治一日死若不早治之縱不死者多殘斷人手足蝮蛇形不乃長頭褊口尖頸斑身亦艾斑色青黑人犯之頸腹帖著地者是也江東諸山甚多其毒最烈草行不可不慎又有一種狀如蝮而短有四腳能跳來齧人名曰千歲蝮中人必死然其齧人竟即跳上樹作聲云斫木者但營棺具不可救若云搗菽者猶可治吳音呼藥為菽故也三虺螫候虺形短而褊身亦青黑色山草自不甚多每六七月中夕時出路上喜入車轢中令車轢腹破而子出人侵晨及冒昏行者每傾意看之其螫人亦往往有死者四青蝰蛇螫候青蝰蛇者正綠色喜緣樹及竹上自掛與竹樹色一種人看不覺若入林中行有落人項背上者然自不傷齧齧人必死而蛇無正形極大者不過四五尺世人皆呼為青條蛇言其與枝條同色乍看難覺其尾二三寸色黑者名熇尾毒最猛烈中人立死五䖻毒候此是諸毒蛇夏日毒盛不泄皆齧草木及吐毒著草木上人誤犯著此者其毒如被蛇螫不殊但瘡腫上有物如蟲蛇眼狀以此別之名為䖻毒雜毒病諸候凡十四論一蜂螫候蜂類甚多而方家不具顯其名唯地中大土蜂最有毒一螫中人便即倒悶舉體洪腫諸藥治之皆不能卒止舊方都無其法雖然不肯殺人有禁術封唾亦微效又有瓠𧹬蜂抑亦其次余者猶瘥二蠍螫候此蟲五月六月毒最盛云有八節九節者彌甚螫人毒勢流行多至牽引四肢皆痛過一周時始定三蠆螫候陶隱居云蠆蟲方家亦不能的辯正云是蝘蜒子或云是小烏蟲尾有兩歧者然皆恐非也疑即是蠍蠍尾歧而曲上故周詩云彼都人士拳發如蠆四蜈蚣螫候此則百足蟲也雖復有毒而不甚螫人人誤觸之者故時有中其毒五蜞蜍著人候江東及嶺南無處不有蜞蜍蜞蜍乃是兩種物蜞者在草里名為山蜞在水裡名馬蜞皆長四五寸許黑色身滑人行涉山水即著人肉不甚痛而癢兩頭皆能嗍人血血滿腹便自脫地無甚毒害蜍者無不背作文理粗澀多著龜螺殼上若著人肉即於肉裡生子乃至十數枚經日便腫癢隱軫起久久亦成瘡瘻六石蛭螫人候山中草木及路上石上石蛭著人則穿齧肌皮行人肉中浸淫起瘡灸斷其道則愈凡行山草之中常以膏和鹽塗足脛則蛭不得著人七蠶齧候蠶既是人養之物性非毒害之蟲然時有齧人者乃令人憎寒壯熱經時不瘥亦有因此而致斃斯乃一時之怪異救解之方愈八甘鼠齧候此即鼷鼠也形小而口尖多食傷牛馬不甚痛云其口甜故名甘鼠時有齧人者九諸魚傷人候魚類甚多其鯆魮鯸鮐之徒鬐骨芒刺有毒傷人則腫痛十惡𧉧齧候惡𧉧一名滿大如毒蜱似蝗無尾前有兩角觸後則傍後觸前則卻行生於樹皮內及屋壁間又喜在紙書內圓似榆莢其色赤黑背橫理二月生十月蟄螫人唯以三時五月六月七月尤毒初如疱狀中央紫黑大如粟粒四傍微腫焮焮色赤或有青色者癢喜搔之若飲酒房室近不過八九日遠不過十餘日爛潰為膿汁亦殺人十一狐尿刺候云是野狐尿棘刺頭有人犯之者則多中於人手指足指腫痛焮熱有端居不出而著此毒者則不必是狐尿刺也蓋惡毒氣耳故方亦云惡刺毒者也十二蠔蟲螫候此則樹上蠔蟲耳以其毛刺能螫人故名蠔蟲此毒蓋輕不至深斃然亦甚痛螫處作軫起者是也十三蠼螋尿候蠼螋蟲云能尿人影即令所尿之處慘痛如芒刺亦如蠔蟲所螫然後起細㾦瘰作聚如茱萸子狀其㾦瘰遍赤中央有白膿如粟粒亦令人皮肉拘急惡寒壯熱極者連起多著腰脅及胸若繞腰匝遍者重也十四入井塚墓毒氣候凡古井塚及深坑阱中多有毒氣不可輒入五月六月間最甚以其鬱氣盛故也若事輒必須入者先下雞鴨毛試之若毛旋轉不下即是有毒便不可入金瘡病諸候凡二十三論一金瘡初傷候夫被金刃所傷其瘡多有變動若按瘡邊乾急肌肉不生青黃汁出瘡邊寒清肉消臭敗前出赤血後出黑血如熟爛者及血出不止白汁隨出如是者多凶若中絡脈髀內陰股天聰眉角橫斷腓腸乳上及與鳩尾攢毛小腹尿從瘡出氣如賁豚及腦出諸瘡如是者多凶少愈診金瘡血出太多其脈虛細者生數實大者死小者生浮大者死所傷在陽處者去血四五斗脈微緩而遲者生急疾者死二金瘡血不止候金瘡血出不斷其脈大而止者三七日死金瘡血出不可止前赤後黑或黃或白肌肉腐臭寒冷硬急者其瘡難愈亦死三金瘡內漏候凡金瘡通內血多內漏若腹脹滿兩脅脹不能食者死瘀血在內腹脹脈牢大者生沉細者死四毒箭所傷候夫被弓弩所傷若箭鏃有菵藥入人皮脈令人短氣須臾命絕口噤唇乾血為斷絕腹滿不言其人如醉未死之間為不可治若榮衛青瘀血應時出瘡邊溫熱口開能言其人乃活毒箭有三種嶺南夷俚用焦銅作箭鏃次嶺北諸處以諸蛇蟲毒螫物汁著管中漬箭鏃此二種才傷皮便洪腫沸爛而死唯射豬犬雖困得活以其啖糞故也人若中之便即食糞或飲糞汁並塗瘡即愈不爾須臾不可復救菵箭著寬處者雖困漸治不必死若近胸腹便宜速治小緩毒入內則不可救五金瘡腸出候此謂為矛箭所傷若中於腹則氣激氣激則腸隨瘡孔出也六金瘡腸斷候夫金瘡腸斷者視病深淺各有死生腸一頭見者不可連也若腹痛短氣不得飲食者大腸一日半死小腸三日死腸兩頭見者可速續之先以針縷如法連續斷腸便取雞血塗其際勿令氣泄即推內之腸但出不斷者當作大麥粥取其汁持洗腸以水漬內之當作研米粥飲之二十餘日稍作強糜食之百日後乃可進飯耳飽食者令人腸痛決漏常服錢屑散若腸腹虫亞從瘡出有死者有生者但視病取之各有吉凶虫亞出如手其下牢核煩滿短氣發作有時不過三日必死虫亞下不留安定不煩喘息如故但瘡痛者當以生絲縷系絕其血脈當令一宿乃可截之勿閉其口膏稍導之七金瘡筋急相引痛不得屈伸候夫金瘡愈以後肌肉充滿不得屈伸者此由傷絕經筋榮衛不得循行也其瘡雖愈筋急不得屈伸也八金瘡傷筋斷骨候夫金瘡始傷之時半傷其筋榮衛不通其瘡雖愈合後仍令痹不仁也若被瘡截斷諸解身軀肘中及腕膝髀若踝際亦可連續須急及熱其血氣未寒即去碎骨便更縫連其愈後直不屈伸若碎骨不去令人痛煩膿血不絕不絕者不得安諸中傷人神十死一生九箭鏃金刃入肉及骨不出候箭鏃金刃中骨骨破碎者須令箭鏃出仍應除碎骨盡乃敷藥不爾瘡永不合縱合常疼痛若更犯觸損傷便驚血沸潰有死者十金瘡中風痙候夫金瘡痙者此由血脈虛竭飲食未復未滿月日榮衛傷穿風氣得入五臟受寒則痙其狀口急背直搖頭馬鳴腰為反折須臾十發氣息如絕汗出如雨不及時救者皆死凡金瘡卒無汁者中風也邊自出黃汁者中水也並欲作痙急治之又痛不在瘡處者傷經絡亦死十一金瘡驚腫候夫金瘡愈閉後忽驚腫動起糜沸跳手大者如盂小者如杯名為盜血此由肌未定里不滿因作勞起早故令盜血湧出在人皮中不肯自消亦不成膿反牢核又有加血加血者盜血之滿也其血凝深不可妄破破之者盜血前出不可禁止加血追之出即滿瘡中便留止令人短氣須臾命絕十二金瘡因交接血驚出候夫金瘡多傷經絡去血損氣其瘡未瘥則血氣尚虛若因而房室致情意感動陰陽發泄驚觸於瘡故血汁重出十三金瘡驚悸候金瘡失血多者必驚悸以其損於心故也心主血血虛則心守不安心守不安則喜驚悸悸者心動也十四金瘡煩候金瘡損傷血氣經絡空虛則生熱熱則煩痛不安也十五金瘡咳候金瘡傷血損氣氣者肺之所主風邪中於肺故咳也十六金瘡渴候夫金瘡失血則經絡空竭津液不足腎臟虛燥故渴也十七金瘡蟲出候夫金瘡久不瘥及裹縛不如法瘡內敗壞故生蟲也十八金瘡著風候夫金瘡干無汁亦不大腫者中風也寒氣得大深者至臟便發作痙多凶少愈中水者則腫多汁或成膿十九金瘡著風腫候此由瘡著於風風氣相搏故腫也二十金瘡成癰腫候夫金瘡冬月之時衣厚絮溫故裹欲薄夏月之時衣單日涼故裹欲厚重寒傷榮重熱傷衛筋勞結急肉勞驚腫骨勞折沸難可屈伸血脈勞者變化作膿榮衛不通留結成癰凡始縫其瘡各有縱橫雞舌隔角橫不相當縫亦有法當次陰陽上下逆順急緩相望陽者附陰陰者附陽腠理皮脈復令復常但亦不曉略作一行陰陽閉塞不必作膿榮衛不通留結為癰晝夜不臥語言不同碎骨不去其人必凶雞舌隔角房不相當頭毛解脫志失故常瘡不再縫膏不再漿二十一金瘡中風水候夫金瘡裹縛不密為風水氣所中則疼痛不止而腫痛內生青黃汁二十二金瘡下血虛竭候金刃中於經絡者下血必多腑臟空虛津液竭少無血氣榮養故須補之二十三金瘡久不瘥候夫金瘡有久不瘥膿汁不絕肌肉不生者其瘡內有破骨斷筋伏血腐肉缺刃竹刺久而不出令瘡不愈喜出青汁當破出之瘡則愈腕傷病諸候凡九論一被打頭破腦出候夫被打陷骨傷頭腦眩不舉戴眼直視口不能語咽中沸聲如㹠子喘口急手為妄取即日不死三日小愈二腕折破骨傷筋候凡人傷折之法即夜盜汗者此髓斷也七日死不汗者不死三卒被損瘀血候夫有瘀血者其人喜忘不欲聞物聲病人胸滿唇萎舌青口燥但欲漱水不欲咽無熱脈微大來遲腹不滿其人言我腹滿為有瘀血汗當出不出內結亦為瘀病人胸滿口乾膊痛渴無寒熱為有瘀血腹滿口燥不渴唾如漿狀此有留血爾從高頓僕內有血腹脹滿其脈牢強者生小弱者死得笞掠內有結血脈實大者生虛小者死其湯熨針石別有正方補養宣導今附於後養生方導引法云端坐伸腰舉左手仰掌以右手承右脅以鼻納氣自極七息除瘀血結氣又云鼻納氣口閉自極七息除兩脅下積血氣又云端坐伸腰舉左手右手承右脅鼻納氣七息除瘀血又云端坐右手持腰鼻納氣七息左右戾頭各三十止除體瘀血項頭痛又云雙手搦腰手指相對向盡勢前後振搖二七又將手大指向後極勢振搖二七不移手上下對與氣下盡勢來去三七去雲門腰掖血氣閉塞四壓迮墜墮內損候此為人卒被重物壓迮或從高墜下致吐下血此傷五內故也五腕傷初繫縛候夫腕傷重者為斷皮肉骨髓傷筋脈皆是卒然致損故血氣隔絕不能周榮所以須善繫縛按摩導引令其血氣復六被損久瘀血候此為被損傷仍為風冷搏故令血瘀結在內久不瘥也七腕折中風痙候夫腕折傷皮肉作瘡者慎不可當風及自扇若風入瘡內犯諸經絡所致痙痙者脊背強直口噤不能言也八腕折中風腫候此為風入瘡內而不入經絡其搏於氣故但腫也九刺傷中風水候此為竹木所刺傷其瘡中風水者則腫痛乃至成膿
