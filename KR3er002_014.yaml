body:
  text: 卷之十四咳嗽病諸候凡十五論一咳嗽候咳嗽者肺感於寒微者則成咳嗽也肺主氣合於皮毛邪之初傷先客皮毛故肺先受之五臟與六腑為表裡皆稟氣於肺以四時更王五臟六腑皆有咳嗽各以其時感於寒而受病故以咳嗽形證不同五臟之咳者乘秋則肺先受之肺咳之狀咳而喘息有音聲甚則唾血乘夏則心先受之心咳之狀咳則心痛喉中介介如哽甚則咽腫喉痹乘春則肝先受之肝咳之狀咳則兩脅下痛甚則不可以轉側兩胠下滿乘季夏則脾先受之脾咳之狀咳則右脅下痛喑喑引於膊背甚則不可動動則咳劇乘冬則腎先受之腎咳之狀咳則腰背相引而痛甚則咳逆此五臟之咳也五臟咳久不已傳與六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳之狀咳而遺屎心咳不已則小腸受之小腸咳之狀咳而失氣與咳俱出腎咳不已則膀胱受之膀胱咳之狀咳而遺尿久咳不已則三焦受之三焦咳之狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又有十種咳一曰風咳欲語因咳言不得竟是也二曰寒咳飲冷食寒入注胃從肺脈上氣內外合因之而咳是也三曰支咳心下堅滿咳則引痛其脈反遲是也四曰肝咳咳而引脅下痛是也五曰心咳咳而唾血引手少陰是也六曰脾咳咳而涎出續續不止引少腹是也七曰肺咳咳而引頸項而唾涎沫是也八曰腎咳咳則耳聾無所聞引腰臍中是也九曰膽咳咳而引頭痛口苦是也十曰厥陰咳咳而引舌本是也診其右手寸口名氣口以前脈手陽明經也其脈浮則為陽陽實者病腹滿善喘咳微大為肝痹咳引小腹也咳嗽脈浮喘者生小沉伏匿者死又云脈浮直者生沉硬者死咳且嘔腹脹且泄其脈弦急欲絶者死咳脫形發熱脈小堅急者死咳且羸瘦脈形堅大者死咳而尿血羸瘦脈大者死二久咳嗽候肺感於寒微者即成咳嗽久咳嗽是連滯歲月經久不瘥者也凡五臟俱有咳嗽不已則各傳其腑諸久嗽不已三焦受之其狀咳而腹滿不欲食飲寒氣聚於胃而關於肺使人多涕唾而變面浮腫氣逆故也三咳嗽短氣候肺主氣候皮毛氣虛為微寒客皮毛入傷於肺則不足成咳嗽夫氣得溫則宣和得寒則痞澀虛則氣不足而為寒所迫並聚上肺間不得宣發故令咳而短氣也四咳嗽上氣候夫咳嗽上氣者肺氣有餘也肺感於寒微者則成咳嗽肺主氣氣有餘則喘咳上氣此為邪搏於氣氣壅不得宣發是為有餘故咳嗽而上氣也其狀喘咳上氣多涕唾而面目胕腫氣逆也五久咳嗽上氣候久咳嗽上氣者是肺氣虛極氣邪停滯故其病積月纍年久不瘥則胸背痛面腫其則唾膿血六咳嗽膿血候咳嗽膿血者損肺損心故也肺主氣心主血肺感於寒微者則成咳嗽嗽傷於陽脈則有血血與氣相隨而行咳嗽極甚傷血動氣俱乘於肺肺與津液相搏蘊結成膿故咳嗽而膿血也七久咳嗽膿血候肺感於寒微者則成咳嗽咳嗽極甚傷於經絡血液蘊結故有膿血氣血俱傷故連滯積久其血黯瘀與膿相雜而出八呷嗽候呷嗽者猶是咳嗽也其胸膈痰飲多者嗽則氣動於痰上搏喉咽之間痰氣相擊隨嗽動息呼呷有聲謂之呷嗽其與咳嗽大體雖同至於投藥則應加消痰破飲之物以此為異耳九暴氣嗽候肺主於氣候皮毛人有運動勞役其氣外泄腠理則開因乘風取涼冷氣卒傷於肺即發成嗽故為暴氣嗽其狀嗽甚而少涎沫十咳逆候咳逆者是咳嗽而氣逆上也氣為陽流行腑臟宣發腠理而氣肺之所主也咳病由肺虛感微寒所成寒搏於氣氣不得宣胃逆聚還肺肺則脹滿氣遂不下故為咳逆其狀咳而胸滿氣逆膊背痛汗出尻陰股膝腨䯒足皆痛其湯尉針石別有正方補養宣導今附於後養生方導引法云先以鼻納氣乃閉口還復以鼻納氣咳則愈向晨去枕正偃臥伸臂脛瞑目閉口無息極脹腹兩足再息頃間吸腹仰兩足倍拳欲自微息定復為之春三夏五秋七冬九蕩滌五臟津潤六腑所病皆愈又云還向反望倒望不息七通治咳逆胸中病寒熱也十一久咳逆候肺感於寒微者則成咳嗽久咳嗽者是肺極虛故也肺既極虛氣還乘之故連年積月久不瘥夫氣久逆不下則變身面皆腫滿表裡虛氣往來乘之故也十二咳逆上氣候肺虛感微寒而成咳咳而氣還聚於肺肺則脹是為咳逆也邪氣與正氣相搏正氣不得宣通但逆上喉咽之間邪伏則氣靜邪動則氣奔上煩悶欲絶故謂之咳逆上氣也十三久咳逆上氣候肺感於寒微者則成咳嗽久咳逆氣虛則邪乘於氣逆奔上也肺氣虛極邪則停心時動時作故發則氣奔逆乘心煩悶欲絶少時乃定定後復發連滯經久也十四咳逆上氣嘔吐候五臟皆稟氣於肺肺感微寒則咳嗽也寒搏於氣氣聚還肺而邪有動息邪動則氣奔逆上氣上則五臟傷動動於胃氣者則胃氣逆而嘔吐也此是肺咳連滯氣動於胃而嘔吐者也又有季夏脾王之時而脾氣虛不能王有寒氣傷之而咳嗽謂之脾咳其狀咳則右脅下痛喑喑引膊背甚則不可動動則咳發脾與胃合脾咳不已則胃受之其狀咳嗽而嘔嘔甚則長蟲出是也凡諸咳嗽甚則嘔吐各隨證候知其腑臟也十五咳逆短氣候肺虛為微寒所傷則咳嗽嗽則氣還於肺間則肺脹肺脹則氣逆而肺本虛氣為不足復為邪所乘壅痞不能宣暢故咳逆短氣也淋病諸候凡八論一諸淋候諸淋者由腎虛膀胱熱故也膀胱與腎為表裡俱主水水入小腸下於胞行於陰為溲便也腎氣通於陰陰津液下流之道也若飲食不節喜怒不時虛實不調則腑臟不和致腎虛而膀胱熱也膀胱津液之府熱則津液內溢而流於睪水道不通水不上不下停積於胞腎虛則小便數膀胱熱則水下澀數而且澀則淋瀝不宣故謂之為淋其狀小便出少起數小腹弦急痛引於齊又有石淋勞淋血淋氣淋膏淋諸淋形證各隨名具說於後章而以一方治之者故謂之諸淋也其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥令兩手布膝頭邪踵置尻下口納氣振腹自極鼻出氣七息去淋數小便又云蹲踞高一尺許以兩手從外屈膝內入至足趺上急手握足五指極力一通令內曲入利腰髖治淋二石淋候石淋者淋而出石也腎主水水結則化為石故腎客沙石腎虛為熱所乘熱則成淋其病之狀小便則莖里痛尿不能卒出痛引少腹膀胱裡急沙石從小便道出甚者塞痛令悶絶其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥令兩手布膝頭邪踵置尻下口納氣振腹自極鼻出氣七息去石淋莖中痛三氣淋候氣淋者腎虛膀胱熱氣脹所為也膀胱與腎為表裡膀胱熱熱氣流入於胞熱則生實令胞納氣脹則小腹滿腎虛不能制其小便故成淋其狀膀胱小腹皆滿尿澀常有餘瀝是也亦曰氣癃診其少陰脈數者男子則氣淋其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩足踵布膝除癃又云偃臥以兩手布膝頭取踵置尻下以口納氣腹脹自極以鼻出氣七息除氣癃數小便莖中痛陰以下濕小腹痛膝不隨也四膏淋候膏淋者淋而有肥狀似膏故謂之膏淋亦曰肉淋此腎虛不能制於肥液故與小便俱出也五勞淋候勞淋者謂勞傷腎氣而生熱成淋也腎氣通於陰其狀尿留莖內數起不出引小腹痛小便不利勞倦即發也六熱淋候熱淋者三焦有熱氣搏於腎流入於胞而成淋也其狀小便赤澀亦有宿病淋今得熱而發者其熱甚則變尿血亦有小便後如似小豆羹汁狀者蓄作有時也七血淋候血淋者是熱淋之甚者則尿血謂之血淋心主血血之行身通遍經絡循環腑臟其熱甚者血則散失其常經溢滲入胞而成血淋也八寒淋候寒淋者其病狀先寒戰然後尿是也由腎氣虛弱下焦受於冷氣入胞與正氣交爭寒氣勝則戰寒而成淋正氣勝則戰寒解故得小便也小便病諸候凡八論一小便利多候小便利多者由膀胱虛寒胞滑故也腎為臟膀胱腎之腑也其為表裡俱主水腎氣下通於陰腑既虛寒不能溫其臟故小便白而多其至夜尿偏甚者則內陰氣生是也二小便數候小便數者膀胱與腎俱虛而有客熱乘之故也腎與膀胱為表裡俱主水腎氣下通於陰此二經既虛致受於客熱虛則不能制水故令數小便熱則水行澀澀則小便不快故令數起也診其跗陽脈數胃中熱即消穀引食大便必堅小便即數其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩踵布膝除數尿又云偃臥令兩手布膝頭斜踵置尻下口納氣振腹自極鼻出氣七息去小便數三小便不禁候小便不禁者腎氣虛下焦受冷也腎主水其氣下通於陰腎虛下焦冷不能溫制其水液故小便不禁也尺脈實小腹牢痛小便不禁尺中虛小便不禁腎病小便不禁脈當沉滑而反浮大其色當黑反黃此土之剋水為逆不治四小便不通候小便不通由膀胱與腎俱有熱故也腎主水膀胱為津液之腑此二經為表裡而水行於小腸入胞者為小便腎與膀胱既熱熱入於胞熱氣大盛故結澀令小便不通小腹脹滿氣急甚者水氣上逆令心急腹滿乃至於死診其脈緊而滑直者不得小便也五小便難候小便難者此是腎與膀胱熱故也此二經為表裡俱主水水行於小腸入胞為小便熱氣在於臟腑水氣則澀其熱勢微故但小便難也診其尺脈浮小便難尺脈濡小便難尺脈緩小便難有餘瀝也六遺尿候遺尿者此由膀胱虛冷不能約於水故也膀胱為足太陽腎為足少陰二經為表裡腎主水腎氣下通於陰小便者水液之餘也膀胱為津液之腑腑既虛冷陽氣衰弱不能約於水故令遺尿也診其脈來過寸口入魚際遺尿肝脈微滑遺尿左手關上脈沉為陰陰絶者無肝脈也苦遺尿其湯尉針石別有正方補養宣導今附於後養生方導引法云蹲踞高一尺許以兩手從外屈膝內入至足趺上急手握足五指極力一通令內曲入利腰髖治遺尿七尿床候夫人有於眠睡不覺尿出者是其稟質陰氣偏盛陽氣偏虛者則膀胱腎氣俱冷不能溫制於水則小便多或不禁而遺尿膀胱足太陽也為腎之腑腎為足少陰為臟與膀胱合俱主水凡人之陰陽日入而陽氣盡則陰受氣至夜半陰陽大會氣交則臥睡小便者水液之餘也從膀胱入於胞為小便夜臥則陽氣衰伏不能制於陰所以陰氣獨發水下不禁故於眠睡而不覺尿出也八胞轉候胞轉者由是胞屈闢小便不通名為胞轉其病狀齊下急痛小便不通是也此病或由小便應下便強忍之或為寒熱所迫此二者俱令水氣還迫於胞使胞屈闢不得充張外水應入不得入內溲應出不得出外內相壅塞故令不通此病至四五日乃有致死者飽食食訖應小便而忍之或飽食訖而走馬或小便急因疾走或忍尿入房亦皆令胞轉或胞落並致死大便病諸候凡五論一大便難候大便難者由五臟不調陰陽偏有虛實謂三焦不和則冷熱並結故也胃為水穀之海水穀之精化為榮衛其糟粕行之於大腸以出也五臟三焦既不調和冷熱壅澀結在腸胃之間其腸胃本實而又為冷熱之氣所並結聚不宣故令大便難也又云邪在腎亦令大便難所以爾者腎臟受邪虛而不能制小便則小便利津液枯燥腸胃乾澀故大便難又渴利之家大便也難所以爾者為津液枯竭致令腸胃乾燥診其左手寸口人迎以前脈手少陰經也脈沉為陰陰實者病苦閉大便不利腹滿四肢重身熱苦胃脹右手關上脈陰實者脾實也苦腸中伏伏如牢狀大便難脈緊而滑直大便亦難跗陽脈微弦法當腹滿不滿者必大便難而腳痛此虛寒從上向下也其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥直兩手捻左右脅除大便難腹痛腹中寒口納氣鼻出氣溫氣咽之數十病愈二大便不通候大便不通者由三焦五臟不和冷熱之氣不調熱氣偏入腸胃津液竭燥故令糟粕痞結壅塞不通也其湯尉針石別有正方補養宣導今附於後養生方導引法云龜行氣伏衣被中覆口鼻頭面正臥不息九通微鼻出氣治閉塞不通三大便失禁候大便失禁者由大腸與肛門虛弱冷滑故也肛門大腸之候也俱主行糟粕既虛弱冷滑氣不能溫制故使大便失禁四關格大小便不通候關格者大小便不通也大便不通謂之內關小便不通謂之外格二便俱不通為關格也由陰陽氣不和榮衛不通故也陰氣大盛陽氣不得榮之曰內關陽氣大盛陰氣不得榮之曰外格陰陽俱盛不得相榮曰關格關格則陰陽氣痞結腹內脹滿氣不行於大小腸故關格而大小便不通也又風邪在三焦三焦約者則小腸痛內閉大小便不通日不得前後而手足寒者為三陰俱逆三日死也診其脈來浮牢且滑直者不得大小便也五大小便難候大小便難者由冷熱不調大小腸有遊氣遊氣在於腸間搏於糟粕溲便不通流故大小便難也診其尺脈滑而浮大此為陽干於陰其人苦小腹痛滿不能尿尿即陰中痛大便亦然其湯尉針石別有正方補養宣導今附於後養生方導引法云正坐以兩手交背後名曰帶便愈不能大便利腹愈虛羸反叉兩手著背上推上使當心許踑坐反到九通愈不能大小便利腹愈虛羸也
