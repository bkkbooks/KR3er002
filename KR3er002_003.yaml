body:
  text: 卷之三虛勞病諸候上凡三十九論一虛勞候夫虛勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又肺勞者短氣而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌本苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛陰濕囊生瘡小腹滿急六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顏色眉發墮落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰胃極令人酸削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不為肌膚六曰精極令人少氣吸吸然內虛五臟氣不足發毛落悲傷喜忘七傷者一曰陰寒二曰陰萎三曰裡急四曰精連連五曰精少陰下濕六曰精清七曰小便苦數臨事不卒又一曰大飽傷脾脾傷善噫欲臥面黃二曰大怒氣逆傷肝肝傷少血目暗三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷苦驚喜忘善怒六曰風雨寒暑傷形形傷髮膚枯夭七曰大恐懼不節傷志志傷恍惚不樂男子平人脈大為勞極虛亦為勞男子勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸𤺊寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則榮氣竭脈直上者遲逆虛也脈澀無陽是腎氣少寸關澀無血氣逆冷是大虛脈浮微緩皆為虛緩而大者勞也脈微濡相搏為五勞微弱相搏虛損為七傷其湯尉針石別有正方補養宣導今附於後養生方云唯欲默氣養神閉氣使極吐氣使微又不得多言語大呼喚令神勞損亦云不可泣淚及多唾涕此皆為損液漏津使喉澀大渴又云雞鳴時叩齒三十六通訖舐唇漱口舌聊上齒表咽之三過殺蟲補虛勞令人強壯養生方導引法云兩手拓兩頰手不動摟肘使急腰內亦然住定放兩肘頭向外肘膊腰氣散盡勢大悶始起來去七通去肘臂勞又云兩手抱兩乳急努前後振搖極勢二七手不動搖兩肘頭上下來去三七去兩肘內勞損散心向下衆血脈遍身流布無有壅滯又云兩足跟相對坐上兩足指向外扒兩膝頭拄席兩向外扒使急始長舒兩手兩向取勢一一綿急三七去五勞腰脊膝疼傷冷脾痹又云跪一足坐上兩手髀內卷足努踹向下身外扒一時取勢向心來去二七左右亦然去五勞足臂疼悶膝冷陰冷又云坐抱兩膝下去三里二寸急抱向身極勢足兩向身起欲似胡床住勢還坐上下來去三七去腰足臂內虛勞膀胱冷又云外轉兩腳平踏而坐意努動膝節令骨中鼓挽向外十度非轉也又云兩足相踏向陰端急蹙將兩手捧膝頭兩向極勢捺之二七竟身側兩向取勢二七前後劭腰七去心勞痔病膝冷調和未損盡時須言語不瞋喜偏跏兩手抱膝頭兩向極勢挽之三七左右亦然頭須左右仰扒去背急臂勞又云兩足相踏令足掌合也蹙足極勢兩手長舒掌相向腦項之後兼至膊相挽向頭膊手向席來去七仰手合手七始兩手角上極勢腰正足不動去五勞七傷齊下冷暖不和數用之常和調適又云一足踏地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去五勞三里氣不下又云蛇行氣曲臥以正身復起踞閉目隨氣所在不息少食裁通腸服氣為食以舐為漿春出冬藏不財不養以治五勞七傷又云蝦蟆行氣正坐動搖兩臂不息十二通以治五勞七傷水腫之病也又云外轉兩足十遍引去心腹諸勞內轉兩足十遍引去心五息止去身一切諸勞疾疹二虛勞羸瘦候夫血氣者所以榮養其身也虛勞之人精髓萎竭血氣虛弱不能充盛肌膚此故羸瘦也其湯尉針石別有正方補養宣導今附於後養生方云朝朝服玉泉使人丁壯有顏色去蟲而牢齒也玉泉口中唾也朝未起早漱口中唾滿口乃吞之輒琢齒二七過如此者三乃止名曰練精又云咽之三過乃止補養虛勞令人強壯三虛勞不能食候脾候身之肌肉胃為水穀之海虛勞則臟腑不和脾胃氣弱故不能食也四虛勞胃氣虛弱不能消穀候胃為腑主盛水穀脾為臟主消水穀若脾胃溫和則能消化今虛勞血氣衰少脾胃冷弱故不消穀也五虛勞三焦不調候三焦者謂上中下也若上焦有熱則胸膈痞滿口苦咽乾有寒則吞酢而吐沫中焦有熱則身重目黃有寒則善脹而食不消下焦有熱則大便難有寒則小腹痛而小便數三焦之氣主焦熟水穀分別清濁若不調平則生諸病六虛勞寒冷候虛勞之人血氣虛竭陰陽不守臟腑俱衰故內生寒冷也其湯尉針石別有正方補養宣導今附於後養生方導引法云坐地交叉兩腳以兩手從曲腳中入低頭叉手項上治久寒不能自溫耳不聞聲七虛勞痰飲候勞傷之人脾胃虛弱不能克消水漿故為痰飲也痰者涎液結聚在於胸膈飲者水漿停積在膀胱也八虛勞四肢逆冷候經脈所行皆起於手足虛勞則血氣衰損不能溫其四大故四肢逆冷也九虛勞手足煩疼候虛勞血氣衰弱陰陽不利邪氣乘之次冷熱交爭故以煩疼也十虛勞積聚候積聚者腑臟之病也積者臟病也陰氣所生也聚者腑病也陽氣所成也虛勞之人陰陽傷損血氣凝澀不能宣通經絡故積聚於內也十一虛勞癥瘕候癥瘕病者皆由久寒積冷飲食不消所致也結聚牢強按之不轉動為症推之浮移為瘕虛勞之人脾胃氣弱不能克消水穀復為寒冷所乘故結成此病也十二虛勞上氣候肺主於氣氣為陽氣有餘則喘滿逆上虛勞之病或陰陽俱傷或血氣偏損今是陰不足陽有餘故上氣也十三虛勞客熱候虛勞之人血氣微弱陰陽俱虛小勞則生熱熱因勞而生故以名客熱也十四虛勞少氣候虛勞傷於肺故少氣肺主氣氣為陽此為陽氣不足故也其湯尉針石別有正方補養宣導今附於後養生方導引法云人能終日不涕唾隨有漱漏咽之若恆含棗核而咽之令人受氣生津液此大要也十五虛勞熱候虛勞而熱者是陰氣不足陽氣有餘故內外生於熱非邪氣從外來乘也十六虛勞無子候丈夫無子者其精清如水冷如冰鐵皆為無子之候又泄精精不射出但聚於陰頭亦無子無此之候皆有子交會當用陽時陽時從夜半至禺中是也以此時有子皆聰明長壽勿用陰時陰時從午至亥有子皆頑暗而短命切宜審詳之凡婦人月候來時候一日至三日子門開若交會則有子過四日則閉便無子也男子脈得微弱而澀為無子精氣清冷也十七虛勞裡急候虛勞則腎氣不足傷於衝脈衝脈為陰脈之海起於關元關元穴在臍下隨腹直上至咽喉勞傷內損故腹裡拘急也上部之脈微細而臥引裡急裡急心膈上有熱者口乾渴寸口脈陽弦下急陰弦裡急弦為胃氣虛食難已飽飽則急痛不得息寸微關實尺弦緊者少腹腰背下苦拘急痛外如不喜寒身憒憒也其湯尉針石別有正方補養宣導今附於後養生方導引法云正偃臥以口徐徐納氣以鼻出之除裡急飽食後小咽氣數十令溫中若氣寒者使人乾嘔腹痛從口納氣七十所咽即大填腹內小咽氣數十兩手相摩令極熱以摩腹令氣下十八虛勞傷筋骨候肝主筋而藏血腎主骨而生髓虛勞損血耗髓故傷筋骨也十九虛勞筋攣候肝藏血而候筋虛勞損血不能榮養於筋致使筋氣極虛又為寒邪所侵故筋攣也二十虛勞驚悸候心藏神而主血脈虛勞損傷血脈致令心氣不足因為邪氣所乘則使驚而悸動不定二十一虛勞風痿痹不隨候夫風寒濕三氣合為痹病在於陰其人苦筋骨痿枯身體疼痛此為痿痹之病皆愁思所致憂慮所為診其脈尺中虛小者是脛寒痿痹也二十二虛勞目暗候肝候於目而藏血血則榮養於目腑臟勞傷血氣俱虛五臟氣不足不能榮於目故令目暗也二十三虛勞耳聾候腎候於耳勞傷則腎氣虛風邪入於腎經則令人耳聾而鳴若膀胱有停水浸漬於腎則耳聾而氣滿二十四虛勞不得眠候夫邪氣之客於人也或令人目不得眠何也曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脈也化為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者晝行於陽夜行於陰其入於陰常從足少陰之分肉間行於五臟六腑今邪氣客於臟腑則衛氣獨營其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺滿不得入於陰陰氣虛故目不得眠二十五大病後不得眠候大病之後臟腑尚虛榮衛未和故生於冷熱陰氣虛衛氣獨行於陽不入於陰故不得眠若心煩不得眠者心熱也若但虛煩而不得眠者膽冷也二十六病後虛腫候夫病後經絡既虛受於風濕膚腠閉塞榮衛不利氣不宣泄故致虛腫虛腫不已津液澀或變為微水也二十七虛勞脈結候脈動而暫止因不能還而復動是脈結也虛勞血氣衰少脈雖乘氣而動血氣虛則不能連屬故脈為之結也二十八虛勞汗候諸陽主表在於膚腠之間若陽氣偏虛則津液發泄故為汗汗多則損於心心液為汗診其脈寸口弱者陽氣虛為多汗脈也二十九虛勞盜汗候盜汗者因眠睡而身體流汗也此由陽虛所致久不已令人羸瘠枯瘦心氣不足亡津液故也診其脈男子平人脈虛弱細微皆為盜汗脈也三十諸大病後虛不足候大病者中風傷寒熱勞溫瘧之類是也此病之後血氣減耗臟腑未和使之虛乏不足虛乏不足則經絡受邪隨其所犯變成諸病三十一大病後虛汗候大病之後復為風邪所乘則陽氣發泄故令虛汗汗多亡陽則津液竭令人枯瘦也三十二風虛汗出候夫人䐃肉不牢而無分理理粗而皮不致者腠理疏也此則易生於風風入於陽陽虛則汗出也若少氣口乾而渴近衣則身熱如火臨食則流汗如雨骨節懈惰不欲自營此為漏風由醉酒當風所致也三十三虛勞心腹痞滿候虛勞損傷血氣皆虛復為寒邪所乘腑臟之氣不宣發於外停積在裡故令心腹痞滿也三十四虛勞心腹痛候虛勞者臟氣不足復為風邪所乘邪正相干冷熱擊搏故心腹俱痛三十五虛勞嘔逆候勞傷之人五臟不安六腑不調胃為水穀之海今既虛弱為寒冷所侵不勝於水谷故氣逆而嘔也三十六虛勞咳嗽候虛勞而咳嗽者腑臟氣衰邪傷於肺故也久不已令人胸背微痛或驚悸煩滿或喘息上氣或咳逆唾血此皆臟腑之咳也然肺主於氣氣之所行通榮臟腑故咳嗽俱入肺也三十七虛勞體痛候勞傷之人陰陽俱虛經絡脈澀血氣不利若遇風邪與正氣相搏逢寒則身體痛值熱則皮膚癢診其脈緊濡相搏主體節痛其湯尉針石別有正方補養宣導今附於後養生方導引法云雙手舒指向上手掌從面向南四方回之屈肘上下盡勢四七始放手向下垂之向後雙振輕散氣二七上下動兩膊二七去身內臂肋疼悶漸用之則永除又云大踑坐以兩手捉足五指自極低頭不息九通治頸脊腰腳痛勞疾又云偃臥展兩足指右向直兩手身旁鼻納氣七息除骨痛又云端坐伸腰舉右手仰其掌卻左臂覆左手以鼻納氣自極七息息間稍頓左手除兩臂背痛又云胡跪身向下頭去地五寸始舉頭面向上將兩手一時抽出先左手向身前長舒一手向身後長舒前後極勢二七左右亦然去臂骨脊筋陰陽不和痛悶㽲痛又云坐一足上一足橫鋪安膝下押之一手捺上膝向下急一手反向取勢長舒頭仰向前共兩手一時取勢捺搖二七左右迭互亦然去髀胸項掖脈血遲澀攣痛悶疼雙足互跪安穩始抽一足向前極勢頭面過前兩足指上下來去三七左右換足亦然去臂腰背髀膝內疼悶不和五臟六腑氣津調適一足屈如向前使膀胱著膝上一足舒向後盡勢足指急勢兩手向後形狀欲似飛仙虛空頭昂一時取勢二七足左右換易一寸去遍身不和又云長舒兩足足指努向上兩手長舒手掌相向手指直舒仰頭努脊一時極勢滿三通動足相去一尺手不移處手掌向外七通須臾動足二尺手向下拓席極勢三通去遍身內筋節勞虛骨髓疼悶長舒兩足向身角上兩手捉兩足指急搦心不用力心氣並在足下手足一時努縱極勢三七去踹臂腰疼解溪蹙氣日日漸損三十八虛勞寒熱候勞傷則血氣虛使陰陽不和互有勝弱故也陽勝則熱陰勝則寒陰陽相乘故發寒熱三十九虛勞口乾燥候此由勞損血氣陰陽斷隔冷熱不通上焦生熱令口乾燥也其湯尉針石別有正方補養宣導今附於後養生方導引法云東向坐仰頭不息五通以舌撩口中漱滿二七咽愈口乾若引腎水發醴泉來至咽喉醴泉甘美能除口苦恆香潔食甘味和正久行不已味如甘露無有飢渴又云東向坐仰頭不息五通以舌撩口漱滿二七咽治口苦幹燥
