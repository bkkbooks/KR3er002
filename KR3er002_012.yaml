body:
  text: 卷之十二黃病諸候凡二十八論一黃病候黃病者一身盡疼發熱面色洞黃七八日後壯熱在裡有血當下之法如豚肝狀其人少腹內急若其人眼睛澀疼鼻骨疼兩膊及項強腰背急即是患黃多大便澀但令得小便快即不慮死不用大便多多即心腹脹不存此由寒濕在表則熱蓄於脾胃腠理不開瘀熱與宿谷相搏煩郁不得消則大小便不通故身體面目皆變黃色凡黃候其寸口近掌無脈口鼻冷氣並不可治也二急黃候脾胃有熱穀氣鬱蒸因為熱毒所加故卒然發黃心滿氣喘命在頃刻故云急黃也有得病即身體面目發黃者有初不知是黃死後乃身面黃者其候得病但發熱心戰者是急黃也三黃汗候黃汗之為病身體洪腫發熱汗出不渴狀如風水汗染衣色正黃如柏汁其脈自沉此由脾胃有熱汗出而入水中浴若水入汗孔中得成黃汗也四犯黃候有得黃病已瘥而將息失宜飲食過度犯觸禁忌致病發胃名為犯黃候五勞黃候脾臟中風風與瘀熱相搏故令身體發黃額上黑微汗出手足中熱薄暮發膀胱急四肢煩小便自利名為勞黃六腦黃候熱邪在骨髓而腦為髓海故熱氣從骨髓流入於腦則身體發黃頭腦痛眉疼名為腦黃候七陰黃候陽氣伏陰氣盛熱毒加之故但身面色黃頭痛而不發熱名為陰黃八內黃候熱毒氣在脾胃與穀氣相搏熱蒸在內不得宣散先心腹脹滿氣急然後身面悉黃名為內黃九行黃候瘀熱在脾臟但肉微黃而身不甚熱其人頭痛心煩不廢行立名為行黃十癖黃候氣水飲停滯結聚成癖因熱氣相搏則鬱蒸不散故脅下滿痛而身發黃名為癖黃十一噤黃候心脾二臟有瘀熱所為心主於舌脾之絡脈出於舌下若身面發黃舌下大脈起青黑色舌噤強不能語名為噤黃也十二五色黃候凡人著黃五種黃皆同其人至困冥漠不知東西者看其左手脈名手肝脈兩筋中其脈如有如無又看近手屈肘前臂上當有三歧脈中央者名為手肝脈兩廂者名歧脈看時若肝脈全無兩廂壞其人十死一生難可救濟若中央脈近掌三指道有如不絶其人必不死脈經三日漸徹至手掌必得汗汗罷必愈婦人患黃看右手脈其人身熱眼青黃視其瞳子青脈亦青面色青者是其由脾移熱於肝肝色青也其人身熱而發黃赤視其眼赤高視心腹脹滿脈赤便是此由脾移熱於心心色赤故其人身熱而發赤黃不可治治之難瘥其人身熱發黃白視其舌下白垢生者是此由脾移熱於肺肺色白也其人身熱發黑黃視其唇黑眼黃舌下脈黑者是此由脾移熱於腎腎色黑也故其身熱而發黑黃也十三風黃候凡人先患風濕復遇冷氣相搏則舉身疼痛發熱而體黃也十四因黃髮血候此由脾胃大熱熱傷於心心主於血熱氣盛故發黃而動血故因名為發血十五因黃髮痢候此由瘀熱在於脾胃因而發黃挾毒即下痢故名為發痢十六因黃髮痔候此病由熱傷於心心主血熱盛則血隨大便而下名為血痔十七因黃髮癖候夫黃病皆是大熱所為熱盛之時必服冷藥冷藥多則動舊癖十八因黃髮病後小便澀兼石淋候黃病後小便澀兼石淋發黃疸此皆由蓄熱所為熱流小腸小便澀少而痛下物如沙石也十九因黃髮吐候黃病吐下之後胃氣虛冷其人宿病有寒飲故發吐二十黃疸候黃疸之病此由酒食過度腑臟不和水穀相併積於脾胃復為風濕所搏瘀結不散熱氣鬱蒸故食已如飢令身體面目爪甲及小便盡黃而欲安臥若身脈多赤多黑多青皆見者必寒熱身痛面色微黃齒垢黃爪甲上黃黃疸也疸而渴者其病難治疸而不渴其病可治發於陰部其人必嘔發於陽部其人振寒而微熱二十一酒疸候夫虛勞之人若飲酒多進谷少者則胃內生熱因大醉當風入水則身目發黃心中懊痛足脛滿小便黃面發赤斑若下之久久變為黑疸面目黑心中如啖蒜齏狀大便正黑皮膚爪之不仁其脈浮弱故知之酒疸心中熱欲嘔者當吐之則愈其小便不利其候當心中熱足不熱是其證明也若腹滿欲吐鼻燥其脈浮先吐之沉弦先下之二十二谷疸候谷疸之狀寒熱不食食畢頭眩心忪怫鬱不安而發黃由失飢大食胃氣衝熏所致陽明病脈遲食難用飽飽則發煩頭眩者必小便難此欲為谷疸雖下之其腹必滿其脈遲故也二十三女勞疸候女勞疸之狀身目皆黃發熱惡寒小腹滿急小便難由大勞大熱而交接交接竟入水所致也二十四黑疸候黑疸之狀苦小腹滿身體盡黃額上反黑足下熱大便黑是也夫黃疸酒疸女勞疸久久多變為黑疸二十五九疸候夫九疸者一曰胃疸二曰心疸三曰腎疸四曰腸疸五曰膏疸六曰舌疸七曰體疸八曰肉疸九曰肝疸凡諸疸病皆由飲食過度醉酒勞傷脾胃有瘀熱所致其病身面皆發黃但立名不同耳二十六胞疸候胞疸之病小腸有熱流於胞內故大小便皆如柏汁此為胞疸二十七風黃疸候夫風濕在於腑臟與熱氣相搏便發於黃即小便或赤或白好臥而心振面虛黑名為風黃疸二十八濕疸候濕疸病者脾胃有熱與濕氣相搏故病苦身體疼面目黃小便不利此為濕疸冷熱病諸候凡七論一病熱候夫患熱者皆由血氣有虛實邪在脾胃陽氣有餘陰氣不足則風邪不得宣散因而生熱熱搏於腑臟故為病熱也診其脈關上浮而數胃中有熱滑而疾者亦為有熱弱者無胃氣是為虛熱跗陽脈數者胃中有熱熱則消穀引食跗陽脈粗而浮者其病難治若病者苦發熱身體疼痛此為表有病其脈自當浮今脈反沉而遲故知難瘥其人不即得愈必當死以其病與脈相反故也其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥合兩膝布兩足而伸腰口納氣振腹自極七息除壯熱疼痛通兩脛不隨又云覆臥去枕立兩足以鼻納氣四十所復以鼻出之極令微氣入鼻中勿令鼻知除身中熱背痛又云兩手卻據仰頭向日以口納氣因而咽之數十除熱身中傷死肌二客熱候客熱者由人腑臟不調生於虛熱客於上焦則胸膈生痰實口苦舌乾客於中焦則煩心悶滿不能下食客於下焦則大便難小便赤澀三病冷候夫虛邪在於內與衛氣相搏陰勝者則為寒真氣去去則虛虛則內生寒視其五官色白為有寒診其脈遲則為寒緊則為寒澀遲為寒微者為寒遲而緩為寒微而緊為寒寸口虛為寒其湯尉針石別有正方補養宣導今附於後養生方導引法云一足向下踏地一足長舒向前極勢手掌四方取勢左右換易四七去腸冷腰脊急悶骨疼令使血氣上下布潤又云兩足相合兩手仰捉兩腳向上急挽頭向後振極勢三七欲得努足手兩向舒張身手足極勢二七去竅中生百病下部虛冷又云叉跌兩手反向拓席漸漸向後努齊腹向前散氣待大急還放來去二七去齊下冷腳疼五臟六腑不和又云兩手向後拓腰蹙膊極勢左右轉身來去三七去腹肚齊冷兩膊急胸掖不和又云互跪兩手向後手掌合地出氣向下始漸漸向下覺腰脊大悶還上來去二七身正左右散氣轉腰三七去齊下冷悶解溪內疼痛四寒熱候夫陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒陽者受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通不通則寒獨留於外故寒栗也陰虛內生熱者有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熏胸中故內熱也陽盛而外熱者上焦不通利皮膚緻密腠理閉塞不通衛氣不得泄越故外熱也陰盛而內寒者厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣血凝泣則脈不通其脈不通脈則盛大以澀故中寒陰陽之要陰密陽固若兩者不和若春無秋若冬無夏因而和之是謂聖度故陽強不能密陰氣乃絶因於露風乃生寒熱凡小骨弱肉者善病寒熱骨寒熱病無所安汗注不休齒本稿取其少陰於陰股之絡齒爪稿死不治診其脈沉細數散也五寒熱往來候夫寒氣並於陰則發寒陽氣並於陽則發熱陰陽二氣虛實不調故邪氣更作寒熱往來也脈緊而數寒熱俱發必當下乃愈脈急如弦者邪入陽明寒熱脾脈小甚為寒熱養生方云已醉飽食發寒熱也六冷熱不調候夫人榮衛不調致令陰陽痞塞陽並於上則上熱陰並於下則下冷上焦有熱或喉口生瘡胸膈煩滿下焦有冷則腹脹腸鳴絞痛泄痢七寒熱厥候夫厥者逆也謂陰陽二氣卒有衰絶逆於常度若陽氣衰於下則為寒厥陰氣衰於下則為熱厥熱厥之為熱也必起於足下者陽氣起於足五指之表陰脈者集於足下而聚於足心故也故陽氣勝則足下熱熱厥者酒入於胃是絡脈滿而經脈虛脾主為胃行其津液陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢此人必數醉若飽已入房氣聚於脾中未得散酒氣與穀氣相併熱起於內故遍於身內熱則尿赤夫酒氣盛而慓悍腎氣有衰陽氣獨勝故手腳為之熱寒厥之為寒必從五指始上於膝下陰氣起於五指之裡集於膝下聚於膝上故陰氣勝則五指至膝上寒其寒也不從外皆從內寒寒厥何失而然前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣衰秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪其所用下氣上爭未能復精氣溢下邪氣因從之而上氣因於中陽氣衰不能滲榮其經絡故陽氣日損陰氣獨在故手足為之寒夫厥者或令人腹滿或令人暴不知人或半日遠至一日乃知人者此由陰氣盛於上則下氣重上而邪氣逆逆則陽氣亂亂則不知人太陽之厥踵首頭重足不能行發為眴僕陽明之厥則癲疾欲走呼腹滿不能臥臥則面赤而熱妄見妄言少陽之厥則暴聾頰腫胸熱脅痛䯒不可以運太陰之厥腹滿䐜脹後不利不欲食食之則嘔不得臥也少陰之厥者則舌乾尿赤腹滿心痛厥陰之厥者少腹腫痛䐜脹涇溲不利好臥屈膝陰縮腫脛內熱其湯尉針石別有正方補養宣導今附於後養生方導引法云正偃臥展兩足鼻納氣自極七息搖足三十過止除足寒厥逆也
