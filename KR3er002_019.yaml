body:
  text: 卷之十九積聚病諸候凡六論一積聚候積聚者由陰陽不和腑臟虛弱受於風邪搏於腑臟之氣所為也腑者陽也臟者陰也陽浮而動陰沉而伏積者陰氣五臟所生始發不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處諸臟受邪初未能為積聚留滯不去乃成積聚肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發痎瘧連歲月不已以季夏戊己得之何以言之肺病當傳肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知之肥氣季夏得之也心之積名曰伏梁起臍上大如臂上至心下久不愈令人病煩心以秋庚辛得之何以言之腎病當傳心心當傳肺肺秋適旺腎冬適旺旺者不受邪心欲復還腎腎不肯受故留結為積故知伏梁以秋得之也脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸得之何以言之肝病當傳脾脾當傳腎腎冬適王旺者不受邪脾欲復遠肝肝不肯受故留結為積故知痞氣以冬得之也肺之積名曰息賁在右肋下覆大如杯久不愈令人灑淅寒熱喘嗽發肺癰以春甲乙得之何以言之心病當傳肺肺當傳肝肝以春適旺旺者不受邪肺欲復還心心不肯受故留結為積故知息賁以春得之腎之積名曰賁豚發於少腹上至心下若豚賁走之狀上下無時久不愈令人喘逆骨萎少氣以夏丙丁得之何以言之脾病當傳腎腎當傳心心夏適旺旺者不受邪腎欲復還脾脾不肯受故留結為積故知賁豚以夏得之此為五積也診其脈快而緊積聚脈浮而牢積聚脈橫者脅下有積聚脈來小沉實者胃中有積聚不下食食即吐出脈來細沉附骨者積也脈出在左積在左脈出在右積在右脈兩出積在中央以部處之診得肺積脈浮而毛按之辟易脅下氣逆背相引痛少氣善忘目瞑皮膚寒秋愈夏劇主皮中時痛如蝨緣狀其甚如針刺之狀時癢色白也診得心積脈沉而芤時上下無常處病悸腹中熱面赤咽乾心煩掌中熱甚即唾血主身瘛瘲主血厥夏瘥冬劇色赤也診得脾積脈浮大而長飢則減飽則見䐜起與谷爭纍纍如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能臥主肌肉損季夏瘥春劇色黃也診得肝積脈弦而細兩脅下痛邪走心下足脛寒脅痛引小腹男子積疝也女子病淋也身無膏澤喜轉筋爪甲枯黑春瘥秋劇色青也診得腎積脈沉而急苦脊與腰相引痛飢則見飽則減病腰痛小腹裡急口乾咽腫傷爛目茫茫骨中寒主髓厥喜忘冬瘥夏劇色黑也診得心腹積聚其脈牢強急者生脈虛弱急者死又積聚之脈實強者生沉者死其湯尉針石別有正方補養宣導今附於後養生方導引法云以左足踐右足上除心下積又云病心下積聚端坐伸腰向日仰頭徐以口納氣因而咽之三十過而止開目作又云左脅側臥申臂直腳以口納氣鼻吐之周而復始除積聚心下不便又云以左手按右脅舉右手極形除積及老血又云閉口微息正坐向王氣張鼻取氣逼置臍下小口微出氣十二通以除結聚低頭不息十二通以消飲食令身輕強行之冬月令人不寒又云端坐伸腰直上展兩臂仰兩手掌以鼻納氣閉之自極七息名曰蜀上喬除脅下積聚又云向晨去枕正偃臥伸臂脛瞑目閉口不息極張腹兩足再息頃間吸腹仰兩足倍拳欲自微息定復為之春三夏五秋七冬九蕩滌五臟津潤六腑所病皆愈腹有疾積聚者張吸其腹熱乃止癥瘕散破即愈矣二積聚痼結候積聚痼結者是五臟六腑之氣已積聚於內重因飲食不節寒溫不調邪氣重沓牢痼盤結者也若久即成症三積聚心腹痛候積者陰氣五臟所生其痛不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處此皆由寒氣搏於臟腑與陰陽相擊下上故心腹痛也診其寸口之脈沉而橫脅下有積腹中有橫積聚痛又寸口脈細沉滑者有積聚在脅下左右皆滿與背相引痛又云寸口脈緊而牢者脅下腹中有橫積結痛而泄利脈微細者生浮者死四積聚心腹脹滿候積者陰氣五臟所生其痛不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處也積聚成病蘊結在內則氣行不宣通氣搏於腑臟故心腹脹滿心腹脹滿則煩而悶尤短氣也五積聚宿食候積者陰氣五臟所生其痛不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處也積聚而宿食不消者由臟腑為寒氣所乘脾胃虛冷故不消化留為宿食也診其脈來實心腹積聚飲食不消胃中冷也六伏梁候伏梁者此由五臟之積一名也心之積名曰伏梁起於臍上大如臂診得心積脈沉而芤時上下無常處病悸腹中熱面赤而咽乾心煩掌中熱甚即唾血身瘛瘲夏瘥冬劇唾膿血者死又其脈牢強急者生虛弱急者死癥瘕病諸候凡十八論一症候症者由寒溫失節致腑臟之氣虛弱而食飲不消聚結在內漸染生長塊假盤牢不移動者是症也言其形狀可徵驗也若積引歲月人即柴瘦腹轉大遂致死診其脈弦而伏其症不轉動者必死二癥瘕候癥瘕者皆由寒溫不調飲食不化與臟氣相搏結所生也其病不動者直名為癥若病雖有結瘕而可推移者名為瘕瘕者假也謂虛假可動也候其人發語聲嘶中聲濁而後語乏氣拖舌語而不出此人食結在腹病寒口裡常水出四體灑灑常如發瘧飲食不能常自悶悶而痛此食症病也診其脈沉而中散者寒食症也脈弦緊而細症也若在心下則寸口脈弦緊在胃脘則關上弦緊在臍下則尺中弦緊脈症法左手脈橫症在左右手脈橫症在右脈頭大在上頭小在下脈來遲而牢者為病症也腎脈小急肝脈小急心脈小急不鼓皆為瘕寸口脈結者癥瘕脈弦而伏腹中有症不可轉動必死不治故也其湯尉針石別有正方補養宣導今附於後養生方云飲食大走腸胃傷久成癥瘕時時結痛養生方導引法云向晨去枕正偃臥伸臂脛瞑目閉口無息極張腹兩足再息頃間吸腹仰兩足倍拳欲自微息定復為之春三夏五秋七冬九蕩滌五臟津潤六腑所病皆愈腹有疾積聚者張吸其腹熱乃止癥瘕散破即愈矣三暴症候暴症者由腑臟虛弱食生冷之物臟既虛弱不能消之結聚成塊卒然而起其生無漸名曰暴症也本由臟弱其症暴生至於成病死人則速四鱉症候鱉症者謂腹內癥結如鱉之形狀有食鱉觸冷不消生症者有食諸雜物得冷不消變化而作者此皆脾胃氣弱而遇冷不能克消故也癥病結成推之不動移是也五蝨症候人有多蝨而性好齧之所齧既多腑臟虛弱不能消之不幸變化生症而患者亦少俗云蝨症人見蝨必齧之不能禁止蝨生長在腹內時有從下部出亦能斃人六米症候人有好啞米轉久彌嗜啞之若不得米則胸中清水出得米水便止米不消化遂生癥結其人常思米不能飲食久則斃七食症候有人卒大能食乖其常分因飢值生蔥便大食之乃吐一肉塊繞畔有口其病則難愈故謂食症特由不幸致此妖異成症非飲食生冷過度之病也八腹內有人聲候夫有人腹內忽有人聲或學人語而相答此乃不幸致生災變非關經絡腑臟冷熱虛實所為也九發症候有人因食飲內誤有頭髮隨食而入成症胸喉間如有蟲上下來去者是也十蛟龍病候蛟龍病者云三月八月蛟龍子生在芹菜上人食芹菜不幸隨食入人腹變成蛟龍其病之狀發則如癲十一瘕病候瘕病者由寒溫不適飲食不消與臟氣相搏積在腹內結塊瘕痛隨氣移動是也言其虛假不牢故謂之為瘕也十二鱉瘕候鱉瘕者謂腹中瘕結如鱉狀是也有食鱉觸冷不消而生者亦有食諸雜肉得冷變化而作者皆由脾胃氣虛弱而遇冷則不能克消所致瘕言假也謂其有形假而推移也昔曾有人共奴俱患鱉瘕奴在前死遂破其腹得一白鱉仍故活有人乘白馬來看此鱉白馬遂尿隨落鱉上即縮頭及腳尋以馬尿灌之即化為水其主曰吾將瘥矣即服之果如其言得瘥養生方云六月勿食澤中水令人成鱉瘕也十三魚瘕候有人胃氣虛弱者食生魚因為冷氣所搏不能消之結成魚瘕揣之有形狀如魚是也亦有飲陂湖之水誤有小魚入人腹不幸便即生長亦有形狀如魚也養生方云魚赤目作鱠食之生瘕十四蛇瘕候人有食蛇不消因腹內生蛇瘕也亦有蛇之精液誤入飲食內亦令病之其狀常苦飢而食則不下喉噎塞食至胸內即吐出其病在腹摸揣亦有蛇狀謂蛇瘕也十五肉瘕候人有病常思肉得肉食訖又思之名為肉瘕也十六酒瘕候人有嗜酒飲酒既多而食谷常少積久漸瘦其病遂當思酒不得酒即吐多睡不復能食云是胃中有蟲使之然名為酒瘕也十七谷瘕候人有能食而不大便初有不覺為患久乃腹內成塊結推之可動故名為谷瘕也十八腹內有毛候人有飲食內誤有毛隨食入腹則令漸漸羸瘦但此病不説別有證狀當以舉因食毛以知之
