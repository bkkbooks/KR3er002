body:
  text: 卷之四十四婦人産後病諸候下凡四十一論三十一産後月水不利候手太陽少陰之經主下為月水太陽小腸之經少陰心之經也心主血脈因産傷動血氣其後虛損未復而為風冷客於經絡冷搏於血則血凝澀故令月水不利也三十二産後月水不調候夫産傷動血氣虛損未復而風邪冷熱之氣客於經絡乍冷乍熱冷則血結熱則血消故令血或多或少乍在月前乍在月後故為不調也三十三産後月水不通候夫産傷動血氣其後虛損未平復為風冷所傷血之為性得冷則凝結故風冷傷經血結於胞絡之間故令月水不通也凡血結月水不通則變成血瘕水血相併後遇脾胃衰弱肌肉虛者變水腫也三十四産後帶下候帶下之病由任脈虛損任脈為經絡之海産後血氣勞損未平復為風冷所乘傷於任脈冷熱相交冷多則白多熱多則赤多也相兼為帶下也又云帶下有三門一曰胞門二曰龍門三曰玉門産後屬胞門謂因産傷損胞絡故也三十五産後崩中惡露不盡候産傷於經血其後虛損未平復或勞役損動而血暴崩下遂因淋瀝不斷時來故為崩中惡露不盡風崩中若小腹急滿為內有瘀血不可斷之斷之終不斷而加小腹脹滿為難矣若無瘀血則可斷易治也三十六産後痢候産後虛損未平復而起早傷於風冷風冷乘虛入於大腸腸虛則泄故令痢也産後痢若變為血痢則難治世謂之産子痢也三十七産後痢腫候因産勞傷榮衛脾胃虛弱風冷乘之水穀不結大腸虛則泄成利也痢而腫者脾主土候肌肉土性本剋水今脾氣衰微不能克消於水水氣流溢散在皮膚故令腫也三十八産後虛冷洞痢候産勞傷而血氣虛極風冷乘之入於腸胃腸胃虛而暴得冷腸虛則泄遇冷極虛故變洞痢也三十九産後滯痢候産後虛損冷熱之氣客於腸間熱乘血血滲於腸則赤冷搏腸間津液則變白其冷熱相交故赤白相雜連滯不止故謂滯利也四十産後冷熱利候産後臟虛而冷熱之氣入於腸胃腸虛則泄故成冷熱痢凡利色青與白為冷黃與赤為熱不止熱甚則變生血冷極則生白膿膿血相雜冷熱不調則變滯痢也四十一産後客熱痢候産後臟虛而熱氣乘之熱入於腸腸虛則泄故為客熱痢色黃是也熱甚則黃赤而有血也四十二産後赤痢候赤痢血痢也因産後血虛為熱氣所乘熱搏血滲入腸腸虛而泄為血痢凡血痢皆是多熱熱血不止蘊瘀成膿血痢也四十三産後陰下脫候産而陰脫者由宿有虛冷因産用力過度其氣下衝則陰下脫也四十四産後陰道痛腫候臟氣宿虛因産風邪乘於陰邪與血氣相搏在其腠理故令痛血氣為邪所壅痞故腫也四十五産後陰道開候子臟宿虛因産冷氣乘之血氣得冷不能相榮故令開也四十六産後遺尿候因産用氣傷於膀胱而冷氣入胞囊胞囊缺漏不禁小便故遺尿多因産難所致四十七産後淋候因産虛損而熱氣客胞內虛則起數熱則泄少故成淋也四十八産後渴利候渴利者渴而引飲隨飲隨小便而謂之渴利也膀胱與腎為表裡膀胱為津液之府婦人以腎系胞産則血水俱下傷損腎與膀胱之氣津液竭燥故令渴也而腎氣下通於陰腎虛則不能制水故小便數是為渴利也四十九産後小便數候胞內宿有冷因産氣虛而冷發動冷氣入胞虛弱不能制其小便故令數五十産後尿血候夫産傷損血氣血氣則虛而挾於熱搏於血血得熱流散滲於胞故血隨尿出是為尿血五十一産後大小便血候夫産傷動血氣腑臟勞損血傷未復而挾於熱血得熱則妄行大腸及胞囊虛者則血滲入之故因大小便而血出也五十二産後大小便不通候大小腸宿有熱因産則血水俱下津液暴竭本挾於熱大小腸未調和故令大小便澀結不通也五十三産後大便不通候腸胃本挾於熱因産又水血俱下津液竭燥腸胃痞澀熱結腸胃故大便不通也五十四産後小便不通候因産動氣氣衝於胞胞轉屈闢不得小便故也亦有小腸本挾於熱因産水血俱下津液竭燥胞內熱結則小便不通也然胞轉則小腹脹滿氣急絞痛若虛熱津液竭燥者則不甚脹急但不通津液生氣和則小便也五十五産後小便難候産則津液空竭血氣皆虛有熱客於胞者熱停積故小便痞澀而難出五十六産後嘔候胃為水穀之海水穀之精以為血氣血氣榮潤腑臟因産則腑臟傷動有血虛而氣獨盛者氣乘腸胃腸胃燥澀其氣則逆故嘔不下食也五十七産後咳嗽候肺感微寒則成咳嗽而肺主氣因産氣虛風冷傷於肺故令咳嗽也五十八産後時氣熱病候四時之間忽有非節之氣而為病者謂之時氣産後體虛而非節之熱氣傷之故為産後時氣熱病也診其脈弦小者足溫則生足寒則死凡熱病脈應浮滑而懸急以為不順手足應溫而反冷為四逆必死也五十九産後傷寒候觸冒寒氣而為病謂之傷寒産婦血氣俱虛日月未滿而起早勞動為寒所傷則嗇嗇惡寒吸吸微熱數日乃歇重者頭及骨節皆痛七八日乃瘥也六十産後寒熱候因産勞傷血氣使陰陽不和互相乘克陽勝則熱陰勝則寒陰陽相加故發寒熱凡産余血在內亦令寒熱其腹時刺痛者是也六十一産後瘧候夫瘧者由夏傷於暑客在皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱正邪相擊陰陽交爭陽盛則熱陰盛則寒陰陽更虛更盛故發寒熱陰陽相離則寒熱俱歇若邪動氣至交爭復發故瘧休作有時其發時節漸晏者此由邪客於風府邪循膂而下衛氣一日一夜常大會於風府其明日日下一節故其作日晏其發早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏沖之脈其氣上行九日出於缺盆之內其氣既上故其病發更早其間日發者由邪氣內薄五臟橫連募原其道遠其氣深其行遲不能日作故間日蓄積乃發産後血氣損傷而宿經傷暑熱今因産虛復遇風邪相折陰陽交爭邪正相干故發作成瘧也六十二産後積聚候積者陰氣五臟所生聚者陽氣六腑所成皆由飲食失節冷熱不調致五臟之氣積六腑之氣聚積者痛不離其部聚者其痛無有常處所以然者積為陰氣陰性沉伏故痛不離其部聚為陽氣陽性浮動故痛無常處産婦血氣傷損腑臟虛弱為風冷所乘搏於臟腑與氣血相結故成積聚也六十三産後症候症病之候腹內塊按之牢強推之不移動是也産後而有症者由臟虛余血不盡為風冷所乘血則凝結而成症也六十四産後癖候癖病之狀脅下弦急刺痛是也皆由飲食冷熱不調停積不消所成産後臟虛為風冷搏於停飲結聚故成癖也六十五産後內極七病候産後血氣傷竭為內極七病則舊方所云七害也一者害食二者害氣三者害冷四者害勞五者害房六者害任七者害睡皆産時傷動血氣其後虛極未平復犯此七條而生諸病凡産後氣血內極其人羸疲萎黃冷則心腹絞痛熱則肢體煩疼經血痞澀變為積聚癥瘕也六十六産後目瞑候目不痛不腫但視物不明謂之目瞑肝藏血候應於目産則血虛肝氣不足故目瞑也六十七産後耳聾候腎氣通耳而婦人以腎系胞因産血氣傷損則腎氣虛其經為風邪所乘故令耳聾也六十八産後虛熱口生瘡候産後口生瘡者心臟虛熱心開竅於口而主血脈産則血虛臟有客熱氣上衝胸膈熏發於口故生瘡也六十九産後身生瘡候産則血氣傷損腠理虛為風所乘風邪與血氣相搏臟腑生熱重發肌膚故生瘡也七十産後乳無汁候婦人手太陽少陰之脈下為月水上為乳汁妊娠之人月水不通初以養胎既産則水血俱下津液暴竭經血不足者故無乳汁也七十一産後乳汁溢候婦人手太陽少陰之脈上為乳汁其産雖血水俱下其經血盛者則津液有餘故乳汁多而溢出也故令渴也渴引飲水止飲入腸胃則變為下利也
