body:
  text: 卷之四十一婦人妊娠病諸候上凡二十論一妊娠候經云陰搏陽別謂之有子此是氣血和調陽施陰化也診其手少陰脈動甚者任子也少陰心脈也心主血脈又腎名胞門子戶尺中腎脈也尺中之脈按之不絶者妊娠脈也三部脈沉浮正等按之無斷絶者有娠也又左手沉實為男右手浮大為女左右俱沉實生二男左右俱浮大生二女又尺脈左偏大為男右偏大為女左右俱大産二子又左右手尺脈俱浮為産二男不爾女作男生俱沉為産二女不爾男作女生又左手尺中脈浮大者男右手尺脈沉細者女又得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮欲知男女遣面南行還復呼之左回首是男右回首是女又看上圊時夫從後急呼之左回首是男右回首是女婦人妊娠其夫左邊乳房有核是男右邊乳房有核是女懷娠一月名曰始形飲食精熟酸美受御宜食大麥無食腥辛之物是謂才貞足厥陰養之足厥陰者肝之脈也肝主血一月之時血流澀如不出故足厥陰養之足厥陰穴在足大指歧間白肉際是妊娠二月名曰始膏無食腥辛之物居必靜處男子勿勞百節皆痛是謂始藏也足少陽養之足呼陽者膽之脈也主於精二月之時兒精成於胞里故足少陽養之足少陽穴在足小指間本節後附骨上一寸陷中者是妊娠三月名始胎當此之時血不流形像始化未有定儀見物而變欲令見貴盛公主好人端正莊嚴不欲令見傴僂侏儒醜惡形人及猿猴之類無食姜兔無懷刀繩欲得男者操弓矢射雄雞乘肥馬于田野觀虎豹及走犬其欲得女者則著簪珂環佩弄珠璣欲令子美好端正者數視白璧美玉看孔雀食鯉魚欲令兒多智有力則啖牛心食大麥欲令子賢良盛德則端心正坐清虛和一坐無邪席立無偏倚行無邪徑目無邪視耳無邪聽口無邪言心無邪念無妄喜怒無得思慮食無邪臠無邪臥無橫足思欲果瓜啖味酸菹好芬芳惡見穢臭是謂外象而變者也手心主養之手心主者脈中精神內屬於心能混神故手心主養之手心主穴在掌後橫文是診其妊娠脈滑疾重以手按之散者胎已三月也妊娠四月始受水精以成血脈其食宜稻粳其羹宜魚雁是謂盛榮以通耳目而行經絡洗浴遠避寒暑是手少陽養之手少陽者三焦之脈也內屬於腑四月之時兒六腑順成故手少陽養之手少陽穴在手小指間本節後二寸是也診其妊娠四月欲知男女左脈疾為男右脈疾為女左右俱疾為生二子當此之時慎勿瀉之必致産後之殃何謂也是手少陽三焦之脈風屬於三焦靜形體和心志節飲食妊娠五月始受火精以成其氣臥必晏起洗浣衣服深其屋室厚其衣裳朝吸天光以避寒殃其食宜稻麥其羹宜牛羊和以茱萸調以五味是謂養氣以定五臟者也一本云宜食魚鱉足太陰養之足太陰脾之脈主四季五月之時兒四肢皆成故足太陰養之足太陰穴在足內踝上三寸是也診其妊娠脈重手按之不散但疾不滑者五月也又其脈數者必向壞脈緊者必胞阻脈遲者必腹滿湍脈浮者必水壞為腫妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數觀走犬及視走馬宜食鷙鳥猛獸之肉是謂變腠膂筋以養其爪以牢其背膂足陽明養之足陽明者胃之脈主期其口目六月之時兒口目皆成故足陽明養之足陽明穴在太衝上二寸是也妊娠七月始受木精以成其骨勞躬搖支無使定止動作屈伸以運血氣居處必燥飲食避寒常宜食稻粳以密腠理是謂養骨牢齒者也手太陰養之手太陰者肺脈主皮手七月之時兒皮手已成故手太陰養之手太陰穴在手大指本節後白肉際陷中是診其妊娠七月脈實大牢強者生沉細者死懷軀七月而不可知時時衄而轉筋者此為軀衄時嚏而動者非軀也懷軀七月暴下鬥余水其胎必倚而墮此非時孤漿預下故也妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理而光澤顏色手陽明養之手陽明者大腸脈大腸主九竅八月之時兒九竅皆成故手陽明養之手陽明穴在大指本節後宛宛中是診其妊娠八月脈實大牢強弦緊者生沉細者死妊娠九月始受石精以成皮手六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮多才力足少陰養之足少陰者腎之脈腎主續縷九月之時兒脈續縷皆成故足少陰養之足少陰穴在足內踝後微近下前動脈是也妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神咸備然可預修滑胎方法也二妊娠惡阻候惡阻病者心中憒悶頭眩四肢煩疼懈惰不欲執作惡聞食氣欲啖鹹酸果實多睡少起世云惡食又云惡字是也乃至三四月日以上大劇者不能自勝舉也此由婦人元本虛羸血氣不足腎氣又弱兼當風飲冷太過心下有痰水挾之而有娠也經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐也血脈不通經絡痞澀則四肢沉重挾風則頭目眩故欲有胎而病惡阻所謂欲有胎者其人月水尚來而顏色皮膚如常但苦沉重憒悶不欲食飲又不知其患所在脈理順時平和即是欲有胎也如此經二月日後便覺不通則結胎也三妊娠轉女為男候陰陽和調二氣相感陽施陰化是以有娠而三陰所會則多生女但妊娠二月名曰始藏精氣成於胞里至於三月名曰始胎血脈不流象形而變未有定儀見物而化是時男女未分故未滿三月者可服藥方術轉之令生男也四妊娠養胎候妊娠之人有宿挾疴疹因而有娠或有娠之時節適乖理致生疾病並令腑臟衰損氣力虛羸令胎不長故須服藥去其疾病益其氣血以扶養胎也五妊娠禁忌候妊娠男女未分之時未有定儀見物而化故須端正莊嚴清靜和一無傾視無邪聽兒在胎日月未滿陰陽未備腑臟骨節皆未成足故自初訖於將産飲食居處皆有禁忌六妊娠胎間水氣子滿體腫候胎間水氣子滿體腫者此由脾胃虛弱臟腑之間有停水而挾以妊娠故也妊娠之人經血壅閉以養於胎若挾有水氣則水血相搏水漬於胎兼傷腑臟脾胃主身之肌肉故氣虛弱肌肉則虛水氣流溢於肌故令體腫水漬於胞則令胎壞然妊娠臨將産之月而腳微腫者其産易所以爾者胞藏水血俱多故令易産而水乘於外故微腫但須將産之月耳若初任而腫者是水氣過多兒未成具故壞胎也懷胎脈浮者必腹滿而喘懷娠為水腫七妊娠漏胞候漏胞者謂妊娠數月而經水時下此由衝脈任脈虛不能約制太陽少陰之經血故也衝任之脈為經脈之海皆起於胞內手太陽小腸脈也手少陰心脈也是二經為表裡上為乳汁下為月水有娠之人經水所以斷者壅之以養胎而蓄之為乳汁衝任氣虛則胞內泄漏不能制其經血故月水時下京名胞阻漏血盡則人斃也八妊娠胎動候胎動不安者多因勞役氣力或觸冒冷熱或飲食不適或居處失宜輕者止轉動不安重者便致傷墮若其母有疾以動胎治母則胎安若其胎有不牢固致動以病母者治胎則母瘥若傷動甚者候其母面赤舌青者兒死母活母唇口青口兩邊沫出者母子俱死母面青舌赤口中沫出母死子活九妊娠僵仆胎上搶心下血候此謂行動倒僕或從高墮下傷損胞絡致血下動胎而血傷氣逆者胎隨氣上搶心其死生之候其母舌青者兒死母活唇口無沫兒生唇青沫出者母子俱死唇口青舌赤者母死兒活若下血不住胞燥胎枯則令胎死十妊娠胎死腹中候此或因驚動倒僕或染溫疫傷寒邪毒入於胞臟致令胎死其候當胎處冷為胎已死也十一妊娠腹痛候腹痛皆由風邪入於腑臟與血氣相擊搏所為妊娠之人或突破挾冷疹或新觸風邪癘結而痛其腹痛不已邪正相干血氣相亂致傷損胞絡則令動胎也十二妊娠心痛候夫心痛多是風邪痰飲乘心之經絡邪氣搏於正氣交結而痛也若傷心正經而痛者為真心痛心為神統領諸臟不可受邪邪若傷之朝發夕死夕發朝死若傷心支別絡而痛者則乍間乍盛休作有時妊娠之人感其病者痛不已氣乘胞絡傷損子臟則令動胎凡胎動則胎轉移不安不安而動於血者則血下也十三妊娠心腹痛候妊娠心腹痛者或由腹內宿有冷疹或新觸風寒皆因臟虛而致發動邪正相擊而並於氣隨氣上下上衝於心則心痛下攻於腹則腹痛故令心腹痛也妊娠而痛之者正邪二氣交擊於內若不時瘥者其痛衝擊胞絡必致動胎甚則傷墮十四妊娠腰痛候腎主腰腳因勞損傷動其經虛則風冷乘之故腰痛婦人腎以系胞妊娠而腰痛甚者多墮胎也十五妊娠腰腹痛候腎主腰腳其經虛風冷客之則腰痛冷氣乘虛入腹則腹痛故令腰腹相引而痛不止多動胎腰痛甚者則胎墮也十六妊娠小腹痛候妊娠小腹痛者由胞絡宿有冷而妊娠血不通冷血相搏故痛也痛甚亦令動胎也十七妊娠卒下血候此謂卒有損動或冷熱不調和致傷於胎故卒痛下血不止者墮胎也十八妊娠吐血候吐血皆由腑臟傷所為憂思驚怒皆傷臟腑氣逆故吐血吐血而心悶胸滿未欲止心悶甚者死妊娠病之多墮胎也十九妊娠尿血候尿血由勞傷經絡而有熱熱乘於血血得熱流溢滲入於胞故尿血也二十妊娠數墮胎候陽施陰化故得有胎榮衛和調則經養周足故胎得安而能成長若血氣虛損者子臟為風冷所居則血氣不足故不能養胎所以致胎數墮候其妊娠而恆腰痛者喜墮胎也
