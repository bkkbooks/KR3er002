body:
  text: 卷之七傷寒病諸候上凡三十三論一傷寒候經言春氣溫和夏氣暑熱秋氣清涼冬氣冰寒此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒夫觸冒之者乃為傷寒耳其傷於四時之氣皆能為病而以傷寒為毒者以其最為殺厲之氣也即病者為傷寒不即病者其寒毒藏於肌骨中至春變為溫病夏變為暑病暑病者熱重於溫也是以辛苦之人春夏必有溫病者皆由其冬時觸冒之所致非時行之氣也其時行者是春時應暖而反寒夏時應熱而反冷秋時應涼而反熱冬時應寒而反溫非其時而有其氣是以一歲之中病無少長多相似者此則時行之氣也夫傷寒病者起自風寒入於腠理與精氣交爭榮衛痞隔周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背強重此邪氣在表洗浴發汗即愈病三日以上氣浮在上部胸心填塞故頭痛胸中滿悶當吐之則愈病五日以上氣深結在臟故腹脹身重骨節煩疼當下之則愈夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以十日以上何也巨陽者諸陽之屬也其脈連於風府故為諸陽主氣人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必死兩感於寒者其脈應與其病形何如兩傷於寒者病一日則巨陽與少陰俱病則頭痛口乾煩滿二日則陽明與太陰俱病則腹滿身熱不食譫言三日則少陽與厥陰俱病則耳聾囊縮厥逆水漿不入則不知人六日而死夫五臟已傷六腑不通榮衛不行如是之後三日乃死何也陽明者十二經脈之長也其氣血盛故不知人三日其氣乃盡故死其不兩傷於寒者一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈夾鼻絡於目故身熱而鼻乾不得臥也三日少陽受之少陽主骨其脈循脅絡於耳故胸脅痛耳聾三陽經絡皆受病而未入通於臟也故可汗而已四日太陰受之太陰脈布於胃絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡肺系舌本故口熱舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆病榮衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而咳十二日厥陰病衰囊從少腹微下大氣皆去病日已矣治之奈何治之各通其臟脈病日衰其病未滿三日者可汗而已其病三日過者可泄之而已太陽病頭痛至七日以上並自當愈其經竟故也若欲作再經者當針補陽明使經不傳則愈矣相病之法視色聽聲觀病之所候脈要訣豈不微乎脈洪大者有熱此傷寒病也夫傷寒脈洪浮秋佳春成病寸口脈緊者傷寒頭痛脈來洪大傷寒病少陰病惡寒身拳而利手足四逆者不治其人吐利躁逆者死利止而眩時時自冒者死四逆惡寒而身拳其脈不至其人不煩而躁者死病六日其息高者死傷寒熱盛脈浮大者生沉小者死頭痛脈短澀者死浮滑者生未得汗脈盛大者生細小者死診人瀼瀼大熱其脈細小者死不治傷寒熱病脈盛躁不得汗者此陽之極十死不治未得汗脈躁疾得汗生不得汗難瘥頭痛脈反澀此為逆不治脈浮大而易治細微為難治發汗若吐下者若亡血無津液者而陰陽自和必愈夫下後發汗其人小便不利此亡津液勿治其小便利必自愈陽已虛尺中弱者不可發其汗也咽乾者不可發其汗也傷寒病脈弦細頭痛而發熱此為屬少陽少陽不可發汗發汗則諴語為屬胃胃和則愈不和則煩而悸少陰病脈細沉而微病在裡不可發其汗少陰病脈微亦不可發汗無陽故也陽已虛尺中弱澀者復不可下太陽病發熱而惡寒熱多而寒少脈微弱則無陽不可發其汗脈浮可發其汗發熱自汗出而不惡寒關上脈細數不可吐若諸四逆厥者不可吐虛家亦然寒多熱少可吐者此謂痰多也治瘧亦如之頭項不強痛其寸脈微浮胸中愊牢氣上衝喉咽不得息可吐之治傷寒欲下之切其脈牢牢實之脈或不能悉解宜摸視手掌濈濈汗濕者便可下矣若掌不汗病雖宜下且當消息溫暖身體都皆津液通掌亦自汗下之即了矣太陰之為病腹滿吐食不可下下之益甚時腹自痛下之胸下結牢脈浮可發其汗陽明病心下牢滿不可下下之遂利殺人不可不審不可脫爾禍福正在於此太陽與少陽並病心下牢頭項強眩不可下三陽合病腹滿身重大小便調其脈浮牢而數渴欲飲水此不可下其湯熨針石別有正方補養宣導今附於後養生方導引法云端坐生腰徐徐以鼻納氣以右手持鼻徐徐閉目吐氣治傷寒頭痛洗洗皆當以汗出為度又云舉左手頓左足仰掌鼻納氣四十息止除身熱背痛二傷寒發汗不解候傷寒初一日至二日病在皮膚名為在表表者陽也法宜發汗今發汗而不解者此是陽不受病陽受病者其人身體疼痛發熱而惡寒敕嗇拘急脈洪大者有此證候則為病在表發汗則愈若但煩熱不惡寒身不疼痛此為表不受病故雖強發其汗而不能解也三傷寒取吐候傷寒大法四日病在胸膈當吐之愈有得病二三日便心胸煩悶此為毒氣已入有痰實者便宜取吐四中風傷寒候中風傷寒之狀陽浮而陰弱陽浮熱自發陰弱汗自出嗇嗇惡寒淅淅惡風吸吸發熱鼻鳴乾嘔此其候也太陽病中風以火劫發其汗邪風被火熱血氣流溢失常兩陽相熏灼其身發黃陽盛即欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出齊頸而還腹滿微喘口乾咽爛或不大便久則諴言甚者至噦手足躁擾尋衣摸床小便利者其人可治陽明中風口苦而咽乾腹滿微喘發熱惡寒脈浮緊若下之則腹滿小便難陽明病能食為中風不能食為中寒少陽中風兩耳無聞目赤胸中滿而煩不可吐之吐之則悸而驚太陰中風四肢煩疼其脈陽微陰澀而長為欲愈少陰中風其脈陽微陰浮為欲愈厥陰中風其脈微浮為欲愈不浮為未愈五傷寒一日候傷寒一日太陽受病太陽者膀胱之經也為三陽之首故先受病其脈絡於腰脊主於頭項故得病一日而頭項背膊腰脊痛也六傷寒二日候傷寒二日陽明受病陽明者胃之經也主於肌肉其脈絡鼻入目故得病二日肉熱鼻乾不得眠也諸陽在表表始受病在皮膚之間可摩膏火炙發汗而愈七傷寒三日候傷寒三日少陽受病少陽者膽之經也其脈循於脅上於頸耳故得病三日胸脅熱而耳聾也三陽經絡始相傳病未入於臟故皆可汗而解八傷寒四日候傷寒四日太陰受病太陰者脾之經也為三陰之首是故三日以前陽受病訖傳之於陰而太陰受病焉其脈絡於脾主於喉嗌故得病四日腹滿而嗌乾也其病在胸膈故可吐而愈九傷寒五日候傷寒五日少陰受病少陰者腎之經也其脈貫腎絡肺繫於舌故得病五日口熱舌乾渴而引飲也其病在腹故可下而愈十傷寒六日候傷寒六日厥陰受病厥陰者肝之經也其脈循陰器絡於肝故得病六日煩滿而囊縮也此則陰陽俱受病毒氣在胃故可下而愈十一傷寒七日候傷寒七日病法當小愈陰陽諸經傳病竟故也今七日以後病反甚者欲為再經病也再經病者是陰陽諸經絡重受病故也十二傷寒八日候傷寒八日病不解者或是諸陰陽經絡重受於病或因發汗吐下之後毒氣未盡所以病證猶有也十三傷寒九日以上候傷寒九日以上病不除者或初一經受病即不能相傳或已傳三陽訖而不能傳於陰致停滯累日病證不罷者或三陽三陰傳病已竟又重感於寒名為兩感傷寒則腑臟俱病故日數多而病候改變十四傷寒咽喉痛候傷寒病過經而不愈脈反沉遲手足厥逆者此為下部脈不至陰陽隔絕邪客於足少陰之絡毒氣上熏故咽喉不利或痛而生瘡十五傷寒斑瘡候傷寒病證在表或未發汗或經發汗未解或吐下後而熱不除此毒氣盛故也毒既未散而表已虛熱毒乘虛出於皮膚所以發斑瘡隱軫如錦文重者喉口身體皆成瘡也十六傷寒口瘡候夫傷寒冬時發其汗必吐利口中爛生瘡以其表裡俱熱熱不已毒氣熏上焦故也十七傷寒豌豆瘡候傷寒勢毒氣盛多發疱瘡其瘡色白或赤發於皮膚頭作瘭漿戴白膿者其毒則輕有紫黑色作根隱隱在肌肉裡其毒則重甚者五內七竅皆有瘡其瘡形如豌豆故以名焉十八傷寒豌豆瘡後滅瘢候傷寒病發豌豆瘡者皆是熱毒所為所病折則瘡愈而毒氣尚未全散故瘡痂雖落其瘢猶黶或凹凸肉起所以宜用消毒滅瘢之藥以敷之十九傷寒謬語候傷寒四五日脈沉而喘滿者沉為在裡而反發其汗津液越出大便為難表虛里實久久則諴語發汗後重發其汗亡陽諴語其脈反和者不死陽明病下血而諴語者此為熱入血室但頭汗出當刺期門穴隨其實者而瀉之濈然汗出者則愈病若譫言妄語身當有熱脈當得洪大而反手足四厥脈反沉細而微者死病也譫言妄語身熱脈洪大生沉細微手足四逆者死二十傷寒煩候此由陰氣少陽氣勝故熱而煩滿也少陰病惡寒而拳時自煩欲去其衣被者可治也病脈已解而反發煩者病新瘥又強與谷脾胃氣尚弱不能消穀故令微煩損谷即愈少陰病脈微細而沉但欲臥汗出不煩欲自吐五六日自利後煩躁不得臥寐者死發汗後下之脈平而小煩此新虛不勝穀氣故也二十一傷寒虛煩候傷寒發汗吐下以後腑臟俱虛而熱氣不散故虛煩也二十二傷寒煩悶候傷寒毒氣攻胃故煩悶或服藥以後表不解心下有水氣其人微嘔熱滿而煩悶也二十三傷寒渴候傷寒渴者由熱氣入於臟流於少陰之經少陰主腎腎惡燥故渴而引飲厥陰渴欲飲水者與之愈二十四傷寒嘔候傷寒陽明病熱入胃與穀氣並故令嘔或已經吐下虛熱在藏必飲水水入則胃家虛冷亦嘔也傷寒發熱無汗嘔不能食而反汗出濈然是為轉在陽明傷寒嘔多雖有陽明證不可攻也少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之二十五傷寒乾嘔候此謂熱氣在於脾胃也或發汗解後胃中不和尚有蓄熱熱氣上熏則心下痞結故乾嘔二十六傷寒吐逆候傷寒少陰病其人飲食入口則吐或心中溫溫欲吐不能當遂吐之若始得之手足寒脈弦遲此中有寒飲不可吐也當溫之病人脈數數為有熱當消穀引食反吐者師發其汗陽微膈氣虛脈則為數數為客陽不能消穀胃中虛冷故也二十七傷寒噦候傷寒大吐下之後極虛復極汗出者其水鬱以發其汗者因得噦所以然者胃中寒冷故也傷寒噦而腹滿者視其前後知何部不利利之即愈陽明病能食下之不解其人不能食攻其熱必噦所以噦者胃中虛冷故也又病人本虛伏熱在胃則胸滿胸滿則氣逆氣逆不可攻其熱攻其熱必噦二十八傷寒喘候傷寒太陽病下之微喘者外未解故也夫發汗後飲水多者必喘以水停心下腎氣乘心故喘也以水灌之亦令喘也二十九傷寒厥候厥者逆也逆者謂手足逆冷也此由陽氣暴衰陰氣獨盛陰勝於陽故陽脈為之逆不通於手足所以逆冷也傷寒一二日至四五日厥者必發熱前發熱者後必厥厥深熱亦深厥微熱亦微厥應下之而反發其汗者口傷爛赤傷寒先厥後發熱下利必自止而反汗出必咽喉中強痛其為喉痹發熱無汗而利必自止不止便膿血便膿血者其喉不痹傷寒先厥者不可下之後發熱而利者必自止見厥複利傷寒病厥五日熱亦五日設六日當復厥不厥之者自愈厥終不過五日以熱五日故知愈也發熱而厥七日而下利者為難治其脈促手足厥逆者可灸之下利手足厥無脈灸之不溫反微喘者死下利厥煩躁不能臥者死病六七日其脈數手足厥煩躁灸厥陰厥不還者死發熱下利至甚厥不止者死下利後其脈絕手足厥卒時脈還手足溫者生不還者死三十傷寒悸候悸者動也謂心下悸動也此由傷寒病發汗以後因又下之內有虛熱則渴渴則飲水水氣乘心必振寒而心下悸也太陽病小便不利者為多飲水心下必悸小便少者必苦裡急夫脈浮數法當汗出而愈而下之身體重心悸不可發汗當自汗出而解所以然者尺中微裡虛須表裡實津液自和便自汗出愈也三十一傷寒痙候痙之為病身熱足寒項頸強惡寒時頭熱面目熱搖頭卒口噤背直身體反張是也此由肺移熱於腎傳而為痙痙有剛柔太陽病發熱無汗而反惡寒為剛痙發熱汗出而惡寒為柔痙診其脈沉細此為痙也三十二傷寒心痞候太陽少陽並病脈浮緊而下之緊反入里則作痞痞者心下滿也病發於陰者不可下下之則心下痞按之自耎但氣痞耳不可復下也若熱毒氣乘心心下痞滿面赤目黃狂言恍惚者此為有實宜速吐下之三十三傷寒結胸候結胸者謂熱毒結聚於心胸也此由病發於陽而早下之熱氣乘虛而痞結不散也按之痛其脈寸口浮關上反自沉是也脈大不可下下之即死脈浮而大下之為逆若陽脈浮關上小細沉緊而飲食如故時小便利者名為臟結臟結病舌上白胎滑為難治不往來寒熱其人反靜舌上不胎者不可攻之
