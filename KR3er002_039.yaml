body:
  text: 卷之三十九婦人雜病諸候三凡四十論五十二月水不利無子候月水不利而無子者由風寒邪氣客於經血則令月水痞澀血結子臟陰陽之氣不能施化所以無子也五十三月水不通無子候月水不通而無子者由風寒邪氣客於經血夫血得溫則宣流得寒則凝結故月水不通冷熱血結搏子臟而成病致陰陽之氣不調和月水不通而無子也月水久不通非止令無子血結聚不消則變為血瘕經久盤結成塊亦作血症血水相併津液壅澀脾胃衰弱者水氣流溢變為水腫如此難可復治多致斃人養生方云少時若新產後急帶舉重子陰挺出或傾邪月水不瀉陰中激痛下塞令人無子五十四子臟冷無子候子臟冷無子者由將攝失宜飲食不節乘風取冷或勞傷過度致風冷之氣乘其經血結於子臟子臟則冷故無子五十五帶下無子候帶下無子者由勞傷於經血經血受風邪則成帶下帶下之病白沃與血相兼帶而下也病在子臟胞內受邪故令無子也診其右手關後尺中脈浮為陽陽絕者無子戶脈也苦足逆冷帶下故也五十六結積無子候五臟之氣積名曰積臟積之生皆因飲食不節當風取冷過度其子臟勞傷者積氣結搏於子臟致陰陽血氣不調和故病結積而無子養生方云月水未絕以合陰陽精氣入內令月水不節內生積聚令絕子不復產乳五十七數失子候婦人數失子者或由乖陰陽之理或由觸犯禁忌既產之後而數失兒乃非腑臟生病故可以方術防斷之也五十八腹滿少氣候腹滿少氣者由臟虛而觸風冷風冷搏於血氣故腹滿腹滿則氣壅在內而呼吸不足常如少氣之狀故云少氣腹滿也五十九胸脅脹滿候胸脅脹滿者由勞傷體虛而風冷之氣乘之客於臟腑腸胃之間搏於血氣血氣壅之不宣氣得冷則逆與血飲相搏上搶胸脅所以令胸脅脹滿也六十客熱候人血氣有陰陽臟腑有虛實實則生熱虛則受寒互相乘加此人身內陰陽冷熱自相乘也此云客熱者是體虛而將溫過度外熱加之非腑臟自生故云客熱也其狀上焦胸膈之間虛熱口燥或手足煩熱腸胃之內無實熱也六十一煩滿候煩滿者由體虛受邪使氣血相搏而氣逆上乘於心胸氣痞不宣故令煩滿煩滿者心煩胸間氣滿急也六十二身體卒痛候身體卒痛者由勞動血氣而體虛受於風冷客其經絡邪氣與正氣交擊於肌肉之間故身體卒痛也六十三左脅痛如刀刺候左脅偏痛者由經絡偏虛受風邪故也人之經絡循環於身左右表裡皆周遍若氣血調和不生虛實邪不能傷偏虛者偏受風邪今此左脅痛者左邊偏受病也但風邪在於經絡與血氣相乘交爭衝擊故痛發如刀刺六十四痰候痰者由水飲停積在胸膈所成人皆有痰少者不能為害多則成患但胸膈飲漬於五臟則變令眼痛亦令目眩頭痛也六十五嗽候嗽者肺傷微寒故也寒之傷人先傷肺者肺主氣候皮毛故寒客皮毛先傷肺也其或寒微者則咳嗽也六十六咽中如炙肉臠候咽中如炙肉臠者此是胸膈痰結與氣相搏逆上咽喉之間結聚狀如炙肉之臠也六十七喉痛候喉痛者風熱毒客於其間故也十二經脈有循頰喉者五臟在內而經脈循於外臟氣虛則經絡受邪邪氣搏於臟氣則生熱熱乘其脈熱搏咽喉故令喉痛也六十八癭候癭病者是氣結所成其狀頸下及皮寬膇膇然憂恚思慮動於腎氣腎氣逆結宕所生又諸山州縣人飲沙水多者沙搏於氣結頸下亦成癭也六十九吐血候吐血者皆由傷損腑臟所為夫血外行經絡內榮腑臟若傷損經絡臟腑則虛血行失其常理氣逆者吐血又怒則氣逆甚則嘔血然憂思驚怒內傷腑臟氣逆上者皆吐血也七十口舌出血候口舌出血者心脾傷損故也脾氣通於口心氣通於舌而心主血脈血榮於臟腑通於經絡若勞損臟腑傷動經脈隨其所傷之經虛者血則妄行然口舌出血心脾二臟之經傷也七十一汗血候汗血者肝心二臟虛故也肝藏血而心主血脈心之液為汗肝是木心是火母子也血之行內在腑臟外通經絡勞傷肝心其血脈虛者隨液發為汗而出也七十二金瘡敗壞候婦人金瘡未瘥而交會動於血氣故令瘡敗壞七十三耳聾候耳聾者風冷傷於腎腎氣通於耳勞傷腎氣風冷客之邪與正氣相搏使經氣不通故耳聾也七十四耳聾風腫候耳聾風腫者風邪搏於腎氣故也腎氣通於耳邪搏其經血氣壅澀不得宣發故結腫也七十五眼赤候眼眥赤者風冷客於眥間與血氣相搏而淚液乘之挾熱者則令眥赤七十六風眩鼻塞候風眩而鼻塞者風邪乘腑臟入於腦也五臟六腑之精氣皆上注於目血與氣並屬於腦體虛為風邪入腦則引目目系急故令頭眩而腑臟皆受氣於肺肺主氣外候在鼻風邪入腦又搏肺氣故頭眩而鼻塞七十七鼻衄候鼻衄者由傷動血氣所為五臟皆稟血氣血氣和調則循環經絡不澀不散若勞傷損動因而生熱氣逆流溢入鼻者則成鼻衄也七十八面黑皯候面黑皯者或臟腑有痰飲或皮膚受風邪皆令血氣不調致生黑皯五臟六腑十二經血皆上於面夫血之行俱榮表裡人或痰飲漬臟或腠理受風致血氣不和或澀或濁不能榮於皮膚故變生黑皯若皮膚受風外治則瘥腑臟有飲內療方愈也七十九面黑子候面黑子者風邪搏血氣變化所生夫人血氣充盛則皮膚潤悅若虛損疵點變生黑子者是風邪變其血氣所生若生而有之者非藥可治也八十蛇皮候蛇皮者由風邪客於腠理也人腠理受於風則閉密使血氣澀濁不能榮潤皮膚斑剝其狀如蛇鱗世呼蛇體也亦謂之蛇皮也八十一手逆臚候手逆臚者經脈受風邪血氣痞澀也十二經筋脈有起手指者其經虛風邪客之使血氣痞澀皮臚枯剝逆起謂之逆臚八十二白禿候頭瘡有蟲痂白而發禿落謂之白禿云是人腹內九蟲內蟯蟲值血氣虛發動所作也八十三耳後附骨癰候附骨癰是風寒搏血脈入深近附於骨也十二經之筋脈有絡耳後完骨者虛則風寒客之寒氣折血血痞澀不通深附於骨而成癰也其狀無頭但腫痛八十四腫滿水氣候水病由體虛受風濕入皮膚搏津液津液痞澀壅滯在內不消而流溢皮膚所以然者腎主水與膀胱合膀胱為津液之府津液不消則水停蓄其外候目下如臥蠶頸邊人迎脈動甚也脾為土主剋水而脾候肌肉腎水停積脾土衰微不能消令水氣流溢浸漬皮膚而腫滿八十五血分候血分病者是經血先斷而後成水病以其月水壅澀不通經血分而為水故曰血分婦人月經通流流則水血消化若風寒搏於經脈血結不通血水而蓄積成水腫病八十六卒腫候夫腫或風冷或水氣或熱毒此卒腫由腠理虛而風冷搏於血氣壅結不宣故卒然而腫其狀但結腫而不熱是也八十七赤流腫候赤流腫者由體虛腠理開而風熱之氣客之風熱與血氣相搏挾熱毒其狀腫起色赤隨氣流沖移易故云流腫八十八瘀血候此或月經痞澀不通或產後余穢未盡因而乘風取涼為風冷所乘血得冷則結成瘀也血瘀在內則時時體熱面黃瘀久不消則變成積聚癥瘕也八十九傷寒候此謂人觸冒於寒氣而成病冬時嚴寒攝衛周密者則寒不能傷人若卒苦勞役汗出觸冒寒氣即發成病謂之傷寒也其輕者微咳嗽鼻塞嗇嗇小寒吸吸微熱數日而歇重者頭痛體疼惡寒壯熱而膏腴之人肌膚脆弱雖不大觸冒其居處小有失宜則易傷於寒也自有四時節內忽有暴寒傷於人成病者亦名傷寒謂之時行傷寒非觸冒所致言此時通行此氣故為時行也九十時氣候此謂四時之間忽有非節之氣傷人而成病也如春時應暖而反寒夏時應熱而反冷秋時應涼而反熱冬時應寒而反溫言此四時通行此氣一氣之至無問少長病皆相似故名為時氣也但言其病若風寒所傷則輕狀猶如傷寒小頭痛壯熱也若挾毒厲之氣則重壯熱煩毒或心腹脹滿多死也九十一瘧候夫瘧病者由夏傷於暑客在皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱正邪相擊陰陽交爭陽盛則熱陰盛則寒陰陽更虛更盛故發寒熱陰陽相離則寒熱俱歇若邪動氣至交爭復發故瘧休作有時其發時節漸晏者此由邪客於風府循膂而下衛氣一日一夜常大會於風府其明日日下一節故其作日晏其發日早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏沖之脈其氣上行九日出於缺盆之內其氣既上故其病發更早其間日發者由邪氣內薄五臟橫連募原其道遠其氣深其行遲不能日作故間日蓄積乃發凡病瘧多渴引飲飲不消乃變為癖大腸虛引飲水入腸胃則變為利也
