body:
  text: 卷之二十七血病諸候凡九論一吐血候夫吐血者皆由大虛損及飲酒勞損所致也但肺者五臟上蓋也心肝又俱主於血上焦有邪則傷諸臟臟傷血下入於胃胃得血則悶滿氣逆氣逆故吐血也但吐血有三種一曰內衄二曰肺疽三曰傷胃內衄者出血如鼻衄但不從鼻孔出是近心肺間津出還流入胃內或如豆汁或如衄血凝停胃裡因即滿悶便吐或去數升乃至一斗是也肺疽者言飲酒之後毒滿便吐吐以後有一合二合或半升一升是也傷胃者是飲食大飽之後胃內冷不能消化則便煩悶強嘔吐之所食之物與氣共上衝蹙因傷損胃口便吐血色鮮正赤是也凡吐血之後體恆讝讝然心裡煩躁悶亂紛紛顛倒不安寸口脈微而弱血氣俱虛則吐血關上脈微而芤亦吐血脈細沉者生喘咳上氣脈數浮大者死久不瘥面色黃黑無復血氣時寒時熱難治也養生方云思慮傷心心傷則吐衄發則發焦也二吐血後虛熱胸中痞口燥候吐血之後臟腑虛竭榮衛不理陰陽隔絶陽虛於上故身體虛熱胸中痞則口燥三嘔血候夫心者主血肝者藏血愁憂思慮則傷心恚怒氣逆上而不下則傷肝肝心二臟傷故血流散不止氣逆則嘔而出血四唾血候唾血者由傷損肺所為肺者為五臟上蓋易為傷損若為熱氣所加則唾血唾上如紅縷者此傷肺也脅下痛唾鮮血者此傷肝關上脈微芤則唾血脈沉弱者生牢實者死其湯尉針石別有正方補養宣導今附於後養生方導引法云伸兩腳兩手指著足五指上愈腰折不能低著若唾血久疼為之愈長伸兩腳以兩手捉足五指七遍愈腰折不能低仰若唾血久疼血病久行身則可卷轉也五舌上出血候心主血脈而候於舌若心臟有熱則舌上出血如湧泉六大便下血候此由五臟傷損所為臟氣既傷則風邪易入熱氣在內亦大便下血鮮而腹痛冷氣在內亦大便血下其色如小豆汁出時疼而不甚痛前便後下血者血來遠前下血後便者血來近遠近者言病在上焦下焦也令人面無血色時寒時熱脈浮弱按之絶者下血七小便血候心主於血與小腸合若心家有熱結於小腸故小便血也下部脈急而弦者風邪入於少陰則尿血尺脈微而芤亦尿血養生方云人食甜酪勿食大酢必變為尿血八九竅四肢出血候凡榮衛大虛腑臟傷損血脈空竭因而恚怒失節驚忿過度暴氣逆溢致令腠理開張血脈流散也故九竅出血喘咳而上氣逆其脈數有熱不得臥者死九汗血候肝藏血心之液為汗言肝心俱傷於邪故血從膚腠而出也毛髮病諸候凡十三論一鬚髮禿落候足少陽膽之經也其榮在須足少陰腎之經也其華在發衝任之脈為十二經之海謂之血海其別絡上唇口若血盛則榮於鬚髮故鬚髮美若血氣衰弱經脈虛竭不能榮潤故鬚髮禿落其湯尉針石別有正方補養宣導今附於後養生方云熱食汗出勿傷風令發墮落又云欲理髮向王地既櫛發之始叩齒九通而微咒曰太帝散靈五老返真泥丸玄華保精長存左拘隱月右引日根六合清煉百神受恩咒畢咽唾三過能常行之發不落而生又云當數易櫛櫛之取多不得使痛亦可令待者櫛取多血液不滯髮根常牢二令生髭候手陽明為大腸之經其支絡缺盆上頸貫頰入下齒間髭者是血氣之所生也若手陽明之經血盛則髭美而長血氣衰少則不生三白髮候足少陰腎之經也腎主骨髓其華在發若血氣盛則腎氣強腎氣強則骨髓充滿故發潤而黑若血氣虛則腎氣弱腎氣弱則骨髓枯竭故發變白也其湯尉針石別有正方補養宣導今附於後養生方云正月十日沐發發白更黑又云千過梳頭頭不白又云正月一日取五香煮作湯沐頭不白又云十日沐浴頭不白又云十四日沐浴令齒牢發黑又云常向本命日櫛發之始叩齒九通陰咒曰太帝散靈五老返真泥丸玄華保精長存左拘隱月右引日根六合清煉百神受恩咒畢咽唾三過常數行之使人齒不痛發牢不白一雲頭腦不痛養生方導引法云解發東向坐握固不息一通舉手左右導引手掩兩耳以手復捋頭五通脈也治頭風令發不白又云清旦初起左右手交互從頭上挽兩耳舉又引鬚髮即面氣流通令頭不白耳不聾又云坐地直兩腳以兩手指腳脛以頭至地調脊諸椎利髮根令長美坐舒兩腳相去一尺以扼腳兩脛以頂至地十二通調身脊無患害致精氣潤澤髮根長美者令青黑柔濡滑澤發恆不白又云伏解發東向握固不息一通舉手左右導引掩兩耳令發黑不白伏者雙膝著地額直至地解發破髻舒頭長敷在地向東者向長生之術握固兩手如嬰兒握不令氣出不息不使息出極悶已三噓而長細引一通者一為之令此身囊之中滿其氣引之者引此舊身內惡邪伏氣隨引而出故名導引舉左右手各一通掩兩耳塞鼻孔三通除白髮患也又云蹲踞以兩手舉足五趾低頭自極則五臟氣偏至治耳不聞目不明久為之則令發白復黑又云思心氣上下四布正赤通天地自身大且長令人氣力增益發白更黑齒落再生四令長髮候發是足少陰之經血所榮也血氣盛則髮長美若血虛少則發不長須以藥治之令長五令發潤澤候足少陰之經血外養於發血氣盛發則光潤若虛則血不能養髮故發無潤澤也則須以藥治令其潤澤六發黃候足少陰之經血外養於發血氣盛發則潤黑虛竭者不能榮發故令發變黃七須黃候足少陽之經血外榮於須血氣盛須則美而長若虛少不足不能榮潤於外故令須黃八令生眉毛候足太陽之經其脈起於目內眥上額交巔血氣盛則眉美有毫血少則眉惡眉為風邪所傷則眉脫皆是血氣傷損不能榮養故須以藥生之九火燒處發不生候夫發之生血氣所潤養也火燒之處瘡痕緻密則氣血下沉不能榮宣腠理故發不生十令毛髮不生候足少陰之血氣其華在發足太陽之血氣盛則眉美足少陽之血氣盛則須美足陽明之血氣盛則發美手陽明之血氣盛則髭美諸經血氣盛則眉髭須發美澤若虛少枯竭則變黃白悴禿若風邪乘其經絡血氣改變則異毛惡發妄生也則須以藥敷令不生也十一白禿候凡人皆有九蟲在腹內值血氣虛則能侵食而蟯蟲發動最能生瘡乃成疽癬瘑疥之屬無所不為言白禿者皆由此蟲所作謂在頭生瘡有蟲白痂甚癢其上發並禿落不生故謂之白禿十二赤禿候此由頭瘡蟲食發禿落無白痂有汁皮赤而癢故謂之赤禿十三鬼舐頭候有人風邪在於頭有偏虛處則發禿落肌肉枯死或如錢大或如指大發不生亦不癢故謂之鬼舐頭面體病諸候凡五論一蛇身候蛇身者謂人皮膚上如蛇皮而有鱗甲世謂之蛇身也此由血氣痞澀不通潤於皮膚故也二面皰候面皰者謂面上有風熱氣生疱頭如米大亦如谷大白色者是養生方云醉不可露臥令人面發瘡疱又云飲酒熱未解以冷水洗面令人面發瘡輕者皶疱三面皯䵴候人面皮上或有如烏麻或如雀卵上之色是也此由風邪客於皮膚痰飲漬於腑臟故生皯䵴養生方云飽食而坐不行步有所作務不但無益乃使人得積聚不消之病及手足痹面目梨皯四酒鼓候此由飲酒熱勢沖面而遇風冷之氣相搏所生故令鼻面生皶赤皰幣幣然也五嗣面候嗣面者云麵皮上有滓如米粒者也此由膚腠受於風邪搏於津液津液之氣因虛作之也亦言因敷胡粉而皮膚虛者粉氣入腠理化生之也
