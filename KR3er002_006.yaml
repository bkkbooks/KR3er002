body:
  text: 卷之六解散病諸候凡二十六論一寒食散發候夫散脈或洪實或斷絶不足欲似死脈或細數或弦快坐所犯非一故也脈無常投醫不能識熱多則弦快有癖則洪實急痛則斷絶凡寒食藥率如是無苦非死候也勤從節度不從節度則死矣欲服散宜診脈候審正其候爾乃畢愈脈沉數者難發難發當數下之脈浮大者易發也人有服散兩三劑不發者此人脈沉難發發不令人覺藥勢行已藥但於內發不出形於外欲候知其得力人進食多是一候氣下顏色和悅是二候頭面身癢瘙是三候策策惡風是四候厭厭欲寐是五候也諸有此證候者皆藥內發五臟不形出於外但如方法服散勿疑但數下之則內虛當自發也諸方互有不同皇甫唯欲將冷廩丘公欲得將暖之意其多有情致也世人未能得其深趣故鮮能用之然其方法猶多不盡但論服藥之始將息之度不言發動之後治解之宜多有闕略江左有道弘道人深識法體凡所救療妙驗若神制解散對治方云鍾乳對術又對栝蔞其治主肺上通頭胸術動鍾乳胸塞短氣鍾乳動術頭痛目疼又鍾乳雖不對海蛤海蛤動乳則目痛短氣有時術動鍾乳直頭痛胸塞然鍾乳與術所可為患不過此也雖所患不同其治亦一矣發動之始要其有由始覺體中有異與上患相應便速服蔥白豉湯又云硫黃對防風又對細辛其治主脾腎通腰腳防風細辛動硫黃煩疼腰痛或瞋忿無常或下利不禁防風細辛能動硫黃硫黃不能動彼始覺發便服杜仲湯白石英對附子其治主胃通至脾腎附子動白石英煩滿腹脹白石英動附子則嘔逆不得食或口噤不開或言語難手腳疼痛覺發服生麥門冬湯紫石英對人參其治主心肝通至腰腳人參動紫石英心急而痛或驚悸不得眠臥或恍惚忘誤失性狂發或黯黯欲眠或憒憒喜瞋或瘥或劇乍寒乍熱或耳聾目暗又防風雖不對紫石而能動紫石紫石由防風而動人參人參動亦心痛煩熱頭項強始覺便宜服麻黃湯赤石脂對桔梗其治主心通至胸背桔梗動赤石心痛口噤手足逆冷心中煩悶赤石動桔梗頭痛目赤身體壯熱始覺發即溫酒飲之隨能數杯酒勢行則解亦可服大麥麨良復若不解復服術對鍾乳術發則頭痛目赤或舉身壯熱解與鍾乳同附子對白石英亦對赤石脂附子發則嘔逆手腳疼體強骨節痛或項強面目滿腫飲酒食麨自愈若不愈與白石英同解人參對紫石英人參發則煩熱頭項強解與紫石英同桔梗對赤石脂又對茯苓又對牡蠣桔梗發則頭痛目赤身體壯熱解與赤石同乾薑無所偏對有說者云藥性草木則速發而易歇土石則遲發而難歇也夫服藥草石俱下於喉其勢厲盛衰皆有先後其始得效皆是草木先盛耳土石方引日月也草木少時便歇石勢猶自未成其疾者不解消息便謂頓休續後更服或謂病痼藥微倍更增石或更雜服衆石非一也石之為性其精華之氣則合五行乃益五臟其滓穢便同灰土也夫病家氣血虛少不能宣通雜石之性卒相和合更相塵瘀便成牢積其病身不知是石不和精華不發不能致熱消疾便謂是冷盛牢劇服之無已不知石之為體體冷性熱其精華氣性不發其冷如冰而疾者其石入腹即熱既不即熱服之彌多是以患冷癖之人不敢寒食而大服石石數彌多其冷癖尤劇皆石性不發而積也亦有雜餌諸石丸酒單服異石初不息惟以大散為數而已有此諸害其證甚多小品方云道弘道人制解散對治方說草石相對之和有的能發動為證世人逐易不逆思尋古今方說至於動散臨急便就服之既不救疾便成委禍大散由來是難將之藥夫以大散難將而未經服者乃前有慎耳既心期得益苟就服之已服之人便應研習救解之宜異日動之便得自救也夫身有五石之藥而門內無解救之人輕信對治新方逐易服之從非棄是不當枉命誤藥邪檢神農本草經說草石性味無對治之和無指的發動之說按其對治之和亦依本草之說耳且大散方說主患注藥物不說其所主治亦不說對和指的發動之性也覽皇甫士安撰解散說及將服消息節度亦無對和的發之說也復有廩丘家將溫法以救變敗之色亦無對和的動之說若以藥性相對為神者栝蔞惡乾薑此是對之大害者道弘說對治而不辨此道弘之方焉可從乎今不從也當從皇甫節度自更改栝蔞便為良矣患熱則不服其藥惟患冷者服之耳自可以除栝蔞若虛勞腳弱者以石斛十分代栝蔞若風冷上氣咳者當以紫菀十分代栝蔞二法極良若雜患常疾者止除栝蔞而已慎勿加余物皇甫云然寒食藥者世莫知焉或言華他或曰仲景考之於實他之精微方類單省而仲景經有侯氏黑散紫石英方皆數種相出入節度略同然則寒食草石二方出自仲景非他也且他之為治或刳斷腸胃滌洗五臟不純任方也仲景雖精不及於他至於審方物之候論草石之宜亦妙絶衆醫及寒食之療者御之至難將之甚苦近世尚書何晏耽聲好色始服此藥心加開朗體力轉強京師翕然傳以相授歷歲之困皆不終朝而愈衆人喜於近利未睹後患晏死之後服者彌繁於時不輟余亦豫焉或暴發不常夭害年命是以族弟長互舌縮入喉東海王良夫癰瘡陷背隴西辛長緒脊肉爛潰蜀郡趙公烈中表六喪悉寒食散之所為也遠者數十歲近者五六歲余雖視息猶溺人之笑耳而世人之患病者由不能以斯為戒失節之人多來問余乃喟然嘆曰今之醫官精方不及華他審治莫如仲景而競服至難之藥以招甚苦之患其夭死者焉可勝計哉咸寧四年平陽太守劉泰亦沉斯病使使問余救解之宜先時有姜子者以藥困絶余實生之是以聞焉然身自荷毒雖才士不能書辨者不能說也苟思所不逮暴至不旋踵敢以教人乎辭不獲已乃退而惟之求諸本草考以素問尋故事之所更參氣物之相使並列四方之本注釋其下集而與之匪曰我能也蓋三折臂者為醫非生而知之試驗亦其次也服寒食散二兩為劑分作三帖清旦溫醇酒服一帖移日一丈復服一帖移日二丈復服一帖如此三帖盡須臾以寒水洗手足藥氣兩行者當小痹便因脫衣以冷水極浴藥勢益行周體涼了心意開朗所患即瘥雖羸困著床皆不終日而愈人有強弱有耐藥若人羸弱者可先小食乃服若人強者不須食也有至三劑藥不行者病人有宿癖者不可便服也當先服消石大丸下去乃可服之服藥之後宜煩勞若羸著床不能行者扶起行之常當寒衣寒飲寒食寒臥極寒益善若藥未散者不可浴浴之則矜寒使藥噤不發令人戰掉當更溫酒飲食起跳踴舂磨出力令溫乃浴解則止勿過多也又當數令食無晝夜也一日可六七食若失食飢亦令人寒但食則溫矣若老小不耐藥者可減二兩強者過二兩少小氣盛及産婦臥不起頭不去巾帽厚衣對火者服散之後便去衣巾將冷如法勿疑也虛人亦治又與此藥相宜實人勿服也藥雖良令人氣力兼倍然甚難將息適大要在能善消息節度專心候察不可失意當絶人事唯病著床虛所不能言厭病者精意能盡藥意者乃可服耳小病不能自勞者必廢失節度慎勿服也若傷寒者大下後乃服之便極飲冷水若産婦中風寒身體強痛不得動搖者便溫服一劑因以寒水浴即瘥以浴後身有痹處者便以寒水洗使周遍初得小冷當數食飲酒於意後憒憒不了快者當復冷水浴以病甚者水略不去體也若藥偏在一處偏痛偏冷偏熱偏痹及眩煩腹滿者便以水逐洗於水下即了了矣如此晝夜洗藥力盡乃止凡服此藥不令人吐下也病皆愈若膈上大滿欲吐者便餔食即安矣服藥之後大便當變於常故小青黑色是藥染耳勿怪之也若亦溫溫欲吐當遂吐之不令極也明旦當更服若浴晚者藥勢必不行則不堪冷浴不可強也當如法更服之凡洗太早則藥禁寒太晚則吐亂不可失過也寒則出力洗吐則速冷食若以飢為寒者食自溫常當將冷不可熱炙之也若溫衣溫食溫臥則吐逆顛覆矣但冷飲食冷浴則瘥矣凡服藥者服食皆冷唯酒冷熱自從或一月而解或二十餘日解當飲酒令體中醺醺不絶當飲醇酒勿飲薄白酒也體內重令人變亂若不發者要當先下乃服之也寒食藥得節度者一月轉解或二十日解堪溫不堪寒即以解之候也其失節度者頭痛欲裂坐服藥食溫作癖急宜下之或兩目欲脫坐犯熱在肝速下之將冷自止或腰痛欲斃坐衣厚體溫以冷洗浴冷石尉也或眩冒欲蹶坐衣裳犯熱宜淋頭冷洗之或腰疼欲折坐久坐下溫宜常令床上冷水洗也或腹脹欲決甚者斷衣帶坐寢處久下熱又得溫失食失洗不起行但冷食冷洗當風立或心痛如剌坐當食而不食當洗而不洗寒熱相結氣不通結在心中口噤不得息當校口但與熱酒任本性多少其令酒氣兩得行氣自通得噫因以冷水澆淹手巾著所苦處溫復易之自解解便速冷食能多益善於諸痛之內心痛最急救之若赴湯火乃可濟耳或有氣斷絶不知人時蹶口不得開病者不自知當須傍人救之要以熱酒為性命之本不得下者當斫齒以酒灌咽中咽中塞逆酒入腹還出者但與勿止也出復內之如此或半日酒下氣蘇酒不下者便殺人也或下利如寒中坐行止食飲犯熱所致人多疑冷病人又滯癖皆犯熱所為慎勿疑也速脫衣冷食飲冷洗也或百節痠疼坐臥太厚又入溫被中衣溫不脫衣故也臥下當極薄單布不著棉也當薄且垢故勿著新衣多著故也雖冬寒常當被頭受風以冷石尉衣帶不得系也若犯此酸悶者但入冷水浴勿忍病而畏浴也或矜戰惡寒如傷寒或發熱如瘧坐失食忍飢洗冷不行又坐食臭故也急冷洗起行或惡食如臭物坐溫食作癖也當急下之若不下萬救終不瘥也或咽中痛鼻塞清涕出坐溫衣近火故也但脫衣冷水洗當風以冷石尉咽顙五六遍自瘥或胸脅氣逆乾嘔坐飢而不食藥氣熏膈故也但冷食冷飲冷洗即瘥或食下便出不得安坐有癖但下之或淋不得小便為入坐溫處及騎馬鞍熱入膀胱也冷食以冷水洗小腹以冷石尉一日即止或大行難腹中牢固如蛇盤坐犯溫入積腹中干糞不去故也消酥若膏便寒服一二升浸潤則下不下更服即瘥或寒栗頭掉不自支任坐食少藥氣行於肌膚五臟失守百脈搖動與正氣爭競故也努力強飲熱酒以和其脈強冷食冷飲以定其臟強起行以調其關節酒行食充關節以調則洗了矣云了者是瑟然病除神明瞭然之狀也或關節強直不可屈伸坐久停息不自煩勞藥氣停止絡結不散越沉滯於血中故也任力自溫便冷洗即瘥云任力自溫者令行動出力從勞則發溫也非厚衣近火之溫也或小便稠數坐熱食及啖諸含熱物餅黍之屬故也以冷水洗少腹服梔子湯即瘥或失氣不可禁止者坐犯溫不時洗故也冷洗自寒即止或遺糞不自覺坐久坐下溫熱氣上入胃大腸不禁故也冷洗即瘥或目痛如剌坐熱熱氣衝肝上奔兩眼故也勤冷食清旦溫小便洗不過三日即瘥或耳鳴如風聲汁出坐自勞出力過矣房室不節氣迸奔耳故也勤好飲食稍稍行步數食節情即止或口傷舌強爛燥不得食坐食少穀氣不足藥在胃脘中故也急作梔子豉湯或手足偏痛諸節解身體發癰瘡硬結坐寢處久不自移徙暴熱偏並聚在一處或硬結核痛甚者發如癰覺便以冷水洗冷石尉微者食頃散也劇者數日水不絶乃瘥洗之無限要瘥為期若乃不瘥即取磨刀石火燒令熱赤以石投苦酒中石入苦酒皆破裂因搗以汁和塗癰上三即瘥取糞中大蠐螬搗令熟以塗癰上亦不過三再即瘥尤良或飲酒不解食不復下乍寒乍熱不洗便熱洗復寒甚者數十日輕者數日晝夜不得寐愁憂恚怒自驚跳悸恐恍惚忘誤者坐犯溫積久寢處失節食熱作癖內實使熱與藥並行寒熱交爭雖以法救之終不可解也吾嘗如此對食垂涕援刀欲自刺未及得施賴家親見迫奪故事不行退而自惟乃強食冷飲水遂止禍不成若絲髮矣凡有寒食散藥者雖素聰明發皆頑嚚告舍難喻也以此死者不可勝計急飲三黃湯下之當吾之困也舉家知親皆以見分別賴亡兄士元披方得三黃湯方合使吾服大下即瘥自此常以救急也或脫衣便寒著衣便熱坐脫著之間無適故小寒自可著小溫便脫即洗之即慧矣慎勿忍使病發也洗可得了然瘥忍之則病成矣或齒腫唇爛齒牙搖痛頰車噤坐犯熱不時救故也當風張口使冷氣入咽漱寒水即瘥或周體患腫不能自轉徙坐久停息久不飲酒藥氣沉在皮膚之內血脈不通故也飲酒冷洗自勞行即瘥極不能行使人扶曳行之帶寧違意勿聽從之使支節柔調乃止勿令過差過則使極更為失度熱者復洗也或患冷食不可下坐久冷食口中不知味故也可作白酒麋益著酥熱食一兩頓悶者冷飲還冷食或陰囊臭爛坐席厚下熱故也坐冷水中即瘥或腳趾間生瘡坐著履溫故也脫履著屐以冷水洗足即愈或兩腋下爛作瘡坐臂脅相親也以懸手離脅冷尉之即瘥或嗜寐不能自覺久坐熱悶故也急起洗浴飲冷自精了或有癖也當候所宜下之或夜不得眠坐食少熱在內故也當服梔子湯數進冷食或咳逆咽中傷清血出坐臥溫故也或食溫故也飲冷水冷尉咽外也或得傷寒或得溫瘧坐犯熱所為也凡常服寒食散雖以久解而更病者要先以寒食救之終不中冷也若得傷寒及溫瘧者卒可以常藥治之無咎也但不當飲熱藥耳傷寒藥皆除熱瘧藥皆除癖不與寒食相妨故可服也或藥發輒屏臥不以語人坐熱氣盛食少谷不充邪干正性故也飲熱酒飲食自勞便佳或寒熱纍月張口大呼眼視高精候不與人相當日用水百餘石澆不解者坐不能自勞又飲冷酒復食溫食譬如暍人心下更寒以冷救之愈劇者氣結成冰得熱尉飲則冰銷氣通暍人乃解令藥熱聚心乃更寒戰亦如暍人之類也速與熱酒寒解氣通酒氣兩行於四肢周體悉溫然後以冷水三斗洗之盡然了了矣河東裴季彥服藥失度而處三公之尊人不敢強所欲已錯之後其不能自知左右人不解救之之法但飲冷水以水洗之用水數百石寒遂甚命絶於水中良可痛也夫以十石焦炭二百石水沃之則炭滅矣藥熱雖甚未如十石之火也沃之不已寒足殺人何怨於藥乎不可不曉此意世人失救者例多如此欲服此藥者不唯己自知也家人皆宜習之使熟解其法乃可用相救也吾每一發氣絶不知人雖復自知有方力不復施也如此之弊歲有八九幸家人大小以法救之猶時有小違錯況都不知者哉或大便稠數坐久失節度將死候也如此難治矣為可與湯下之倘十得一生耳不與湯必死莫畏不與也下已致死令不恨也或人困已而脈不絶坐藥氣盛行於百脈人之真氣已盡唯有藥氣尚自獨行故不絶非生氣也或死之後體故溫如人肌腹中雷鳴顏色不變一兩日乃似死人耳或灸之尋死或不死坐藥氣有輕重故有死生雖灸之得生生非已疾之法終當作禍宜慎之大有此故也或服藥心中亂坐服溫藥與疾爭結故也法當大吐下若不吐下當死若吐不絶冷飲自了然瘥或偏臂腳急痛坐久藉持臥溫不自轉移熱氣入肌附骨故也勤以布冷水淹㩉之溫復易之或肌皮堅如木石枯不可得屈伸坐食熱臥溫作癖久不下五臟隔閉血脈不周通故也但下之冷食飲酒自勞行即瘥或四肢面目皆浮腫坐食飲溫又不自勞藥與正氣停並故也飲熱酒冷食自勞冷洗之則瘥或瞑無所見坐飲食居處溫故也脫衣自洗但冷飲食須臾自明瞭或鼻中作毈雞子臭坐著衣溫故也脫衣冷洗即瘥或身皮楚痛轉移不在一處如風坐犯熱所為非得風也冷洗尉之即瘥或腳疼欲折由久坐下溫宜坐單床上以冷水洗即愈或苦頭眩目疼不用食由食及犯熱心膈有澼故也可下之或臂腳偏急苦痛者由久坐臥席溫下熱不自移轉氣入肺胃脾骨故也勤以手巾淹冷水迫之溫則易之如此不過兩日即瘥凡治寒食藥者雖治得瘥師終不可以治為恩非得治人後忘得效也昔如文摯治齊王病先使王怒而後病已文摯以是雖愈王病而終為王所殺今救寒食者要當逆常理反正性或犯怒之自非達者得瘥之後心念犯怒之怨不必得治之恩猶齊王殺文摯也後與太子不能救況於凡人哉然死生大事也如知可生而不救之非仁者也唯仁者心不已必冒犯怒而治之為親戚之故不但其人而已凡此諸救皆吾所親更也試之不借問於他人也要當違人理反常性重衣更寒一反也飢則生臭二反也極則自勞三反也溫則滯利四反也飲食欲寒五反也癰瘡水洗六反也當洗勿失時一急也當食勿忍飢二急也酒必淳清令溫三急也衣溫便脫四急也食必極冷五急也臥必衣薄六急也食不厭多七急也冬寒欲火一不可也飲食欲熱二不可也常疹自疑三不可也畏避風涼四不可也極不能行五不可也飲食畏多六不可也居貧厚席七不可也所欲從意八不可也務違常理一無疑也委心棄本二無疑也寢處必寒三無疑也二解散痰癖候服散而飲過度將適失宜衣厚食溫則飲結成痰癖其狀痰多則胸膈痞滿頭眩痛癖結則心脅結急是也三解散除熱候夫服散之人覺熱則洗覺飢則食若洗食不時失其節度令石勞壅結痞塞不解而生熱故須以藥除之四解散浮腫候服散而浮腫者由食飲溫而久不自勞藥勢與血氣相併使氣壅在肌膚不得宣散故令浮腫或外有風濕內有停水皆與散勢相搏致令煩熱而氣壅滯亦令浮腫若食飲溫不自勞而腫者但煩熱虛腫而已其風濕停水而腫者則必腫而煩熱或小便澀而腫五解散渴候夫服石之人石勞歸於腎而勢沖腑臟腑臟既熱津液竭燥腎惡燥故渴而引飲也六解散上氣候服散將適失所取溫太過熱搏榮衛而氣逆上其狀胸滿短氣是也七解散心腹痛心凚候鬲間有寒胃脘有熱寒熱相搏氣逆攻腹乘心故心腹痛其寒氣盛勝於熱氣榮衛祕澀不通寒氣內結於心故心腹痛而心凚寒也其狀心腹痛而戰凚不能言語是也八解散大便祕難候將適失宜犯溫過度散勢不宣熱氣積在腸胃故大便祕難也九解散虛冷小便多候將適失度熱在上焦下焦虛冷冷氣乘於胞故胞冷不能制於小便則小便多十解散大便血候將適失度或取熱或傷冷觸動於石冷熱交擊俱乘於血致動血氣血滲入於大腸腸虛則泄故大便血十一解散卒下利候行上違節飲食失度犯觸解散而腸胃虛弱故卒然下利也十二解散下利後諸病候服散而飲食失度居處違節或霍亂或傷寒或服藥而下利利雖斷而血氣不調石勢因動致生諸病其狀或手足煩熱或口噤或嘔逆之類是也隨其病證而解之十三解散大小便難候積服散散勢盛在行內熱氣乘於大小腸大小腸痞澀故大小便難也十四解散小便不通候夫服散石者石勢歸於腎而內生熱熱結小腸胞內痞澀故小便不通十五解散熱淋候夫服散石石勢歸於腎若腎氣宿虛者今因石熱而又將適失度虛熱相搏熱乘於腎腎主水水行小腸入胞為小便腎虛則小便數熱結則小便澀澀則莖內痛故淋瀝不快也十六解散發黃候飲酒內熱因服石石勢又熱熱搏脾胃脾胃主土其色黃而候於肌肉積熱蘊結蒸發於肌膚故成黃也十七解散腳熱腰痛候腎主腰腳服石熱歸於腎若將適失度發動石熱氣乘腰腳石與血氣相擊故腳熱腰痛也其狀腳煩熱而腰攣痛十八解散鼻塞候石發則將冷其熱盡之後冷氣不退者冷乘於肺肺主氣開竊於鼻其冷滯結氣不宣通故鼻塞十九解散發瘡候將適失宜外有風邪內有積熱熱乘於血血氣壅滯故使生瘡二十解散癰腫候六腑不和而成癰夫服散之人若將適失宜散動熱氣內乘六腑六腑血氣行於經脈經脈為熱所搏而外有風邪乘之則石熱癰結血氣痞澀而成癰腫二十一解散煩悶候將適失宜冷熱相搏石勢不得宣化熱氣乘於臟故令煩悶也二十二解散嘔逆候將適失宜脾胃虛弱者石勢結滯乘於脾胃致令脾胃氣不和不勝於谷故氣逆而嘔調之即愈二十三解散目無所見目疼候將適失宜飲食乖度鬲內生痰熱痰熱之氣熏肝肝候目故目無所見而疼痛二十四解散心腹脹滿候居處犯溫致令石勢不宣內壅腑臟與氣相搏故心腹脹滿二十五解散挾風勞候本患風勞而服散石風勞未盡石勢因發解石之後體尚虛羸故猶挾風勞也二十六解散飲酒發熱候服散而積飲酒石因酒勢而盛敷散經絡故煩而發熱也
