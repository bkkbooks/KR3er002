body:
  text: 卷之十八濕䘌病諸候凡三論一濕䘌候濕䘌病由脾胃虛弱為水濕所乘腹內蟲動侵食成䘌也多因下利不止或時病後客熱結腹內所為其狀不能飲食忽忽喜睡綿綿微熱骨節沉重齒無色舌上盡白細瘡如粟若上唇生瘡是蟲食五臟則心煩懊若下唇生瘡是蟲食下部則肛門爛開甚者腑臟皆被食齒下上齦悉生瘡齒色紫黑利血而濕由水氣也脾與胃合俱象土胃為水穀之海脾氣磨而消之水穀之精化為血氣以養腑臟若脾胃和則土氣強盛水濕不能侵之脾胃虛弱則土氣衰微或受於冷乍傷於熱使水穀不消化糟粕不儐實則成下利翻為水濕所傷若時病之後腸胃虛熱皆令三尸九蟲因虛動作侵食五臟上出唇口下至肛門胃虛氣逆則變嘔噦蟲食腑臟傷敗利出瘀血如此者死其因脾胃虛微土氣衰弱為水濕所侵蟲動成䘌故名濕䘌也又云有天行之濕初得不覺行坐不發恆少氣力或微利或不利病成則變嘔吐即是蟲內食於臟又云有急結濕先因腹痛下利膿血相兼出病成翻大小便不通頭項滿痛小腹急滿起坐不安亦是內食五臟凡如此者雖初證未發於外而心腹亦常煩懊至於臨困䘌口及肛門方復生瘡即死也二心䘌候心䘌者由臟虛諸蟲在腸胃間因虛而動攻食心謂之心䘌初不覺他病忽忽嗜睡四肢沉重此䘌或食心則心煩悶懊痛後乃侵食余處診其脈沉而細手足冷內濕䘌在心也三疳䘌候人有嗜甘味多而動腸胃間諸蟲致令侵食腑臟此猶是䘌也凡食五味之物皆入於胃其氣隨其腑臟之味而歸之脾與胃為表裡俱象土其味甘而甘味柔潤於脾胃脾胃潤則氣緩氣緩則蟲動蟲動則侵食成疳䘌也但蟲因甘而動故名之為疳也其初患之狀手足煩疼腰脊無力夜臥煩躁昏昏喜妄默默眼澀夜夢顛倒飲食無味面失顏色喜睡起即頭眩體重䏶脛痠疼其上食五臟則心內懊惱出食咽喉及齒齦皆生瘡出黑血齒色紫黑下食腸胃下利黑血出食肛門生瘡爛開胃氣虛逆則變嘔噦急者數日便死亦有緩者止沉默支節疼重食飲減少面無顏色在內侵食乃至數年方上食口齒生瘡下至肛門傷爛乃死又云五疳一是白疳令人皮膚枯燥面失顏色二是赤疳內食人五臟令人頭髮焦枯三是蟯疳食人脊膂遊行五臟體重浮腫四是疳䘌食人下部疼癢腰脊攣急五是黑疳食人五臟多下黑血數日即死凡五疳白者輕赤者次蟯疳又次之疳䘌又次之黑者最重皆從腸里上食咽喉齒齦並生瘡下至穀道傷爛下利膿血嘔逆手足心熱腰痛嗜睡秋冬可春夏極又云面青頰赤眼無精光唇口燥腹脹有塊日日瘦損者是疳食人五臟至死不覺又云五疳緩者則變成五蒸五蒸者一曰骨蒸二曰脈蒸三曰皮蒸四曰肉蒸五曰血蒸其根源初發形候雖異至於蒸成為病大體略同皆令人腰疼心滿虛乏無力日漸羸瘦或寒熱無常或手足煩熱或逆冷或利或澀或汗也五蒸別自有論與虛勞諸病相從也九蟲病諸候凡五論一九蟲候九蟲者一曰伏蟲長四分二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟆七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲伏蟲群蟲之主也蛔蟲貫心則殺人白蟲相生子孫轉多其母轉大長至四五尺亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸多則為痔極則為癩因人瘡處以生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無者此諸蟲依腸胃之間若腑臟氣實則不為害若虛則能侵蝕隨其蟲之動而能變成諸患也二三蟲候三蟲者長蟲赤蟲蟯蟲也為三蟲猶是九蟲之數也長蟲蛔蟲也長一尺動則吐清水出則心痛貫心則死赤蟲狀如生肉動則腸鳴蟯蟲至細微形如菜蟲也居胴腸間多則為痔極則為癩因人瘡處以生諸癰疽癬瘻瘑疥齲蟲無所不為此既是九蟲內之三者而今別立名當以其三種偏發動成病故謂之三蟲也其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩手著頭相叉長引氣即吐之坐地緩舒兩腳以兩手從外抱膝中疾低頭入兩膝間兩手交叉頭上十二通愈三尸也又云叩齒二七過輒咽氣二七過如此三百通乃止為之二十日邪氣悉去六十日小病愈百日大病除三蟲伏尸皆去面體光澤也三蛔蟲候蛔蟲者是九蟲內之一蟲也長一尺亦有長五六寸或因腑臟虛弱而動或因食甘肥而動其發動則腹中痛發作腫聚去來上下痛有休息亦攻心痛口喜吐涎及吐清水貫傷心者則死診其脈腹中痛其脈法當沉弱而弦今反脈洪而大則是蛔蟲也四寸白蟲候寸白者九蟲內之一蟲也長一寸而色白形小褊因腑臟虛弱而能發動或云飲白酒一云以桑枝貫牛肉炙食並食生栗所成又云食生魚後即飲乳酪亦令生之其發動則損人精氣腰腳疼弱又云此蟲生長一尺則令人死五蟯蟲候蟯蟲猶是九蟲內之一蟲也形甚細小如今之蝸蟲狀亦因腑臟虛弱而致發動甚者則能成痔瘻疥癬癩癰疽瘑諸瘡蟯蟲是人體虛極重者故蟯蟲因之動作無所不為也
